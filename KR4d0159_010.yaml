body:
  text: 金壇後學于孔兼校表奉上皇太后册寶賀表臣某言臣恭聞十二月十二日奉上皇太后册寶者詔奉慈闈肇正母儀之位禮嚴寶册聿彰聖孝之隆臣某誠歡誠忭頓首頓首竊以聖人之德無大於事親天下之尊莫先于顯號欽惟母后體順坤元立子生商上協有娀之瑞維莘纘女逺同太姒之賢輔佐先朝儀刑內壼眷大明之保佑宜長樂之推崇恭惟皇帝陛下明德懋昭孝誠克篤暫阻慈顔之奉靡遑宸慮之安爰舉舊章式隆徽稱因親教愛眇四海以深仁率土均歡尚一人之有慶臣叨官邇列竊食外祠北靣稱觴顧走趨之莫預東朝視膳指旦暮以為期臣無任磨勘轉左朝散大夫謝表臣某言今月十八日伏奉告命以臣磨勘蒙聖恩授左朝散大夫依前充徽猷閣待制特封金壇縣開國男食邑三百戶差遣賜如故臣巳於當日望闕謝恩祗受訖計日為勞方慙功令進官以敘忽奉贊書撫躬何以堪任拜命莫知所措臣某誠惶誠懼頓首頓首伏念臣學非博古智昧趣時早玷明揚犬馬未伸於報效中遭難禍桑榆巳迫于衰殘誤𬒳聖知尚聯法從既竊祠庭之祿復安里社之私毫髮無功敢纍陟明之典絲綸假寵遂偕增秩之科併錫戶封肇開爵邑顧便蕃之下逮豈綿薄之能勝兹蓋伏遇皇帝陛下任賢使能立政造事欲熙庶績逺稽三考之文式謹銓曹大計羣吏之治苟未罹於罪咎咸獲𬒳於褒升有若孱庸獨多僥幸隆天重地固莫喻于洪恩殞首捐軀誓不移于素節臣無任紹興十二年再任宮觀謝表臣某言臣昨為宮觀任滿陳乞再任續承勑命候今任滿日令再任臣巳即時望闕謝恩祗受訖奉祠滿歲每懷尸素之慚錫寵自天再遂安間之請官不易舊得之若驚臣某誠惶誠懼頓首頓首伏念臣頃以瑣材謬陪法從勞能弗著罪戾彌深投間巳出于寬恩式序更躋於邇列中遭家禍誰憐陟岵之悲甫畢喪期首拜循墻之命既參華於內閣復叨祿於殊庭藏拙甚宜計功何有坐移歲籥時遽迫於終更仰叩宸旒志欲仍於舊貫敢圖洪造亟下俞音當桑榆遲暮之年荷天地隆寬之德矜其樗散賜以龍光揆厥所蒙其何以稱兹蓋伏遇皇帝陛下勵精庶政允釐百工道本曲成各隨材而因任仁由博愛咸稱物以無私故於下愚特從所欲臣敢不恪遵義訓謹佩忠規羞神武之衣冠顧餘生未能報國夢長安之鍾鼓雖一息不敢忘君指心誓天捐軀有日臣無任懿節皇后上仙慰表臣某言臣今月一日恭聞大行皇后奄棄宮闈伏讀詔音殞越失次臣某誠悲誠感頓首頓首伏以大行皇后淑德懿行居順履中早正六宮佇徽音之內肅方迎重翟俄訃問之北來逺暨寰區同深孺慕恭惟皇帝陛下禮先宗事望隔坤儀願少抑於皇情庶克安於邦計臣伏限職任在外不獲躬詣闕庭臣無任皇太后還闕賀表臣某言臣恭聞皇帝備法駕至臨平奉迎皇太后還宮者馳使節以交鄰爰示一人之孝奉慈闈而返國式均萬宇之歡光照册書福及宗社臣某誠歡誠忭頓首頓首竊以崇高莫大於富貴愛欽必盡于尊親故周武篤生實本維莘之慶而漢文踐祚乃先薄后之迎禮雖備于前聞事莫難于今日恭惟皇帝陛下堯仁天覆舜孝日隆瞻望母儀極徽音之逺想焦勞聖慮思順事以解憂精誠既格於窮旻盟好果通于殊壤風雲萬里宇宙一心共寬陟屺之思亟迓安輿之至駐臨平之法駕既展上儀奉長樂之慈顔即安大養盛德之事曠古所無臣竊祿祠庭叨官禁路東朝問膳想聞環珮之聲北靣稱觴阻造鴛鸞之列臣無任紹興十三年册立皇后賀表臣某言伏覩制書恭聞册立皇后禮成者天作之合禮既備于宮闈王假有家化巳行于寰宇一人襲慶萬世蒙休臣某誠歡誠忭頓首頓首臣聞治道所先人倫為大周南歸美于后德王化始基羲易正位于家人天下自定坐致本支之茂遹觀風俗之醇恭惟皇帝陛下性體堯仁躬行舜孝念祖宗繼嗣之重稽天地合德之宜奉承長樂之訓言聿嚴壼制參考永平之故事爰舉徽章告虔昭格於璇穹錫命寵臨于寶册在禮為稱于古有光臣叨備從班獲聞盛典彤史之修內治方率職於坤儀封人之祝多男佇迎祥於震索臣無任紹興十三年郊祀禮成賀表臣某言臣恭聞今月八日郊祀禮成大赦天下者秩彌文而饗帝既藏上儀斂諸福以錫民亟敷大號時方日至喜若春回臣某誠歡誠忭頓首頓首臣聞萬物皆本于天繼天者必嚴於父事五經莫重于祭主祭者尤謹于親郊允屬熙朝恪遵巨典恭惟皇帝陛下聖由天縱德以日新孝悌通于神明永奉東朝之養忠信行乎蠻貊坐寬北顧之憂時和歲豐而百谷順成兵寢刑措而四民休息丕顯中興之效比隆極治之時爰率舊章聿修大報肇新寶輅儼千乘萬騎之容謁欵紫壇罄一統二精之薦告成嘉祀翕受龎禧霈惠澤以旁流燭皇明而四逹盛德之事無疆惟休臣職忝外祠身違近著奉璋濟濟莫陪多士之班望闕蔥蔥均賴一人之慶臣無任紹興十四年再任宮觀謝表臣某言臣昨為宮觀任滿陳乞再任續奉勑命候命任滿日令再任臣巳即時望闕謝恩祗受訖官間竊寵有負明時秩滿自言更叨申命仰荷優隆之眷益增尸素之慙臣某誠惶誠懼頓首頓首伏念臣家世寒微材能淺陋頃由聖擢驟陟禁嚴用乃過于所期功蔑聞于有輔奉身去國尚聮內閣之榮無事居家更食外祠之祿顧何施於薄技敢自訴於終更方懼干誅忽蒙賜可俾遂桑榆之計獲依閭里之安內省庸虛實惟僥幸此蓋伏遇皇帝陛下懋昭大德纂紹丕圖坐收太平之功默運無為之化譬猶天地順萬物之自然故于臣工閔一夫之不獲俯納由衷之懇肆推從欲之仁大造難名固無容于報謝餘生未盡尚永誓于縻捐磨勘轉左朝請大夫謝表臣某言今月九日伏奉告命以臣磨勘蒙恩轉授左朝請大夫依前充徽猷閣待制進封開國伯加食邑四百戶臣于當日望闕謝恩祗受訖課最無稱方俟黜幽之命綸言下逮遽頒進秩之恩得過所期悸不自定臣某誠惶誠懼頓首頓首伏念臣生逢休運夙荷聖知問學不工徒抱朴忠之志材能巳試蔑聞施設之方既謬職于禁途更猥叨于祠館官間身逸處巳則優月耍日成計功何有苟逭偷安之譴敢希式序之榮忽拜寵靈併增爵邑考循名責實之政負尸祿素餐之慚豈伊庸虛有此僥幸茲蓋伏遇皇帝陛下翕受九德允釐百工爰稽考績之文率循三歲寧失假人之器敘進一官有如樗散之微亦預階升之列臣敢不恭承眷渥益勵操修景迫桑榆顧餘生未能報國身居畎畒雖一日不敢忘君臣無任紹興十五年正旦大朝會賀表臣某言臣恭聞正旦大朝會應外任臣僚合進表稱賀者獻歲發春爰啓三微之序體元居正式嚴百辟之朝惟稽古之上儀自中興而創見神人胥恱夷夏交歡臣某誠歡誠忭頓首頓首臣聞時莫重于履端禮必先於明分肇新寶曆布一歲之始和大開明堂會四方而來賀豈惟正班爵之義蓋以隆當寧之尊屬在熙朝舉兹曠典恭惟皇帝陛下靣稽天德順履乾行合三統于一元既協夏時之正考六年于五服乃參周制之宜用詔羣司具嚴備物玉帛盛塗山之會鼓鍾奏鈞天之和辨會星陳拱千官于北極嵩呼雷動祝萬壽于南山韙兹太平之文時乃盛德之事臣叨恩祠館謬職從班身滯周南念莫陪于執戟心存魏闕恍若侍于凝旒臣無任紹興十六年郊祀禮成賀表臣某言臣恭聞今月十日郊祀禮成大赦天下者升禋泰峙熙事告成旋蹕端闈恩書亟下繫一人之有慶合萬宇以均歡臣某誠歡誠忭頓首頓首竊觀祖宗以來咸以祭祀為重考之昭代參厥禮經謂因天事天亘百王而同軌故以聖繼聖率三歲而一郊垂𥙿後昆克遵舊典恭惟皇帝陛下誕膺寶命纂紹丕圖治巳格于敷天不擅成功之美禮特隆于饗帝是彰報本之誠申大號以戒期詔司存而藏事具嚴法駕來羣后之駿奔欽若昊穹秩明靈而裒對方茂凝于景貺遂敷錫于庶民迎日之陽配天其澤用布積和之氣益昭明德之馨無疆之休于斯為盛臣官叨近列職奉外祠祗薦一純莫預豆籩之執燭明四極徒知葵藿之傾臣無任丁母憂服闋從吉再任宮觀謝表臣某言今月二日伏奉勑命以臣前任左朝請大夫充徽猷閣待制提舉亳州明道宮緣丁母憂服闋從吉特蒙聖恩授臣依前官職改差提舉江州太平興國宫任便居住臣巳於當日望闕謝恩祗受訖親喪外除餘哀未能皇恩下逮舊寵惟新衰殘曷稱於寵光感戴惟增於雨泣臣某誠惶誠懼頓首頓首伏念臣學非考古仕本為貧偶蒙聖哲之知擢與禁嚴之列方喜便私而求志不圖昧祿以挻災銜恤去官但苟延於視息變除終制敢復望于恩榮忽詔命之俯臨敘班聯而如故惕然拜賜恍若更生茲蓋伏遇皇帝陛下廣大配天照臨若日惟恐一夫之不獲由成萬物而無遺遂俾陋庸再叨寵渥隆天厚地知大造之難酬鏤骨銘肌豈餘生之敢愛臣無任紹興十九年郊祀禮成賀表臣某言臣恭聞今月十四日郊祀禮成大赦天下者三歲而郊既備成于熙事一人有慶遂敷錫于庶民和氣所加歡聲相屬臣某誠歡誠忭頓首頓首臣聞國重祀典禮嚴事天自書契以來莫不舉彌文而咸秩唯聖王在上乃能盡精意以感通考古所行於今為盛恭惟皇帝陛下躬勤治道坐格時雍推大有尚賢之誠享既醉太平之福爰思報本丕闡上儀備法駕之嚴恭仰奉一純之荐恍神光之止集誕膺百順之歸嘉與黔黎並蒙景貺恩書亟下霈澤旁流逺同六合之氣增壽萬年之策臣竊祿祠館叨榮從班目斷鴛鸞莫預駿奔之列身同麛鹿但知率舞之勤臣無任磨勘轉左朝議大夫謝表臣某言臣今月二十六日伏奉告命以臣磨勘蒙恩轉授左朝議大夫依前充徽猷閣待制進封丹陽郡開國侯加食邑四百戶差遣使如故臣巳於當日望闕謝恩祗受訖計三歲羣吏之治方懼黜幽奉一禮十行之書遽叨進秩寵榮過望局蹐靡容臣某誠惶誠懼頓首頓首伏念臣志不自強材無所取蚤誤膺于睿奬遂躐置于華途誠巳無功尚玷西淸之列坐而得祿更陪真館之遊身獲家居官無吏責自視衰殘之久巳慚天冒之多敢意洪慈載加式序班聮既進爵邑更新欣蒲柳之再榮竦閭閻而動色茲蓋伏遇皇帝陛下功高邃古治格丕平任賢使能皆諒
