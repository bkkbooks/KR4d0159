front:
  text: 華陽集卷第三十九
  hash: sha256:92f463e8249a8be71ddfc47c377493cd243af95dd5cac58e59cc7f2d58eb1407
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0159_SBCK_039-1a}
body:
  text: 金壇後學于文熙校長短句念奴嬌次韻蔣仲逺是日醉甚逃席論思厭久動蓴鱸淸興輕辭丹極佩玉腰金歸故里光照湖山秋色八坐儀刑九重尊寵才大今詞伯漢庭豪俊一時誰是勍敵三徑舊日家聲華堂深穩處頻開瑤席春在壺中真自有一境珠宮仙掖談麈揮風罰籌如蝟數困樽前客故應元放舉杯狂醉輕擲二次韻李公顯木犀多情宋玉值西風搖落悲秋時節賴有幽芳深解意的皪枝頭爭發欲語含羞斂容微笑心事如何說暗香時度捲簾留伴霜月誰為賦寫仙姿揮毫落𥿄有樽前詞客獨倚䦨干須信道消得孤吟愁絶𥙷闕騷經拾遺香傳頓許居前列品題多謝一枝當為君折靑門飲京師送王敏求歸鄉踈柳飄零暮鴉寒集都門送客斜陽影裏野色沉沉翠微隱隱遙指故鄉雲外聚久交情厚對西風爭忍分𬒮飲散賔朋畫船去也平蕪千里因記小軒無寐觀夜月憑䦨共論深契絳帳淸間杏檀優暇當念宴遊同醉南北煙波逺願無忘音書頻寄未知名宦拘人異日相逢何地驀山溪甲辰生日小窗開宴草草杯盤具歡喜走兒童慶生朝一年一度風光好處恰是小春時香泛泛酒醺醺一曲歌金縷吾今巳醉解作醒時語千里念重親望家山雲天盡處深深發願只願早休官居顔巷戲萊衣歲歲長歡聚臨江仙次韻陳少陽重九緑􅾹浮觴香泛泛黃花共薦芳辰淸霜天宇淨無塵登高宜有賦拈筆戲成文可奈園林搖落盡悲秋意與誰論眼中相識幾畨新龍山高㑹處落帽定何人二堅生日追想京都全盛日蓬弧初記生時朝來朱紱照庭闈誰知衰謝老還有寧馨兒休說藍田生美玉舉杯聽取歌詞年方彊仕未應遲高風輕借便一鶚看橫飛滿庭芳生日十月風光小春時候燕堂初啓朱筵博山雲潤風細梟晴煙坐有文章公子爭吟唱詩滿花箋簾帷裏時聞笑語今日間生賢郎潜雖未貴虛名自有清議推先更那堪高堂重慶兼全占取人間樂事何必羡玉帶貂蟬飛觴處深深更祝龜鶴永齊年二榮國生日風軋雲低寒催臘近畫堂和氣先春玳筵初啓佳㑹慶生辰漏轉高張寶炬重簾邃深炷爐薰歡聲裏清歌間發一曲繞梁塵慈闈春不老山河象服恩𬒳絲綸占人間榮貴蘭玉詵詵便好金尊盡醉殷勤勸須滿十分深深願斑衣拜舞千歲奉靈椿萬年歡榮國生日歲晚寒凝正蓂舒四葉梅吐孤芳慶誕佳辰開筵盛集萱堂合坐春回錦繡捲簾處花簇笙簧除樂禁初許聞韶應時歡宴何妨人言富貴最好算有誰能兼福壽康彊自是仙姿天教占取恩光百和重添寶炷十分勸頻舉瑶觴仍教畫嘉慶新圖要看蘭桂成行浣溪沙榮國生日三首羅綺爭春擁畫堂翠帷深處按笙簧寶奩頻炷鬱沉香海上蟠桃元未老月中仙桂看餘芳何須龜鶴頌年長二臘日銀罌翠管新潘輿迎臘慶生辰捲簾花簇錦堂春百和寶薰籠瑞霧一聲珠唱駐行雲流霞深勸莫辭頻三象服華年兩鬢青喜逢生日是嘉平何妨開宴雪初晴酒勸十分金鑿落舞催三疊玉娉婷滿堂歡笑祝椿齡四安人生日過隙光陰還自催生朝又送一年來宴堂深處彊追陪眼眩豈堪花裏笑眉攢聊向酒邉開與君同醉莫辭杯點絳唇榮國生日二首飛雪初晴曉來佳氣生庭户寶薰籠霧簾幕香風度鶴髮龜齡堂上潘輿駐花深處緩歌金縷莫惜杯頻舉二羅幕重重畫堂迎臘和風轉玳筵高展知是羣仙宴銀鴨香浮紅䄂翻歌扇金杯勸深深祝願爭把蟠桃獻江城子和呂丞送進士赴省寶津樓下柳陰重畫橋東戲魚龍聞喜當時開宴盛儀容遙想新年尋故事扶醉帽夕陽中可憐衰鬢颯霜叢借􅋳紅遣愁濃夢入長安驚起送飛鴻直下青冥休避路九萬里看摶風緑頭鴨次韻王伯壽斂晴煙桂華如水輕寒宴中秋朋簪來㑹滿筵緑鬢朱顔罄樽罍興吞海量妙歌吹聲徹雲端獨念衰殘彊陪歡笑恍然感舊覺悲酸功名志黃梁曉夢老去奈何天休追悔天應教人贏取身閒想姮娥情都如舊也須知我貪歡奈潘鬢霜蓬漸滿况沈腰革帶頻寬月有重圓人誰長健一回相見一回難王夫子看君風度何不早彈冠莫學我年年對月扶病江干二次韻陳季明愛家山坐來心與雲間念平生功名有志暮年多病知難眷簮纓未容引去奈猿鶴久巳催還松菊關情蓴鱸引興昔人高韻照塵寰細追想山林鍾鼎從古罕兼全歸來好皇恩賜可拂䄂欣然望西清猶叨法從夢魂寧隔台躔蒔七松便為小隱開三徑且樂餘年賔友相過雞豚為具從容聊作飲中仙君試聽陽春佳闋今日恰新傳休辭酒從教醉舞踏碎花氈感皇恩休官解組盛明時角巾東路家在深村更深處掃開三徑坐看一川煙雨故山休笑我來何暮苦貪富貴多憂多慮百歲光陰能幾許醉鄉日月莫問人間寒暑興來隨短棹過南浦朝中措安人生日年時生日燕高堂歡笑擁爐香今日山前停棹也須隨分飛觴東陽太守擕家遠去方遡桐江把酒祝君長健相隨歸老吾鄉二前年十二月十八日入對遂除吏侍今在婺逢臘月十八日也前年初對大明宮寒律轉春風幾度鄉關歸夢催成兩鬢霜蓬山州歲晚還逢令節空記前蹤莫遣酒兵相向愁城生怕頻攻三臘日休驚初臘凍全消旬日是春朝梅吐芳心半笑柳含青眼相撩風光如許那知太守老去無憀乘興方思把盞歸心巳逐輕橈鳯栖梧安人生日五日小春休屈指花發西軒早巳傳春意應為高堂催燕喜一枝得得來呈瑞綺席初開雲幕邃蘭蕙騰芳人在蓬壺裏壽酒滿斟那惜醉錦囊行拜恩封貴二雨洗軒庭迎晚照黃菊才芳未覺秋光老怪底烘堂添語笑姮娥此夜來蓬島獻壽新詞誰解道滿眼兒孫著語皆爭巧㶑灔金杯休惜釂追歡不怕霜天曉三婺州席上風勤飛霙迎曉霽銀海光浮宴啓羣仙㑹騎省流芳誰可繼樽前看取連枝貴華髮衰翁羞晚歲未報皇恩尚忝專城寄酒入愁腸應易醉巳拚一醉酬君意四癸未生日老去光陰驚掣電生長元豐試數今誰健多謝天公憐歲晚淸時乞得身閒散憶首生朝叨睿眷臺餽頒恩內酒當筵勸今日衰殘歡意鮮舉杯目斷堯天逺五丁宅二侍兒緩帶垂紅雙侍女綵鳯銜來秀色生庭戶轉蕙光風香暗度回眸綽約神仙侶寡和淸歌聲激楚夜飲厭厭勸我杯頻舉只恐酒䦨催暮雨憑誰約斷陽臺路好事近梅柳梅柳約東風迎臘暗傳消息粉靣翠眉偷笑似欣逢佳客晚來歌管破餘寒沉煙裊輕碧老去不禁巵酒奈樽前春色菩薩蠻上元重簾捲盡樓頭日華燈萬點歡聲入老病莫憑欄一城星斗寒艷粧翻舞雪目眩紅生纈不是故無情羞君雙鬢靑二南山只與溪橋隔年來厭著尋山屐臥對曲屏風淡煙踈雨中功成投老去判作林塘主萬事不關心酒杯紅浪深清平樂上元紅蓮照晚花底明人眼無限遊人誰惜倦只有衰翁心懶笙歌緩引更籌更䦨客散添愁香霧半窗幽夢煙波千里歸舟人月圓壬午生日時初遇㑹慶節至翌日小集封人祝望堯雲了歸路藹歡聲何妨明日開筵笑語聊慶𥘉生官閒歲晚身猶健蘭玉更盈庭持杯為壽從教夜醉誰怕參橫西江月壬午生日易老方驚晚歲難禁又報生朝從他華髮轉蕭蕭且共尊前一笑為具隨宜餖飣烘堂不用笙簫只煩歡伯散無憀醉裏追回年少惜分飛次韻丁希閔年少春心花裏轉只恐飛花片片沉醉歸深院妓衣何用令高捲要看梁州初入遍放出樓中舞燕有服何曾見看來未足重開宴减字木蘭花安人生日思堂醇酹滿酌金杯爭獻壽記取年時頭白成雙唱舊詞莫言秋晚五日小春黃菊綻折一枝來綸誥金花要並開華陽集卷第三十九畢
