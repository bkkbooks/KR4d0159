body:
  text: 金壇後學于孔兼校啓賀朱相啓伏審誕膺渙號進位台司巖石彌崇復見儀刑之舊廟堂增重載圗弼亮之勳善類有歸斯艾大振竊以興邦之要論相為先冠羣后而輔一人非宿德重望不足以副倚毗之任撫四夷以安百姓非深智遠略不足以盡康濟之冝矧當兵火瘡痍之未瘳欲繼紀綱壞亂之遺緒顧茲體大尤見才難申甫相周宣王有復古之美寇鄧佐漢光武致中興之功要在任得其人不然何以能國恭惟某官建標天地論篤古今盛德粹溫氣備四時之正雄文雅健風同三代之醇早依日月之光亟濟雲龍之會遭府不競秉國之鈞翊萬乘於兵戎出沒之中屹長城而外距撫羣情於凶孽創攘之際遡大川而獨航遂正君臣再安社稷方閔勞於機務旋屬望於蒼生趣赴鋒車還服衮職上既悔用於新進偉舊德之登庸人皆喜見於老成跋同心而輔政儀圖大計恢復中原佇觀賢者之所為將與天下而同慶某賦性甚陋辱知最深逖聞新命之傳倍激歡悰之切賀信州連顯謨啓伏審光奉除書遠臨巨屏一麾出守暫分宵旰之憂千里承風巳服神明之政恭惟某官才不世出道與時行養之有源學問窮於壼奧發而中節功業蓋其緒餘粵從清切之班屢屈藩宣之寄遇盤根而必解恢遊創而有餘矧茲上饒實古名郡徒得君重載煩臥閣之能既結主知即赴追鋒之召如某譾陋夙荷眷存回想石渠恍英遊之若夢聳瞻熊軾覺良晤之有期歡抃之懷敘言曷究回宣州沈待制啓上同前至之寄矧宣城之故郡多謝公之遺民獄訟不繁笑談可辦雙溪疊嶂想未厭於登臨一札十行諒即膺於圖任如某譾陋夙荷眷存發策宸庭既識鵾鵬之化觀風獄市更聞𥜗袴之謠念良覿之尚賖辱華箋之先及謙沖則至愧佩何言與交代張提刑啓伏審寵拜宸恩榮持使節將有光於前政用深慶於得人恭惟某官問學得之淵源才猷稟乎精粹論篤古人之事力行憂國之言含香握蘭謂即外於華近登車攬轡猶暫屈於澄清簡自淵衷惠兹江左兼六條而並舉聳一路之遐觀滯訟將平反而出之巨姦有投劾而去者眷言孱陋夙仰聲華未修望履之勤遽有交符之契簸粳揚粃不自意於居前藏垢匿瑕尚卒叨於餘蔭嚴冬屆候行李在途偭惟跋履之勞默有神明之佑除左司謝宰相啓仰止三台方極掃門之願藐兹一介遽叨推轂之勤顧何幸以當能凛不知其所措常謂治道莫難於今日圖功宜急於任賢故凡朝廷之官皆為擢用至於宰相之屬尤號要司贊紀綱出納之權茂省闥彌綸之望名雖别於左右事咸總於劇繁異時臺閣華資間由此出有若廟堂餘論亦或與聞惟遴柬於名流乃克堪於器使顧如某者將焉用之材無博敏之稱學有迂愚之誚仕中都者八任自揣何功更靖康之初元始從外輔歲月謾淹於待次馳驅靡效於平反正合投間敢期妄進上方考御名其相端欲收委任之功命曰惟暨乃僚庶幾獲同心之助殊不自意辱此誤恩茲蓋伏遇某官夙高衛社之忠懋贊經邦之業載專揆路益峻民瞻支大厦於將傾獨任棟隆之吉秉洪鈞而密運坐施工宰之平耻一事之或失其宜收羣材而各致其用肆時掾佐採及庸虛詳整自持固無及古人之事勤勞可效誓將酬國士之知復待制謝宰執啓罪如山積方置散於窮鄉恩自天回遽叨榮於邇列撫躬何以得此承命不知所云伏念某學不造乎古人性難諧於世俗頃從踈逺誤辱明揚幸得陪兩省論議之餘亟欲報千載聖神之遇笑王孫之失問肯懷媚竈之私多謝息之能官獨信挈瓶之守煩言可畏素志莫移張相自之遇字下改云雖知進未能知退每懷據蒺之憂然守道不如守官姑盡挈瓶之智慮無一得技巳五窮忽聞云云逮聞禍發於駭機始覺身危於纍卵屈從薄責仰荷洪仁懲沸吹虀一飯敢忘於往咎看山柱頰終身巳分於長間不謂孤蹤驟蒙渥澤釋其罪罟寵以恩綸多病早衰竊隆名以畢桑榆之景雙親益老資厚祿以奉菽水之歡獲幸為多歸誠有自此蓋伏遇某官奮庸上宰允迪大猷二參云望高人傑躬秉國鈞絶朋邪以開衆正之門拯陷溺而與自新之路謂觀過各於其黨或公論之可申顧於人無所不容豈一眚而遂廢有如疵賤亦與甄收謹當欽佩訓詞恪守名節參西清之鴛鷺巳容叨昧於明時挂神武之衣冠尚覬矜從於它日情之所感言不能文通朱相啓逖違鼎席四序倐其將周屏伏衡門尺書曠而弗嗣坐念闊踈之迹曷勝慚懼之心仰恃洪私尚垂簡照恭惟某官學窮今古道貫天人蚤膺巖夢之求遂陟台符之峻挺夷險之一節更勤勞之百為子儀再造唐家名高而朝不忌叔敖三相楚國功大而身愈卑自遭閔艱亟解機務方奪情於優詔俄力請以終喪隙駟如馳慨祥琴之既御鋒車促駕趣召節以非遙即覲宸庭還登揆路瞻儀刑於舊德大恢復乎新疆庶寬宵旰之憂式副黔黎之望某夙承眷奬預切傾依徂暑屆時尚災威之未解明神來相諒素履之多祥願益保綏下符虔祝賀趙相冬啓黃鍾應律肇基四氣之和紫極當陽共和一人之慶維時上宰與國皆昌恭惟某官偉德望以端朝輔聖神之休運載安社稷全濟黔黎天地為爐獨秉甄陶之化河山作誓蔚高帶礪之勳茲茂對於初陽宜倍膺於多福益隆國棟永贊皇圖某謬忝官聮過叨奬豫瞻言衮席曾莫預於進趨跧伏衡門但彌勤於祝頌丁父憂服闋上宰相啓門牆掃迹一終俄紀於周星里社偷生尺素莫通於記室非仰恃於高明之照敢自踈於舊賤之知惟是傾瞻不忘窹寐恭惟某官載登鼎席獨運廟堂同德一心具著弼諧之效參天兩地丕昭寅亮之功維巖益峻於民瞻隆棟遂強於國體以內則境土復版圖之舊靡煩一鏃之施以外則戎虜交玉帛之歡行迓兩宮之返惟茲盛事從古罕聞中興之期可坐而策眷乃衰殘之迹曷勝訟詠之私哀制甫終顧無階於望履商飊方厲願益保於沖襟服闋上執政啓逖違台席不知歲月之流屏伏衡茅莫貢寒溫之問念夙承於眷遇敢自置於闊踈宏度所臨愚衷必鑒恭惟某官名垂宇宙義薄雲天素韜廊廟之姿出際休明之運臯夔並駕精神足以折衝揚馬同時文章蓋其餘事自入參於大政乃益勵於深忠用宏經世之規坐翊丕天之縡皇威克振版圖俄復於齊疆虜氣潛銷宗社再安於周鼎惟兹盛事云云同前賀鎮江孟郡王到任啓伏審光膺制詔出殿翰藩下車云初闔境相慶恭惟某官懋昭令德允迪大猷孤忠久簡於上心重寄獨當於方靣江山改觀草木知名大纛高牙方迓鎮臨之寵耕田鑿井巳銷愁歎之聲自念餘生夙欽高義顧養痾於閭里未遂披瞻惟竊芘於帡幪實增欣幸賀張樞密冬啓律應黃鍾肇一陽之獨復氣調玉燭先四序以均和履德之基順時以正恭惟某官當朝宿望濟世元勳茂迎剛長之宸坐享朋來之福全師保勝折衝將靖於邉陲舍爵策勳爰立佇歸於廊廟顧如孱瑣夙荷眷知命數多艱適有負薪之疾筋骸難強莫遑細柳之趨瞻望門牆第深祝頌賀朱相冬啓羲畫分爻陽應地雷之復周正建子法垂象魏之和品彚時亨賢哲道長恭惟某官功存廟社名在鼎彞坐迎日至之辰順履朋來之福仰梁公於北斗獨推耆德之高起謝傅於東山佇慰蒼生之望惟兹朽鈍夙荷眷知千里瞻言短羽莫陪於燕厦八年遠迹舊陰徒想於桃蹊乞再任宮祠上宰相啓屏處丘樊仰鈞衡之在望寖更歲籥曠竿牘而弗修唯有傾瞻不忘窹寐恭惟某官位尊上衮德冠三階立社稷之殊勳自生民以來而未有修祖宗之故事雖百世不易而可知公道方行斯文不墜山甫中興於周室子儀再造於唐家蔚高不世之名允屬當朝之傑眷言孱瑣忝迹簮紳橫草無功心甚慚於犬馬負薪有疾齒遽迫於桑榆方貪竊食之安再力奉祠之請所期終惠以苟餘生兀若朽株顧難勝於風雨渠然厦屋願永託於帡幪賀鎮江汪內翰到任啓伏審錫命中宸更符巨鎮旌騎方聞於壓境閭閻巳浹於歡聲某官德配古人名重當世獻納蚤膺於皇眷文章獨掞於天庭粵從清切之班屢出蕃宣之寄雙溪疊嶂固未厭於登臨一札十行俄復頒於寵渥以鐵甕江山之勝付玉堂詞翰之宗風醇而獄訟不繁事至而笑談可辦汲長孺之治民清靜信臥閣而有餘黃潁川之下詔稱揚諒迫鋒之不晚顧兹朽鈍久辱眷知占籍治封正賴帡幪之芘杜門臥疾尚稽桑梓之恭緬想光儀但增欣抃賀鎮江蔣龍圖到任啓伏審十行奉詔閔煩飛挽之勞一水揚􅦬就屈藩宣之寄歡聲載路和氣回春某官學富家傳才優世用早踐更於中外獨藹著於聲華木牛流馬之功方仰資於國計皂蓋朱􅙲之寵俄易卑於藩條佇見褒嘉亟躋禁近顧如末契幸竊餘庥尚稽恭梓之儀敢後馳箋之敬賀鎮江鄭侍郎到任啓伏審一札十行詔趣甘泉之舊雙旌五馬寵臨方靣之雄下車云初闔境相慶某官高文華國厚德鎮浮蚤聮淸切之班備罄忠嘉之節均勞既久屬望彌崇上方思見賈生將召還於宣室民固未忘汲黯聊借重於淮陽仰瞻師帥之賢巳服神明之政眷言末契久闊英遊少須當力於病衰尚冀復承於謦咳賀鄭侍郎年啓單閼肇歲正四序以履端象魏布和率萬民而觀治化工有俶賢路方亨某官名簡上心望高方靣載肅藩條之舊茂迎寶曆之新皂蓋行春巳布宣於德意鋒車就日將入侍於皇明顧此病衰莫遑展慶光塵在望祝頌彌深丁母憂服闋上宰相啓憂居苫次罔知歲月之徂竦仰槐庭莫貢寒溫之問念夙叨於甄冶敢自棄於闊踈內省孤衷伏深大懼恭惟某官位冠羣后名震四夷咸有一德以格天得伊尹自任之重思兼三王而施事致周公旁作之勤時既得矣而身愈恭愛莫助之而功益懋整乾坤於兵革搶攘之際奉虞舜以解憂還風俗於祖宗全盛之時大周宣之復古凛凛帝王之佐煌煌社稷之勳遠稽厥初獨立無二然且謙虛而下逮不緣踈賤以遐遺凡具識知悉同依仰某分窮命薄福過災生銜恤去官痛難勝於哀慕變除終制恩實賴於矜存尚念餘生欲襄大事顧無材不可為恱捨干祿莫知所安自躍不祥儻爐錘之未棄雖悲弗洎庶窀穸之有終輒陳悃愊之私妄有祠宮之請退量僣率冀獲哀憐賀黃郎中年啓曆占堯象出日方賔歲啓夏時建寅為正恭惟某官蔚高雅望臨寵巨藩政修鼎取之新序協泰來之吉明神攸介福履具冝皂蓋行春方布和於闔境紫泥封詔遂趣駕於追鋒顧此病衰莫遑展敘賀鎮江張朝議到任啓久闊英標阻奉尺書之問忽聞新命下臨方靣之雄豈惟慶師帥之得賢亦以慰朋遊之素望瞻懷甚邇歡抃可量某官學造古人文推作者趨時適變而才無滯用奉法遵職而治有能名肆膺廊廟之知特卑藩維之寄眷此南徐之地實分北顧之憂江山勝絶而民醇租賦樂輸而事簡既涓辰而視印果來暮以騰謠似聞將促於追鋒正恐不容於暖席某居然尸祿老矣就間緬惟森戟之嚴曾是布衣之舊每念靑編之共學獨憐華髮之墮顛不自意於衰頽復有依仁之幸儻未忘於雅素當修請謁之儀庶卜暇時略談故事惟涼秋之屆候諒福履之具冝願益保綏副茲虔祝回鄭侍郎賀年啓璇璣占象仰七政之回天寶曆頒時慶三元之肇歲仰止一都之會粹然九牧之賢皂蓋朱轓巳肅班春之令清都絳闕將嚴就日之趨顧馳慶之未遑忽飛箋之先及拜嘉有􅌤佩德無窮華陽集卷第二十八畢
