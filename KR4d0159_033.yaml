front:
  text: 華陽集卷第三十三
  hash: sha256:c582036d9b6dcd1ff817651a7a5600a5d74d1b8422a66f28828d2dce7802ead2
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0159_SBCK_033-1a}
body:
  text: 金壇後學于文熙校雜文異鶴記神仙之説尚矣世人以其事不常有而莫之信夫事不常有而一旦出於耳目之所接殆非人力能致則傳記所載有不得不信者某舅氏左朝散郎提舉江州太平興國宮李公某之夫人胡氏紹興二十年十二月癸卯以疾卒越二十日公用道家法為夫人薦冥福於茅山之元符萬寧宮方至山欲登殿有羣鶴不知所來向殿飛舞少焉一鶴繼至合十有四徘徊上下食頃乃去又四十九日當明年二月庚戌夫人既葬復有鶴翔于公所居第廳事之前如元符所見之數其一亦後至去地三丈許兩兩成列凝然不動若俯若仰其勢各殊日光射之輝彩眩目鄉人爭覩為快稍喧忽盤旋作西北向去未數十步有白雲十餘族從後湧起飄至鶴所如銀山雪浪鶴舞其中元裳縞衣或現或隱良久雲合不見觀者歎仰咸謂夫人仙去今日乘鶴來歸嗚呼異哉夫人孝事舅姑克盡婦道舅沒姑且老奉養尤謹食飲衣服必躬必親調芼之不精浣濯紉縫有所未善必反復之可其意乃敢以進姑有疾臥起以夜繼日倦即坐而假寐如是者兩月體瘦至骨立顛沛不少懈人皆稱為孝婦居家雍睦忍辱無爭處心仁慈重殺物命媵侍有過曉譬之不見責怒里族有貧不給者隨所有以施豫無嗇意嘗謂日用之物生於天地而人力成之不敢妄費至若盥濯之水亦不過量方感疾夢一道士揖之使前寤而曰吾其逝矣是夕奄然而化四日而後斂體柔膚澤容色如生目瞑而光不毀溢出睫間數道如線又左額髮際有物如金珠浮動半日家人以手掬之輒失去蓋夫人平生為善出於天性雖大修行人有所不及而孝行尤著宜其卒也有異於人矣古之得道者多尸解仙去而或謂鶴為仙人騏驥蘇耽丁令威之徒去而復歸皆從以鶴以所見乎今考所聞乎古是邪非邪不可得而知也姑托其實以紀大略云書刁倪老挂劒帖後刁倪老行年七十有五而氣貌不衰出入起居如少壯一日携八座胡公挂劒帖來示余曰吾老矣嘗預作死計求挽詩於胡乃得此他日吾有不諱胡以詩來即瞑矣余竊怪之曰挽詩所以寫哀特為死者作也公方矍鑠示人意象未肯伏老何忽須是不祥莫大焉公曰然寓形宇內百年一瞬人苦不自悟也今吾幸有田疇足以給衣食有詩書足以遺子孫結廬數椽靑山相對翛然終日家自釀酒不問美惡客來輒醉自謂如此巳足了一生尚何求獨送死一假正須料理念於胡有葭莩親知我平生莫胡詳也吾故欲其有作以慰地下嘗見陶淵明既述五柳傳又作文以自祭白樂天亦傳醉吟本末而自銘其墓二公皆前世賢者猶汲汲於身後老夫不能文也求詩於人以待盡雖愧陶白不猶愈於貪生而忘死者乎余三復斯言然後知公為逹因語公曰公壽骨高當享期頥誰能為公移書以謝季子寶劒誠大惠也欲挂在二十年外且請洗削藏之母以迫人公大笑因命書于帖後恭題賜帶御書臣仰惟皇帝陛下總攬權綱慨然念治登進羣彥中外布列而尤惠顧近輔以禮終始之乃紹興二十有七年九月辛未以臣上章引疾乞罷參知政事奉外祠詔弗許懇請數四特除資政殿學士知婺州辛巳既臨遣又敕中使馳至江亭賜臣御書一封通犀帶一條以寵其行臣自初有請凡三對便坐愚衷委曲盡荷聖知慰諭憫憐恩禮巳極敢意非常之賜復此下逮跪捧慚懼莫知所措因竊自念材力駑下得謝久矣一旦蒙召用再忝從班不閲歲遂參國論任益重報效益無聞加病且老分當擯棄尚何足惜而於其去也乃軫皇慈念及衣服之微而假以異數如此非獨臣拜寵若驚一時觀瞻駭歎亦謂比年所未有也嘗聞周宣王之遣申伯則以路車乘馬命韓侯則以淑旗綏章蓋侯伯分土而守天子思所以大鎮撫之於是乎有賜然二賢之美特託詩人以傳後至若人主親御翰墨發為奎章錫命自天昭示隆眷則以今視昔萬萬有光焉夫宣王能御名微接下故其臣無不自盡以奉其上臣繆列侯爵守兹南邦膺受渥澤庶幾跂望古人惟是德不足而榮遇過之大懼弗克欽承以隕越于下區區自盡之忠其敢忽忘既襲藏寶帶傳示不朽復以宸翰恭勒堅珉不唯繼二詩以侈上恩抑將使學士大夫知君父所以待遇臣子之意各思自勉云題祖誥某自丱角聞先祖少傅言家舊有唐朝告勑數卷三張族長主之今不知安在蓋張氏本河朔人有仕唐官于潤者因家金壇分派而居張橋赤岡希墟各為一族歷年既久張橋赤岡失其世次唯希墟家譜見於石刻自先考太師而上七世諱鍪者為希墟始祖合前二族號三張家其間世次既難盡考亦莫知族長為誰以故祖誥藏匿不出紹興四年某自給事中罷歸暇時集宗黨諭意密令搜訪又數年始得之乃上柱國銑楊州六合縣主簿連制書二通幅縫舛脫字多漫滅至有零落壤甚不可識讀則去之而取其可以編次者命工裝為一卷題曰張氏唐朝制書唐人善筆札觀此書墨迹一一可愛又郭尚父李司空賈元靖皆元勳重望而蘇顧奚徐亦一時勝流列名其上自乾元至今傳四百餘年開卷一讀如見乎其人竦然生敬開寶𥘉南唐違命侯猶未歸朝方欲調兵旅拒而逺祖嘗以衣冠戶擕是書免充軍名卷末有二徐署銜即鉉鍇兄弟也舊云三通一十七縫今亡三之一又寶應貞元年號以脫縫先後不倫而二徐書押亦無復見皆為可惜嗚呼張氏衣冠其來舊矣二祖在唐雖以官微事業無所見然其流芳餘澤傳及後人巳墜而復振則當時慶源所積可不論而知矣某老病豈能久生恐來世不知宗姓本始故特為題識凡我子孫宜謹藏之跋洛神賦摹本曹子建賦洛神正如説夢虎頭癡絶遂以為畫本僧步隆又從而摹之人物態度恍如目擊是邪非邪著想顛倒以見世間種種虛幻仗法莊嚴便為實相有能悟解諸法海一切應作如是觀跋醉道士圖𬒳褐祿蔌不受戒杯盤狼籍無籍在浪説蓬萊三萬里醉鄉便是仙世界跋江貫道畫山水老江畫山水造微入妙一時好事者訪求遺墨幾與隋珠趙璧爭價不知明仲安所得此宜善藏之無使通靈之物變化而去二胸中丘壑發之毫素居然有萬里勢間窗永日鳴琴對之便覺衆山皆響跋洪慶善先夫人丁氏詩文手墨夫人賢而有文蓋得於慶善所作志銘舊矣今又見此遺篇字畫徑麗詞致清婉使人三復竦然余雖姻家不及一拜堂上然風味不凡自可想見抑知志銘為實録也跋丁氏手簡并剛巽詩卷剛巽頃任國子監丞余官太學相從甚久為人純篤雅重有前輩典刑今即世不知幾年一見遺墨恍如對靣愴然久之又得其女慶善先夫人所寄女弟手帖真草纍幅皆閨房針訓情致繾綣若不能自巳者以是知夫人篤於恩義蓋有似其先人云跋張叔元所藏山谷覺民帖山谷勸其弟姪讀書一帖中三致意焉丁寧懇切唯恐其或怠蓋非獨私其弟姪而巳凡厥後學皆當敬佩斯言永以為訓跋山谷大字能鼓琴者識琴能擊劒者識劒故必能書然後知古人筆法叔元出示豫章公墨迹一卷余手拙不能書何足以識之但見其行草變態縱橫勢若飛動而風韻尤勝非得夫翰墨三昧其孰能臻此公嘗謂蓄書者以韻觀之當得其髣佛今反復此帖知公言為確論跋寶晉帖余家舊有米帖數卷兵火中失之其間一𥿄敘京口江山形勝最為竒特或謂有瘞鶴銘苗裔今觀此書筆勢雄強大似京口帖使人對之恍然念青氈不忘也擬進御試策題朕紹開中興夙夜求治有年于兹而道未方古罔知攸濟乃慨然興念視前日之政有不便於時者若小若大咸飭而正之於是拔滯淹放姦回而收人材之用削繁文遵舊典以清法令之原懼刑罰之冤濫則許其昭雪使之自新憂財用之耗蠹則蠲其羡餘為之節省以至嚴取士之科而惠實學頒求言之詔以通下情內則選命臺諌開公正之路大肅朝綱外則御名擇牧守奉寬恤之政亟紓民力是數者皆方今之要務斷自朕志次第舉行冀有以合天下之公而庶幾乎先王之盛夫唐虞成周號稱極治而其書具存有國者所當法也以今日之所為驗之於其書尚慮講究之未詳推行而未盡子大夫強學待問其為朕熟之究之伊欲祖述憲章悉其條貫使先王之治復見於斯時必有可言者詳著于篇朕將虛心以聽焉婺州勸農文仰惟明天子念稼穯艱難躬耕以先天下而詔至郡國又每以勸農為首德至渥也夫體上德意奉行詔令實太守之職方時東作田事既飭是用率僚屬入阡陌携酒與肴招父老而飲食之且告之曰力田為生之本汝所當知惰偷自安越其罔有黍稷冝各率乃子弟庤乃錢鎛以朝夕從事毋忽異時高廪萬億於此乎取之是豈獨富於家以不負其力抑將使太守涉筆占位書勸農之職為無愧云洪宅求婚書長子堂繼娶夙欽門閥謬忝鄉鄰頃幸接於台光既敘葭莩之舊茲用忘其寒族具存嬿婉之求竊以某人粗謹過庭久虛中饋伏承某人騰芳甚早擇對惟時敢因媒妁之言願合婚姻之好委禽效贄顧篚實之不豐鳴鳯再占尚逢門之有耀儻納愚悃恭聽嘉音丁宅求婚書次子堅序人倫之本禮莫重於成婚御名世睦之情義敢忘於求舊以某人方逾幼學行卜好逑伏承某人秀發閨房譽宜家室輒藉行媒之告用伸合姓之誠齊鄭相親顧雖慚於非偶潘楊有自諒無替於前修即俟嘉音永以為好丁宅納幣書婚姻以及時為貴詩每戒於三星男女非受幣不親禮必先於五兩惟某頃歲有請行媒幸既冠以成人宜納徴而授室實茲筐篚用陳不腆之儀恃有葭莩尚監未將之敬其如冒浼徒積兢慚答丁宅求婚書大婚為萬世之嗣具載格言納采居六禮之先遽承華翰惟令姪孫學巳親於師友而小孫女教未習於組紃念結䄜而願為有家固先求舊况許嫁而言猶在耳敢背厥𥘉聞命以還歡悰曷既朱宅求婚書三孫鑒合婚為重敢攀閥閲之崇同氣相求願附葭莩之末小孫登仕郎某粗服膺於古訓幸及齒於成人伏承令女某人慶分相葉之光德茂公宮之教輒憑媒氏仰締華姻圭篳家風雖自慚於非偶金蘭世契諒無阻於好逑上瀆高明佇聆嘉命答錢宅求婚書長子孫女大婚為重具載格言同氣相求遽承謙誨伏審令長孫承務稟天材而粹美紹家學之淵源而某孫女某人教方習於組紃職未勝於灑掃既辱行媒之諭克協鳯占輒忘家世之平繆希蘿附欽聞嘉命倍切欣悰答錢宅請期書女子願為之有家巳奉通婚之約吉事卜先於近日遽聞親迎之期雖告虔之贄未修而傳命之郵逺逮欲辭不可為愧徒深曹宅求婚書四孫鎬鄰邦相望夙欽閥閲之高二姓通婚願卜絲蘿之好雖慙非偶蓋喜同聲伏承令姪女某人傳慶大家巳深明於女誡而某弟四孫通仕郎某誦書黃石私竊慕於祖風既寅緣姻婭之有初且考驗蓍龜而協吉匪媒不得先馳尺素之誠其新孔嘉佇俟千金之諾道士王如晦真贊色如春溫若可與言神如水淸不可以煩子喬仙去逺矣乃今識其裔孫任造化之日逝獨湛然而常存二道風仙骨照靑春誰寫生綃却亂真莫訝三毛不加頰齊公端解視全人道士李沖妙真贊蟠根仙李萬葉敷遺芳豈直黃冠徒吐氣硉矹古丈夫味道之腴貌何癯誰令畏壘俎豆豫龍吟虎嘯人爭趍故棲猿鶴情未踈翻然脫屣吾歸歟舍者爭席不關渠向來形諜誠區區二領袖名山龍吟虎嘯忽辭屨於戶外信光矣而不耀是將沖而用之深入乎衆妙之門吾不知其人曰伯陽之孫自贊寫真堂堂莫作公侯想是身如幻無定相衣冠挂却神武門便是維摩坐方丈二投間歲久聖恩圖舊載錫身章在帝左右骨相多屯何以愈人陳力就列勿為具臣華陽集卷第三十三畢
