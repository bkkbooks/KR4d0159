front:
  text: 華陽集卷第十二
  hash: sha256:4e00e20752cd5156251d40bdda0d0470fbd3bde346bff32d468dc8f1cbd1de13
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0159_SBCK_012-1a}
body:
  text: 金壇後學于孔兼校表紹興二十九年加恩謝表臣某言今月二十八日伏準告命以郊祀大禮赦恩加臣食邑三百戶食實封一百戶臣巳即時望闕謝恩祗受訖禮備郊丘既錫萬方之慶身居畎畒亦均列辟之恩國雖有常臣實增愧臣某誠惶誠懼頓首頓首伏念臣叨逢興運嘗忝近班負至愚不學之才辱上聖非常之眷乞骸盛世方竊幸於餘生奠璧中壇曾莫陪於熙事敢期朽質尚冒殊榮不惟增衍於本封且復併加於真賦明綸俯𬒳感涕交流此蓋伏遇皇帝陛下道與時行人無遐棄推廣輝胞之卑特優簪屨之餘犬馬巳疲知難酬於異顧雲天在望徒銜結於危衷臣無任顯仁皇后上仙慰表臣某言臣伏覩今月二十一日皇太后遺誥奄棄大養號慟震驚殞越失措臣某誠悲誠感頓首頓首伏以皇太后誕生神聖追配薑任方享遐齡遽返仙路恭惟皇帝陛下孝愛本自於天性哀衷必過於人情仰乞上念宗祊俯從禮制少抑晨昏之慕用安夷夏之心臣退伏田野不獲奔赴闕庭臣無任欽宗皇帝升遐慰表臣某言臣伏聞孝慈淵聖皇帝厭世升遐中外臣民號痛如一臣某誠悲誠感頓首頓首竊以孝慈淵聖皇帝體道淵淨逢時艱虞北狩未還仙期奄迫恭惟皇帝陛下友愛方懷於遐裔哀恫忽感於訃音天數莫逃聖情難處仰訖深思付託少抑哀摧上安宗社之靈下副黔黎之望臣衰遲得謝退伏田野不獲奔赴闕廷臣無任紹興三十一年明堂禮成賀表臣某言恭聞今月二日明堂禮成賀赦天下者肅九筵而享帝於昭陟配之儀斂五福以錫民茂舉滌瑕之典龎鴻所𬒳舞蹈惟均臣某誠歡誠抃頓首頓首竊以禮莫重於承天孝必先於嚴父考國家之大祭侑祖考而迭尊刺經之中惟聖時克恭惟皇帝陛下至仁御宇盛德寧神推生民之功雖郊禋之屢展繼下武之命顧宗祀而敢稽乃發渙音載揚熙事我將我享而時物兩盡不怠不煩而情文孔昭萬壽無疆既順成於天慶五刑有赦爰誕布於國章道洽幽明光垂簡册臣自初遭遇投老衰殘心存王者之堂儼豆籩而可想身𬒳野人之服望鵷鷺以難追徒竭孤忠少陳善頌臣無任紹興三十二年加恩謝表臣某言臣今月二十六日伏準告命以明堂大禮赦恩加臣食邑三靣戶臣巳即時望闕謝恩祗受訖饗帝合宮盛儀既舉均釐列位朽質奚勝臣某誠惶誠懼頓首頓首伏念臣遇主一生致身二府捐軀報國雖素志之未渝急景凋年曾寸勞之莫效上聖嚴禋而昭孝庶工祗載以盡誠初無奔走之勤敢意龎鴻之逮兹蓋伏遇皇帝陛下法天懋德稽古馭臣謂夫祭大則澤宜豐不以人微而禮遂廢肆推茂渥俯及衰蹤臣拜命凌兢捫心感懼明綸輝耀但知傳寶於子孫病骨虺殘難復仰酬於覆幬臣無任紹興三十二年册立皇太子賀箋伏聞皇太子殿下升儲位定受册禮成不間邇遐同深慶幸云云竊以問安祝膳孝篤於在三監國撫軍義符於明兩克光盛典允屬元良伏惟殿下英粹凝姿溫文懋德久繫人神之望是膺匙鬯之司罄萬邦而宅心知九鼎之增重臣退身耄及荷國恩深徒跂仰於星輝阻進瞻於玉𥙿丹衷竊忭倍百常倫禪位禮成賀太上皇帝表臣某言臣伏覩詔書恭聞太上皇帝陛下今月十一日禪位禮成者肅詔春宮光傳寶位盛德之事曠古罕儔臣某誠歡誠忭頓首頓首恭惟太上皇帝道合祖宗量包天地炎圖再造備經三紀之憂勤黃屋何心思享萬年之壽考運神謨而獨斷舉曠典以必行禮方盛於建儲命亟聞於與子堯以位傳之舜退處無為之為周之曆久於商永尊衆父之父臣生平冒寵老病辜恩聆大號之聿頒撫孤忠而自感朝太公於五日阻陪仗衛之趨祝唐帝於千秋但切精誠之懇臣無任皇帝登寶位賀表臣某言臣伏覩赦書恭聞皇帝陛下登寶位大赦天下者位正乾元宗祧永賴恩流渙號夷夏交欣臣某誠歡誠忭頓首頓首恭惟皇帝陛下濬哲在躬淵沖稽古允若謳歌之咸戴居然曆數之有歸爰御飛龍遂安神器以聖繼聖逺追堯舜之蹤雖休勿休佇洽羲農之化臣頃叨華近今困衰遲法座凝旒望龍顔而可想昕庭輯瑞簉鵷序以無階臣無任車駕巡幸起居表邊檄交馳皇輿順動赫先聲於有截空大敵以無前臣某誠歡誠忭頓首頓首恭惟皇帝陛下纂紹丕圖憂勤庶政憤犬羊之干紀戒虎旅以徂征詔舉時巡方肅鳴鸞之伏士爭賈勇咸均挾纊之恩恢復之期可坐而策即日餘寒在候六飛御途神動天隨聖躬萬福臣身居畎畒分隔雲霄仰跂清塵雖違顔於咫尺恪尊嚴令阻扞牧以奔趨臣無任隆興元年册立皇后賀太上皇帝表臣某言臣伏覩制書恭聞今上皇帝册並皇后者聖神傳序道必本於正家柔順居中禮益尊於大養時乃巨典浹于歡心臣某誠歡誠忭頓首頓首臣聞首風化者治內于閨門明人倫者造端乎夫婦既格移風之效復詒燕翼之謀徽數孔昭熙朝創見恭惟光堯壽聖太上皇帝陛下儲神淡漠軫慮淵深念嗣聖之紹休屬長秋之虛位聿求邦媛載穆坤儀五日以朝太公肇新中饋之助二南之得淑女更𢡟始基之圖臣夙荷殊恩欣傳渙號從鳴鸞而問膳想聞環珮之聲瞻黼座以稱觴阻預簪纓之列臣無任又賀太上皇后箋臣某言臣伏覩制書恭聞今上皇帝册立皇后者椒房正位聿新教化之原寶册流光肇式邦家之慶禮成禁掖觀動華戎臣某誠歡誠忭頓首頓首臣聞乾坤合德而茂育羣生日月並明而照臨四海自昔有為之主必資內助之賢選建柔良屬當熙洽恭惟皇帝陛下齊家憲古篤孝奉親惟中壼之久虛慮陰教之或缺稟訓言於壽聖淑先窈窕之求發渙號於昕朝或覿禕䄖之盛一人受福百世垂休臣荷至深投老無用不圖晚景獲覩上儀萬壽稱觴顧莫陪於旅進二南紀德徒竊誦於流芳臣無任又賀皇后箋臣某言臣伏覩制書恭聞皇后正位宮闈者柔儀告成陰教有主是興正始之道以立太平之基臣某誠歡誠忭頓首頓首臣聞御于家邦必本人倫之敘首以風教實由內治之修禮既行於會通時自臻於福祿恭惟皇后殿下塗莘績慶妊姒推賢占符立馬之祥譽見濯龍之兆召王后之五輅巳均厚載之功仰天極之四星更廣照臨之惠臣無任乾道元年郊祀禮成賀表臣某言臣恭聞正月一日郊祀禮成者主神器以宅師夙懋靈承之敬陟泰壇而類帝肇迎滋至之休幽顯燮和華戎慶賴臣某誠歡誠忭頓首頓首竊以祀者國之甚重禮非時而不行因天事天尊祖聿嚴於大報基命定命承祧尤謹於初郊恭惟皇帝陛下躬舜繼堯系唐接漢久協謳歌之載縻忘燔燎之恭稟壽聖之成謨舉圜丘之大典慮軍興而改卜心蓋務於專精用人正之𥘉元事益光於故實昊穹昭答瑞洊臻躋富壽於斯民永延洪於丕祚臣身居畎畝望絶霄雲籲俊充庭難綴奉璋之列可封成俗但賡擊壤之謠臣無任辭免召赴行在恩命謝表臣某言臣近具奏辭免召赴行在恩命今月二十八日準尚書省劄子奉聖旨張某一時老成朕所渴見巳令趣召乃以耄老為辭重違雅志可從所請令所在州軍常加存問仍賜羊酒者叨恩趣召輒陳衰病之情從欲推仁更冒撫存之寵危衷激切感涕交橫臣某誠惶誠懼頓首頓首伏念臣素乏時才久愆旅力報國罔施於尺寸捫心空負於生平忽聞收召之音衆謂死灰之復熖自揣支離之骨獨嗟老馬之先疲與其上誤於使令孰若退安於分守是殫悃愊仰覬哀憐載惟聖主龍飛尚阻造庭之敬况復邉隅雲擾尤非避事之時竊料微蹤必嬰嚴譴孰意乾坤之造曲昭螻蟻之誠垂溫旨以丁寧既遂桑榆之志敕有司而存問更加牢醖之頒得過所期愧何以稱兹蓋伏遇皇帝陛下接下以禮推恕及人知臣朴拙而非敢矯誣察臣病瘁而莫能強勉靡愛優隆之澤用增枯朽之華臣荷眷益深謝生無路風雲遇合雖絶望於攀鱗畎畒優遊但懷忠於結草臣無任乾道元年加恩謝表臣某言臣今月十一日伏準告命以隆興二年十一月二十九日冬至詔書進封臣開國公加食邑三百戶臣巳即時望闕謝恩祗受訖至仁恤祀特先事以疏恩朽質辭榮復隨班而冒寵光生爵邑愧溢心顔臣某誠惶誠懼頓首頓首伏念臣身起布韋家無儋石偶玷高華之列巳深溫飽之慚敢意垂年復叨異數植圭貴重遂首冠於諸侯采地豐饒更增加於多戶退念乞骸之久初無橫草之勞得之若驚悸不自定兹蓋伏遇皇帝陛下丕承大業肇舉明禋卜郊爰徙於權宜霈澤靡嫌於過厚甫及初陽之日亟頒大賚之音罔間孤微俾偕序進臣桑榆景迫犬馬力疲寶軸熒煌但覺光輝於梓社丹心感切無緣舞蹈於蓂階臣無任乾道元年册立皇太子賀太上皇帝表臣某言臣伏覩制書恭聞今上皇帝册立皇太子者大廷發册肇基國本之安萬乘稱觴式表家傳之慶縟儀創見至養彌隆臣某誠歡誠忭頓首頓首竊以稟睿算於慈闈正重明於上嗣是謂兩宫之兼美誠非百代之可儔恭惟光堯壽聖太上皇帝陛下德冠二儀量包衆甫探至道於狶韋伏羲之上閲成功於夏康周宣之時愛方樂於含飴禮遂觀於主鬯子又孫而孫又子益知問寢之恭天占人而人占天咸驗卜年之永臣叨恩惟舊臥疾增深霈澤多方但切遭逢之幸班朝五日阻陪蹈舞之趨臣無任又賀皇帝表臣某言臣伏覩制書恭聞册立皇太子者儲宫正位昭大慶於宗祧顯册告庭浹多歡於夷夏臣某誠歡誠忭頓首頓首竊以周室教行於三善漢家頌美於重光蓋考震離之文取侔星海之象恭惟皇帝陛下以天地為量以祖宗為心躬大養而不違於睿謨舉盛禮而獨高於往牒天下之本既立聖人之功孰加臣退窮山欽聞曠典雞鳴鶴禁遙知問寢之恭鷺集螭墀阻預稱觴之列臣無任遺表臣某言臣伏為疾患危篤上遺表者抱病衡門巳絶再生之望馳心魏闕輒伸將死之言臣某誠惶誠懼頓首頓首伏念臣脫迹蓬蒿參華簪紱伶俜一介遭遇四朝繇經濟之才踈故功名之念薄頃投間散履閲星霜上皇擢二政機冒寵僅周於歲律陛下再頒召節卧痾莫造於天墀宸心終始以務憐異數便蕃而存問乾坤大造獨厚孤微蒲柳殘生知難稱塞方幸優遊於樂土庶幾休養於餘齡而臣福過災生鍾鳴漏盡負薪之憂寢劇屬纊之息僅存雖人生如過隙之駒光陰易捨然情迫若戀軒之馬恩德難忘伏望皇帝陛下體道御時配天立極施仁發政躬周后之憂勤修巳安人法唐堯之慈儉懷柔夷狄褒禮忠良上遵一定之規模益固無窮之基緒臣形將就木志切傾葵想清禁以魂迷撫殘骸而涕隕上茂陵之書而獻佞肯效前人結輔氏之草以酬恩尚期異日臣無任華陽集卷第十二畢
