front:
  text: 華陽集卷第三十
  hash: sha256:96ce0056581f77be4e03441d695d6bb4f485e181ec20159403206a65c138364c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0159_SBCK_030-1a}
body:
  text: 金壇後學于孔兼校雜文衆會黃籙靑詞庶類貪迷凡有生不能免死千劫受報非上聖無所祈哀用申不忍之私仰瀆蓋高之聽昨自國家多難始於胡虜內侵甲兵散以雲屯盜賊從而蜂起凶熖所及玉石俱焚慘毒不勝川谷流血况飢寒癘疫之所迫害雖羽毛鱗介亦或殘生宇宙之間禍災若此諒彼各償於宿負豈無橫及於非辜自變起不啻十年所殺傷難以數計觀露骸積尸之處痛長夜以何歸披黃籙白簡之文尚冤魂之可釋輒憑衆願虔啓真科或各誦於靈篇或同修於淨供裒多益寡近恱遠來仗精懇以上昭庶神明之可格伏願高穹下監列聖垂休照冥途而洞開灑法雨以沾沐九州萬里潛消鬼哭之聲六道四生永脫輪回之苦設醮靑詞一乾坤大造難述恩慈草芥微生何施報謝惟忱詞之自竭庶陳露而必聞伏念臣身荷國恩官無吏責合家口衆坐竊於安榮有母年高獲供於祿養顧茲薄陋何以堪任况因祈禱之私數免憂虞之禍恭承慈護彌積震惶乃涓日於初元用歸誠於法會伏願上蒼昭格下鑒愚衷消無妄之災巳曲推於全度定長生之籙尚永畀於康寧二患無大於有身實賴神明之祐福莫長於無禍敢忘祭薦之恭仰叩洪慈具陳丹悃伏念臣稟生愚拙竊國恩榮身為法從而家居官無吏責而廪食歲時溫飽老幼康寧欽承大造之私錫此闔門之慶况乃賤息頃赴官期嘗暨親姻共伸齋禱既逭瀆神之譴更叨從欲之仁僥幸滋多凌兢罔措伏願高真降格列宿昭回赦除冒犯之愆臨享潔蠲之素自天獲祐息凶禍於無形與時皆昌垂子孫而不替三天道玄微蓋不言而善應人心懇切斯有感而必通受賜實深撫躬增懼伏念臣愚不聞道老尚貪生但知竊祿以安居豈有微功而報國茍逃陰譴既荷神休更虞子婦之災曾露禱祠之懇仰叨洪造悉獲淸安是用虔啓真科具嚴法供庶殫精恪上動監觀伏願列聖旁臨大慈普濟福輕乎羽敢期純錫之大來禍生有胎所冀潛銷於未兆四太始無形強名曰道至誠有叩如響應聲用自竭於愚衷冀仰塵於聰聽伏念臣賦性頑鈍遭時盛明進不能陳力以事君退不能修德而善俗奉身竊祿浮食挻災乃從去夏以來幼稚多嬰於疾苦嘗以私情所迫懇祈妄瀆於明靈由是舉家悉蒙全慶上竊厖洪之施不勝感戴之誠爰卜元辰聿嚴淨供伏願祥光下燭惠澤旁流特寬冒犯之誅尚鑒精虔之志既安且吉錫難老於桑榆俾熾而昌藹餘芳於蓬蓽五受國恩深莫伸於報效闔門口衆更逭於疾殃仰銜洪覆之私虔瀝謝生之悃伏念臣稟生薄陋晚歲遭逢再仕明時躐贊萬機之重纍叨􅐶澤更霑三族之榮去家幾閲於四年携幼殆逾於千里卒逃橫禍重反舊鄉顧庸繆以何堪皆聖神之密佑况緣病苦嘗賴保全茲因冒貢於微誠併用答還於先願伏願芬芳上逹靈鑒俯昭赦其黷犯之愆錫以安平之福宦途出處巳曲荷於厖鴻暮境身心尚永離於障難六物壯則老難逃病苦之憂天矜于民尚啓祈禳之路既叨蔭祐敢怠熏修伏念臣仕歷四朝年彌七紀自念平時之出處無非道力之保持福過災生忽纒痾於下體月來日往幾可厭於頺齡嘗暨兒曹兩干神造刳心俟命旋踵蒙休夫何朽邁之餘猶辱哀憐之賜爰因令日祗按仙科期盡展於初心更仰希於後福伏願飈遊倐降淵鑒俯回灼知懇迫之私加惠衰疲之質盡蠲沴氣注金簡以增年普燭恩光均蓬門而協慶七年彌八帙繆先五福之稱恩自九霄敢怠一純之薦伏念臣受形濁世竊祿淸朝退憐命數之多竒常慮色身之難保皇慈俯逮既幸卑於殘骸道蔭均霑復喜登於中壽仰被厖鴻之賜曷勝感戴之情乃卜元辰虔修淨供式敷謝悃希續頽齡伏願天鑒孔昭神釐來下納丹誠於螻蟻駐末景於桑榆欽一人而恱千萬人咸羡久生之樂行百里者半九十里更祈永命之休追薦皇考黃籙靑詞禍延所怙莫報劬勞痛極終喪不勝摧割輒冒蓋高之聽仰陳罔極之私伏念臣夙負丕愆頃招大罰自興悲於陟岵嘗瀝懇以籲天未盡孝思奄及祥祭慈顔益逺無路攀號法力可憑用嚴齋禱所冀監觀於精懇早蒙拔度於幽靈伏願亡考某官覺悟真心歸依大道出三塗之寒夜長覩光明滅四趣之苦因往生快樂醮新宅靑詞一環堵肇新仰荷帡幪之賜蘭場夙啓虔伸豺獺之私伏念臣蓬蓽故栖風雨莫芘勢當改造既經始於先臣責在肯堂用續成於治命僅違湫隘稍就規模三歲訖功屢黷陰陽之禁一家攸處同傾報謝之心幸元夕之甫臨顧落成而敢後有嚴法會庶逹忱誠伏願上聖垂慈列星回照吉祥萃止潛消妄作之凶少長咸宜永享安居之福二土木妄興深負震驚之罪雲天下覆敢稽禳謝之儀伏念臣聚指猥多結廬甚隘久欲命工而增築慮黷陰陽頃困從宦以去家遂鳩徒役鑿舊山而開址穿積壤以居楹規模僅足於一區功力行周於三歲每虞招釁常再禱於神休茲幸落成用併陳於法會伏願高穹垂鑒列耀回光由衷俯察於信誠輕動潛消於悔吝上棟下宇永觀風雨之除幼子童孫咸賴帡幪之賜母親慶壽醮靑詞五福在人咸羡久生之樂大慈立教曲施從欲之仁輒露忱誠仰祈臨照伏念臣身叨榮祿志在奉親堂有母慈年踰中壽雖左右就養每欣駒犢之從然造化密移巳迫桑榆之景顧餘齡之難恃撫危慮而靡寧恭案真科虔敷法席冀逹由衷之欵乞延難老之期仍叩真靈預求恩護伏願高真下監列聖垂休憐臣愛母之私實由本性察臣籲天之懇非敢為身特俾親闈益增祿算浹餘恩於見在身外齎後果於未來世中儻獲慰於母心庶少安於子職追薦皇妣黃籙青詞禍莫大於喪親難勝追慕道常先於救物用極號呼伏念臣稟生多艱無母何恃永負劬勞之德莫申孝養之勤罪逆所招煩冤罔極自營魂之初逝固齋薦之屢修尚慮前塵未超淨域爰當卒哭再竭哀誠回生前祈禱之私作身後追崇之報伏願明靈昭鑒列聖垂慈化形遍滿於十方開度不遺於羣品庶遷幽爽頓釋愆非徑上朱陵往生快樂禳松蟲設醮靑詞大鈞播物莫先動植之恩沴氣為災敢廢禬禳之法蓋此方之衣食多仰給於山林眷言弱植之柗將備異時之用爰從近歲匆蜚蠹之潛孳乃至滿山皆𧖟食而稿死顧殘生之巳甚更遺育於方來非假威神何能撲滅是用恪修淨供披露忱詞仰祈常善之私亟下惟新之令所冀物無疵癘氣復和平卵生化生乘靈光而滅度甲者拆者洗法雨以蕃滋載歌行葦之仁復見牛山之美曲全地利盡荷天慈禳兵災黃籙青詞地接邊烽亟致辟兵之禱天從民欲爰推削死之恩祗按明科式敷謝悃伏念臣微生遲暮幼纍猥多昨虜騎之繹騷暨王師之弔伐軍聲振野暗鋒鏑於江淮殺氣千霄亘煙塵於里社遁逃則莫知所向憂懼而無以自安是用罄竭丹誠歸投金籙冀哀矜其迫切俾脫免於凶災逮兹經歲以平寧蓋本至仁之覆護肆涓穀旦虔啓法筵期展盡於初心更消禳於後患伏願高穹悔禍厚載流謙錫景祐於皇家蕩妖氛於紫塞坐令廣宇悉陶至治之風下及私門長享安居之樂追薦皇妣禮觀音疏語威神自在發大願於慈悲功德無邉作衆生之依怙念我慈闈之愛遽躔陟屺之哀圖報重恩唯祈善應伏願愚衷上格慧澤旁流十方普現方便門出沉魂於翳路一切同歸解脫海悟空覺於前塵二神通具足空覺極圓是為淨聖尊能作功德海發不思議大願普現十方救無量劫衆生盡脫諸苦念我先妣巳經大祥欲永離於冥途須仰憑於象教爰因禫祭載啓法筵伏願妙智所臨靈魂如在回心向道早覺悟於顛倒因緣轉身受生常逍遙於極樂世界追薦長男禮觀音疏語塵緣結習衆生未免於輪回法力掃除一切同歸於解脫眷言亡子奄棄盛年恐罪障巳積於多生致靈識或沉於厚夜用嚴淨供仰叩威神伏願火捨慈悲為加哀憫開示超升之路俾從快樂之遊悟五藴空即見非相入三摩地遂證無生追薦李氏水陸疏語六趣苦因漂流不斷三乘妙力拯救無邉載稽方便之門大啓冥陽之會加持祕密聲遍徹於十方厭飫飢羸澤普霑於一切聿崇勝利用作薦嚴孺人李氏伏願仰仗恩光盡蠲罪纍永離濁世悟空相於迷津親禮慈尊聽法音於淨土華陽集卷第三十畢
