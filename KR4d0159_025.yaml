front:
  text: 華陽集卷第二十五
  hash: sha256:15855191f31253af16355bb6c5e231b1a440119ba1bb466d42e603a19148ecb9
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0159_SBCK_025-1a}
body:
  text: 金壇後學于文熙校經筵詩講義關關雎鳩在河之洲窈窕淑女君子好逑臣以謂此言淑女之德宜為君子之配也雎鳩之為物其性則摯而有别其聲則關關而和有别而不失其和淑女之况也水中可居曰洲而河又水之險者在河之洲則去人遠矣淑女者窈窕之况也窈窕者幽閒深逺之謂也逑匹也淑女雖在窈窕而其德乃可以為君子之好匹此后妃所以樂得也說詩者以大序首言關雎后妃之德故以雎鳩為后妃之况臣以文義考之當况淑女而不當况后妃也蓋所謂關雎后妃之德者關雎一篇之詩乃后妃之德耳亦由鵲巢夫人之德而詩乃以鵲巢比國君其所以為夫人之德者亦鵲巢一篇之詩而巳舉鵲巢以證關雎則關雎為淑女之况義固曉然矣參差荇菜左右流之窈窕淑女寤寐求之求之不得寤寐思服悠哉悠哉輾轉反側臣以謂詩人欲述后妃求淑女之事故於首章先言淑女有宜配君子之德然後序后妃所以求之之意夫澗溪沼沚之毛可薦於鬼神則荇菜者供祭祀之物也后妃之求淑女在於協心以供祭祀故以荇菜言之流求也其意若曰荇菜之生參差而不一求之者當左右而無方譬猶淑女之在下窈窕而難見求之者亦當寤寐而不巳然后妃之心猶以為未也求而不得則寤寐而至於思服悠者思之長也輾轉反側者臥而不周也思服而至於輾轉反側不能安寢則其求之可謂至矣於此有以見后妃憂在進賢出於至誠有不能自巳者參差荇菜左右采之窈窕淑女琴瑟友之參差荇菜左右芼之窈窕淑女鍾鼓樂之臣以謂此二章言后妃至誠待淑女之心有加而無巳也芼之為言擇也求而後采采而後擇者共荇菜之序也寤寐求之然後琴瑟友之鍾鼓樂之者待淑女之序也琴瑟常御之樂也故鹿鳴燕羣臣則曰鼓瑟鼓琴鍾鼓至大之樂也故彤弓饗諸侯則曰鍾鼓既設此蓋燕禮小而饗禮大所用之樂亦從以異今后妃之待淑女始則欲以常御之樂友之而通其交際之心終則欲以至大之樂樂之而極其歡欣之意此所謂至誠有加而無巳也且天子之於人材不患其不能尊顯於朝廷之上而常患其遺逸於下是以先王之治於丘園巖谷之士尤加意焉然則關雎之求淑女每章必以窈窕為言者可見后妃進賢之志首及於踈逺矣此所以能輔佐文王而協成周家之治也葛覃后妃之本也后妃在父母家則志在於女功之事恭儉節用服浣濯之衣尊敬師傅則可以歸安父母化天下以婦道也臣聞禮曰甘受和白受采忠信之人可以學禮蓋言有其本也文王之化刑于寡妻而后妃所以能成關雎之德者則以葛覃之本有以受其化也蓋后妃之賢出於天性方其在父母家志則在於女功之事惟其志在女功之事則知夫身所𬒳服者勤勞而不易得故能恭儉節用服浣濯之衣也夫履后妃之位則勢既尊矣恭儉節用服浣濯之衣則德既成矣然猶尊欽師傅而不敢忽則躬行於閨門者豈復有過舉之纍哉此其所以能歸安父母也如上所陳而卒至於歸安父母此其所以能化天下以婦道也孟子曰孰不為事事親事之本也孰不為守守身守之本也葛覃之詩事親守身之道備矣故序詩者以為后妃之本葛之覃兮施于中谷維葉萋萋黃鳥于飛集于灌木其鳴喈喈葛之覃兮施于中谷維葉莫莫是刈是濩為絺為綌服之無斁臣以謂此二章言后妃女功之志也葛所以為絺綌女功之末者志在於葛則絲枲可知矣葛之覃兮施于中谷維葉萋萋則葛方茂盛未成之時也葛之覃兮施于中谷維葉莫莫則葛巳成就可采之時也后妃之於女功志焉而不敢忘故往來於中谷以觀葛之漸長而采之方其初往也葛茂盛而未成但見黃鳥飛鳴于灌木之上顔色之美聲音之好有可以恱其耳目及其繼往也葛成就而可采矣於此無暇及於耳目之所聞見唯知刈葛而濩之以為絺綌專心致志服之而無猒斁焉雖然后妃大邦之子也豈其實然哉詩人賦其意而巳言告師氏言告言歸薄汗我私薄浣我衣害浣害否歸寧父母臣以謂此一章言后妃既嫁而歸寧父母也后妃之勢可以專矣及其歸寧必先告於師氏此叙所謂尊欽師傅汙煩撋之也浣濯之也汙其燕居之服而浣其事宗廟舅姑之衣在常人有不足道唯后妃服之則可謂恭儉之盛德然其汙也浣也固非好潔其衣服薄而巳矣非止於薄而巳也又擇其何所當浣何所當否然則后妃修飾其身如此而歸于父母之家父母之心有不寧者哉斯干之卒章祝其女子無詒罹於父母觀后妃之歸寧然後知其父母免於憂也卷耳后妃之志也又當輔佐君子求賢審官知臣下之勤勞內有進賢之志而無險詖私謁之心朝夕思念至於憂勤也臣竊觀葛覃之序言后妃在父母家則志在於女功之事此則后妃之本志也及其作合于周而供內助之職則不特女功之事而已又當輔佐君子求賢審官是以有卷耳之詩蓋人君之治無大於求賢審官者誠能求賢以官使之審焉而勿忽則衆職並舉天下不足為矣故后妃既求淑女以協成內治而於輔佐君子又必以求賢審官為先也文王之時羣臣戮力以趨事后妃知其勤勞是以欲燕勞之而進其賢者則非有險詖私謁之心也然求賢審官文王之政后妃唯當輔佐之而不敢與其事焉有其志而不敢與其事是以朝夕思念至於憂勤而不釋序詩者以謂后妃之志又當如此故以其詩次于關雎葛覃之後也采采卷耳不盈頃筐嗟我懷人置彼周行臣聞卷耳易得之菜也頃筐易盈之器也夫采易得之菜以實易盈之器又采采而不巳然且不能頓盈况賢材之士為難得百官之位為至衆欲求難得之材以實至衆之位可不思念之乎此后妃所以有懷賢人之德而欲置之周行也陟彼崔嵬我馬虺隤我姑酌彼金罍維以不永懷陟彼高岡我馬玄黃我姑酌彼兕觥維以不永傷陟彼砠矣我馬瘏矣我僕痡矣云何吁矣臣聞崔嵬山之險也虺隤馬之病也臣下之從征役者陟山之險乘馬之病可謂勤勞矣后妃欲酌金罍之酒以勞之庶慰其永懷之心也山脊之岡則其險甚於崔嵬元馬變黃則其病甚於虺隤山甚險而馬甚病則勞之宜加厚故欲酌罰爵以樂之樂之以罰爵則非止金罍而巳蓋人有甚勞則其心必至於永傷尤當有以慰之也若夫山極險而謂之砠馬極病而謂之瘏不特馬病而僕且病則臣下之勤勞至矣如此乃不言酌酒以勞之但吁嗟而巳何哉蓋酒食者后妃之事也爵賞者朝廷之政也臣下之勤勞彌至則報之在乎爵賞而酒食有不足用焉然朝廷之政后妃所不敢與聞此其所以吁嗟而已也樛木后妃逮下也言能逮下而無嫉妬之心焉南有樛木葛藟纍之樂只君子福履綏之南有樛木葛藟荒之樂只君子福履將之南有樛木葛藟縈之樂只君子福履成之臣聞后妃正位宮闈同體天王顧夫人嬪婦之屬貴賤之勢固有間矣惟貴賤之勢有間故每以逮下為難小星言惠及下而曰夫人無妬忌之行樛木言逮下而曰無嫉妬之心然則逮下之事唯無妬忌者能之耳木上竦曰喬下曲曰樛喬則與物絶故曰南有喬木不可休息樛則與物接故曰南有樛木葛藟纍之葛藟在下之物也以木之樛故得附麗以上諭嬪婦之屬所處在下以后妃有逮下之德故亦得進御於其君若是者上恩逹於下下情通於上閨門之內不失其和矣文王之治始於憂勤終於逸樂后妃逮下而閨門以和則內治成矣文王安得而不樂哉惟樂其內治之成所以能安享福祿故曰樂只君子福履綏之臣嘗觀易之設卦剛柔相雜而變生故或吉或凶相為倚仗唯謙之為體自卦繇彖象以至六爻之辭無一言及於凶咎悔吝以是知謙之為德所以致和於天下無往而不利既無凶咎悔吝則福隨之矣夫逮下而無嫉妬之心謙德也以是而和其閨門則其君子免於凶咎悔吝而安享福祿也宜矣葛藟纍之則附麗以上而已荒之則又言其奄覆之也縈之則不止於奄覆又旋繞之矣福履綏之不若將之之大將之不若成之之備詩人美其事有加而無巳故其言之序如此也且天保之序言君能下下以成其政而一篇之詩備述福祿之事然則文王之治外固以下下而致福祿矣以此見樛木之逮下乃所以化文王之德而輔佐之也螽斯后妃子孫衆多也言若螽斯不妬忌則子孫衆多也螽斯羽詵詵兮宜爾子孫振振兮螽斯羽薨薨兮冝爾子孫繩繩兮螽斯羽揖揖兮宜爾子孫蟄蟄蟄兮臣聞螽斯蚣蝑也鄭康成云凡物有陰陽情欲者無不妬忌唯蚣蝑不耳然則螽斯於萬物中獨有不妬忌之性且生子之多故詩人取以為况後之說詩者謂螽斯微物性或難知是以於此序不能無疑臣竊嘗深求之蓋上古穴居野處日與鳥獸相親故能畢知萬物之性三代去古未逺學者皆有師承研窮物理尚皆精審故其所言有後世不能及者且七月詩言斯螽動股莎雞振羽以至歷紀在野在宇在戶之候月令言螳螂生腐草化以至獺祭魚豺祭獸鳩拂羽虎始交皆非後人所嘗見而知者然載在典籍垂信萬世由是觀之螽斯之不妬忌詩人必有以知其性矣固無足疑也詵詵生之多也薨薨飛之多也揖揖聚之多也振振言其性厚繩繩言其戒御名蟄蟄言其和集子孫衆多而不賢則適足為患故又及其賢德也華陽集卷第二十五畢
