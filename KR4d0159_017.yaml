front:
  text: 華陽集卷第十七
  hash: sha256:8f01b328a9113f5bc5c173053271fe2401bec36985f0fd920d316c0fc61489ad
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0159_SBCK_017-1a}
body:
  text: 金壇後學于文熙校奏狀駮陳鑄吳説差遣指揮狀右臣今月十四日準中書門下省送到録黃一道右朝奉大夫吳説差權發遣江南西路轉運判官右承議郎陳鑄差提舉兩浙西路茶鹽公事臣伏見吳説陳鑄輕儇不端皆無素行內吳説昨任兩浙市舶緣苗傅叛逆附會凶黨忽除金部郎官仍領市舶職事後因臺臣論列罪狀顯明與劉蒙范仲熊等同𬒳黜責未幾復除福建運判物論大喧偶緣丁憂遂免彈擊兼其為人貪冒無耻嘗以習書大字所在求請牌額為人題寫以徼厚利有識鄙之鑄昨任江東鹽香過惡暴著言者亦嘗論其貪汚夤緣冒進等事而罷其差遣臣不復縷陳契勘監司刺舉一路委寄非輕如二人者皆罪戾之餘久犯清議方當循名責實之公朝豈容更叨重寄臣若不言必致公論沸騰復煩朝廷改命欲望聖慈當成命未行之時特賜寢罷所有上件録黃臣未敢書行繳連在前謹録奏聞伏候勑旨駮陳伯疆恩澤指揮狀右臣今月二十五日準中書門下省送到録黃一件為陳獻用父伯強致仕恩澤特輔將仕郎臣檢會紹興薦舉令節文諸中大夫以下見責降乞致仕不得乞蔭輔恩澤臣看詳陳獻父伯強昨任正言得罪送吏部與合入差遣未經牽復間守本官致仕正是責降中致仕之人於條不合陳乞蔭輔據陳獻狀詞自稱伯強因言高俅妄造聖語得罪其事有無虛實歲月深逺難以考究正使當時所言罪狀有實則責降之後亦須先經朝廷洗雪始可追復給還致仕恩澤况伯強之死巳近三十年前此未嘗敘雪陳乞今乃遽有此命不知何所據憑其人引用沈畸近例又不知畸之所乞於見行格法有無違礙夫法者所與天下公共者也今來陳伯強身雖巳死罪籍未除若遽推恩與子即今日以前死於責籍者更引伯強近例將何以止之臣愚欲望聖慈特降􅐶旨將所與陳獻一資恩澤遵依紹興條令特賜寢罷以絶僥幸之路所有録黃臣未敢書行繳連在前謹録奏聞伏候勑旨繳薛昻復官恩澤詞頭狀正月二十六日準中書省吏房送到詞頭一道責授左中奉大夫薛昻上遺表事奉聖旨薛昻特追復特進其遺表恩澤依條施行令臣命詞行下者右臣契勘自來臣寮死於責籍察其平時無甚顯惡則追復官職間亦有之蓋是朝廷一時特恩不可以為常也臣竊見薛昻以腐儒之學黨附蔡京致位近弼當政和宣和間朝廷大事一無建明專務諂諛同惡祖濟稔成今日艱危之禍天下疾之甚於仇讎罪惡顯著臣不復具陳陛下寬恩不賜竄殛俾得終於牖下巳為厚幸今若因其所上遺表追復舊官即是誤國之臣殁有榮耀非特忠邪不辨無以昭示天下兼恐應責降中身亡之人有如昻者復引此為例無辭以却臣愚欲望聖慈將薛昻追復特進恩命特賜寢罷所有上件詞頭臣未敢撰述謹録奏聞伏候勑旨駮張公𥙿廨宇指揮狀今月二十九日中書門下省工房送到勑黃一道為奉聖旨指揮梁汝嘉將舊祗候庫屋十間添修充張公𥙿廨宇其雜買務别行踏逐令臣書行者右臣竊見自來官司廨宇皆以所管職事為名其下便為治所未有無職事而得居廨宇者今來張公𥙿係同管客省四方館閣門公事兼總領海船契勘客省閣門等職事見在禁中從舊不曾别置廨宇兼客省閣門官非止公𥙿一名公𥙿應得他人皆可得也若以總領海船為名則其職事係在明州於行朝别無所治豈有置廨宇於此而遙領職事於彼者况舊祗候庫巳改作戶部雜買務今若添修充張公𥙿廨宇其雜買務别行踏逐不唯公𥙿居之無名而改更添修土木工役煩費實多兼恐僥幸之門一啓他日滋蔓無以杜絶臣愚欲望聖慈特下有司參照如張公𥙿目今職事不當得廨宇即乞將上件聖旨指揮速行寢罷所有勑黃臣未敢書行謹録奏聞伏候勑旨駮錢稔與郡指揮狀今月初七日晚準中書門下省送到勑黃一道奉聖旨錢稔與郡令臣書行者右臣竊觀比年以來所以害民者莫甚乎貪殘之吏乃者陛下數頒明詔訓敕中外又臨遣五御史巡行郡國以察治狀其有贓汗不法與夫刑獄冤濫皆得以上聞仰見聖心慨然欲革其弊甚盛德也臣方竊喜以謂貪殘之吏自是當知所畏矣今日忽見錢稔得旨與郡衆口歡譁殊不曉所以然者契勘錢稔素無廉聲而有酷惡之資頃為臣寮論列其奉使浙西則罪贓狼籍皆得所取受迹狀甚明其任大理少卿則持刑不平專事觀望嘗以三等風指授其同列臣雖不識稔以言章考之而參以士論蓋行汗寄治倚權勢為暴者也貪殘二字稔實盡之若使之為郡其能以廉節自持為陛下牧養小民乎其能體欽恤之意而不擾於獄市乎向自廷尉以殫章罷職未幾除知台州又復言罷衆謂稔當廢放終身今日豈可更臨郡寄臣愚欲望聖慈察前後章疏所言罪狀將今來與郡指揮特賜寢罷所有録黃臣未敢書行謹録奏聞伏候勑旨乞宮觀第一狀右臣輒傾危悃上干􅐶聽情有所迫罪不容誅伏念臣猥以凡庸繆塵禁近竊祿逾分天降疾災舊苦風痰常多昏眩乃自此月十一日以來驟爾復作頭目旋暈顛仆弗支心悸氣滿移時方定逮今旬日發動至再臣職在詞掖實掌贊書方當無病之時猶負素餐之愧矧兹遽嬰疾疢豈不深懼曠瘝兼臣父母垂年久還鄉里旁無兼侍供養有闕人子之分實不自安伏望陛下察臣病衰難於任事憐臣親老許以便私特垂天地覆育之恩令臣以本官任在外宮觀差遣一次庶獲少休餘息不廢孝養他日圖報誓當糜捐臣無任祈天懇聖激切俟命之至謹録奏聞伏候勑旨乞宫觀第二狀右臣近以風眩不安嘗傾危悃乞以本官任在外宮觀差遣伏蒙聖慈未賜俞允忱情迫切欲巳不能伏念臣謬忝禁嚴粗知分義既謂居官而任責豈敢無故而求間誠以叨昧踰涯災疾橫作驚悸旋暈衆所共知行立稍勞即便發動每當趨就朝列常虞顛仆失容至若入直省中亦恐眩昏曠職今在告醫治巳是數日未獲痊平顧兹詞掖機要之司非是臣愚養痾之地此臣所以憂惶踧踖莫知攸處所有臣父母闕養固巳嘗具奏陳更不敢喋喋干冒天聽今者止為臣身自嬰疾難於任事理須控告遂至黷煩伏望聖慈俯垂矝憫特賜睿旨檢會臣前奏令臣以本官任在外宮觀差遣一次輕犯天威臣無任惶懼侍罪之至謹録奏聞伏候勑旨駮汪若海差遣指揮狀右臣今月十三日準中書門下省送到勑黃一道為右宣義郎趙不凡差通判泉州右宣義郎鄧襄通判沅州右承奉郎汪若海通判無為軍令臣書行臣伏見數內汪若海浮躁輕脫素無士檢昨任三省樞密院幹辦官與同僚何大圭日事蒱酒肆為荒嫚爭淫娼婦至相歐擊嘗為臺臣論列除名勒停編置嶺外偃蹇不赴欲圖苟免後蒙寬恩釋放稍還官秩而故態弗悛逋蕩無復羞畏搢紳之所不齒方今州郡之治責在守倅無為雖號小壘屢經殘破正賴撫綏得人乃以半刺之權付此狂士竊恐陵上虐下有害郡政不能仰副陛下寬恤元元之意兼若海見係監當資序罪廢之後升為通判士論疑之臣愚欲望聖慈將汪若海通判無為軍指揮特賜寢罷所勑黃臣未敢書行謹録奏聞伏候勑旨駮折彥質衝改指揮狀今月𥘉七日準中書門下省送到勑黃為知潭州折彥質奏乞詳酌紹興三年十月二十五日指揮為土豪及細民乘時作過等事今謹開具下項一檢會紹興三年十月二十五日指揮節文自紹興二年正月一日以前諸路州縣曽經金人占據及羣寇殘破去處土豪專輒斬殺并鄉村細民乘時作過限今降指揮到日將已受詞訴限十日結絶不得支蔓日後更有詞訴並不得受理一今來折彥質申請乞更詳酌紹興三年十月二十五日指揮將委曽殺人放火如𬒳苦之家自陳若鄰保及徒中告首而事狀彰聞證佐明白者內為首之人許依法勘斷自餘支黨特免窮治即事不干巳并教唆詞訟或官吏不為審實輒行追逮捕繫者並坐以法四月七日奉聖旨今後如有論訴或告首罪惡顯著事迹明白官司見得詣實方許勾追證佐將為首人依法勘斷自餘支黨特免窮治不得稍涉支蔓餘依所乞右臣看詳紹興三年十月二十五日指揮蓋緣兵火之際小人乘時作過至今經隔五六年而詞訴不絶獄訟滋多所以特降聖旨截自紹興二年正月一日以前所犯已在官者限日結絶未在官者指揮到後並不許受理今折彥質所奏乞詳酌上件指揮將委曽殺人放火如𬒳苦之家自陳若鄰保及徒中告首將為首之人許依法勘斷即是前來指揮全不可遵用再詳四月七日聖旨今後如有論訴或告首罪惡顯著事迹明白官司見得詣實方許勾追證佐將為首人依法勘斷臣竊謂朝廷立法蓋本人情自建炎兵火以來無知之人所在作過何所不有州縣根治誅鋤首惡略盡其有不經官司論訴者必是事迹不甚顯著兼其情理亦必不至切害如此等罪雖未陳論理宜矝恕聽其自新今所犯在數年之前事既滅息乃始降指揮許令告首即與當時立法之意正相背戾指揮才下將見平日挾怨規利之徒自此轉相告訐無有巳時事既在官若不勾追證佐何由見得詣實雖云不得稍涉支蔓方首從未分之時追逮所及支蔓必多若以謂𬒳苦之家及鄰保等必欲訴冤則兵火才息自合陳告何至今日乃始生事自降不許受理指揮至今將及半年若又衝改不行豈唯滋長姦弊亦恐無以示信四方以臣所見紹興三年十月二十五日指揮委是允當却合依舊遵守所有今來録黃臣未敢書行伏望聖慈更賜詳酌謹録奏聞伏候勑旨又貼黃稱契勘絶興三年十月二十五日指揮係臣靣對奏請施行事今折彥質所乞乃是衝改巳降指揮與臣當時奏請之意不同故臣不得不論乞賜睿察華陽集卷第十七畢
