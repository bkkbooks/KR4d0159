front:
  text: 華陽集卷第十四
  hash: sha256:0f209bd75d62f46281d67ad90101e663ac60bf3b62d252c60be47997b103a072
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0159_SBCK_014-1a}
body:
  text: 金壇後學于孔兼校劄子論獄囚瘦死劄子臣聞詰姦禁暴莫重於獄敗法亂政莫甚於治獄之吏恭惟陛下自即位以來每發德音下明昭未嘗不以欽恤刑獄為先然近歲吏姦成市未能遽革或緣貨鬻或挾怨仇或望風旨或私逞威勢捶楚之下欲致之死地往往先以病聞及其巳死縣匿之不以申州州匿之不以申監司上下相蒙難以稽察按紹興斷獄勑諸囚在禁病死歲終通計所禁人數死及一分則官吏以次斷罪罪止杖一百此固法之善也然繫囚日死官吏斷罪之文初未嘗舉行夫欲懲其苛慘而罪止于杖責之既輕復為虛文宜其吏之不知畏也昔漢宣帝詔郡國歲奏繫囚以掠笞若瘦死即坐名縣爵里丞相御史課殿最以聞臣愚欲自今以後令州縣月具繫囚存亡之數長吏結罪保明申提刑司歲終舉行斷罪之法仍每路比較一州一縣死囚最多之數具當職官吏姓名取旨黜責其最少處亦乞量行褒賞如宣帝故事庶幾慘酷稍懲人無橫害以廣陛下好生之德取進止乞久任劄子臣聞張官置吏本以為民與民親者莫如監司郡守前代以來尤重其選然未有不使之久任而責其成功者也國家稽古建官舊以三年為任近歲員多闕少率二歲為成資以古驗今巳不為久使人人得成資而代猶足以稽其功效竊見比年監司郡守往往數易或到任未滿一年或才三兩月輒代去夫郡守治一州監司總一路其風俗之厚薄吏胥之欺詐簿書訟獄之繁夥非一朝一夕所能省察也借使材術過人亦必遲之歲月然後可以措手今乃不待席暖數見換易前官視事日淺未究設施而後官巳至端緒復亂人懷苟且迄無成功又况遠近送迎士卒疲苦往來饋給州縣煩費當此艱虞之時豈無所損哉臣愚欲乞檢會二年成資旨揮申嚴行下今後監司郡守除以罪去不問久近其他並令成資如朝廷選材召擢亦必到任一年方許受代所貴吏得安職民受實惠取進止乞令帥守條例利害劄子臣竊觀陛下即位以來勵精圖治崇諌諍之風而虛心於敢言之士懋緝熙之學而留聽于勸講之臣猶以為未也乃自從官下至百執事皆令以次轉對可謂得聽納之道矣然而州郡帥守於民尤親講求時務亦應有所論奏雖詔書數下中外奉承其間尸官循默之人曠日持久曾未聞以讜言至論上徹聖覽甚無為也臣伏見仁宗皇帝詔沿邊郡守替日各具民間及邉事五件奏聞蓋欲躬垂明聽以察四方萬里之遠然則凡在官者孰敢不究心所職哉臣愚欲望陛下舉行仁宗故事應諸路帥守不以到任久近至替日各令條列本處利害五事以上畫一具奏其沿邉州軍仍論邉防急務悉可行於今者庶幾人皆竭誠盡慮仰副陛下求言之意取進止乞嚴邉備劄子臣竊觀國家自遭夷虜之難繼以姦臣僭竊中原陷沒社稷阽危此天下之所痛心疾首恨未有以報也比來川陜之師捷書屢至賊境內擾虜氣沮衄是乃上天悔禍之時中外人心亦少快矣然臣竊有所慮者蓋群情樂于苟安事變生于所忽天不假易道貴難圖今雖警報稍寧然所以自為備者豈可一日廢也又况凶渠假息陰連黠虜深謀詭計緩急相應則羸師張我或未可知傳曰上兵伐謀又曰先為不可勝以待敵之可勝正今日之先務臣愚欲望陛下明詔有司日御名一日常若寇至應沿邉去處無得徹警要令斥堠益逺關防益密訓士卒察姦細以至城池樓櫓器械之屬亦宜常切按視以時修葺如此不唯物各素具可以應卒抑使士氣不惰國勢自強恢復之基於是乎在取進止乞詔大臣兼領史事劄子臣聞自古帝王之興必有信史備載一時行事所以昭示天下後世不可缺也恭惟陛下纘紹丕圖于今七年動勞萬機夙夜不怠將以恢中興之業比迹周宣漢光而東觀日曆未有述焉頃因臣寮上言嘗詔論撰然自艱難以來簡編散逸時政起居本末不備方且重行搜訪內則關問於百司外則取會於州郡既以節目繁夥供報為難又緣祕省權輕諸處視為不急雖復文移往返未有汗青之期深恐歲月侵久事或失實愈難考正竊見今之著作局乃昔之史館祖宗時嘗以宰臣兼之故史權增重臣愚欲望聖慈若稽故實特詔大臣兼領史事而委以筆削之功庶幾聖朝盛典粲然備舉天下幸甚取進止論買牛筋角劄子臣竊謂方今國家之急有二一曰治兵二曰務農治兵所以強國務農所以足食二者相頃以濟殆難以偏廢也夫兵無弓矢固不可以戰然農無牛亦安能服田力穡此正宜今日之所圖者臣伏見近日軍器所打造弓一萬張計用牛筋六千七百四十五斤角一萬一千隻績奉聖旨分一半下浙東收買此乃陛下留神武備修治器械以攘夷狄深得夫宣王復古之意矣有司奉行旨揮獨患筋骨數多無人出賣州郡決不能以時應辨蓋一牛得筋不過數兩約用三牛可得筋一斤今所買六千餘斤無慮二萬牛矣緣自兵火以來逺近耕牛驅虜屠殺殆盡至有以人代耕田畒荒蕪莫之墾闢頃者朝廷察知故嚴立罪賞禁人屠殺自是人稍知戒然所在孽養未久正須遵行法禁以俟蕃息今乃分科筋角下州縣收買州縣必須科下人戶人戶之牛自死者其筋角既巳依條納官緣何更有出賣深恐官司務欲辦事妄行促迫則小民畏懼勢須殺以應命顧罪賞如此誰敢輒殺設或姦猾之民以所須筋角為名遂復恣為屠割不知州縣何以處之欲加以罪筋角無所從出欲縱之法令不行而殺牛滋多益廢耕耨是於國家務農之意有未至也臣訪聞溫台衢婺等州昨為鄰境盜賊竊發其間豪民多緣扞禦收畜良弓今筋角旨揮既行所買必不能足數臣愚欲望聖慈下三省相度除一靣收買筋角外浙東人戶能以堪用好弓力及八斗以上者赴官投賣即今州縣每張約筋角若干而給還其直總計所買弓輔充今來所降筋角之數如此不唯收買易辦且得存養耕牛農人不至失業兼使民間兵器以漸納官是一舉而獲三利也區區管見干犯天威無任惶悚戰懼之至取進止論土豪獄久不決劄子臣聞臯陶告舜曰與其殺不辜寧失不經好生之德洽于民心夫以德洽民心其本在於御名罰此虞舜之治天下所以歸仁仰惟陛下纂業中興憂勤不怠監觀庶獄尤務哀矜既巳臨遣使軺宣諭德意而又親灑宸翰刻石以詔有司唯恐淫刑以逞濫及無罪是宜四方風勤下無冤民然臣竊觀軍興以來每遇寇亂村人往往乘時倚勢羣輩剽劫以至殺人放火時或有州縣尋行根治罪大而左驗明白者固巳即時就戮其情由曖昧黨與牽連則必逮繫證案姦吏受賕滋漫及于平人是致獄久不決而斃於纍囚者不可勝數小人見其如此或挾讐怨或規賄利轉相告訴無有巳時故雖歲月深遠事既滅息而官司因其告訴輒復收捕驗治是以獄訟愈多而人情不能安處方其事變擾攘無知之民違法作過何所不有罪在一時豈無詿誤自建炎巳酉至今經涉五年推窮誅治亦足以鉏姦去惡使民知畏矣然而囹圄置對猶或有未決之囚官吏受辭無以絶方來之訟近者紹興府亦嘗申請正言金人占據去處而不及他盜紛擾之地止言土豪專輒斬殺之罪而不及細民乘時殺傷等事雖巳特降旨揮又不遍及天下似于聖威推行未廣臣愚欲望陛下載頒詔旨截自紹興元年正月一日以前應因寇亂聚集作過及殺傷等事一切不問州縣勿復受禮如事巳在官而未結正者並令釋放所貴曠蕩之澤普浹天下雖虞舜好生無以過此取進止論淮南官冗劄子臣伏見淮南州縣數經殘破比年餘間稍稍歸業正在朝廷加意拊循庶幾德澤下究創痍漸復然其間官吏設貟太冗裁減未盡浸漁騷擾為害不細甚非勞來還定安集之意方今國家大勢以東南為重自江以北皆吾屏蔽苟欲經理天下則淮南當在所先不可謂殘破之地而遂忽之且州縣民既不多則事亦隨少事少則冗官濫食亦安所用若不痛行減省將見積日纍月害民益甚臣愚欲乞每郡自太守而下除酒稅主兵及簽廳官各存留一貟刑獄倉庫止一貟兼治其餘並罷每縣自知縣而下存留酒稅官一貟丞簿尉職事亦止一貟兼治其餘並罷所有管下巡檢及外鎮稅官除係衝要去處依舊存留外餘悉罷之如此則減貟雖多必不至乏事俟將來歸業者衆州縣事體寖盛却相度逐旋增添所貴治有條理民得休息伏望睿慈特降詔旨施行取進止論儲蓄劄子臣聞國家無九年之蓄曰不足無六年之蓄曰急無三年之蓄曰國非其國也是以立國之道穀食為本量入制用以備凶災方無事時尚當如此而况艱危之際軍師仰給有倍於平日者乎國家數年以來養兵益衆月費廩餉無慮數十萬斛所幸頻歲登稔不至缺乏然而朝斂暮散僅了目前未聞有所蓄積古人嘗謂六歲旱蓋言豐凶相代不可以為常也萬一豐歲以後繼年穀不熟民無以輸則將何以為計臣竊見春來霪雨不節二麥既傷而秋成又未可知要當預為之圖訪聞民間猶有積榖可以接新二麥雖傷將來薄收穀價亦必少減臣愚伏望聖慈委諸路漕臣及兹民有餘粟之時早行措置或從官司兊那糴買或行民戶預行樁留各條具委令如何可廣儲蕃限一月上之户部相度申尚書省取旨施行取進止華陽集卷第十四畢
