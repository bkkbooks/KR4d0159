  text: 華陽集卷第十一
  hash: sha256:f8ebe09af8e1dbeaf8fe26b3ac8dfbb1a75682c5eea27e94869c3f2444c9e159
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0159_SBCK_011-1a}
body:
  text: 金壇後學于文熙校表紹興二十一年再任宮觀謝表臣某言臣昨為宮觀將任滿陳乞再任今月十八日伏奉勑命候今任滿日令再任臣巳即時望闕謝恩祗受訖奉祠苟祿歲滿何功從欲推仁詔令再任荷皇慈之優恤拊孤跡以增慚臣某誠惶誠懼頓首頓首伏念臣賦材甚踈學古不博誤𬒳聖神之選躐躋侍從之華坐竊恩榮蔑絲毫之報效空縻歲月覺氣血之耗衰靜惟養拙之方亟上由衷之懇冒塵淵聽方大懼於嚴誅祗奉綸言乃再叨於舊物當桑榆之暮景獲閭里之安居自省庸虛實為僥幸兹蓋伏遇皇帝陛下堯仁天覆湯聖日躋體道觀能翕九德而咸事量材因任成庶政以惟和故令樗散之姿亦玷龍光之施恩同造物雖欲報而難名義有捐軀顧敢忘於永誓臣無任紹興二十二年郊祀禮成賀表臣某言臣恭聞今月十八日郊祀禮成大赦天下者上帝溥臨既備成於熙事庶邦丕享遂普浹於湛恩天人交通夷夏呼舞臣某誠歡誠忭頓首頓首竊以有國之大饗帝為難得其位而得其時斯舉百王之典不欲疏而不欲數宜循三歲之規考古以來於今為盛恭惟皇帝陛下性堯舜之孝悌躬禹湯之儉勤地平天成坐致九功之叙兵寢刑錯聿臻庶政之和治已格於丕平禮必隆於大報夙嚴淸蹕齊謁紫壇儼千乘萬騎之容惟祗惟畏奉一純二精之薦是饗是宜瞻權大之方升恍雲車而來下神心允答聖度彌謙拜貺于郊靡擅一人之慶配天其澤式均四海之歡臣身忝從班職拘逺服奉璋就列莫階麾士之榮望闕馳誠但效華封之祝臣無任除吏部侍郎謝表臣某言臣伏奉告命除臣尚書吏部侍郎仍賜對衣金帶者辭榮晚歲敢萌再仕之心召對嚴宸遂玷六卿之二恩加不次身若更生懇避莫回凌兢失措臣某誠惶誠懼頓首頓首臣聞圖治以人材為急量材乃選部所專注擬分於四時品流動以萬計故中臺列職雖率屬以惟均而小宰一司視他曹為最要欲革滯留冗濫之弊必求明敏練逹之材而臣學陋無聞性迂寡合徒以朴忠之守誤蒙聖哲之知蚤擢禁嚴蔑聞績效半生去國空驚齒髮之衰無路報君更懼風波之險逮引年而得謝方謀食以偷安豈謂皇明曲垂簡恤起從田野頓增朽質之華入覲冕旒欽奉玉音之訓俯憐久困復置近班仍假寵於服章俾分權於銓綜退惟綿力何以當能不圖晚遇之榮乃過初心之望此蓋伏遇皇帝陛下聖由天縱心與神謀廓離照以並觀奮乾剛而獨斷散羣壞植大開公正之門拔滯振淹促赴功名之㑹故雖小物不以遐遺內省叨逾若何報稱臣謹當恭承明命仰體眷懷激昻巳退之心磨勵久荒之業桑榆晚景儻幸駐於餘光駑蹇馳驅敢辭難於末路冀伸鄙志少答洪慈臣無任除兼侍講謝表駑蹇無堪復登於禁路龍光申錫沓至於旬時承命自天措躬無地臣某誠惶誠懼頓首頓首臣竊觀睿主臨御應期右文躬五帝之聖神臣皆莫及請六經之淵懿義各有歸故微言每垂意於討論而淺識類難陪於淸燕在漢則有班張之博學於唐則推禇馬之多聞儻使生於斯時尚恐莫能稱職矧如臣者何足道哉占一藝而不精閲百年而向盡召從間廢巳叨不次之除敢以空踈更冒最高之選顧懇辭而莫遂揣涯分以難勝云云闕除參知政事辭免表臣某言臣伏蒙聖慈以臣辭免新除參知政事恩命特降詔書不允者寵命過優非材莫稱忱辭上逹聰聽未回仰明詔之春溫撫危衷而夕惕臣某誠惶誠懼頓首頓首伏念臣孤窮賤士遭遇四朝收之簪屨棄遺之餘試以銓衡煩劇之選勞能弗著幽黜是虞敢期全度之私更委難勝之任擢升廊廟進二機衡顧茲政令出納之間實賴左右謀謨之助而臣病隨年而日進心與力以俱疲激濁揚清尚懼曠瘝於一職殫智竭慮安能參贊於萬微矧今公道之方行宜擇真材而為輔儻不量其非分必自取於疾顛用干難犯之威再瀝由衷之懇伏望皇帝陛下廓大明而旁照矜小器之易盈不難渙汗之回俾遂謙撝之守庶於高位不至妨賢臣無任除參知政事謝表臣某言伏奉告命除臣參知政事尋具辭免伏蒙聖慈特降中使賜臣批答不允仍斷來章者擢置廟堂成命由於獨斷與聞機政謭材何以當能懇避莫回凌兢罔措臣某誠惶誠懼頓首頓首竊以朝廷之上治化為先崇建二府之官密贊萬幾之事所以發號而施令正賴同寅而協恭非得偉材曷輔大業如臣者蚤緣末學謬竊賢科從仕四十三年歷官十有八任服膺道義空白首以無聞妄意功名幸丹心之猶在晚遇聖神特逹之眷召從間退無憀之中俾二銓曹進陪經幄吏員猥衆持衡莫著於微勞聖學高明侍席空慚於淺識方虞罷免忽誤超遷位高躐進於羣工命下駭聞於衆聽以是古俗儒而驟參國論以窮閻賤士而日近天顔載加品秩之崇增賁服章之寵身所僥幸人莫比倫恩重命輕感深涕隕此蓋伏遇皇帝陛下懋昭帝德統御乾剛導群心於公正之門措一世於光華之旦用人惟巳靡先左右之容以道觀能咸責事功之實知臣獲事三朝而未罹大過察臣匪躬一節而特躋近班豈伊暮年有此榮遇臣敢不祗承命綍恪守官針非堯舜之道不陳用贊明昌之運儻稷契之言有合肯忘謇諤之忠誓畢此生仰酬洪造臣無任賜生日生餼謝表臣某言伏奉詔書以臣生日特降中使賜臣羊酒米麵者門􅓡記日敢上逹於聰聞詔綍宣恩乃忽叨於異數光生里巷愧溢心顔臣某誠惶誠懼頓首頓首伏念臣仕雖為貧才不逮衆導義方之往訓勉晚節以遭時誤𬒳眷知擢參機務千鍾後仕方興弗泊之悲初度錫名載值始生之旦豈伊孤藐更辱殊私敇餼廩之豐儀兼醇醪而飫賜惟大烹之養甚盛宜以與賢顧小人之腹屬厭實為冒寵此蓋伏遇皇帝陛下道隆乾施德懋謙光至誠俯逮於臣鄰厚意特將於臺餽必熟而薦獲伸永慕之懷惟孝可移誓竭孤忠之報臣無任除資政殿學士知婺州謝表臣某言臣伏蒙聖恩除資政殿學士知婺州軍州事尋具辭免奉詔書不允巳於今月十六日祗受告命仍賜對衣金帶者嬰疢祈間方憂冒犯叨榮過望惟極驚慚臣某誠惶誠懼頓首頓首伏念臣世出窮鄉生逢休運先帝賜臣以上第特見褒嘉陛下擢臣於從班屢膺器使第材踈而識暗兼分薄而命窮雖受丘山之恩蔑聞毫髮之報逮迫暮齒猥參繁機責愈重而任有弗勝疾益加而力難自勉尸祿既逃於深譴乞身更荷於軫憐竊惟祕殿之華資本優舊德至若近畿之古郡宜付長材矧加命綍之榮仍賁身章之寵顧臣朽質何以當能茲蓋伏遇皇帝陛下大智燭幽深仁遍物謂臣服勞自舊未忘簮屨之遺憫臣來日無多特借桑榆之景肆頒新命庸示殊私臣感極涕零言窮意拙陛辭有日尚期一望於堯天郡政久虛敢憚疾驅於周道臣無任知婺州謝上表臣某言近准告命除臣資政殿學士知婺州軍州事臣巳於今月初二日到任交割職事訖二政無功亟上祠宮之請分符過望更叨祕殿之華拜命若驚臨民有愧臣某誠惶誠懼頓首頓首伏念臣生逢休運晚遇聖知擢自山林得謝之餘置諸廊廟弼階之次顧庸虛不學之質雖自竭於愚衷當睿知有臨之日亦何禆於大政年益衰而告病位巳過而將顛載陳知止之情乞身退屏敢意均勞之典錫寵便蕃蒙聖諭頗惜於去朝謂精力猶堪於共理逮辭天陛復遣王人親灑奎章軫念猥加於𬒳服申頒寶帶殊榮頓聳於觀瞻辱隆眷之非常在近時而罕有矧兹星郡實輔日畿民皆服化而有遷善輯睦之風路不當衝而免過客將迎之苦何暮年之竊幸獲善地以偷安茲蓋伏遇皇帝陛下發揮聖神崇廣德業攬萬務以當寧聚衆賔於本朝舉而用不與人而求備及其老也每從欲以推仁致此孤微亦容忝冒臣夙遵宸命躬布藩條眷竊位之朞年善俗稔聞於睿訓幸提封之千里承流敢後於他人庶幾桑榆之收少答天地之造臣無任進土貢羅狀右狀以别九州而作貢蓋分任土之宜供十笥以充庭爰届始喪之候非貴異物式舉彞章前件物本民事於𧖟繅敕女工之組麗實諸厥篚仰輸三服之勤掌在尚衣肅備九重之奉敢茲塵冒彌切震惶賜曆日謝表臣某言臣進奏院遞到宣一道伏蒙聖恩賜臣紹興二十八年統元萬年具注曆一軸臣巳即時望闕謝恩祗受訖者推策成書氣均調於四序授時協政恩首逮於庶邦祗拜為榮奉行敢怠臣某誠惶誠懼頓首頓首恭惟皇帝陛下天臨廣宇春育羣生探頥陰陽合乾行之密度同文夷夏前民用以頒條臣謹當佩服聖謨恪恭郡事仰日星霜露之變既獲考於常經順析因夷隩之宜期助成於至化臣無任再致仕謝表臣某言近緣年老多病陳乞致仕今月十八日伏奉告命蒙恩特授臣左太中大夫依前充資政殿學士致仕臣巳即時望闕謝恩祗受訖陳力不能屢上乞骸之請推仁從欲更叨增秩之恩身既返於田廬職尚聯於禁密始終厚遇朽謝奚堪臣某誠惶誠懼頓首頓首臣聞禮存致仕之文國重憫勞之典乃治古優賢之遺意實人臣歸老之至榮苟非其人未免有愧如臣者起家寒賤遭世盛明受寵三朝效官四紀晚荷非常之眷召從得謝之餘俾再仕於淸時巳為忝冒自二卿而聞政更極超踰上焉纍世蒙休下則舉宗𬒳澤逮辭疾而去位猶分符於善邦凡茲寵數之優隆皆過平生之分量報未先於縻隕年遽迫於衰殘自知無𥙷於公家豈敢坐靡於稍廪是祈退屏以苟生存睿聽俯回既特從於至懇官聯序進仍曲示於殊私顧終身無尺寸之伐可稱而末路荷保全之恩如此慙顔莫寄感涕交流兹蓋伏遇皇帝陛下博愛而行義之宜至誠而盡人之性知臣朴直少無能而老亦何為察臣衰病心雖勤而力有不逮俯憐舊物特卑殘生息駕駑駘雖戀軒而無路懷忠畎畝猶結草以為期臣無任紹興二十八年郊祀禮成賀表臣某言臣恭聞今月二十三日郊祀禮成大赦天下者饗帝于郊函蒙於祉福配天其澤鼓動於風雷凡厥有生罔不咸賴臣某誠歡誠忭頓首頓首臣聞禮之大者非聖莫行誠苟至焉雖幽可格允屬亨嘉之會克成孝奏之儀恭惟皇帝陛下體統乾之粹精廓大觀之中正德功兼茂逺配五三六經之傳符瑞洊臻豈止數千百所之盛肆昭大報丕藏彌文精意上昭百鬼迪嘗於嘉薦明靈並貺三呼肅動於侍祠靡專滋至之休亟布維新之令滌瑕蕩穢褒德賞功聿彰晏粲之風於緝㑹通之典臣叨恩暮齒得謝窮鄉望初日於紫壇阻陪籲俊接歡聲於白叟徒幸遭時臣無任皇太后慶壽賀表臣某言臣恭遇皇太后聖壽新歲八十皇帝陛下於宮中行慶壽之禮特降詔書推恩天下者上儀肅備侈萬壽於東朝溫詔俯頒浹多歡於率土矧是服乘之舊尤深舞抃之情臣某誠歡誠忭頓首頓首竊以周紀太妊靡著年齡之永魯歌壽母蔑聞位號之崇曷若熙朝兼隆備福皇太后含光坤載育德聖躬長樂尊嚴極天下之大養龜臺清淨得道家之長生鴻算方隆綿區永賴恭惟皇帝陛下仁同天覆恩厚母慈三朝不懈於雞鳴務盡恪勤之禮萬歲允符於芝瑞聿彰孝友之誠屬歲籥之更端奉寶觴而稱慶欲廣躋民之化爰推錫類之恩眇古昔以創聞實邦家之盛事臣嘗叨近列久去淸朝不謂餘生獲觀曠典退藏畎畒徒占南極之祥注想慈寧阻奉蟠桃之獻臣無任華陽集卷第十一畢
