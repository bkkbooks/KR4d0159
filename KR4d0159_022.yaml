front:
  text: 華陽集卷第二十二
  hash: sha256:3890096e9c8ad39a4f4db07a3858b22338ba5fe0bf97e601a4025520f9473136
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0159_SBCK_022-1a}
body:
  text: 金壇後學于文熙校進故事一兩朝寶訓判刑部石宗道與詳覆官梁如圭等薦方偕淳于佺韓中正為詳覆官仁宗指中正姓名問宰相王欽若曰是吏部嘗引對坐失入人罪不與改官者乎欽若曰然上曰用法不當非習律令者也其可以為法官乎命劾宗道等欽若等退相顧歎曰上天縱睿明強記如此非羣臣所及也臣嘗謂人主必有過人之聰明然後能察君子小人之情狀蓋天下君子常少小人常多君子直道以事上固不論也若夫小人為姦其可不察哉飾是非點白成黑或譽過其實或毀損其真相與蔽欺雜然陳於前而人主以一已耳目廣覽兼聽必欲每事洞然其情非大過人之聰明其能不顛倒眩惑乎仁宗皇帝以天縱之姿留神政治如石宗道不能以韓中正靣欺非聰明過人何以及此臣試論之夫官為詳覆刑獄所繫居其任者盡循三尺以示至公猶懼或失而况不習律令安能辦職哉宗道判刑部宜於此盡心而乃謬薦中正以為詳覆中正嘗坐失入人罪而不得改秩其事見於疇昔引對坐之時宗道私竊自料以為人主萬機之煩決不能記此遂敢靣欺必且韓其所犯以幸不察然而仁宗一見覺之宗道即𬒳罪此聰明之實所以能服天下也當是時王欽若為宰相蓋先朝舊德也宗道欺君其罪固大矣欽若得為無罪哉朝廷進用人材未有不由宰相者其人有過而宰相不知以薦於上雖曰不明猶或可恕今宗道主舉中正仁宗方以失入事問其人是否而欽若應聲以為是則中正之不可用欽若固巳熟知之矣知其人之不可用聽宗道之言而固容之必待人主問而後對非朋姦罔上而何臣以是知欽若非忠臣也且一詳覆官用非其人於朝廷舉措未為大害然必劾之者罪在罔上耳苟於其微置而不問則小人欺君之計日浸以長後之啓擬必有大於此者其害政未易言也古之所貴於御名微者以此故臣嘗謂治天下之術在用人而用人之術在察知其情狀若共工之象恭鯀之方命自歡兜四嶽咸荐之而堯獨能察焉以為不可觀諸此然後知仁宗皇帝用人之術上與堯合圖治功者可不念哉二唐書李珏傳杜悰領度支有勞帝欲拜戶部尚書以問宰相陳夷行答曰恩權豫奪願陛下自斷珏曰祖宗以宰相天下事皆先平章故官曰平章事君臣相須所以致太平苟用一吏處一事皆決於上將焉用彼相哉臣竊謂人主之操術無他御名擇宰相委任而責其成功如是而巳至於人材之用舍爵祿之豫奪則執其柄以詔王實宰相之職唐文宗任陳夷行李珏等為相豈不欲以朝廷事盡付之而責其效職哉杜悰拜戶部尚書而夷行無所可否乃曰恩權豫奪陛下自斷嗚呼是安用彼相邪夫本在於上末在於下本末而上下之分定治功所以成也夷行身為相臣而用一吏處一事皆決於人主不知其所任何事哉雖然當開成中夷行亦號一時賢相不幸與李珏楊嗣復等並用嗣復得君與玨為黨故夷行疾之數爭事於上前一日文宗以王彥威為忠武節度使史孝章領頒寧議皆出於嗣復及夷行對延英帝問除二鎮當否夷行曰苟自聖擇無不當也嗣復曰若用人盡出上意而當固善如小不稱下安得默然臣以是知夷行介特而悻直意謂嗣復輩黨與既成則進退人材與已相違故於除用不肯任責且人主用人悉從執政啓擬是謂合天下之公議不然命由中出必有招權賣恩而私於人主者為夷行計便當與上别白是非若其人果賢雖不由於啓擬用之不害為公有如不材宜白去之不當循默自避以取誚於後世也大抵文宗有勵精圖治之資其失在於不能去朋黨耳嘗曰竇易直勸我凡宰相啓擬五取三二取一彼當勸我擇宰相不容勸我疑宰相然則文宗豈不知任相之道哉至於黨人成於下主聽亂於上見譏史氏此其於知人之明有所未盡而朋姦得以欺之也儻能即夷行應答之際詰其所因慨然破嗣之黨而正夷行唯阿不任責之罪則唐之威令當是復振矣文宗不知出此惜哉三唐書李絳傳憲宗嘗稱太宗明皇之盛曰朕不佞欲庶幾二祖之道德風烈無愧諡號不為宗廟羞何幸而至此乎絳曰陛下誠能正身厲巳遵道德逺邪佞進忠直與大臣言欽而信無使小人參焉與賢者遊親而禮無使不肖與焉去官之無益於治者則才能出斥宮女之希御者則怨曠銷將帥擇士卒勇矣官師公吏治輯矣法令行而下不違教化篤而俗必遷如是可與祖宗合德號稱中興夫何逺之有言之不行無益也行之不至無益也帝曰美哉斯言朕將書諸紳臣竊謂自古人主未嘗無願治之志然焦心勞思變法更令若將措天下於唐虞三代之上而夷考其治終有愧於前世者其故何哉稽其名不求其實慕其時不行其道故用力雖多功效蔑如也且唐有天下傳世二十德業之盛無如太宗故除隋之亂比迹湯武致治之美庶幾成康至於明皇雖晚節不兢而開元之政亦後世罕能及之然觀二君所以能致此者豈無其要哉不過李絳所言數事而巳臣請得以備論之夫人主誠能正身厲巳則所以表天下者動用周旋舉得其正孰得而違之遵道德逺邪佞進忠直則所以取於人者是非好惡悉由至公孰得而惑之與大臣言欽而信無使小人參焉則委任之重所以責成功者專也與賢者遊親而禮無使不肖與焉則禮貌之隆所以資啓沃者深也去官之無益於治者則竊位素飱之人退而材能自出矣斥宮女之希御者則承恩負寵之人寡而怨曠自銷矣將帥擇而士卒勇則外侮不患乎不郤官師公而吏治輯則內政不患乎不舉以至法令行而下不違教化篤而俗必遷是皆人主夙夜躬行無一敢怠者太宗明皇用此以致正觀開元之治其效豈彰彰可考哉非獨太宗明皇為然雖堯舜三代聖哲之主其所行亦不出此是宜憲宗有問而李絳對之悉也書曰監于先王成憲其永無愆又曰丕顯哉文王謨丕承哉武王烈啓佑我後人咸以正罔缺夫祖宗之謨烈垂之天下所以啓佑後人為之後者亦監其成憲舉行之而巳憲宗有言欲無愧諡號則其措意施設豈不韙哉觀其慨然發憤志平僣叛能用忠謀不惑於羣議卒收成功以至元和之治唐室號稱中興則二祖之道德風烈如絳所云者信乎其能行之矣至於不克有終與明皇同譏史氏此無他由其信用非人所以馴致其禍莫之悟也嗚呼惜哉四仁宗君臣政要上嘗問都知王守忠曰卿出入中外聞有甚議論守忠曰皆言陛下仁慈聖德但朝廷好官美職及清要差遣皆是兩府親舊方得進用陛下不曾拔擢一孤寒之臣置於清近又曰天下事皆由宰相陛下不得自專上默然良久曰任人者興王之本自任者失道之君故君知其道臣知其事朕若一一自任非無為責成之理守忠愧拜而退臣嘗觀蘇軾頌仁帝皇帝之德曰未嘗行也而萬事莫不畢舉未嘗視也而萬物莫不畢見非有他術也善於用人而巳惟其善於用人是以穆然無為坐視其成功嗚呼仁宗皇帝可謂得君人之道矣夫君人者有四海之大應萬幾之煩不委之人曷以濟哉故必延登一時老成名德之士置之廊廟而使之修其德業政事無巨細悉以責其成人材無內外悉以聽其用吾於此尚復何為恭巳正南靣而巳矣傳曰上必無為而用天下必有為而為天下用此不易之理也自昔堯舜禹湯文武所以用天下而有餘者亦豈弊弊然以其身親之哉至於後世不能御名擇大臣為大臣者又復懷姦挾私不能仰稱委任之意於是人主始欲收其柄而不使之專也故進擢才能關決事務一切勞其心志而自為之若將與臣下爭功者名之曰憂勤其實以上兼下非秉本執要之道顧如是區區亦焉用彼相哉恭惟仁宗皇帝在位四十二年所任執政皆極當世之選如韓琦范仲淹富弼尤其彰彰者方是時百官效職而人無棄材庶功即敘而事無遺策真所謂人主穆然無為坐視其成功者也而王守忠乃云陛下不曾拔擢一孤寒之臣置於清近又曰天下事皆由宰相陛下不得自專守忠小人將以是踈間君臣而行其私賴明聖覺之以謂任人者興王之本自任者失道之君大哉王言兹所以為仁宗也歟夫以仁宗臨御之久在列精白承休而守忠何者乃敢陰肆其説亂惑主聽以此見小人應對之際不可不察也昔宇文士及謂唐太宗南衙羣臣靣折廷諍陛下不得舉手明皇嘗引鑑默不樂左右曰自韓休入朝陛下無一日歡何自戚戚不逐去之然則自古小人處心積慮乘間進説未嘗不欲遵人主於非義惟在聽之如何耳若仁宗之聰明能使讒者愧拜而退蓋可為萬世法也五三朝寶訓端拱元年太宗謂宰相曰國之興衰視其威柄可知矣五代乘唐季喪亂之後權在諸侯征伐不由朝廷怙勢內侮故王室微弱享國不久太祖光宅天下深究兹弊暨朕纂位抑亦徐圖其事思與卿等御名守法制務振紀綱以致太平臣觀人君所以能號令天下者威柄在我而已方太平無事朝廷之紀綱法度具在雖有姦雄孰敢妄作故操待豫奪之權未嘗不出於上也至於末世人習宴而不知有鴆毒之禍凡所以馭下之具悉從廢壞是以國勢駸弱主權暗移使匹夫孺子尺兵在手皆足以作難况姦雄哉唐有天下二百年而高祖太宗之紀綱法度固無不善也天寶以後日漸陵夷方鎮擅權連城相望強臣悍將拏兵忿爭而尾大不掉之患終唐世莫之能救五代承之其弊尢甚當是時威柄在人天子惴惴然不得搖手嗚呼天下豈有是理哉迹其禍敗之由蓋以制之不早所謂養虎而自遺患者也觀德宗姑息藩鎮至有終身不易地者憲宗用吉甫為相歲餘凡易三十六鎮殿最分明神策軍使王駕鶴者典衛兵久權振中外德宗將代之懼其變以問崔祐甫祐甫曰是無足慮即召鶴駕留語移時而代者巳入軍中矣大抵朝廷之勢得人則張彼祐甫相德宗吉甫相憲者皆能有所設施故其效昭然有足稱者惜乎二宗之德業俱不克終遂使唐禍胚胎卒抵敗亂豈不以假其術智特以排難於一時而不知復收其柄立以法善其後故也故臣嘗謂國勢所恃以安疆者莫重於兵而所以危國者亦莫甚於兵顧上之人御之之術如何耳方無事時聽受節制若女子然東西唯命吾尚何憂及其植黨漸固而挾之以恣橫豢養滋豐而縱之以驕侈於是怙勢長惡始有慢命不虔之事聖人慮禍於未萌豈不思有以制之乎昔者鼂錯欲削諸侯而七國亟反蓋削之非計也曾不若主父偃之策之為善耳偃之説以謂使諸侯得推恩分子弟以地侯之則其國自弱然則為唐室計者外而藩鎮內而強臣悍將其權固不可遽奪也儻能用偃之説而衆建偏禆以分其威稍令出戍以散其黨則庶幾陰奪其勢而主柄專於上豈不偉哉唐柳澤有言勿謂何傷其禍將長勿謂何害其禍將大太宗皇帝能於立國之初監前代之失欲收其威柄以致太平則其先見之明後世所當法也華陽集卷第二十二畢
