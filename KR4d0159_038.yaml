front:
  text: 華陽集卷第三十八
  hash: sha256:74e5fc8a33160c4f956f95a930aed9a09e8b0b27166a24ebae2b807e9a7c23d4
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0159_SBCK_038-1a}
body:
  text: 金壇後學于孔兼校挽詞顯仁皇后挽詞三首輔漢陰功大生啇寶運開俸從湯邑省恩向外家裁奄忽乘仙馭劬勞動聖哀園陵奉遺誥終不費邦財二長樂坤儀肅思齊母道全九州供大養八帙茂遐年仗簇江山外哀纒日月邉遺芳歸史筆萬古照靑編三仗去慈寧殿神歸永祐宮問安迷輦道灑泣慟宸衷水逝長江月天號宰木風平生尚慈儉流澤到無窮鄭國太挽詞四首五福兼全舉世稀庭闈早日見淸規應期千載生公輔掩迹三遷號母師漢魏疏封華國史蘋蘩遺德繼周詩年年只説重陽近無復黃花酒一巵一夕萱堂事巳非百年遺範在豐碑頒花玉殿春風暖奉詔登樓夜漏移罷宴巳聞修故事回班那復見新儀音容寂寞應仙去香火因緣只自知蘭桂秋風一夜催衮衣何處望南陔堂堂斗帳銷香篆鑑掩飛鸞下玉臺漢使從天虛鹵薄胡笳和月助悲哀東門咫尺佳城在雙鶴飛空日幾回銘旌冉冉去飛揚蕭瑟西風泣畫堂不見魚軒辭繡轂空餘鸞誥冷綃囊姓名自是標仙籍環佩應知返帝鄉盡把遺芳歸史筆會令千古獨輝煌何丞相挽詞三首一德乘亨運三公冠宰司秉鈞回直道解組向明時人去空圖畫名存粲鼎彛懸知千古後貪懦激淸規二帝念虧三鑑天臨動八鑾飛星瞻傅説舊學記井盤治定身先退名全德不刋於何驗符策有子嗣鴛鸞三不憖遺元老巖巖失具瞻勳庸扶廟社名字到閭閻王國開封大師垣寵數兼夢雞初莫省今日竟成占談勝仲挽詞二首詞伯風騷舊公朝宿望存郎官寧出宰廷尉亟平反夢斷天衢逺愁連野樹昏秪應陰德茂蘭玉照于門二時論歸清德耽書到白頭士應知巳用人豈法家流骨瘦凌孤鶴詩豪壓萬牛悲看耆舊傳誰復繼前修湯德廣挽詞三首四海知名士三朝老從臣勤王安反側分閫試經綸天闊鴛行斷山空馬鬛新豐碑滿忠義千古詔簮紳二忠憤憂時切風雲得路先官針循吏傳家法棣華篇滅虜兵方急優賢席屢前如何天不憖高冡臥蒼煙三束髮師前輩忘年得此翁雞豚同里社詩禮共家風别去十年久書無三月空歸來人不見銘旐舞斜紅張彥度挽詩二首京兆吾宗不乏人煌煌朱紱照簪紳棠陰訟簡絃歌樂蓮幕才高畫諾新北海但知樽有酒萊蕪誰念甑生塵哀笳忽送秋風急忍看遺蹤萬古陳滿目溪山舊賞心杖藜那復共登臨平生友誼情無間纍世宗盟分更深顧我老懷誰告語思君遙夜獨悲吟流風賴有諸郎在他日相親儻嗣音莊弱翁挽詩二首厚德鄉評最知名國士同郎曹參列宿宰屬輔宗工紫詔恩垂下黃梁夢巳空九原那可作流涕濕西風二仕路靑霄逼還家白髮生一麾驚昨夢三徑適幽情孰謂如蘭契先隨逝水傾送君悽斷處煙雨暗銘旌胡氏碩人挽詞二首吾舅當朝傑幽芳配德同典刑家法整湯沐上恩隆鸞影悲塵鑑蘭芬泣露叢音容不知處宰木夜號風二我有劬勞念多從外氏遊母儀頻接侍賔饋每淹留應惜年垂老相親禮特優一朝千古别衰淚不能收舅李侍郎挽詞三首射策飛騰早推賢望實兼直心常自負大器果難淹持橐丹墀穩分符畫戟嚴平生莫追憶淚盡轉愁添二諸舅唯公在承顔念母存笑看身巳老情話意彌溫不作求田計方期報主恩高堂忽蕭瑟誰為賦招魂三強健公先去零丁我曷從同盟空白水酷似有衰容休説鵷行夢看成馬鬛封淚流南望眼愁絶暮雲重洪慶善挽詞二首畫省真郎選朱􅙲老郡侯名歸時論重行向古人求嗜學千雞跖修文五鳯樓秋風忽驚夢懷舊涕交流二忝戚鄉閭舊論交道義深窮搜千古意樂易一生心遭謗身雖貶全名死不沉君恩為昭雪歸窆得家林吳氏太淑人挽詞生兒要路早飛騰玉瑱金花寵屢膺天壽康寧逾九帙佛心明了契三乘葭莩永歎音容阻閭里空存孝義稱追想潘輿從遊處青青煙草正愁凝陳叔美挽詞坦腹東牀衆莫竒堂堂吾弟獨君知交親未及親三歲淪喪俄驚共一時琴在我方悲子敬禮存誰為哭言思山阿幽室千年閟挽語空吟靖節詩外祖李承事挽詞二首總角承顔賴擊蒙後生因識古人風忘情自到羲皇上盛事多談慶曆中雙壽兒孫青若若一門慈孝鬱蔥蔥吁嗟耆舊今何在古木斜陽瀨水空西山忽與老人期未報深恩忍復思燕及祖風從少小與聞家訓識操持聊從諸舅紀遺行深愧外孫無好辭懸想追封在他日附書名傳有佳兒舅李義卿挽詞由來甥舅兩相依存沒誰知半路虧在側每蒙誇叔寶不才那得似牢之臨風酌酒酬春處對月憑軒語夜時回首凄涼巳陳迹壯心無哭奈愁思沈洞元挽詞天闕辭嚴召雲棲得坐忘尊生三洞籙起死上池方神託飛魚化丹餘舊竈香從今紀甲子華表佇還鄉徐獻仲挽詞一尊相别未經時情話如今忍復思老去交親能有幾年來懷抱更誰知溪橋路斷秋風急香火庭空曉日遲三尺孤墳閉千古傷心東望涕交頥丁宣仲挽詞回首三年别追懷一笑歡坐移香砌暖飲散燭花殘蒿里歸何速桃蹊忍更看秋原愁絶處為想鶺鴒寒李居正挽詞白首論交舊黃冠獨此人誠全知俗薄語直見情親上館鍾魚在空壇月露新如今入山去行處是悲辛丁明仲挽詞二首世德知名早鄉評第一流折腰官易厭拄頰興難收博物千尋海高情百尺樓平生松菊徑蕭瑟晚雲秋二里社欣相接葭莩晚益親過從忘客禮簡易見天真把酒微風夜歸舟細雨春如今每追憶悽慟欲傷神陳美成挽詞二首望族推平輿淸芬嗣太丘鄉評嚴禮法家學邃源流幸託葭莩契方期杖屨遊西風忽悲慘忍復看眠牛二德潤洮湖闊心平福地安流風前輩似雅量鄙夫寬松菊開三徑芝蘭秀二難百年如轉燭蕭瑟夜堂寒丁宋卿挽詞舊約頻相過交情忍獨違四時間杖屨一榻冷煙霏易感龍祠别難期鶴馭歸老懷誰共語東望益霑衣彥飾弟挽詞二首吾家奕奕茂芝蘭士論尤推季孟間挾策可憐場屋老杜門空對水雲間嗟余屏迹常多病幸爾論心數解顔乘興過從無復日忍將愁眼望西山解組歸來會靣初杖藜朝暮過吾廬相親樽酒情無間共話田園樂有餘樗散年頽方倚託棣華風急頓蕭踈堂堂人物無高壽不那哀傷淚滿𥚑彥深弟挽詞憶弟懸弧日當余弱冠年艱勤同素志衰病各華顚辭祿歸相倚驚魂去忽先一樽風雨夜那復共蟬聮陳子張挽詞二首地發湖光秀神鍾鶴骨淸高談排俗子執友遍時英枳棘鸞棲在松楸馬鬛成欲收東望眼流涕若為情二交契先朝露凄涼對夕暉箕裘三世逺簿領一官微翠柏開新隧靑編冷舊幃元方未慚長萬里看橫飛堅所生母李氏安人挽詞五首仙李移根逺夭桃表慶長九重頒象服三世奉萱堂尚想慈祥性難追淡靚粧眼酸生怕哭雙淚忽淋浪夭桃事見後二四德騰芳早三乘悟性空淸修忘俗纍勤儉肅家風舞鏡鸞悲影飛花雨泣叢愁情無處著半入夢魂中三舊約余偕老分違汝忽先有懷中饋闕無憾母儀全望斷送歸路哀纒垂盡年何當卜同穴相與伴愁煙四七帙開逾半孤芳散若飄可憐頻舉案那復記吹簫翠幌浮埃積熏爐舊炷消如何寄懷抱細雨夜蕭蕭五
