front:
  text: 華陽集卷第二十九
  hash: sha256:8684d630e9133fe5b54da97203ae5ba590c5a0bf2ba40a4996dff9aecc90baba
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0159_SBCK_029-1a}
body:
  text: 金壇後學于文熙校啓賀執政冬啓氣行無間一陽進而朋來福生有基萬寶滋而萌動惟時盛德與國同休恭惟某官名世巨賢端朝碩輔奮文章之大手領䄂諸儒竭啓沃之深忠丹靑萬化協千載風雲之會冠百工柱石之良茂對昌時倍膺殊祉佇正鈞衡之拜益崇廊廟之瞻不間邇遐實同抃喜某叨恩祠館屏迹鄉枌緬想光儀徒深頌禱賀鎮江王尚書年啓歲且更始與物偕昌福生有基惟人所召伏惟某官公才獨步時論同歸輟從淸切之班來重藩維之寄長江流惠比屋興謠象魏之布始和坐擁春祺之慶晉康之錫蕃庶行膺晝接之榮顧此病衰久於庇賴仰光塵之在望叙桑梓以猶賖徒有頌言少伸悃愊回鎮江請赴鄉飲啓式序賔賢莫重習鄉之禮欲知王道必觀稽古之文眷此盛儀行於會府冝選期頥而有德庶參賔介以無慚曾是繆庸猥蒙寵速摛詞甚過揣巳奚勝仰和樂而不流固願得陪於席末惟暮年之多病實難自彊以階升非敢固辭尚祈照亮回金壇請赴鄉飲啓伏審䖍奉新制舉行習鄉特枉翰箋俾倍賔位屬有眩昏之疾難自力於進趨𬗟懷揖遜之儀但彌勤於瞻頌回葛丞謝解啓伏審棘闈較藝賈餘勇以先登鶚薦飛書超羣英而得雋凡預交親之契同增歡抃之誠馳慶未遑貽箋遽及啓牘載披於麗藻玩詞彌服於高才感佩之私敷宣罔既回宋知縣啓伏審拜命九重字民百里竊聽輿人之誦雅知令尹之賢某官才兼衆長望重一世官不擇地聊欲試於絃歌治有能名諒難淹於朞月顧茲衰朽久服芳華自憐投老之蹤將有依仁之幸方圖遣問忽奉飛箋披溢美之英詞荷高情而增愧回葛丞謝及第啓伏審恭承大問摛章獨掞於天庭光𬒳殊榮唱第寵登於仙藉士夫相慶科舉得人某官識稟天材文傳世業書破萬卷窮學海之淵源筆掃千軍擢詞林之根柢方瑣㕔而應詔遂發策以决科志諧捨舊之圖恩拜維新之命顧如賤息久竊餘光同為蟾窟之遊猥符謙誨退念鯉庭之訓有愧前修惟慶謝之未遑忽箋函之先及過情得譽拜賜彌慚回張察院啓睽違英標阻貢箋函之問忽聞中詔茂膺憲府之除士論僉諧朝綱允肅某官學窮千古心醉六經文章華國而有餘蔚高大手譽望得君而益重峻陟清途况當日治之朝尤難風憲之任職分六察身率百寮鵰鶚摶空巳振霜威之厲鴛鸞接武佇躋法從之嚴遂究設施深符屬望某辭榮簮紱臥疾山樊知言路之有開覺歡悰之倍集鬱然枌梓既分同社之榮暮矣桑榆更切餘光之照心所甚喜言不能文賀陳相冬啓召陽以律應復卦之初爻求端於天建周正而布治惟時碩輔與國同休恭惟某官道貫三才智包九德棟隆廣厦納四海於帡幪坯就一陶鼓羣生於橐籥神人底豫夷夏輯寧茂對令辰備膺嘉貺某叨恩洪播屏迹窮鄉𬗟想槐庭阻造承顔之列恭馳竹素敢稽事貴之儀回秀州張守啓丘樊屏迹誤𬒳弓招綸綍疏恩遽當銓部顧衰殘而曷稱徒震懼以彌增徼幸惟多寅緣有自伏惟某官德高時論名簡上心茂建州麾夙著勞能之效行躋禁路益觀施設之方特假吹噓以及庸陋曾未伸於謝悃忽先辱於誨函謙以與人仰佩過情之譽歉然揣巳奚勝流汗之慚回折端明啓伏審光奉中詔寵臨大邦政令一新士夫交慶恭惟某官躬蹈九德心濳六經負王佐之英才獨當妙簡委樞庭之重任屢罄嘉謨方自託於退閒忽起膺於圖任揔一路兵民之寄寬九重宵旰之憂坐席未溫威令先騰於南海追鋒巳趣台躔還拱於北辰益展猷為用符屬望某謬尸榮祿夙仰光塵貢只尺之書尚稽郵傳荷謙虛之德先墜芳函感佩以還敷宣罔既除參政回兩府啓叨承命綍擢與政機用過其材感深以懼方今聖主之在御獨奮乾剛而有為所以任承弼之臣必將責事功之實顧如某者何以當仁念才術之空踈矧年齡之遲暮挂冠得謝久絶望於恩榮乘傳趣還復叨官於禁從未閲周歲遽陟近司懇辭莫遂於循牆危懼有同於據蒺此蓋某官急賢人之引類明上臣之事君借以褒揚致兹忝冒謙詞俯逮既曲荷於推前重任難勝更願聞於善後知婺州回兩府啓病辭機政冀休養於餘生恩卑輔藩尚叨塵於煩使荷皇慈之曲𬒳撫衰質以奚堪竊惟寶婺之區近接王畿之化溪山明秀歌八詠於先賢風俗安恬揖二仙之遺範將使承流於昭代必惟名世之偉人有若耄昏初無才術遭逢興運濫陪四近之聮黽勉朞年愧乏一毫之𥙷巳逭嚴誅而竊幸敢分樂土以偷安兹蓋伏遇某官華嶽三峰明堂一柱二公洪化密參寅亮之權偃兵息民坐贊安彊之道樂君子成人之美體聖君優老之心特假吹噓致兹忝冒郡條始布方圖貢於柔緘郵傳遽臨乃先貽於誨翰仰佩謙抑曷勝悚惶回監司賀冬啓氣回初律一陽進而上行道協亨時諸福備而畢至伏惟某官才優公論名簡上心暫駕軺車增重觀風之任行趨召節遂通持橐之班兹允迪於昌辰宜朋來而受祉方期展賀遽辱惠音輒附致於柔緘用陳悃愊第感銘於謙德莫罄敷宣回宣州樓樞密啓二政朞年初無𥙷報分符千里誤玷寵靈揣暮齒以奚堪覺慙顔之有􅌤伏惟某官淸朝先逹當代老成輟經濟之宏才暫承宣於巨屏雙溪疊嶂雖多暇日之娛黃閣紫樞政復須賢之久佇膺召節歸覲凝旒某自顧叨逾出於庇賴王事鞅掌欲修謝而未遑君子撝謙辱貽箋之先及其如悚佩莫罄敷宣回鄰郡賀年啓王正肇序聿新布德之元君子履端丕擁自天之慶伏惟某官探原奧學經世宏才追三代以同風久去詞林之直長萬夫而觀政暫煩臥閣之賢茲坐對於春祺冝鼎來於召節遂還清禁益懋逺猷某假守鄰封夙霑河潤念未遑於展賀乃先辱於貽箋佩德何窮捫心有愧回董直閣賀冬啓郊迎日至天子斂福以錫民道與陽外賢者對時而膺祉某官才惟世用仕結主知畫枕靑縑早流聲於省戶朱轓皂蓋久借重於江城兹逢剛長之辰竚趣召還之命某養痾如舊賴芘尤深欣一線之添長稍延暮景望雙旌而阻造但祝多祥賀鎮江楊少卿到任啓伏審暫輟禁途聿臨㑹府溫言錫寵知委任之非常令日頒條聽歡謠之巳洽伏惟某官身兼數器名動九重踐揚清切之班具著忠勤之績三章弼教釋之久誦於無冤千里擇賢長孺果聞於借重蓋欲革外輕之弊豈徒寬北顧之憂諒暖席之未遑趣追鋒而亟下靜惟衰朽夙荷照存投老鄉枌方依仁而竊幸贄名賔戺期力疾以猶艱輒寓箋縢少伸悃愊賀鎮江韓尚書到任啓伏審光奉除書寵臨會府旌麾照日開八座之儀刑條教回春聳萬夫之觀聽伏惟某官立朝雋望經世長才夙遭神聖之知具著忠嘉之績上星辰而聽履班蚤冠於甘泉集鞾袴以迎郊威旋行於南服茲甫祥琴之御載膺符竹之分以長江控扼之邦付三輔剸裁之手真成假道看即追鋒眷言投老之蹤曾是同寮之舊治封占籍託芘賴以云𥘉賔戺贄名困衰遲而阻遂聊陳干牘少逹悃悰賀趙直閣冬啓聖人設卦驗剛長於復來君子對時協道亨於泰內某官鈎深敏識濟務宏才學探淵源夙著間平之譽政先慈惠逺追召杜之風方順序以迎釐宜自天而錫寵眷言朽質幸託餘庥久闊笑談未遂賔儀之展緬懷祝頌敢稽慶牘之修賀都統劉太尉到任啓伏審光奉十行總提萬旅先聲逺暢奠國勢以彌尊嚴令初頒肅軍容而改觀伏惟某官大忠奮發妙略沉雄當四郊多壘之時立萬世不刋之績破胸奴而趙邉無犯孰先李牧之竒兵敗符堅而晉祚中興獨賴謝元之决戰勳昭彞鼎名動華戎夙登大將之壇屢剖價藩之竹眷江淮之列戍實輦轂之上游易畀中權載識倚毗之重佇宣優詔趣升宥密之嚴某久仰英猷幸依洪芘渙音始布共欣朝論之公衰迹深藏未遂賔儀之展聊陳短牘少述鄙悰賀趙直閣年啓漢殿受圖禮隨時正侯藩謹朔德與春回伏惟某官慶襲仙源學窮聖閫屢屈分符之寄益恢拔薤之規占歲事於八風方勤勸課拜宸恩於三接佇躡淸華眷此衰遲久於庇賴莫蓫舉觴而獻祝敢忘削牘以馳誠賀都統劉太尉年啓順三陽而畫泰曆紀新元大一統以書王慶均列辟伏惟某官名垂宇宙功冠旗常暫分細柳之屯增重長城之勢比膺宸眷既趣覲於凝旒願納春祺亟進禆於闕衮某棲蹤蓬巷矯首轅門阻稱椒柏之觴聊致箋縢之禮其如祝頌罔罄敷宣賀方敷文冬啓先王治曆方考驗於初陽賢牧撫民巳召回於和氣某官望高時彥德配古人久踐劇繁屢試發硎之創行躋禁密益搏運海之風茲茂履於復亨冝大來於泰吉某心勤桑梓迹逺旌麾念君子之得時阻陪賀旅撫衰悰而竊抃姑寓柔緘回曹教授啓歸老莵裘漸忘世故仰高泮水尚隔風儀敢期㛰對之求遂辱箋縢之貺伏惟某官文摛黼黻學探淵源惟樂其義而利其仁故仕既久而未嘗干進然弸諸中而彪諸外雖時未遇而莫掩蜚聲方英主有為之朝乃志士圖功之日恩華可跂閥閲增高况聞謝氏之芝蘭巳造孔門之堂室欲諧嘉耦宜得名宗猥及衰微何勝悚佩指長途而附驥切欣盛德之可親執敝帚以掃門深懼弱孫之弗稱倉惶裁謝草率為慚尚冀高明曲垂簡照賀鎮江李寶文到任啓伏審拜命楓宸輟淸班於卿士升華寶閣分劇任於侯藩師帥得人里閭交慶伏惟某官機深燭理才大濟時簡上帝之心方在朝而美政通當世之務更治民以考功眷長江扞敵之衝正萬旅交馳之會擇賢而授倚重惟深佇觀𥜗袴之成謠復指鵷鸞而接武退循衰病首託庇庥未卜造門先承惠翰賀李寶文年啓三陽應律方順履於新元五馬行春巳召回於和氣某官名高簡帝才大濟時聯西清邃密之班壯北固藩維之勢師蓋公之淸靜頒條每戒於烹鮮𬒳黃霸之稱揚歸覲佇看於儀鳯載臨端月益介繁禧某迹遠使旌心傾談麈緘詞尺素莫殫善禱之私竊䕃甘棠徒極偷安之幸回王運使啓仰止英標未卜趨承之便辱先榮翰過形褒借之勤自揣空踈何勝愧感伏惟某官才高瑞世學奧窮源擅剖符持節之權著騰實蜚聲之美蟬聮緒業久傳江左之風流烜赫功名行冠漢庭之班列某禀生極陋投老無庸聞卜宅於鄉邦喜棲蹤於德宇病衰成懶巳稽削牘之恭渴想增懷尚冀披雲之幸華陽集卷第二十九畢
