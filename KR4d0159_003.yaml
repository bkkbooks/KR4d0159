front:
  text: 華陽集卷第三
  hash: sha256:e9e87b1db932bd494afe7fa2638e3eef3ef3204d929713c91905a402353163e6
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0159_SBCK_003-1a}
body:
  text: 金壇後學于文熈校外制解濳再任荆南鎮撫使昔韋臯治蜀張建封治徐嚴震治鳯率以乆任而成功名未聞數變易也載在舊史朕甚慕之具官某有牧人禦衆之材有折衝禦侮之略作鎮荆峽兼總兵民恩威並施遠近信服朕方以爲西南藩翰之固而飛章遽至迺以滿歲自言夫申畫封圻撫綏方靣葢將久其所職責以成効雖終更有制豈應亟還宜申錫於贊書俾薦臨於郡政毋使有唐數子獨擅其美則予汝嘉汝亦永有終譽樊彦端轉行遙郡刺史朕惟王者用人有勞必錄一藝而上咸被襃寵以爾究習方技出入禁嚴祗奉有年率職彌謹用兹疇其功緒錫以殊恩徃御名厥官益圖稱塞士博轉一官朕念國家多故皇族中微毎推骨肉之恩欲厚根本之芘矧茲㑹課敢廢舊章以爾胄出神明蚤聞詩禮耻貴驕之習御名信厚之風入奉内朝乆居環衛用載頒于命綍俾升進於武階夫閱歲十周遷官一等得之匪易尚克欽承士樽轉正任防禦使考績之法治道所先雖予屬籍之懿親猶以積年而叙進是曰舊典豈朕敢私具官某胄出神明閑於教訓雅知爲善之樂居無席寵之驕列位内朝久著嘉譽有司上課法應第遷夫惟扞禦侮者旣用名尓之官則以親屏周者其亦惟官之稱徃服明命無愧古人士䞈轉遙郡刺史刺史漢官也國家因其名以爲武階所以待天下勞能之士而有司謂爾宗族之英乆居環衛法當得之朕惟親親尚恩肆加寵命爾其益思祖宗流慶之及勉盡忠孝求稱厥官勿期世祿之驕庶有維城之託楊沂中司馬法曰軍賞不踰月欲其速得爲善之利矧吾梟俊討定一方疇厥勞能可無襃勸具官某忠於衛上奮不顧身有古將帥之風能勵士卒之氣比緣妖㓂竊發嚴衢命以徂徃至則殄滅雖殺敵致果衆一迺心而發縱指示實由主將進司留務用爲尓寵徃其秪服益思逺圖沈昭逺改官昔鄭當時推轂士及官属承史有味其言見稱後世矧予樞輔御名簡廼僚謂爾有材形扵論薦召見便殿言合朕心宜進厥官俾仍舊服往承休命益勉所聞舒清國除起居郎昔孔子作春秋先正王而繫萬事大法昭然垂訓後世朕方日昃御朝思濟洪業若時言動御名于幾㣲遴簡時髦卑職記注庻乎紀事得實如古作者惟爾操行純潔秀于士林問學淵深蔚有文藻仇書中秘議禮南宮閲時滋多發聞彌著兹用命爾進直螭拗凡舉必書是為善志官守勿失嗣有寵褒洪炎轉一官致仕朕遭時多艱纂業中興顧焦勞方急于求賢義豈容于謝事惟筋力或愆于盡瘁勢難彊以居官矧予邇臣服勞兹乆宜頒命渥以休餘年具官某舊學淵源老猶篤志後生領䄂論必據經召従江海退閑之餘擢置言語侍從之列方資獻納俄爽節宣陟次對之清班就燕閑于真館露章有請遽欲辭榮當饋興嗟重違雅志俾遂山林之適仍加爵秩之榮祗服寵光用介眉夀王岡王廷秀除直秘閣宮觀朕惟在服在位之士宣勞國家或以疲老言旋于其去也宜有以寵綏之爾等踐更任使恪守靖共擢自郎曹置之宰属閲時未乆遽欲求間其升延閣之華往食真祠之禄少休勞勩尚勉壮猷杜湛轉武翼大夫遥郡刺史朕欲綏靖方隅而盗賊羣軰為害民乆失業爾以忠勇自奮殺敵無前用能乗利席勝破蛇豕之毒有司言状惟予汝嘉進陟武階升刺名郡恩寵厚矣往其勉之劉大中除監察御史廼者分遣使軺假御史持節導德意于四方而察郡國之政爾以端方亮直之資奉指衘命風望隐然奏牘屢聞刺舉無所廻避朕甚嘉之茲用擢居憲府遂正其名夫耳目之官職在振肅紀綱督吏治以紏不法惟爾之能見于已試往其勉之勿苟勿隨勿使聲稱减于前日則為舉職克副朕意梁彦贈官惟爾奮自行陣蚤以勇聞盗起搶攘率先犯敵隕于非命良用盡傷贈官一等式昭異數營䰟未泯尚其享之李擢除徽猷閣直學士與郡中臺政事之原尚書均爲八座内閣圖書之府學士尤高近班入則分六職以赴功出則卑隆名而示寵具官某蚤以儒術簡于公朝徧儀法從之華借罄辰猷之告頃從外服載陟周行亟進貳於冬官遂躋榮於宗伯朕方御名擇師帥撫臨翰藩用輟邇聮復分憂寄念宣勞于南省俾列職于西淸寵遇則均徃服恩榮之意論思惟舊敢忘忠藎之規曾楙除禮部尚書周監二代備庶事于彌文漢鄙兩生起朝儀于綿蕝朕承祖宗積累之德悼禮樂散亡之餘名物雖具于有司制作靡遵于故典欲振迺職必惟其人具官某有厚重長者之風能通逹當世之務蚤由時望亟𬒳明揚䆮更二省之嚴旋寘六卿之列詞章雅徤極代言視草之工議論宏深見憂國憂民之志自違朝著久逸真祠益聞譽處之休深渇老成之助屬春官之虚位惟舊人之是圖巳試曰能肆今命汝夫籩豆玉帛宜兼節于情文若朝覲㑹同必因時而隆殺庶使威儀復正姦究自消靡聞擊枉之爭是謂播刑之迪徃服朕訓無愧古人宋伯友除刑部侍郞堯帝淸問下民時莫先于降典文王罔兼庶獄亦惟付之有司眷予邦憲之嚴實重秋官之職欲使無訟何擇非人具官某識量宏逹而濟之彊敏之材性資粹溫而輔以䟽通之智當官有守見義敢爲頃由識㧞之公亟躋侍從之列式我司㓂能自得于刑書殿彼雄藩至不擾于獄市大孚衆論有嘉爾能其遂解于一麾以復掌于八辟爾宜察吏刀筆重人死生豈獨以明允自將邁種臯陶之德亦庶幾剛正不撓無替廣平之風祗服新恩徃司舊服楊從儀轉親衛大夫川陜用師乆矣凡出入行伍有尺寸㣲勞者未嘗不錄而况被堅執銳勒部曲以立功名顧所以寵襃之其可後乎具官某沉勇多謀戮力自奮方虜㓂大入勤吾西顧迺能先登却敵屢紀殊効幕府上功進秩一等庸示眷奬以勵其餘徃服厥官毋忘報稱陳桷升郞中文昌六官之屬有郞中有外郞各從其資以序厥位爾以文行兼著再擢省闈有司上其閥閱卽爾舊服用外正員夫以二千石之秩入贊地官之政望亦高矣徃旣乃心以充其實李擢知婺州昔汲黯由九卿出𥙷淮陽薛宣以御史中丞爲臨淮守侍從之臣宜在左右然郡國得人不以去朝廷爲惜也具官某文學奮勵有稱于時更踐禁途宣勞滋久惟東陽古郡扞我南服若時師帥非賢不居是用輟爾于六官之列卑之西淸延閣之華以撫臨其民朕之用人視漢無愧徃服休命勿怠厥修錢圻改官銓部改官之法必稽歲月審功過察保任應格然後以聞于上惟時異恩則略之爾以儒學之秀克自奮勵爲屬樞府譽言逹于朕聽召見便殿占對可嘉是用進爾京秩示吾所以推奬之意徃服休命益勉厥勤虞澐陸長民除吏部郞官天官銓序人物其任重矣省方以來案牘散落巧吏滑徒詐欺不出寒士有不能堪者比詔有司除其弊源選吏以主之汝澐材識詳練有聞于時汝長民風力敏彊見于巳試兹用簡㧞爲屬其徃爲朕摘辨條章撿捉姦僞要使官曹一淸而侑謝之私自汝屏迹汝尚勉之無負予詔洪炎轉四官遇臣下之禮宜務全其始終念死䘮之威顧可忘於襃䘏具官某言有壇宇學造淵源典刑獨紹于前人氣節雅高於流俗召自逺俗寘之邇聮期造膝以輸忠㑹積痾而去位義難奪志甫遂掛冠天不假年遽聞易簀命也不淑愴然興懷其峻陟于文階庶流光于泉壤尚惟精爽歆此恩榮邢煥特贈少師追封國公正位齊家允賴坤闈之助襃賢錄善宜先戚畹之英追賁寵章式昭異數具官某忠信而好禮静專而寡求早奮志于周行亟躋榮于淸貫踐揚滋久譽處彌休惟積慶之有初致流芳之未艾是生碩媛作配朕躬位正椒塗親隆肺腑齋壇授鉞專節制于中權華衮升班等威儀于上宰念淪忘之未逺愴閥閱以興懷再䟽大國之封仍冠三孤之秩夫雲臺畵像伏波豈乏于勲名而石臼隂功平壽宜膺于命冊尚期精爽服此恩榮邢孝揚除直秘閣朕讀周詩而美葛覃之化稽漢制而隆肺腑之親匪爲私恩厥由舊典爾㳟御名自守志節可嘉顧于中宫寔謂同氣俾升華于延閣庶增寵于私庭徃服官榮式彰眷遇后姊邢氏加封郡夫人朕于戚里之家不欲以私恩掩公義然義有不可廢者恩得以行焉惟爾克懋女德實爲后兄習聞環珮之聲秀發閨房之譽䟽封大郡進號小君服此茂恩益修淑御名郭孝友禮部郞官文昌設屬唯儀曹舊號南宮舎人稽古禮文之事與夫尚書牋奏皆在所掌其選甚艱爾以儒學有聲踐歷滋乆擢居省戸孰曰不宜惟制作必遵于典常而撰著務明于體要是爲稱職嗣有寵襃趙濡禮部郞官祠者國之大典職在春官而祠曹主之爾以儒術自奮克世其家官于奉常見謂通敏省戸之選僉曰汝諧徃旣厥心母忽朕命吳革除直秘閣中秘圖書之府以儲天下英俊之士惟爾奮由材諝久贊軍謀奏事便殿議論通敏其徃寓直延閣以昭示寵奬之意欽予時命益勉厥修粟順等遷長史并司馬惟爾世懷忠順克守教條有司以言進爾上佐徃服恩寵恩報所蒙后妹邢氏并弟婦高氏並封安人命婦八等之制惟夫若子通籍于朝始得以序進焉至于一時異恩豈限彞典爾以中宮女弟高氏云后親之懿淑御名有聞念方加惠戚藩宜見優寵是用躐進封號以昭朕意徃服休命益茂爾德華陽集卷第三畢
