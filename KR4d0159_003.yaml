front:
  text: 華陽集卷第三
  hash: sha256:e9e87b1db932bd494afe7fa2638e3eef3ef3204d929713c91905a402353163e6
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0159_SBCK_003-1a}
body:
  text: 金壇後學于文熙校外制解濳再任荆南鎮撫使昔韋臯治蜀張建封治徐嚴震治鳯率以久任而成功名未聞數變易也載在舊史朕甚慕之具官某有牧人禦衆之材有折衝禦侮之略作鎮荆峽兼總兵民恩威並施遠近信服朕方以為西南藩翰之固而飛章遽至乃以滿歲自言夫申畫封圻撫綏方靣蓋將久其所職責以成效雖終更有制豈應亟還宜申錫於贊書俾薦臨於郡政毋使有唐數子獨擅其美則豫汝嘉汝亦永有終譽樊彥端轉行遙郡刺史朕惟王者用人有勞必録一藝而上咸被褒寵以爾究習方技出入禁嚴祗奉有年率職彌謹用兹疇其功緒錫以殊恩往御名厥官益圖稱塞士博轉一官朕念國家多故皇族中微每推骨肉之恩欲厚根本之芘矧茲會課敢廢舊章以爾胄出神明蚤聞詩禮耻貴驕之習御名信厚之風入奉內朝久居環衛用載頒于命綍俾升進於武階夫閲歲十周遷官一等得之匪易尚克欽承士樽轉正任防禦使考績之法治道所先雖豫屬籍之懿親猶以積年而敘進是曰舊典豈朕敢私具官某胄出神明間於教訓雅知為善之樂居無席寵之驕列位內朝久著嘉譽有司上課法應第遷夫惟扞禦侮者既用名尓之官則以親屏周者其亦惟官之稱往服明命無愧古人士䞈轉遙郡刺史刺史漢官也國家因其名以為武階所以待天下勞能之士而有司謂爾宗族之英久居環衛法當得之朕惟親親尚恩肆加寵命爾其益思祖宗流慶之及勉盡忠孝求稱厥官勿期世祿之驕庶有維城之託楊沂中司馬法曰軍賞不踰月欲其速得為善之利矧吾梟俊討定一方疇厥勞能可無褒勸具官某忠於衛上奮不顧身有古將帥之風能勵士卒之氣比緣妖寇竊發嚴衢命以徂往至則殄滅雖殺敵致果衆一乃心而發縱指示實由主將進司留務用為尓寵往其秪服益思逺圖沈昭逺改官昔鄭當時推轂士及官屬承史有味其言見稱後世矧豫樞輔御名簡乃僚謂爾有材形于論薦召見便殿言合朕心宜進厥官俾仍舊服往承休命益勉所聞舒清國除起居郎昔孔子作春秋先正王而繫萬事大法昭然垂訓後世朕方日昃御朝思濟洪業若時言動御名于幾微遴簡時髦卑職記注庶乎紀事得實如古作者惟爾操行純潔秀于士林問學淵深蔚有文藻仇書中祕議禮南宮閲時滋多發聞彌著兹用命爾進直螭拗凡舉必書是為善志官守勿失嗣有寵褒洪炎轉一官致仕朕遭時多艱纂業中興顧焦勞方急于求賢義豈容于謝事惟筋力或愆于盡瘁勢難強以居官矧豫邇臣服勞兹久宜頒命渥以休餘年具官某舊學淵源老猶篤志後生領袖論必據經召從江海退間之餘擢置言語侍從之列方資獻納俄爽節宣陟次對之清班就燕間于真館露章有請遽欲辭榮當饋興嗟重違雅志俾遂山林之適仍加爵秩之榮祗服寵光用介眉夀王岡王廷秀除直祕閣宮觀朕惟在服在位之士宣勞國家或以疲老言旋于其去也宜有以寵綏之爾等踐更任使恪守靖共擢自郎曹置之宰屬閲時未久遽欲求間其升延閣之華往食真祠之祿少休勞勩尚勉壯猷杜湛轉武翼大夫遙郡刺史朕欲綏靖方隅而盜賊羣輩為害民久失業爾以忠勇自奮殺敵無前用能乘利席勝破蛇豕之毒有司言狀惟豫汝嘉進陟武階升刺名郡恩寵厚矣往其勉之劉大中除監察御史乃者分遣使軺假御史持節導德意于四方而察郡國之政爾以端方亮直之資奉指銜命風望隱然奏牘屢聞刺舉無所回避朕甚嘉之茲用擢居憲府遂正其名夫耳目之官職在振肅紀綱督吏治以紏不法惟爾之能見于已試往其勉之勿苟勿隨勿使聲稱減于前日則為舉職克副朕意梁彥贈官惟爾奮自行陳蚤以勇聞盜起搶攘率先犯敵隕于非命良用盡傷贈官一等式昭異數營魂未泯尚其享之李擢除徽猷閣直學士與郡中臺政事之原尚書均為八座內閣圖書之府學士尤高近班入則分六職以赴功出則卑隆名而示寵具官某蚤以儒術簡于公朝遍儀法從之華借罄辰猷之告頃從外服載陟周行亟進二於冬官遂躋榮於宗伯朕方御名擇師帥撫臨翰藩用輟邇聮復分憂寄念宣勞于南省俾列職于西淸寵遇則均往服恩榮之意論思惟舊敢忘忠藎之規曾楙除禮部尚書周監二代備庶事于彌文漢鄙兩生起朝儀于綿蕝朕承祖宗積纍之德悼禮樂散亡之餘名物雖具于有司制作靡遵于故典欲振乃職必惟其人具官某有厚重長者之風能通逹當世之務蚤由時望亟𬒳明揚䆮更二省之嚴旋置六卿之列詞章雅健極代言視草之工議論宏深見憂國憂民之志自違朝著久逸真祠益聞譽處之休深渴老成之助屬春官之虛位惟舊人之是圖巳試曰能肆今命汝夫籩豆玉帛宜兼節于情文若朝覲會同必因時而隆殺庶使威儀復正姦究自消靡聞擊枉之爭是謂播刑之迪往服朕訓無愧古人宋伯友除刑部侍郎堯帝淸問下民時莫先于降典文王罔兼庶獄亦惟付之有司眷豫邦憲之嚴實重秋官之職欲使無訟何擇非人具官某識量宏逹而濟之強敏之材性資粹溫而輔以疏通之智當官有守見義敢為頃由識拔之公亟躋侍從之列式我司寇能自得于刑書殿彼雄藩至不擾于獄市大孚衆論有嘉爾能其遂解于一麾以復掌于八辟爾宜察吏刀筆重人死生豈獨以明允自將邁種臯陶之德亦庶幾剛正不撓無替廣平之風祗服新恩往司舊服楊從儀轉親衛大夫川陜用師久矣凡出入行伍有尺寸微勞者未嘗不録而况被堅執鋭勒部曲以立功名顧所以寵褒之其可後乎具官某沉勇多謀戮力自奮方虜寇大入勤吾西顧乃能先登却敵屢紀殊效幕府上功進秩一等庸示眷奬以勵其餘往服厥官毋忘報稱陳桷升郎中文昌六官之屬有郎中有外郎各從其資以序厥位爾以文行兼著再擢省闈有司上其閥閲即爾舊服用外正員夫以二千石之秩入贊地官之政望亦高矣往既乃心以充其實李擢知婺州昔汲黯由九卿出輔淮陽薛宣以御史中丞為臨淮守侍從之臣宜在左右然郡國得人不以去朝廷為惜也具官某文學奮勵有稱于時更踐禁途宣勞滋久惟東陽古郡扞我南服若時師帥非賢不居是用輟爾于六官之列卑之西淸延閣之華以撫臨其民朕之用人視漢無愧往服休命勿怠厥修錢圻改官銓部改官之法必稽歲月審功過察保任應格然後以聞于上惟時異恩則略之爾以儒學之秀克自奮勵為屬樞府譽言逹于朕聽召見便殿占對可嘉是用進爾京秩示吾所以推奬之意往服休命益勉厥勤虞澐陸長民除吏部郎官天官銓序人物其任重矣省方以來案牘散落巧吏滑徒詐欺不出寒士有不能堪者比詔有司除其弊源選吏以主之汝澐材識詳練有聞于時汝長民風力敏強見于巳試兹用簡拔為屬其往為朕摘辨條章撿捉姦偽要使官曹一淸而侑謝之私自汝屏迹汝尚勉之無負豫詔洪炎轉四官遇臣下之禮宜務全其始終念死喪之威顧可忘於褒恤具官某言有壇宇學造淵源典刑獨紹于前人氣節雅高於流俗召自逺俗置之邇聮期造膝以輸忠會積痾而去位義難奪志甫遂挂冠天不假年遽聞易簀命也不淑愴然興懷其峻陟于文階庶流光于泉壤尚惟精爽歆此恩榮邢煥特贈少師追封國公正位齊家允賴坤闈之助褒賢録善宜先戚畹之英追賁寵章式昭異數具官某忠信而好禮靜專而寡求早奮志于周行亟躋榮于淸貫踐揚滋久譽處彌休惟積慶之有初致流芳之未艾是生碩媛作配朕躬位正椒塗親隆肺腑齋壇授鉞專節制于中權華衮升班等威儀于上宰念淪忘之未逺愴閥閲以興懷再疏大國之封仍冠三孤之秩夫雲臺畫像伏波豈乏于勳名而石臼隂功平壽宜膺于命册尚期精爽服此恩榮邢孝揚除直祕閣朕讀周詩而美葛覃之化稽漢制而隆肺腑之親匪為私恩厥由舊典爾恭御名自守志節可嘉顧于中宫實謂同氣俾升華于延閣庶增寵于私庭往服官榮式彰眷遇后姊邢氏加封郡夫人朕于戚里之家不欲以私恩掩公義然義有不可廢者恩得以行焉惟爾克懋女德實為后兄習聞環珮之聲秀發閨房之譽疏封大郡進號小君服此茂恩益修淑御名郭孝友禮部郎官文昌設屬唯儀曹舊號南宮舍人稽古禮文之事與夫尚書箋奏皆在所掌其選甚艱爾以儒學有聲踐歷滋久擢居省戶孰曰不宜惟制作必遵于典常而撰著務明于體要是為稱職嗣有寵褒趙濡禮部郎官祠者國之大典職在春官而祠曹主之爾以儒術自奮克世其家官于奉常見謂通敏省戶之選僉曰汝諧往既厥心母忽朕命吳革除直祕閣中祕圖書之府以儲天下英俊之士惟爾奮由材諝久贊軍謀奏事便殿議論通敏其往寓直延閣以昭示寵奬之意欽豫時命益勉厥修粟順等遷長史并司馬惟爾世懷忠順克守教條有司以言進爾上佐往服恩寵恩報所蒙后妹邢氏并弟婦高氏並封安人命婦八等之制惟夫若子通籍于朝始得以序進焉至于一時異恩豈限彞典爾以中宮女弟高氏云后親之懿淑御名有聞念方加惠戚藩宜見優寵是用躐進封號以昭朕意往服休命益茂爾德華陽集卷第三畢
