front:
  text: 華陽集卷第二十
  hash: sha256:9bc7cc62402ef879931e60675e9ec66103d4c5399067d07afb5eddcb51a71755
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0159_SBCK_020-1a}
body:
  text: 金壇後學于孔兼校進故事一前漢魏相傳相好觀漢故事及便宜章奏以為古今異制方今務在奉行故事而巳數條漢興以來國家便宜行事及賢臣賈誼鼂錯董仲舒等所言奏請施行之臣嘗觀孝宣承武帝以來奢侈軍旅弊壞之極勵精政事欲就中興之功故專任魏相協濟艱難當是時紀綱法度之在天下者宜將一切更張以便目前之急相乃不然獨奏請施行漢興以來故事其言疑若迂濶不切於時然帝皆施行之卒能功光祖宗何哉蓋漢自高祖創業開基以至文景恭儉而繼以賈誼􅏯董之徒相與論議則當時所行見於後世無非致治之明效為子孫者要當謹守勿失不幸遭武帝以雄才自恃變亂舊章又孝昭在位不久而有昌邑之亂天下思祖宗之遺德而欲一反前日之治是猶痿人之不忘起盲者之不忘視此魏相之所以取二十三事區區為上陳之後世徒知孝宣之中興而不知其所行者皆祖宗故事也豈獨漢為然哉唐史稱太宗之治制度紀綱之法後世有以憑藉扶持能永其天命故文宗讀太宗政要慨然慕之及即位鋭意於治卒致太和之政號為清明然則祖宗故事無負於子孫明矣臣恭聞神宗皇帝嘗問司馬光曰漢守蕭何之法久而不變可乎曰何獨漢也夫道萬世無弊夏商周之子孫苟能常守禹湯文武法何衰亂之有其後神宗皇帝謂輔臣曰大凡前世法度有可行者宜謹守之不問利害如何一一變更豈近理邪故臣以魏相所言而驗神宗皇帝聖訓則知祖宗故事不可輕廢也如此二唐書李絳傳憲宗嘗盛夏對延英帝汗浹衣絳欲趨出帝曰朕宮中所對惟宦官女子欲與卿講天下事乃其樂也臣聞人君深居九重而欲周知天下之事則必延訪公卿不倦聽納此固甚盛德也然好逸惡勞者人之常情而况安於崇高富貴之資惑以左右近習之奉則清燕之暇能以講論為樂者蓋亦鮮矣至於祈寒盛暑猶不忘晝訪之勤則又鮮焉憲宗承德順之後朝廷衰弱方鎮悍彊紀綱法度頽靡欲盡使其狥常情之易隋苟朝夕以自逸則社稷大計忽焉去矣今乃不然却宮掖之娛而留聽於宰相忘汗浹之煩而引對於延英非夫慨然發憤有志於興復者不能爾也觀元和之治能使疆藩悍將皆欲悔過效順唐之威令幾於復振則知所以致此者憂勤之效也其後文宗亦以恭儉儒雅鋭意於治每延英對宰臣率漏下十一刻而輟朝放朝悉以雙日除吏召見必加訪問則其憂勤願治視憲宗豈有愧哉然其仁而少斷終不能恢張王室史氏所以譏之嗚呼文宗不如憲宗固巳明矣然憲宗晚節不兢信用非人則又去漢之光武逺甚光武當祗陵夷奮然特起遂能撥亂反正及隴蜀既平海內嚮於無事宜宴安矣然且日昃視朝引公卿講論至夜分乃寢故雖身濟大業兢兢如不及是謂以此始之以此終之真萬世之明主也書曰終始惟一時乃日新可不念哉三前漢薛宣傳谷永上疏曰帝王之德莫大於知人知則百僚任職天工不曠臣聞天下安危治亂繫乎君子小人之進退君子進則治安小人進則危亂此理甚易明也然人君昧知人則衆讒可以毁有德衆譽可以進無功黑白顛倒於前而胸中不知所定如是則小人必得志而君子去矣君子去則小人引類而進相為朋姦百僚孰肯任職天工安得不曠故曰帝王之德莫大於知人也夫人君未嘗不欲知人而人知之是非邪正亦不難知惟其好惡蔽之故聰明有所不及耳是以古之聖人於用舍之際尤所致御名昔李德𥙿為相入謝即戒帝辨邪正專委任而後朝廷治其說以謂正人一心事君無待於助邪人必更為黨以相蔽欺君人者以是辨之則無惑矣故臣嘗謂知人之道最人君之不可忽者以帝堯之聖而書猶謂知人則哲惟帝其難之則聰明不及堯者可不知戒乎漢武帝信任張湯而疏汲黯蓋有所蔽也夫湯懷詐靣欺為小人明矣而汲黯犯顔直諌近古社稷之臣豈可與湯同日而語哉然湯每朝奏事語國家財用日旰天子忘食丞相取克位至黯則以嚴見憚而終不用然則武帝可得為知人乎唐明皇之於張九齡李林甫亦猶是也林甫以武惠妃薦而德宰相九齡諤諤有大臣節兩人自不侔矣至帝欲相牛仙客九齡執不可而林甫以謂天子用人有何不可者由是帝踈薄九齡罷其政事且專任林甫而卒相仙客人謂安祿山反為唐室治亂分時而崔羣謂罷九齡相李林甫治亂固巳分矣嗚呼九齡文章風度見稱一時而林甫姦邪無學術仙客起於胥史則三人賢不肖明甚而明皇用捨如此惜哉以是見帝皇知人卓然不惑於群議不牽於好惡亦難矣故自古以來得是道者未始不治而反此則亂亡隨之不可以不察也四唐書房玄齡傳太宗曰公為僕射當助朕廣耳目訪賢材比聞閲牒訟日數百豈暇求人哉乃勑細務屬左右丞大事關僕射臣嘗謂宰相於事無所不統而專以進用人材為職蓋天下事非人材不能舉自朝廷以至郡國各有司存宰相惟當擇人而任之不然欲以區區一身親叢脞之務則本末顛倒一日萬幾將有不勝應者尚安能運動樞極而代天理物乎房玄齡唐之賢相然日閲牒訟數百勤則至矣而牒訟非宰相事此太宗告之所以廣耳目訪賢才之說也且人主之治天下譬如作室必得匠委之求材大杗細桷欂櫨椳闑無所不有室乃可成故宰相之求材有如匠氏則多蓄而廣備一旦用之官足以效其人之能人足以任其官之事衆治畢舉而宰相之職固以綽綽然有餘𥙿矣又何必疲精勞神於采鹽煩碎之間而後謂之賢乎是以文帝問陳平以决獄錢穀之事皆置而不對而丙吉出逄道路鬪爭死傷之民委而不問彼誠知宰相自有體非細務所能干也至於何武薛宣居位雖有可紀然而人皆號為煩碎無大體故當時亦無薦賢拔士之名是所謂留意末務而不知本者矣大抵人君之職在論相而宰相之職在用人苟惟君相各盡其職故紛紛細務誠不足治昔明皇用姚崇為相崇嘗於帝前次序郎吏帝左右顧不答乃謂高力士曰我任崇以政大事吾當與决至用郎吏崇顧不能而重煩我邪崇由是進賢退不肖而天下治觀此然後知明皇委任責成之意初無愧於太宗惜其晚節不兢信用非人遂有天寶之禍書曰御名厥終惟其始可不戒哉五唐書許孟容傳􅺖容元和初再遷京兆尹神策軍自興元後日驕恣府縣不能制軍吏李昱貸富人錢八百萬三歲不肯歸孟容遣吏捕詰與之期使償曰不如期且死一軍盡驚訴於朝憲宗詔以昱付軍治之再遣使皆不聽奏曰不奉詔臣當誅然臣職司輦轂當為陛下抑豪彊錢不盡輸昱不可得帝嘉其守正許之京師豪右大震臣聞唐有天下二百年兵法無慮三變及其末也天子亦自置兵於京師謂之禁軍自興元後禁軍始盛蓋德宗懲艾泚賊踵魚朝恩故事以左右神策諸軍分委竇文場霍仙嗚等主之而朝廷威柄始下遷於中人矣正元中御史崔薳以巡囚入右神策中尉奏之德宗杖薳四十流崔州由是小人得志乘時怙寵積而至元和之初根株盤結凶熖益熾雖憲宗剛明果斷莫之誰何許􅺖容一京兆尹乃敢捕其軍吏斷以必死憲宗欲赦之而終不奉詔嗚呼若孟容可謂守正不阿者矣蓋以道變法者君上也以死守法者有司也君上以法付之有司要在必行故雖詔命亦有所不當受况可奪於權勢乎其後柳公綽亦拜京兆尹方赴府有神策校乘馬不避即時榜死憲宗怒其專殺公綽曰此非獨試臣乃輕陛下法帝曰既死不以聞可乎曰臣不當奏在市死職金吾在坊死職左右巡使帝乃解臣既讀許孟容傳乃參以柳公綽榜殺軍校事然後知憲宗之初固巳深得御下之術何以言之當是時兵柄在人如倒持太阿小不得意禍隨踵發故孟容捕軍吏則詔欲赦之公綽戮軍校則怒其專殺而不以告蓋如是而後能安兩軍之情且使知夫有司之法不容於苟免也謂非得馭下之術能如是乎大抵人主威權所以能久固而不奪者以法在故也彼既犯吾有司要當以人狥法不當以法狥人法行於下則主威彊於上矣蘇軾嘗謂姦臣之始以臺諌折之而有餘及其既成以干戈取之而不足然則孟容公綽之舉過臺諌逺甚所以消沮姦萌而助朝廷之勢如何哉使憲宗末年能不變其初則中興之業孰得而少之六前漢陳平傳項王使使至漢漢為太牢之具舉進見楚使即陽驚曰以為亞夫使乃項王使也復持去以惡草具進楚使使歸具以報項王果大疑亞夫臣聞兵者詭道也故以詐立以僞動皆古人用兵之機方楚漢之爭天下以勢度之漢不敵楚明矣勇悍強仁霸於一時所當者破所繫者服名聞諸侯聲動天地孰能與項王抗哉然終為漢禽者以計得之漢三年羽數擊絶漢甬道漢王乏食請割滎陽以東為漢羽欲聽之范增不可乃急圍滎陽漢王與陳平金四萬斤以間楚君臣當是時羽以勇范增以智二人者同力協謀相輔以圖漢漢力日屈而楚軍勢張甚孰不謂漢危亡可跂足待也而不知平之間言巳入矣夫羽之為人自恃其勇以蓋一世然其智實出增下間有論說雖彊從之胸中固巳不平一聞間言安得不疑乎及其遣使至漢漢復僞設太牢之具以為待亞夫使且增方為楚之謀主而謂私交於漢决無是理使歸具報而項王遂疑之則以平之言先入故也夫項王所以與漢戰而數得利者徒以范增在耳鴻門之㑹若從增言豈復有漢哉此高祖所以畏其人不得不用間以圖之也增去而死項羽相繼以敗後世知羽之兵敗於垓下而不知增去之日敗證以見知高祖之得天下者以殺項羽而滅之而不知能去范增羽當自滅兵法曰非竒譎無以破姦息寇非陰謀無以成功觀項羽有一范增不能用卒以成禽則竒譎陰謀信乎其不可少矣自古兵交使在其間待之之術可不深思而熟講之哉
