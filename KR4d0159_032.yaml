front:
  text: 華陽集卷第三十二
  hash: sha256:a558fdf4638d81f0ad5a8655e2b90fd1351fd776f81a2e1018d976cefc30d7a3
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0159_SBCK_032-1a}
body:
  text: 金壇後學于孔兼校雜文祭皇考文父兮生我恩同於天孝養永違攀號不逮日月如駛奄經寒食顧瞻墳土宿草方春追慕慈顔獨閟幽壤匍匐叩地肝心潰裂念此孤藐無父何怙天命不弔敢誰怨尤嗚呼哀哉酒殽芳馨恭致薄奠旨甘之奉不異平生庶格靈魂鑒此哀懇祭皇妣文某積惡深重禍延先妣喪期迅速既就外除痛念劬勞大恩莫報號天扣地無所逮及嗚呼哀哉蓋聞死者謂葬為藏故體魄降地乃始有歸不肖之孤是用不敢忘窀穸之事謹卜七月六日敬奉靈輀祔于先君中大之墓恭惟先妣三年在殯音容寖逺猶有几筵得以朝夕號慟慰孝思萬一今也歸窆泉壤永隔慈顔雖欲升堂摩棺想像如在殯時豈復可得唯有生存拊育慈愛追慕感咽無有窮盡嗚呼哀哉嗚呼痛哉母子之愛如何相捨禮當即逺忍痛奠訣焚黃文一圓丘祭天禮成肆赦是為國家大典歲在戊申肇舉於維揚逮今十五年矣天子聖明干戈載戢海內綏靖乃復舉舊章以幸天下凡厥有官自通籍而上恩皆及親德至厚也我先考昨巳纍封官至中散今茲𬒳命加贈一等進為中奉大夫嗚呼自葉流根天澤也根不植者葉不茂惟昔中奉植德自晦陰貽後人是使不肖之孤襲其餘芳竊有祿位叨榮以賁先壠謹擇令辰跪奉綸綍告于尊靈尚想平生膺受光寵惟是慈訓永隔不勝感涕哽噎之至二嗚呼父母大恩天地罔極如何可報獨有朝廷命數霑𬒳幽壤庶以慰孝思萬分乃去年冬天子親郊謁欵紫壇禮成肆赦凡厥在位自通籍以上均釐錫福咸得顯榮其親故先考昨纍贈中大夫今加贈大中大夫先妣巳封太令人今隨先考秩位加贈太碩人蓋寄祿之官遷至太中大夫則秩比法從非示優寵不輕卑付而命婦之於碩人非其夫若子官與太中比亦不以封嗚呼漏泉之澤自葉流根吾君待遇臣下可謂厚矣某竊伏自念坐尸榮祿無尺寸功而蒙上恩渥如此豈某不肖所能自致哉實我考妣積德垂慶效見于今追念生存何所逮及謹用易𫀆帶更冠帔奉天子所賜告黃躬致薄奠以焚獻于尊靈酒殽芳馨哀誠懇切魂儀忽恍庶克顧歆三某頃自政和甲午登上舍第厯官至今四十二年矣中間得謝里居無復仕宦意遭遇明天子慨然圗舊召還朝列以今年八月二十五日蒙恩擢參大政乃遵舊典封贈三代官于是有司定議曽祖贈太子少保曾祖母朱氏贈普安郡夫人皇祖贈太子少傅祖母太安人王氏贈齊安郡夫人皇考正議贈太子少師皇妣碩人李氏贈咸安郡夫人絲綸既下舉族蒙福仰惟朝廷崇尚孝治凡搢紳通籍于朝者遇國慶賜咸有追榮之典唯東宫三少列郡夫人則非二府之先不以封恩至渥也某竊伏自念材智淺薄何以辱上恩遇實由祖先積善種德其發有時乃俾後人叨𬒳餘慶今兹天澤自葉流根上及三世非特顯揚幽光抑使不肖之孤知其所以進冒爵祿者蓋有所自也某以官職有守未得歸省丘墓躬展孝誠謹遣男具官某賚所贈某官某郡夫人告一通上冡焚獻若乃生平行實所以致天子褒寵之意則具載訓詞伏惟尊魂如生秪服新命以永芘于後嗣尚饗四天子以去年冬十一月郊見上帝禮成肆赦遂舉封贈之典故皇考自太子少師加贈太子太保皇妣自咸安郡夫人加贈太寧郡夫人蓋東宫官有三公有三少太保公之列也封號之格有大郡有小郡大寧郡之大也潛德隱耀與位俱升綸言下告光動閭里某不肖竊國厚恩略無輔報既老得謝光𬒳顯親之澤教忠在耳且感且慚謹涓令日上冡焚黃躬致薄奠庶格靈享五國家設官之法天子置三公三少而東宫亦置焉命婦之號封國者稱夫人而列郡亦稱焉其名雖同而尊卑等級固有次第去年冬矢子將郊見上帝有司既戒而疆吏以虜騎侵軼聞乃詔改卜唯是慶賜之澤凡所以寵綏列位者斷自長至一切以舊典從事惟我皇考厯東宫官至太師矣今加贈少保是為天子之三少遂正一品先妣纍贈郡號今加榮國夫人升郡而為國蓋亦視一品而為稱訓詞褒美枌梓輝耀敬念先考妣之德積厚而不施用能傳芳後人膺此異數某老矣不復能報國恩但當以疇昔教忠之言貽厥子孫庶或克承以慰地下之望躬陳薄奠展墓焚黃想像生存哀榮感切冬至祭長男文一陽來為復君子道長誰不逢時舉家相慶我獨何辜罹此凶禍上堂奠哭既失慈顔回視兒曹又不見汝惟汝婦子伏拜我後纍纍衰絰舉目傷之我哭我母心折欲死而汝諸孤哭汝不巳我今垂老衰病日迫俯仰若是胡寧久生聊因令節酒殽致奠來止歆兹慰我悽惻二惟人之情莫親於父子雖壽夭之既定有生而必死吾固知之而猶於汝感咽痛悼懷之不置得非情之所鍾觸緒感發有不能自巳者耶嗚呼去年寒食汝初病時謁醫三茅十日而歸今復見此令節汝獨冥漠去無歸期餘三尺之孤墳委宿草之紛披悽然念想涕泗交頥觴酒豆肉令豎携以奠汝靈魂未泯知乎不知祭李氏孺人文嗟人生之必死兮如夜旦之有常惟體魄之降地兮故謂葬以為藏哀夫君之下世兮當暮秋之肅霜胡馬紛其南騖兮盜賊乘時而陸梁遍雲擾於江淮兮孰不憂心而惶惶徙君柩以旅殯兮計實出於倉忙經嚴冬之氷雪兮倐又見夫春陽委靈骨於草莽兮空丹靑之在床每一念而興哀兮未嘗不揮涕淚而淋浪也嗚呼哀哉卜觀基之高原兮山深而水長涓二月之壬午兮日吉而時良舉窀穸之大事兮冀清魂之樂康歎吾年之垂盡兮置壽藏於汝旁將百歲以同歸兮胡能獨處而悲傷就新塋而結屋兮陳薄奠之潔芳考古誼以即逺兮不復祖載於中堂追懿德而莫返兮斷九回之危腸諒精誠之未泯兮釂永訣之一觴安萬古之幽宅兮期終焉而允臧祭孫女文爾之生也稟姿聰慧居室則為淑女既歸則為賢婦言德功容無一不備吾閲人多矣如爾之婉嫕夙成者蓋亦鮮儷奈何天不與齡春花始榮遽歎凋瘁嗚呼爾之歸寧也欣欣送迎本期抱子而還侍豈謂禍生不測呼吸之間遂至永棄念十有九年之所為覺成毀之須臾殆如夢而如寄人誰不死惟爾之死年不及壯病不及藥繼嗣未立魂單骨寒所以使吾舉室冤痛號泣而不能巳也惟家廟無祔姑之文而婦人有從夫之義是用舉爾靈櫬以翌日吉辰登舟復歸于江陰之曹氏至若葬祭之厚薄時日之逺近則一在爾之夫而吾不當復經意也去年四月結䄜出門今年四月棺與川逝人非木石之無情行路亦為之流涕觴酒豆肉聊作終天之訣雖陳詞千萬不能寫吾悲哀之切至也李公朝奉墓志銘故右朝奉郎李公諱華字君儀今左朝奉大夫知平江軍府事朝正之父也其先出隴西世逺而分有居建康之句容者不知其所以徙偽唐兵亂又避于溧陽逺郊因家焉故公為溧陽人曾祖曰瓌祖曰俊父曰憲三世逮公皆晦迹不仕公享年八十有六建炎三年六月乙亥以疾卒于家十月壬寅葬家之西五里曰下湯之原其後平江歷仕以恩纍贈公至今官乃移書其甥張某曰先人濳德隱行宜有辭于後世而葬迫兵火不暇乞銘於今二十四年矣子其念之公於某為外祖知其平生顧莫詳於某者且舅命也何敢辭惟公純直簡諒貌莊而溫方其少時於流輩中巳見推重父沒居喪毀瘠盡哀母老得疾廢于牀公垂泣憂懼遂置家事不問而專意奉養抱持臥起進粥藥以至盥帨纎悉必躬必親故其身不出戶庭而衣未嘗解帶如是者十餘年莫知其有晝夜寒暑人以為難尤篤於友愛同氣五人從容季孟間上承下順相親以睦內外無間言平居安間喜怒不形於色而家法益整與人交恭順而有禮自敵以下至於庸人孺子接之必盡其意初不以長老自處人有過惡絶口不道為覆護之唯恐弗及有田十餘頃歲水旱誓不一言減縣官租自其先世巳然而公守之尤謹榖翔貴亟發廪平價以食其一方虛甑待炊者以千計大觀政和間蝗數害稼羣飛下其田輒去不食旁畒愧駭且以相告公曰偶然爾勿復言蓋其謙抑不欲近名類如此嗚呼人之行莫大於孝友而心之所存推以接物莫先於忠厚是二者衆可能也唯公得於性之自然而行之終身不變乃與衆異故以是修於家交於人而信於鄉里當是時雖三尺之童聞公之名莫不率教而自勉有若桀黠無賴亦知畏公之義不敢犯分以為非夫以流俗之難化而公能使之愛慕説服如是其所謂一鄉之善不言而信者歟公先聚周氏再聚倪氏皆贈令人子男三人長曰藴前公卒次曰茂亦卒於公葬之明年其季即平江也女一人適張氏是為某母贈碩人孫男女十六人曾孫男女二十七人初公倦于家一日宴坐召三子誨之曰藴與茂汝治生有法宜勉力以輔吾老曰朝正汝篤志於學可出從士大夫遊立身揚名以大吾門由是二子力生業不去左右而平江辭入太學不數年登顯科釋褐而歸人皆以為公榮而公亦自喜有子以適其志也雖然公之所積者厚天將報之其後必大以顯而傳永久豈止榮一時而巳哉今平江以材見用於朝歷禁從典輔藩赫然為時聞人則既大且顯矣公雖不及見而漏泉之澤自葉流根亦足慰地下之望以是知李氏之興公實積之而平江發之繼自今勿替於前則餘波寢廣浩乎其未可量也某既得論次公之羣行至於為善獲報可垂訓於後人者尤不敢略則又為之銘銘曰建康古邑惟瀨之陽李氏世家至公而昌厥昌伊何種德惟茂惟孝惟友濟以忠厚一鄉稱善公不自伐人各有知心服以恱謂此耆老性合天道監觀在上其必有報天既報公享有全福又錫之子大發其蕃發不自躬匪時不逢以積慶基垂耀無窮下湯之原高山水逺碣此銘詩式勸為善金壇縣放生池記紹興十三年夏五月有以唐放生池言於朝者皇帝若曰嘻此仁政也有唐規制狹陋流澤不廣宜有以侈大之即日有詔下其事諸路行焉鎮江三邑金壇地最居下號為澤國其民習網罟而嗜殺越五年左宣教郎趙公稱來宰是邑入境問俗愀然弗怡亟取詔伏讀曰皇帝盛德好生而吏偷弗虔物未蒙惠今不免其何以逃罪乃相縣治東南不能一里得窪田焉近市無喧在野不僻溪湖流派以回繞島嶼分峙以相屬遂命度以為池視田之直幾何而償不損其價計工之費若干而役不奪其力以十月既望庀徒經始決沮洳縱鍤而濬之為深十尺縱廣百步有竒繚曲堤而靣方植嘉木以環蔭凡役三十有五日而池成淸曠浚潔寒波激隄野色交映外與天際渺然有江湖千里之思於是作亭其北憑高而下臨焉既又設關鑰嚴厲禁使往來者有時而漁盜毋得入明年天申令節宰乃躬率其佐若邑之士大夫會于池再拜呼舞大贖生縱之百族巨細脫鼎鑊自適蓋不可為量數邦人聚觀無不以手加額而致華封人所以祝堯之意且曰吾君之德及於物也深矣昔文王有靈德以及物而民樂之請以德及名其亭使吾邦人歲歲來會臨斯池也登斯亭也以樂吾君之德不亦可乎宰曰謹奉教遂狀其事以來屬為之記臣叨𬒳恩寵念無尺寸功以報今幸目覩盛事願有紀述以歸美萬分固不當以文字曖昧不稱為解蓋聞天地之大德曰生聖人誠參天地贊其化育不忍一物不遂其生者仁之至也夫羽毛鱗介物之甚微而人所不加恤以一人之尊有天下之富而於甚微人不加恤之物惕焉思有以生之則其至誠惻怛所以加惠元元者可不論而知矣是以善言治者必以鳥獸魚鱉草木昆蟲咸若其性為治之極考觀唐虞三代之隆其功效靡不在兹而尤備見於成周之世騶虞靈臺行葦皆其詩也天下誦而歌舞之至今不息何其盛哉我國家以仁德受命聖聖相繼惠綏萬方皇帝陛下躬神武不殺之姿光紹前烈戢兵御名罰視民如傷海內妥安無一夫不獲而宸衷惻隱猶恐渥澤未孚戕敗天物故斯池之作創新增舊遍干郡邑要使有生有形一皆陶粹飲和不復罹暴殘之苦信乎至德流洽下徹淵泉矣將見天地之間潤澤豐美庶類至於蕃殖風俗化為忠厚論功較德比隆成周區區有唐誠不足道嗚呼非天下之至仁其孰能致此孔子曰仁者壽又曰大德必得其壽大哉仁之為德也以所施乎一邑者觀諸郡以所施乎一郡者觀諸天下在在處處恩𬒳動植生之育之而其所施也無窮其施無窮則天之報之也豈有窮哉是以既醉者太平之詩也君子萬年天實錫之假樂者嘉成王之詩也子孫十億天實申之臣不佞敢拜手稽首以是二詩請祝聖人此非獨臣之志也亦邦人之願也安樂國序余自少多病藥褁關心人有善方輒就抄録久之集其所得疏為二十八條名之曰安樂國閉門無事臥遊國中閲蟲鳥草木之變擢其可用俾各效靈庶幾身獲安樂非敢以醫為事也而丁氏甥伯升性頗似舅亦復好蓄醫方從豫求得其本喜津津見顔間若將用是救人疾苦者余謂甥之用心則善矣然此不可易也用藥當如用兵藥有方猶兵之有書孫吳之書行於天下舊矣兵家者流舍此無以勝敵而霍去病乃謂顧方略何如不至學古兵法得無以權術之妙有非書之所能盡者要在變而通之自得於言意之表則戰勝攻取暗合孫吳蓋如是然後為名將嘗試考觀醫方種種之病無所不療然病有一變而變不同藥有同功而用各異精微之旨方豈能𫐠斟酌損益存乎其人而後生晚學僅能窺其藩籬便謂世間之病吾巳盡得按方投劑可使立愈意直徼幸於一中曾不知毫釐之失為害滋大可勝惜哉古人有言知兵之將人之司命今余所集二十八條皆安樂國中兵也尺籍伍符指呼在我苟得其要則麾左而左麾右而右可以出竒應變策勳於五苦六辛之間如其不然暗中殺人雖不以挺與創相去幾何嗚呼此真不可易也御名之哉華陽集卷第三十二畢
