front:
  text: 華陽集卷第十九
  hash: sha256:202f2b53526f8a867f826395ed499dc711ace17cbc4f57f87c5af077d023dd1d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0159_SBCK_019-1a}
body:
  text: 金壇後學于文熙校奏狀辭免徽猷閣待制狀右臣昨任給事中以言章罷職差提舉前件宮觀任便居住紹興五年二月初一日伏准告命以明堂大禮霈恩伏蒙聖慈特授臣徽猷閣待制依舊宮祠臣罪戾餘生忽叨異數感激涕泗不能自巳伏念臣頃由冗散驟陟禁嚴未報主恩遽招物論陛下曲推全度不賜誅夷罷歸里閭半年於此省循罪咎無地自容豈謂解澤旁流綸言俯及既除宿釁更錫殊榮伏惟天地之所敷施雖在木石亦為感動然臣退量朽質仰荷洪慈得為洗心𥙷過之人巳是厚幸至若次對隆名之寵其可冒居非唯再速於煩言固亦難安於私分伏望陛下察臣愚衷收還徽猷閣待制恩命止乞以臣本官除一宮觀差遣所有告命見係鎮江府金壇縣寄收臣未敢祗受謹録奏聞伏候勑㫖除待制舉李益自代狀今月二十一日蒙恩授前件職准令節文侍從官授訖三日內舉官一貟自代者右臣伏見左通直郎新差知秀州海鹽縣丞李益學有師法吐詞可觀材兼吏能臨政得譽臣舊與同學熟知其人舉以代臣實允公議謹録奏聞伏候勑㫖乞致仕狀右臣輒瀝誠懇上干天聽伏念臣賦性庸陋遭世盛明蒙陛下拔擢置身法從是宜殞首捐軀圖報萬一而臣年逾七十旅力既愆自今春以來故疾發動日復一日難以支梧自視尫殘義當知止欲望陛下曲軫洪慈矜憐舊物特降指揮許臣致仕庶因辭祿尚保餘齡干冒隆威臣無任惶懼俯仰俟命之至謹録奏聞伏候勑㫖辭免召赴行在恩命狀右臣今月二十六日准尚書省劄子奉聖㫖召臣赴行在令閣門引見上殿先次與落致仕者臣聞命震驚罔知所措伏念臣頃以庸陋誤辱聖知擢在從班訖無報稱由是退閒於今二十一年正以筋力衰頽義當知止露章辭祿冀得休養餘生仰荷天慈曲從所欲退量僥幸方極感慚豈謂簪履弃遺之物尚軫淵衷忽頒召命恭以大明旁燭靡間幽遐顧臣何人𬒳此光寵便當感激奮勵即日上道而臣桑榆暮景多病衰殘理難勉彊伏望皇帝陛下察臣巳試而無功憐臣既老而得謝特降􅐶㫖收還成命令臣依舊致仕臣無任祈天懇聖激切屏營之至謹録奏聞伏候勑㫖辭免吏部侍郎狀右臣今月十八日准尚書省劄子奉聖㫖除臣吏部侍郎日下供職者臣聞命震驚罔知所措伏念臣年齡遲暮學術荒踈辭祿以來分井永巳陛下矜憐舊物自外召還俾復瞻望淸光曲加寵奬顧臣衰朽不足以仰當聖意方極惶懼忽拜詔除進二銓曹恩榮特異退推薄分豈敢冒居伏望聖慈察臣悃愊收還成命以穆僉言所有前件恩命臣未敢祗受謹録奏聞伏候勑㫖除侍郎舉郯自代狀准令諸侍從官授訖限三日舉官一貟自代者右臣伏覩左宣教郎葛郯為學敏明操行廉謹施於政事所至有聲舉以代臣實允公議謹録奏聞伏候勑㫖辭免兼侍講狀右臣今月十一日准尚書省劄子奉聖㫖差臣兼侍講臣聞命震驚罔知所措伏念臣年齡遲暮學術荒踈起從閒廢之中擢預禁嚴之列閲時未幾巳虞曠職於銓曹申命有加更俾叨榮於經幄恭以聖謨高世淵識造微豈淺陋之能陪實顛躋而是懼伏望聖慈察臣悃愊追寢誤恩庶逃非據之尤仍免煩言之責所有前件恩命臣未敢祗受謹録奏聞伏候勑㫖駮李紹祖差遣指揮狀右臣契勘前項所差四人數內李紹祖天資狠戾為政殘虐其過顯著士大夫多能言之以比古之酷吏昨差知䖍州臣寮言其急於到任彊驅兵卒冒犯風波贛石之險以致舟船捐失不自追悔乃歸罪於造船監官王康國送獄掤縛箠楚又追逮家屬必欲置之死地以快私忿章疏具在考其為人不仁亦甚矣比年以來守令貪殘民無所訴今日朝廷公道方行豈可狃習前弊宜有以痛革之况武岡地近辰沅唐元和中蠻獠不順盜弄庫兵賊脅守臣賴柳公綽屯兵此地以鎮撫之然後人情始安以此見武岡雖遠且僻亦一方控扼去處正須御名擇師帥以善政撫循今乃付之酷吏不惟民𬒳其害而暴殘之毒延及蠻獠未必不致生事臣愚欲望聖慈特降􅐶㫖將李紹祖知武岡軍指揮速賜寢罷所有録黃臣未敢書行謹録奏聞伏候勑㫖轉對狀右臣伏覩吏部舊制承直郎至修職郎六考迪功郎七考有改官舉主五貟內職司一貟與磨勘自磨勘改官以後理知縣資序知縣資序人兩任有舉主二人關升通判臣詳究上件法意蓋限其資考使之諳練政事責以保舉欲其不敢為非可謂盡善矣昨於紹興六年三月內忽因官寮論奏遂令選人有用宮廟年月改官者須一任知縣或縣丞𥙷足考數然後兩任關升通判自後吏部遵守施行凡選人改官用過宮廟年月自一月以上盡令於改官後展𥙷一任即是三任方得關升通判臣嘗計選人若止依舊制改官關升得至通判者巳不為易矣蓋改官用六考及七考以大約較之在任并注擬待闕須十六七年至改官後又兩任關升亦須十餘年今若緣改官用過宫廟年月自一月以上盡令更展一任即又須五六年然則自入仕後三十餘年方可關升通判其間或有事故間廢舉主不圎者尚不論也臣竊恐緣此人材沉滯遂至衰老甚非祖宗立法之意臣愚欲望聖慈將紹興六年三月內續降以宫廟月自展任指揮今後更不施行所有改官關升之法悉依祖宗舊制其巳關升通判者更不改正庶幾人材得以自效謹録奏聞伏候勑㫖乞放婺州見缺內庫綾羅狀右臣契勘本州不住承准尚書左右司及提點內藏庫本路提刑提舉常平司等處公文催促起發紹興元年以後合納內庫綾羅及折羅錢積缺數目臣到任之初即時根問因依見得皆係人戶殘缺之數前官失於催理遂至積漸拖缺經涉歲久實難追催今若一併科督則民間無以輸納若依舊拖延則是虛費行移無𥙷國用臣伏覩紹興二十六年正月二十七日指揮節文江浙荆湖等路未起諸色錢物并拖缺上供米斛積缺稅租等二十二年以前應見缺數目並與除放况前件錢帛元係官給本錢和買後因州縣闕乏遂以人戶物力均敷即是常賦之外别行催理止緣昨降指揮未有放免明文兼係內藏庫錢物州郡不敢奏陳所以二十餘年催理不絶臣愚欲望聖慈特降􅐶㫖將本州所缺內庫綾羅錢許依紹興二十六年正月二十七日巳得指揮將見缺數目截日除放庶使一州七縣之民少寬追擾仰稱陛下愛恤元元之意謹録奏聞伏候勑㫖乞再致仕第一狀右臣輒瀝危衷上干天聽伏念臣幼非通敏老益謬昏頃解政機叨臨郡治仰戴天地生全之造敢忘犬馬報效之誠服勞既閲於十旬蒞政蔑聞於一善自入新歲頓苦舊痾心力俱疲職事將廢覺餘生之向盡貪厚祿以誠難伏望皇帝陛下曲軫􅐶慈俯昭愚悃念臣昔嘗謝事巳不任於馳驅察臣再辱誤恩迄無禆於治化特降指揮許臣依舊致仕則臣遂營醫藥歸返田廬從今未死之年盡出再生之賜臣無任祈天懇聖激切俟命之至謹録奏聞伏候勑㫖乞再致仕第二狀右臣近嘗具奏陳乞致仕退量冒昧方極震惶今月一日伏准詔書未賜俞允臣望闕拜恩捧讀丁寧之訓感深至於涕泣豈當更有陳請然而私情所迫欲巳不能伏念臣天賦甚愚仕途多難每憂亢滿或致顛隮故嘗遠迹以就閒尋巳引年而得謝仰荷日月容光之照再收簮屨服用之餘所𬒳恩私皆非意望敢憚勤勞於夙夜誓將𥙷報於毫分然自一違故棲三換新歲志彌勵而功弗著力既愆而病日侵豈特貽負乘致寇之譏抑亦犯鍾漏夜行之戒嚮以叨逢於異眷顧難卒易以陳情姑瀝懇於祠宮繼免交於郡事今則風霜所迫蒲柳益衰雙瞳瞀昏視瞻幾廢兩膝緩弱拜履甚難在臣固難於自安他人亦謂其當止伏望皇帝陛下至仁惻隱大度并容察其無避事之心憐其守安分之義特賜檢㑹臣前奏許臣致仕以休餘齡懇至再三雖自知其瀆犯年垂八十實仰冀於矜從臣無任祈天懇聖激切俟命之至謹録奏聞伏候勑㫖進大行皇太后挽詞狀右臣恭聞大行皇太后遷座有期皇帝陛下篤孝自天哀慕罔極臣竊自念昔嘗叨綴邇列與聞徽音不勝號痛感切之情謹撰成大行皇太后梓宮發引日挽詞三首開具如後須至奏聞者云云見别卷辭􅊵召赴行在恩命狀右臣伏准進奏院遞到尚書省劄子一道十一月七日三省同奉聖㫖張某可召赴行在臣聞命震驚罔知所措伏念臣賦材庸繆老益無堪頃蒙光堯壽聖太上皇帝屢加拔擢至參大政空縻歲月無𥙷絲毫今巳兩經致仕待盡田里伏自皇帝陛下盛德龍飛羣生利見臣獨以衰殘遠外無階一望淸光方自憐憫忽荷聖慈垂記姓名特賜嚴召臣可謂千載之遇義當即日奔馳赴闕俯伏丹墀靣述感恩戴德之私然後退返舊廬以卒餘日但以臣年逾八十百病交攻素苦目昏腳弱之疾今歲增甚視瞻行步俱有所妨加以風虛痰眩時復發作心志凋零筋力衰憊雖存區區慕君之志勉彊不前感涕之餘徒極慙懼伏望陛下俯察危誠收還召命俾遂安養免於顛隮干冒宸嚴臣無任激切戰汗之至謹録奏聞伏候勑㫖華陽集卷第十九畢
