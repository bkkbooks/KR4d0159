front:
  text: 華陽集卷第七
  hash: sha256:dbebe8790917b478a5e385655d04f9747351bfc8896b69c28743cccb793b9ed1
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0159_SBCK_007-1a}
body:
  text: 金壇後學于文熙校外制汪藻轉一官朕于名器不以假人惟時賞勞則靡所愛故雖嚴近之列有應公令猶加褒録蓋所以勸也具官某以文章得名而能逹當世之務以氣節自勵而不忘憂國之心厭直承名往臨藩翰政平訟理百姓和樂有西京循吏之風比以軍儲闕供下郡國平價以糴而能悉意奉公承詔趣辦朕甚嘉焉其進一官以為任職者之寵祗服休命益勉厥勤陳桷除起居舍人朕慨念艱難以來士風不兢偷薄之俗勝而馳騁進取之習日滋故于用人尤御名厥與方將迪簡在位取其沉厚之德靖恭之操以革斯弊而振起之惟爾文學之富蚤掇殊科克勵才猷以蒙器使自歷中祕陟郎曹蓋二紀于兹一時輩流咸見拔用乃獨退然不以屑意朕方嘉其有守而譽言日聞是用付爾史筆俾聯法從之班以職記注之事夫華要之選非獨為爾寵也欲使縉紳明識朕意知所趣向焉益勉厥修無負眷奬邵溥瀘南沿邉安撫使兼知瀘州朕宵衣旰食思濟多艱不敢一日輒忘強場之事故選置師帥必惟賢能建威消萌用寬憂顧具官某奮由儒學允蹈古人輔以才猷表見當世念去禁途之久既嚴召節之頒載考僉言宜膺煩使惟瀘川地接夷族控制西南朝廷藩翰得人為重今朕卑爾以中權之寵往殿厥服爾其深體德意御名守教條無以地僻俗陋而鄙夷之使夫並邉列城兵民咸乂是為稱職尚勉之哉趙起魏珍各轉一官朕以驍將扞邉為日滋久來赴行闕有嘉勤勞矧其偏禆協忠國事遠勒部曲可無寵褒其敘進于武階庶有光於戎律往服休命尚勉圖功張成憲除金部郎官宇文師瑗除駕部郎官中臺六卿總治衆務郎為之屬其選甚高爾成憲才術之優見于已試爾師瑗縉紳之譽藹然有聞司珍駕曹宜以分命往其懋勉嗣有寵遷景興宗轉三官換給付身頃者秦蜀用師權在主將得以便宜行事謂爾有勞可賞且復會課當遷就進文階亦以久矣兹用錫爾贊書新厥寵命往其欽服尚勉圖功劉子羽散官白州安置朕暴兵露師經理秦蜀置將不善功潰于成由引用之非人遂同惡以相濟誤國甚矣罪奚可逃具官某本非庸才乘於艱運謬竊逾涯之寵䆮成妄作之凶方朝廷倚重元戎聽幕府自擇參佐首以憸佞贊其機謀昧攻守之良圖恣剛愎以自用協持上下莫敢誰何富平之師一敗塗地既自耻于失策欲移咎于他人隂肆讒誣濫行斬殺坐令將士卒至叛違逮嚴召以促還乃卧家而自便觀其寡謀輕敵雖惡有所分至于慢上侵權則咎將誰執其以散秩往居遐荒尚堅循省之心毋負生全之賜程唐落職宮觀腦詞同前具官某材無寸長志欲大用專事權要䆮加顯榮謬為屬於戎昭曾靡遵于廟勝富平之舉朕甚悼焉以諛佞濟輕脫之謀以殘忍成覆亡之禍生靈塗炭職汝之由尚復何顔更臨藩翰覽彈章之來上知公議之弗容其鐫延閣之華往食真祠之祿是為寬典母怠省愆趙鼎加恩朕日者昭事上帝大享合宮秩將禮之文既荷三靈之眷推慶成之澤爰疏百辟之恩矧乃洪儒為豫近弼方有資于同德其敢廢于舊章具官某才周而識明器逺而用博忠嘉自奮屢陳經世之謀謇諤有聞獨著立朝之節一自登于樞輔再分領于帥權坐申廟勝之威益峻嚴瞻之望肆加嚴召入贊于機衡正賴明謨用寬于宵旰念縟儀之既舉宜慶賜之惟均亟命有司式敷異數俾增封于爵號併申衍于爰田夫尊賢顯功所以錫便藩之寵而憂邉思職尚宜圖康濟之方祗服訓言以稱朕意張頴劉彥適降官持節一路以繩責郡吏部使者職也爾由選掄將漕廣右而縣令貪墨乃置不問朝廷耳目之寄尚何賴焉貶秩二等姑示薄懲往服寬恩勿忘念咎趙進之轉官換給付身川陜用師一時官吏付之元帥使以便宜黜陟蓋嘗謂爾有功可録進主兵團兹用更錫贊書新厥寵命往其斂承圖報勿忘潘長卿潘粹卿轉一官遷團練使朕欽念泰陵在宥之德昭慈保護之功實萬世永賴而吳國諸子是為外孫備歷險艱來赴行闕此寵榮所宜及也進官一等仍卑使名尚勉厥勤以副朕崇獎之意周綱薑師仲除監察御史士有卓然以氣節自立于世然後能有所為矧吾中執法之屬任國風憲以督察百吏為職則為官擇人非有立者不在兹選爾綱嘗任言責閲試巳孚爾師仲行巳直方見稱多士兹用並擢御史以舉六察之政考之公論匪為爾私往服訓言益堅所守王綰除石司中臺萬事之本天下之休戚繫焉方時多故詔勑文書倍于疇昔雖以二三執政提其綱維至于左右周旋剖決留事則責在其屬以爾燭理明而不惑遇事審而有斷郎曹更踐閲歲滋多蔚有休聲逹于朕聽兹用擢居宰士以彌綸省闥往共厥職益務恪勤庶幾稱朕所以屬任之意呂聰問除吏部郎官張銖除考功郎官李元瀹除度支郎官朕拔舉羣材以備官使惟時郎位其選甚高凡列職於其間必考實于公論惟爾聰間名德之後文雅自將銖才術兼優能治邦計元瀹為屬憲府藹然有稱皆宜進陟顯途是用各加褒擢往踐厥服益茂爾猷蘇攜除檢正朕惟東西二省政事出焉中書揆而議之門下審而覆之既以二三大臣任其責矣則又為之設屬以助其不逮吾於是知檢正之職不可用非其人以爾氣稟粹溫臨事敏逹郎曹卿寺多所踐更比嘗命列司宗之二而議者謂爾相臣之子嗣德有耀朝廷政體生長見聞是宜更錫贊書擢此要地夫一日萬機出納當否所繫重矣往祗厥服益究乃心呂聰問除宗正少卿堯御名九族周尚同姓千載之後協和輯睦之風可以想見朕甚慕之肆求時髦參典屬籍庶幾紏合之義無愧于古以爾名德之後儒學自將越在外服蔚有休譽比嘗召對便坐觀其論奏有合朕心擢亞伯臣公議惟允惟昔宗寺圖諜于今僅存褒集闕遺以昭穆親踈之序則為爾職尚其勉之陳桷除太常少卿左右史記言動之實地聮禁近奉常長二專禮樂之任班秩甚高朕為官擇人各使效職攸司雖異易地則同爾比由望實之孚入直螭陛乃以親聮宰輔引嫌自言方兹公朝重違其意擢亞卿列主吾曲臺夫以直筆敘事之才而付之討論制作之事蓋優為也往服朕命益究爾能王居正除起居舍人唐制兩省屬皆可議朝廷事其責重矣而况左右載筆記人主言動實為異時法從之選式序在位尤難其人惟爾問學淵源論學徑正昔嘗入直螭陛固以任職著聞比自侯邦擢二卿列會吾記注引嫌自言求稱厥官兹用命爾易地以處夫奉常班秩雖峻而職淸且近史實兼之往祗服于新恩益勉修于舊物湯東野落職宮祠朕選建牧守外作翰藩有兵有民任責為重償悉心于撫御庶少寬于顧憂具官某蚤以材能登于法從維揚謀帥初謂得人當兵火瘡殘之餘付還定安集之政所宜夙夜務稱厥職而乃坐靡嵗月績效弗昭致使一方坐弊尤甚宜黜隆名之寵往從祠館之遊尚服寬恩毋忘循省吉俊輔官換給付身爾頃以武勇自奮從軍秦蜀主帥謂其有功福秩甚峻録名來上更名為真往服寵榮益思報效宋孝先起復知楊州維揚古都會控淮帶江綿地數千里厥今屏翰之寄視他鎮為重兵火既息餘民出于塗炭凡厥師帥豈獨任吾折衝禦侮之責而撫綏瘡痍朕心尤所深念以爾久蒙器使中外殘更決滯務于都司贊深謀于督府皆有聞焉朕思得疏通敏博之士經理淮甸爾雖以憂去職義當奪情錫兹贊書往殿方靣率勤儉以勸生業推恩信以安衆心在爾勉之豫不多訓謝伋除祠部郎官溫州主管神御朕時巡東南欽惟宗廟未獲妥靈肆命有司奉祠于近郡以爾冬官之屬敏肅而誠宜陟氷廳往以從事詩不云乎溫恭朝夕執事有恪尚其勉之副豫休享之意曾紆降一官朕分遣重兵宿屯要地惟時給餉責在漕臣爾才智聞于一時何獨至此而不加勉使吾𬒳堅之衆行有乏食之憂主帥以言良咈豫聽貶秩一官姑示薄懲往服寬恩尚圖來效程千秋起復知嶽州巴陵控引江湖居國上遊兵火搶攘之後政失其經民未復業今欲外強屏藩內安流離貴在守臣其可不御名以爾富于才術嘗試為郡考其績效綽有能名兹用起從倚廬之中委以專城之寄奪情以義宜遵有國之常規當官而行尚茂折衝之遠略郭師中轉刺史依前武功大夫換給付身朕嗣承大統文武之士咸進厥官今既八年而帥司謂爾恩獨未及升刺舉之號以聞于朝是用更錫贊書載新寵命往其祗服思報所蒙楊揆降官朕惟淮楚與敵為鄰爾為守臣凡疆外之事義當專逹乃不以聞違詔漏言皆汝之咎貶秩二等聊戒慢官益勉所圖以輔前失徐俯除端明殿學士宮祠憂勤圖治時方急于任賢左右近臣義豈容于去國念有均勞之請欲高易退之風宜徇懇祈更全體貌具官某氣節不撓辨論可觀蔚有譽于當時期力行于素志起從踈逺亟聯從橐之華度越輩流遂陟樞庭之峻閲時未久𬒳遇非常庶觀整軍經武之謀折遐衝于萬里抑賴同寅協恭之助圖大政于一堂顧屬任之方深曾設施之未究奏章俄上引疾甚堅肆推從欲之仁曲示優賢之禮殊庭厚祿祕殿隆名匪曰朕私用榮爾去或出或處諒不替于憂時嘉謀嘉猷尚毋忘于告后章傑除工部郎官朕惟百工之事皆聖人作也述聖人制作之意考治百工而使咸精其能是謂有司之職以爾才智明逹風力敏強將漕外臺蔚有休譽宜遂進登郎省屬于冬官以修五材九範之法克恭朕命嗣有寵褒彭玘贈吉州團練使戰則死綏將帥之事也比年兵政不修望敵奔潰者十常八九朕方整軍經武欲以激勵士氣有能披堅執鋭奮不顧死則褒崇之典其可後哉具官某資稟忠義志摧姦凶獨當喋血之鋒遽致隕身之禍有司具奏朕甚痛之其正序于戎團庶追榮于幽壤魂爽如在尚克欽承華陽集卷第七畢
