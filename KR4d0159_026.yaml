front:
  text: 華陽集卷第二十六
  hash: sha256:c6e75b267447583989c1d9eb1666f1a44c42f9ffcb43859f612bded7ff9c4349
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0159_SBCK_026-1a}
body:
  text: 金壇後學于孔兼校啓賀朱中書啓伏審光膺中詔峻陟西臺以端方直亮之偉人當佐佑詢謀之大任士夫相慶遠近所同竊以朝廷之官莫尊於二府政事所本獨繫之中書禮固重於前聞任莫難以今日邦基再造王業中興邉陲之兵革未寧州郡之盜賊多有六飛在御靡遑奠枕之安二聖蒙塵方佇迎鑾之策法度尚須於訂議人材尤急於搜揚息四民愁歎之聲還萬里農桑之業惟茲數十難能之事悉委二三同德之臣非有真賢曷當盛舉恭惟某官建標天地逸足風雲眇萬物以遐觀曠千齡而獨步粵從早歲固巳優夔契之才雖在平時常不廢廊廟之語遭國家之多難作屏翰以宣勞嘗險阻於兵戎出沒之中罄忠嘉於上下危疑之際身任大計心懷隱憂時方急於播告之修職遂當乎詞章之選思如泉涌吏胥以脫腕為辭令若風行父老至扶杖往聽此特其筆墨之遊戲蓋本於議論之淵源擢自北門進登左轄眷中樞之虛位疇僉言於外朝不藉多人思見元超之治無易卿者果歸廷碩之賢夫位盛者憂必深而望隆者功亦大既參華於宰路實同秉於國鈞揆亂興衰頗類斷鼇而立極修廢舉墜必將解琴而更張庶觀君子之所為當與天下而同慶某賦性庸陋與世闊踈忝竊一官推移半世申屠幸而無過蓋由久處於賢人鮑叔知其有親遂復叨官於鄉部正間居而待次忽虛寧之登賢情發於中喜深不寐念此洪鈞之託益知孤迹之安元禮龍門固莫陪於賀客公曾鳯沼願長借於恩波賀白太宰啓某官先朝元老後學宗師忠嘉夙簡於上心密勿久陪於國論廟堂倚以為重縉紳賴之而安三星耀天極之旁自然拱北九鼎藏神策之妙正合調元非天私于有邦惟帝賚茲良弼職當輔衮既高山甫之賢門不受私况得申屠之譽欽承渙號允協師言夫移風非俗吏所能而正臣乃治世之表必將道揚洪烈弼亮中樞豈惟專八柄以詔王是乃兼三公而論道夫曹參非不治事蓋安下民者清靜為先如房喬專任進賢則執大政者細微可略兼濟二美獨高一時他人所難惟公是賴首尾闕賀黃相啓伏審光膺制綍峻陟台纏一代偉人允協股肱之望八荒夀域悉歸陶冶之公歡聲所加和氣可召竊以春秋尊上公而謂之宰人主論宰相而付之權一日萬幾經大猷於有截三天兩地斡洪造以無私雖曰衆賢聚於本朝必也上帝賚之良弼始協雲龍之會可圖竹帛之勳果得真儒克勝大任恭惟某官逢時多難許國一心早奉王靈逖分帥閫謀謨制勝臨尊爼以折衝社稷阽危督干戈而周衛高密觸紛以赴光武房喬杖策而謁太宗感會有初忠嘉彌著離亨作於明兩扶日轂以升暘晉錫蕃於晝三冠天樞而入輔獨當宥密深贊經綸載疇柱石之英亟委鈞衡之寄國勢增重乎九鼎民瞻益峻乎三階夫位盛者憂必深而望隆者功亦大考申甫以蒸民嵩高之什事特著於蕃宣稽丙魏以元康地節之功時靡聞於變故記在舊史尚稱名臣今乃遭古人之所未嘗任朝廷之所最重凡是規恢之略得於談笑之間蓋將洗萬古而空之豈特專一時之盛者某銜袖雖漫於禰刺曵𥚑阻造於膺門聞盛舉之軒昻激儒衷而奮勵賀呂相啓遽頒遂乘軺而問俗盡循三尺兼舉六條爰多蹇之微蹤獲叨榮於聮事瓜期未報匏繫何言辱竿牘以先時深慚過禮候門墻於他日尚許依仁賀劉相年啓歲元啓祚建夏正以求端邦憲始和謹周官而垂治恭惟某官安危注意文武兼資列上相於東垣顓靣太微之位撫成師於南服獨登大將之壇號令風行酋渠電掃壯萬里長城之勢寬九重旰食之憂茂對休辰倍膺殊祉牙旗日暖知細柳之春回黼座天臨佇公槐之晝接庶諧啓沃用福寰區某待次鄉閭坐忘歲律竊依仁於封部願屬禮於鞬櫜賀燕爭趨適阻負薪之疾登龍莫遂徒傾恭梓之心頌詠所歸敷宣曷既代姪合謝解啓一郡應書孰非勍敵十條問義獨冠羣儒雖不足致之意中亦自喜出于望外竊以六經之要百世所傳粹然道德之微盡在是矣講若帝王之制孰能違之故自虞夏商周以來莫非詩書禮樂之教習聞其號豈獨見於修身祓飾厥文蓋將用以取士奈何執以一説使之拘於小文黨同門而妬道真是末師而非往古大道既破更令益繁乃不能蘄進民心復何以激昻士氣每發德音下明詔固以為將新復古之科而進真賢舉實廉乃反不能明當世之務此漢唐所同患者非􅐶知莫能革之幸真主之篤生喜斯文之復振四海咸仰萬化更新方一德以同風學弛專門之禁俄兩忘而化道人無異戶之趍師心自得於淵源揮翰曷嫌於忌諱文風蕩蕩士論洋洋乃復見三代之英是謂極一時之盛宜取國士以最能書如某者智乏周身才不逮衆粗學古人之事靡諳世俗之心韓子文工送五窮而不去相如志在空四壁以徒慙雖見笑於新學晚生固未嘗不潛心大業然膏油以繼晷有類書癡因筆墨以成文頗或技癢頃自成童之歲固巳挾策而遊較數子有一日之長欲百戰取萬全之勝鄉評與善泮水呈能曾叨一鶚之薦書遂冠六鼇而稱首觀光上國方欣從下土而來合戰春闈不謂見大敵則怯既折北而不救敢圖南而再飛屬兹更化之初兢奮仰高之志毛錐鐵硯念頑姿尚足以磨新白葦黃茅故荒學益加於鉏舊適侯邦之詔下偕鄉士以朋來筆陳爭先文鋒競逐遣趙使而少一初笑遂以備員舉漢士之無雙不圖錯乃充賦出乎其類得之若驚雖藻鑑之無私亦品題之過分靑氊舊物去七年而復還緑綺新聲鼓再行而愈麗念言么麼誰使遭逢此蓋伏遇某官性稟嶽靈才高人傑華國富文章之譽立朝聞議論之公左史記言合春秋之大法西清賜對敷蹇諤之深忠偶厭直於承明暫出分於方靣吏畏神明之政民歌愷悌之風大度包荒念不遺於一物至誠推轂尤樂取於羣材致此謬庸亦蒙甄録某敢不勉葺舊學益勵前修化蟲臂之微幸巳成形於造物搖羊角而上誓將奮翼於天池庶獲微勞仰酬大惠代姪合上葉左丞啓藩宣重寄有嚴制閫之雄草芥微官獲簉曵𥚑之列念五窮之見困叨一眄以增榮仰佩謙光伏深愧汗竊惟自古寒士之或顛躓必擇當世巨公以為依歸非獨慕於風聲殆將希其題拂贏糧褁飯願見者忘重趼之勞擁帚掃門託迹者有終身之幸望光塵於坐客之末承咳唾於立談之間升濟堙沉奮發枯朽是以一識韓荆州之靣封侯至或可輕粗知蕭潁士之文僕厮戀而不去必將收拾四方奔走之士宜有超絶一時卓偉之才而况道德高於古人勳名冠於當代激昻恩義慰薦孤平儻有哭於途窮可無望於川納恭惟某官纍朝舊德間世英姿溫溫秉君子之文挺挺有大臣之節詞章灝噩陋班馬以稱工廊廟經綸贊臯夔而並駕功存社稷名在鼎彞東山方逸於謝安南土巳思於申伯繡裳虛寧將疏三接之恩齋鉞選賢先拜十連之寵威行外鎮令肅中權寬九重宵旰之憂協千載風雲之會輕表緩帶投壺雅歌泛水依蓮遴集幕中之彥披雲捲霧共談堂上之竒曾謂謏聞敢期殊遇方懼旅進而旅退遽蒙三浴而三薰惟大賢無所不容與其潔也故君子信於知巳輒盡布之伏念某家貧無以代耕歲晚乃知向學然膏油而繼晷羞篆刻以成文謬忝一官虛甑待瓜時之及坐間三載束裝赴桐汭之期不圖豪奪以成風遂致孤蹤之失路望窮閻而郤走追故步以懷慚越人彎弓談笑者衆孺子入井怵惕為誰與其抱隻影以興哀孰若仰宗工而自訴竭來彌月老去驚春幸造膺門猥竊登龍之譽載懷禰刺尚希薦鶚之書退念餘生亦云易與苟得效一職而受侏儒之俸便能食衆指而安鷦鷯之枝桃李成陰諒春工之可待粃粳猶鑄納鈞造以何難誓捐未死之軀庶答不資之惠代舅李治表上宰相啓掃門願見幸承咳唾之餘拜命言旋恩出陶鎔之末初官過望舉族增輝念倐遠於台墀恍巳更於歲籥王春布令道迎和氣之回賢業熙天允集神休之盛恭惟某官夙韜遠略起佐中興道格皇天功高邃古金聲玉振師孔孟以遭時武緯文經輔堯湯而致治自再登於宰路乃獨秉於元鈞事有至難非衆人之敢決謀皆素定仗大信以必行收兵柄以強主威息羣言而定國是遠馳使節大浹鄰歡豈徒盡人之事而人有革心殆將合天之意而天亦悔禍固陵肇卜果獲奉於龍輴長樂久虛迄迎還於騩馭上以寬宵肝劬勞之念下以慰黔黎慕望之私盛德所傳曠古未有某逢時不競晚學何知依仁桑梓之鄉忝迹門闌之舊惟大雅未忘於遺屨故危蹤竊效於彈冠燕頷何人敢有封侯之志鼠肝微物徒勤造物之私自視空踈無所論報永言瞻詠但極精微又代賀冬啓推天地四時之氣胚胎巳肇於黃鍾布神民萬物之和燮理實資於公鼎恭惟某官道傳孔孟德並皇夔坐斡鴻樞丕闡彌文之化中興寶祚獨高蓋世之勳四民阜康五物來備日官居卿以砥日順剛長於時亨天子郊祀以配大贊乾行於熙事神人交相視履多祥隆國棟以益尊固邦基而同永某官叨寵借迹困孤微萃五福以朋來但想槐庭之慶列羣英而燕賀莫陪衮席之趨江東提刑到任謝宰相啓􅒒然衰病之餘何心祿仕付以澄清之任有􅌤靣顔矧一路之所臨合十州而共治民力巳凋於近歲吏姦多忽於下情盜竊起而縱橫兵戈隨以紛擾誰非聽訟蔑聞行露之歌責在有司冝御名觀風之舉有如頑鈍曷稱選掄得官十有九年遇事百無一可索長安之米嘗獲誚於郎潛昧城旦之書顧奚堪於使指徒以親庭之欲便遂叨鄉部之初除有同擇地而安實出自天之幸瓜期屢及匏繫彌深每將攬轡以之官輒復杜門而待次閲歲陽之七換更宸綍之四頒舊物故存政恐妨於近制新恩甚渥俄就易於鄰封夫以山野陋庸之姿上煩朝廷委曲之記使其自處未必能然冒寵則優撫躬曷措茲蓋伏遇某官躬秉道德端居廟堂扶社稷之中興頗類斷鼇而立極正紀綱之欲壞尤先推轂於羣材致此賤微亦蒙甄録上呂都督啓改云某官入冠揆路出總戎􅏧天下有達尊三異數兼榮於將相中國之長技五神兵坐鎮於蠻夷大開公正之途不棄草茅之賤致兹孱瑣亦預使令某敢不恪奉教條講修職業念乘軺之非據深懷顛覆之憂仰大厦之可依實賴帡幪之賜其如率職不敢愛身上葉左丞啓矜庶戮之不辜誤玷軺車之寵長萬夫而觀政竊依帥閫之嚴自視庸虛可量欣幸恭惟某官華夷重望廟社元勳文高三代之英德冠纍朝之舊入參大政訏謨恪奉於中宸出殿雄藩宵旰靡勞於北顧民瞻
