  text: 華陽集卷第一
  hash: sha256:45f9fb4de75226ba073109dde5c242fc78922d8db5d3c36faeb8e814778e1a42
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0159_SBCK_001-1a}
body:
  text: 金壇後學于文熙校外制胡世將知鎮江府四郊多壘每深當寧之憂十國為連尤重殿邦之寄將使閭閻之安堵其惟師帥之得人爰擇時髦肆頒明命具官某論篤古今而富淵源之學智周事物而高練逹之材嘗進列於從班蔚有聲於詞掖方時多故庸許即安載稽望實之孚宜委蕃宣之重眷朱方之會府當行闕之上游田桑或廢於兵屯獄訟靡關於吏課興言積弊深軫至懷昔宣帝閔斯民愁恨之聲以為守相之任而文皇録刺史才否之狀用昭廢置之公朕師其言今以命爾往究厥職别俟寵褒邵溥復徽猷閣待制責人臣以見危致命之義蓋萬世之常規眇天下以赦過宥罪之仁茲一時之盛典乃眷井泉之舊嘗于丹筆之書屬有龎洪稍還光寵具官某奮以時望儀于本朝早承三接之榮函二六卿之職一從吏議久去周行亦既省循宜見濶略霈雷雨而作解巳疏南洽之恩近日月而依光用復西清之列爾其益圖逺業務蓋前愆庶晚節之可觀佇中興而來助檀倬復徽猷閣待制朕即位以來與民更始閔一夫之不獲每推肆青之仁顧三尺之靡容亦與自新之路矧在謫籍嘗為從臣宜均寵光以復玷闕具官某頃緣拔擢䆮歷高華坐罹朋附之言辱在譴何之域孽由自作念久去於周行恩不汝遺既數霑於兊澤其即殊庭之邃聿升次對之班包荒不以遐遺朕欲盡捐於宿負無咎在乎𥙷過汝宜益勉於新圖及此艱難尚期報稱牛臯轉兩官殺敵為果莫先制勝之謀戰功曰多宜懋疇庸之典具官某忠於為國奮不顧身親更百戰之餘獨冠三軍之勇志平外侮期復中原大挫賊鋒有嘉戎捷比既付以翰藩之任寵之亷察之權吉語嗣聞計功特異更增顯秩併示褒恩其益勉於壯猷庶克終於偉績李道遷榮州團練使朕念艱難以來干戈未息圖回疆場之事寤寐將師之臣苟功善之有聞顧褒崇之可後惟爾協謀王事戮力戎行材兼將略之優功有戰多之積比欲遣臨於外鎮蓋將就付於中權成命既頒辭寵以避有嘉謙德宜錫懋恩益務逺圖斂豫特命李回落職宮觀十國為連是謂朝廷之重寄萬夫觀政豈容師帥之不賢物論既喧邦刑敢緩具官某起從謫籍擢二政機頃眷大江之南旋分方伯之任庶回晚節共濟中興報政之期指日以俟及是再期之久宜深恤於民勞乃惟衆惡弗勝忽駭聞於朕聽設施無狀悖謬其謀承詔㫖則匿不布宣上封章則肆為欺罔蔑弃公議橫市私恩義方不肅於過庭姦贓至于狼籍冗食猥多於入幕聚斂因以煩苛黠胥挾寵而威權暗移名賊顯行而方略倒置曾是股肱之舊迄無尺寸之功民生不聊誰任其責覽十條之來上按三尺而靡容其鐫祕殿之華往食貞祠之祿尚從寬典益懋省愆陳宥昭宣使上復一官法行必自近雖左右前後之人苟有罪者法所不赦恩施欲及逺雖竄逐退間之久能自新者恩所不遺具官某出入宮庭典司禁衛獲譴以免閲時滋多蒙霈澤之屢更諒洗心而知過稍還秩序用示寵光益勵操修以圖報效李橫轉行翊衛大夫漢武帝寵力戰之士而置賞功之官魏文侯有勝齊之功而受上聞之爵矧豫藩翰積有勞能可無寵光以示褒勸具官某忠勤體國志略絶倫殿天子之邦威名獨著下將軍之令殺敵無前顧瞻河洛之區行入版圖之舊捷書屢至嘉歎不忘宜益峻於崇階庶以昭于茂烈爾其乘建瓴之勢鼓行而西收破竹之功凱旋以報期在朝夕别對休榮彭玘轉一官遙郡刺史朕勵志中原靡忘旰食惟時恢復之計悉委將帥之臣功狀上聞褒崇可後爾早懷忠義獨奮機權斬將搴旗屢奏邉廷之捷第功行賞宜登勇爵之優其就進於崇階俾遙分於刺部服兹休命益茂戎昭成爾逺圖副豫延望凌唐優贈徽猷閣待制臨難不求苟免是為守節之臣殺身足以成仁宜舉飾終之典具官某奮自儒學䆮階顯途宣力方勤遭時多故身雖受辱豈忘報於公家義不愛生卒見殞於賊手深愴無辜之戮有嘉將死之言陟華貫於西淸慰營魂於下地歆豫茂渥昭爾遺忠錢忱父景臻追封衛國公朕祗率訓典大饗合宮熙事僃成鮮澤㫄暢眷兹在列咸與寵榮施及其親豈間存沒具官某胄出王門之貴姻聮帝室之華𬒳遇纍朝躬秉一節夙著老成之望更高身後之名偉忠懿之遺勳既克成於祖德問漢陽之所服尤想見其家風有子象賢任吾環衛爰念教忠之素宜推廣孝之恩追錫徽章益開茅土信都舊鎮雖無改於齊旄淇奧新封庶以昭於幽壤精爽不寐尚其享之錢忱妻康氏封安定郡夫人朕以季秋大饗均福天下羣臣在列咸𬒳光寵湯沐之賜逮其室家國有舊章豫不敢廢具封某氏早以懿行嬪于甲族奉我秦魯大姬夙夜不怠見謂閨房之秀實增戚畹之華序爵從夫疏恩異等其以小君之號就更大郡之封服此綸言益勤婦事許中降直祕閣朕以胡醜亂華士大夫流寓東南數詔郡國謹遇以理爾幸蒙推擇為一路帥守職在奉行詔書所宜體朕德意務安存之而乃坐視淪落忽焉不加戚於其心唯恐他族實逼以奪巳便既欲絶其廪稍則又請以興徙信如爾言凡失職之士將安所託處乎朕方布大信於人命以優恤而反動危之何以示信靜言乖謬罰其可逃延閣華資稍從降黜服我寬典毋怠省躬董震轉武節大夫遙郡刺史朕惟康濟艱難勤勞夙夜思得竭忠奮義之士付以折衝禦侮之權因示褒優庶圖恢復爾威名夙著智略有餘乃心不負於朝廷自率來歸之路抗志欲平於寇難更多斬獲之功眷豫方念於中原倚重孰先於西土方擇維藩之寄宜推敵愾之臣地合三州勢當一靣用啓爾宇爰俾鎮臨克壯軍容坐期緩靖名郡遙分於刺舉武階兼進於崇資爾其祗服恩榮益思報稱佇俟平戎之奏尚增破虜之封杜林魚澤劉寶王升各轉遙防遙團朕於艱難之際惜名器不輕豫人至於執干戈親行陳能為朝廷立功以寬朕顧憂則大官高爵亦所不吝具官某忠勤自奮沈勇有謀從大將以徂征掃羣凶而屢捷第功來上嘉歎不忘服兹褒勸之榮益懋邉陲之績嶽超轉防禦使朱公旦高政許大同轉團練使國家方事干戈蕩平寇亂故於戰勝克敵之功自大將軍而下第其優劣悉加褒賞蓋所以勸也具官某深於勇略久在戎行出討不庭所至輒克是謂一時梟俊之士虜功來上朕甚嘉之遷官一等以答忠勤益勵壯猷用期報效謝克家知平江府朕時巡方嶽倚重吳門城邑相望是謂股肱之郡藩宣所寄必求師帥之賢眷我洪儒久勞逺服載新符竹宜錫贊書具官某智窮萬物之微學總百家之要孤忠自奮見義必為直道正言進彌縫於主闕高文大冊久潤色於皇猷俾參機務之煩尤賴弼諧之助暫去廊廟數更翰垣治有能名逹于朕聽茲用嘉其丕績卑此大邦所期名德之崇益重鎮臨之望念斯民歌於來暮其無憚于暑行惟郡守職在承流將亟觀於河澗歐陽懋除徽猷閣待制知建康府朕惟江左名都朝廷重寄承流宣化宜求師帥之賢禦侮折衝兼倚藩維之固爰舉於衆兹得其人具官某性資高明才術敏邵屢更器使久著忠勤優吏最於侯邦贊軍謀於督府嘉爾名臣之後用昭遺德之傳升次對之淸班俾分憂於方靣民勞未息其師蓋公淸靜之言戍役方更盍講充國留屯之策佇觀丕績嗣有寵光連南夫知泉州往者閩寇弄兵諸郡相蹈藉而泉南阻險以免泉之地並海蠻胡賈人舶交其中故貨通而民富夫富則易驕寇不至則怠而莫之備朕思得仁明練逹之士以守兹土求於巳試莫如汝宜具官某文學政事高于一時為吾從臣公論浩然歸重朕嘗考汝江左三州之政其施設不同而民皆有愜志茲用命汝往臨于泉昔汲黯為東海太守以大治聞後遷淮陽居郡如其故治汝尚勉之其為朕移所以守三州者施于泉人勿使驕惰則豫一人汝嘉馮軫降一官國家度緇黃以牒掌于祠部而下之四方爾居是官乃不謹察合符繆互將使者疑之昔馬援以印文不同即聞於上而石建書馬闕一退輒恐懼爾當知矣黜官一等姑示薄懲尚省前非以修厥職祁立轉團練使朕于人之勞雖微必録矧兹蕩平劇賊底定一方第功有差可無褒勸具官某久在戎行深于將略荆湘之役陷陳先登爰推賞典之公以示眷知之意益思策勵毋負恩華慕氏魏氏轉婕妤朕念昭慈保兹皇祚巳畢三年之服敢忘萬世之功爰詔有司載疇舊典既推茂渥下逮宗親宜有異恩以及嬙御具封某禀徽柔之德躬淑御名之儀敘于王宮修厥婦事魏氏具封某蚤備德容之懿雅勤圖史之規進服宮闈率遵婦事方哲宗當寧既殫夙夜之勞逮太母垂簾更資左右之助感今懷昔撫事愴情爰申品秩之榮式示褒嘉之意服我休命往其欽哉郭安奴轉尚儀蘇迎喜轉司寶宋七娘轉司衣朕念昭慈保佑之功痛深追慕几筵初徹爰舉彞章以爾祗奉壼闈夙夜不怠進升內職用示寵光服我訓詞毋忘秪戒朱倩奴轉掌綵爾事我昭慈謹於內職愴念几筵之徹爰推綸綍之恩進陟婦宮式彰寵渥士晤轉防禦使朕惟皇族近親不責以吏事須歲月之及序則遷厥官茲實祖宗舊法務隆恩寵豫其敢廢具官某神明之胄禮法是遵居無席寵之驕克有維城之譽蚤奉朝請進列衛官歲既十周會課來上其正扞防之秩用昭眷遇之私服我訓詞毋忘飾勵陳永錫遷職宮庭之制典司有官以率前後左右之人以申戒令紏禁之事其職顧不重哉以爾早奮材能數更事任歷險阻艱難之久靡憚勞於出入起居之間備見忠謹積功既著實簡豫懷其進陟於內司俾益圖於報效服此休命用副眷知華陽集卷第一畢
