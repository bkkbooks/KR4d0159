front:
  text: 華陽集卷第八
  hash: sha256:f6f077e0fb656a2e6718154a817a1c9255932a3d20be72eac080ff00a5ee576c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0159_SBCK_008-1a}
body:
  text: 金壇後學于孔兼校外制馮賽柴斌轉官換給國家賞典藏在盟府有功則舉輕重隨之具官某素以勇聞奮義不顧頃者秦蜀之役帥臣以便宜行事謂爾勞能可録超進武階具名于朝用新厥命恩則厚矣可無報哉郭興贈三官朕以爾忠勇之資摧堅却敵視死不顧卒以身膏草野良用嗟惻進官三等追録爾勤亦以慰爾地下之望趙思誠除中書舍人朕惟人主有立政造事之勤而無論思之助則動或失中有發號出令之信而無制作之文則行之不逺孰能舉職宜圖舊人具官某秉德在躬克濟美于先世辭榮求志嘗晦迹于明時頃自丘園推登禁路論事能識大體抗強禦而不回代言真有古風見中和之自得去位既久勞豫所思其遂解于州麾俾亟還于詞掖朕方圖回大業力濟中興蓋欲使朝廷凡幾微之事罔有愆違亦庶幾天下因播告之修識所好惡任責在爾將觀巳試之能服命惟新無負見知之意范沖除宗正少卿人主拔用賢能之士服在要途豈惟督責治功亦以率勵風俗惟爾名臣之子才術有餘淡然無求士夫高仰朕方御名敘皇族思欲追迹麟趾信厚之化而屬有攸籍官宜擇人往列亞卿曰爾為可勉赴朕命以舉伯臣之職庶幾典刑視效于親睦之教有助焉江公亮章傑倉部工部兩易其任天下之務總于六卿選建諸郎分􅊢乃事爾公亮為司庾掌粟入之藏以待邦用爾傑為司平掌五材九範之法以率百工蓋版曹起部其屬雖不同至于委用則未始或異兩易厥任出于至公往祗厥官毋替朕命孫注轉官換給付身朕嗣承大統澤流海內文武在服咸𬒳寵光具官某奮義戎行有年于此阻以道逺恩獨未及帥司既以便宜升進武階具名來上俾更命渥載新爾榮往其欽承思所以報宋孝先降兩官吏貪為殘害吾赤子爾為部使者坐視不問事發驗治罪將奚逃黜官二等以為外臺不職之戒尚從寬典省咎勿忘种濳轉官換給付身賞國之典藏在盟府出之無常輕重視功具官某材勇有聞熟于行陳秦蜀之役丕績顯然帥司既以便宜進爾橫列之峻具名來上用錫贊書往祗厥官益圖報稱曾楙轉官舜典陟明雖九官猶不廢于考績周官詔爵更三歲則大計於羣工眷豫從槖之聮宜舉邦彞之舊具官某性資醖藉問學淵源在昔光明盛大之時則備獻納論思之職眷遇甚渥踐揚居多自均逸于祠庭巳屢更于歲籥比觀會課於法當遷俾膺爵秩之崇用錫贊書之寵往服朕命益茂爾猷范同除祠部郎官吳次賔除刑部郎官六卿之職各有攸司豈惟分舉治功亦以待異日華要之選凡厥在服必取時髦以爾同學古有稽敏而練逹爾次賔效官惟謹多所踐更宜進陟于郎曹以佐吾宗伯司冦之事往其率職嗣有寵褒張順孟涓各轉右武大夫國家置武功官等秩不一而橫列處其最高方時多艱名器為重非有顯績不輕假人具官某勇聞一時出入行陳嘗從大將却敵有功逮今纍年而幕府具名來上茲用錫爾贊書一新寵命以光戎壘以為衆士之勸往其祗服圖報勿忘巨振楊琳降官朕于武勇之士錫以高爵厚祿答其勤勞至于干犯憲禁亦未嘗赦具官某統率戎旅屬吾大將不自謹畏過惡暴列幕府論奏顧安所逃罪哉尚從輕比姑禠一官服我寬恩勿忘省咎常同除起居郎朕惟天下士有以文學論議表見一時而風節不強不足與有為也故凡拔用群俊必先試所以難觀其遇事卓然有立然後置之要地用能舉職厭服公言惟爾諒直多聞深逹世務頃自逺服擢居憲臺屢殫排擊之公坐致姦邪之戢是為試可克協朕心兹用俾爾進直殿拗記豫言動且朕即位於今八年繫日之書缺焉未備方選儒學之士緒正逸典若時記注實與纂修爾其勉舉厥官以謹書法庶使筆削之善有以副朕責成之意范宗尹除資政殿大學士知溫州朕時巡東南方倚維藩之固選建牧守蓋先宿望之圖惟豫輔臣越在外服宜遂分于重寄用允穆于師言具官某高明而有謀敏博而能斷亟際風雲之會蚤膺夢卜之求若涉大川嘗歷艱難而求濟克勤小物每嘉弼亮以輸忠自違機柄之煩久即祠庭之逸叔敖去相不悔既譽處之彌休申伯以作爾庸尚藩宣之是賴眷乃永嘉之地實當海道之衝下酌民言正資撫御徒得君重少寬顧憂其升祕殿之華往對分符之寵夫股肱舊德固宜一體以宣勞而膏澤下流豈待期年而報政勉服休命克副眷懷虞澐除檢正朕惟東西二省政事出焉中書揆而議之門下審而覆之既以二三大臣任其重矣則又為之設屬每事稽考以助其不逮吾于是知檢正之職不可用非其人以爾敏秀而文多所殘更宣勞之著尤在都公茲用更錫贊書擢居要地夫一日二日萬幾是非當否所繫重矣往祗厥服益究乃心晏敦復除左司朕惟煩劇之務剸裁必得其人如庖丁解牛技經肯綮無難焉則談笑之間無餘事矣惟爾奮由儒學雅以才術著稱佐吾銓曹事至輒辦兹用進爾宰屬究其設施夫詔條叢淆吏胥出沒不可不察也服我訓言往勤厥職使夫遊刃恢恢然有餘地則彌綸省闥之譽何愧于古張崇轉右武大夫國家置武功官等級不一而橫列處其最高方時多艱名器為重非有顯績不輕假人具官某素以勇聞習于行陳奮義不顧却敵有功宜升武秩之崇以勸用命之士往其欽服思報勿忘藍圭轉內侍省押班朕惟宮庭之制則有司存奉出入起居之嚴申戒令紏禁之事恪恭乃職必惟其人以爾材智自將有勞潛邸御名密以謹克慕忠規宜進長于班聮用昭示於寵渥尚思所報益勉厥勤袁正功除直祕閣與郡昔我仁祖嘗患群臣欲進者多而求退者少以問宰相王曾曾謂士人貪廉係時用捨惟朝廷抑奔兢而崇靜退則庶幾有難進之風朕讀寶訓至此未嘗不三復興歎深念多故以來士風不厲正當逺稽前言以革流弊之末今爾任吾宰屬方以治辦稱于一時乃忽慨然力求輔外嘉其趣尚義當勉從藝閣華資用為爾寵往臨郡寄益茂厥修顯應侯加封普惠侯惟侯受職宅彼思靈大芘一方克有常享禱祈輒應逹于聽聞增錫徽章以昭其實朕命不易尚其欽哉蒙光仲等加上柱國逺處遐陬世懷忠順屬兹多故效節彌勤宜進勳階用昭褒寵往祗厥命永固邉陲汪思恭除吏部郎官主管侍郎左選文部四選皆為劇曹而侍郎所掌七階之士尤號員冗必擇通材以為之屬而佐其銓序惟爾昔嘗任此藹有能名稽諸僉言宜還舊服往續巳試之效用昭申命之公夫二年居官十年待選自前世患之而今日益甚思革其弊在爾勉焉翟琮知壽春府惟古壽春形勝甲于淮右數更冦亂瘡痍未復尚虞外侮震驚吾民圖御衆之才往任扞城之寄具官某明志勇略聞于一時厭難折衝厥有成績茲用分以符竹俾臨要地內則布宣德意安集于流亡外則震肅威名綏靖于強場是為稱職尚其勉之魏矼除殿中侍御史朕推大公之心闢衆正之路以收集士類圖回治功其有弗協于極敗常亂政則責在御史府以法殫治之此風憲之任所以取重一時苟非其人不在茲選惟爾文學行藝見推士林頃自郎曹擢與六察氣節徑正凛然可觀茲用進陟殿中專以排擊官邪為務夫明足以辨是非之實而勇足以行之則何事之不舉何舉之不當哉往祗厥官毋虛朕意黃叔敖轉一官操利柄以斡山海之藏付之成法收贏資以佐邦國之用責在有司既殫效職之勤宜舉𢡟功之典具官某才周世務學嗣家風蚤升八座之聯獨擅一時之譽以版曹之餘暇兼管榷以宣勞調盈虛之時濬利源而無壅考竒羡之入溢歲課以居多有嘉心計之良實濟軍興之乏肆疇美績俾進文階時乃茂恩往其祗服高士瑰除直祕閣圖書之府藝閣在焉寓直其間皆一時雋秀是為朝廷淸選爾以才術從軍有功卑此華資用為褒勸夫帥司便宜之舉所以昭示至公具名上聞宜新寵命往其祗服思報所蒙宋萬年轉一官時方用武正賴深謀有勞不圖何以為勸惟爾奮由儒術洞曉韜鈐從吾將臣參計軍事用抗強敵屢獲戰多宜加進秩之恩以示懋功之寵祗服朕命圖惟厥終司寶梁嬌娘賜名從順轉郡夫人知尚書內省事法天象之明用建中臺之制贊路朝之治尤嚴內省之司爰舉徽章式圖邦媛具官某飾躬端靜迪德惠和譽久著于宮闈靡聞私謁身服勤于婦職常佩忠規有嘉淑御名之稱宜總綱維之政序之寵位錫以美名大疏湯沐之封增重文昌之寄兹為異數率由至公其益懋于厥官庶克諧于新命紅霞帔呂六六轉掌記楊二奴轉掌闈後庭衆治內職主之式序勞能具存舊典以爾祗勤宮掖夙夜不違進陟婦官用昭異數往共乃事思報勿忘故宗朴改封惠王昔我皇族當重熙纍洽之辰並建輔藩倣畫野分疆之制念閲時之既久致疇邑之相重度義不安改封為允具官某躬秉一德寵遇纍朝方神祖之御圖推嚴尊屬以濮國之次子奄宅王封肆今遺列之存尚想宗英之盛眷豫潛邸嘗胙晉康偶同壤地之名顧何嫌于異數然以嗣孫之請欲自避于殊稱爰徹爾疆宜莫如惠荒羅浮之勝地易隧路之新榮一品彌崇尚奚加于儀物九原未泯宜克享于徽章趙思誠轉一官朕以天官大許羣工之治惟時法從特循三歲之規逮稽閥以上聞即推恩而增秩具官某靜重有守諒直敢為持槖禁嚴居獲論思之助分符便郡實資屏翰之良比載考于僉言方促加于嚴召適兹會課用進文階夫以積日較功雖由銓序至于褒賢錫寵豈限彞章勉圖厥勤以副朕意華陽集卷之八
