  text: 華陽老人文集序
  hash: sha256:ec81fc0d03a49ec7403545e6aafb90a57692579ccc4141c1734cf6872b108694
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0159_SBCK_000-1a}
body:
  text: 煥章閣學士宣奉大夫提舉隆興府玉隆萬壽宫魏郡公洪邁撰華陽集四十卷故參知政事資政殿學士章簡張公所著也始大觀政和間庠序宏盛彚四方俊造子亰師公起朱方孤生持經術驤奮聲髙一時儒先仄足斂衽比三冠倫遂䇿崇政名為弟一天子當扆挹歎有旨隮用矣老蔡方顓國挽使聽已倡富貴有命之説連拄之且雅憎王黼為邪弗忍識其面擢才學館郎官坎壈過十稔淡然無嗟悔意獨玩心于內不肯頃刻輟為文章每一落紙都人即日傳播至汗漫梀宇建炎􅏤戌家鄉厄胡兵篋櫝貯臧六丁下取略盡煨燔所存僅逮百一既檜相得志齮齕知名士惡子組織人語言買進梯禍公在睥睨中又為之閣筆袖手秦亡公亦老故􅍓歲久著録不能多薨之明年嗣子户部郎中堅鋭搜拾論次合八百五十九篇將刋鏤垂丗未克而沒後二十三年慈孫池州使君釡乃出捐家資板置郡學邁首得其書伏讀之大氐制詞嚴而縟表疏卷卷主敬雖莫齒退休未嘗以一篇倩人代作而講筵故事十九章剴切明白如論仁宗得君人之道舜不窮其民光武開心見誠唐太宗察上封者之姦憲宗御下有術文宗不能正陳夷行唯阿之暃皆反復致志因事納忠非若等輩區區備課呈而巳池州以書索序顧晚出遼絶欲謝不敢念昔者辱與户部遊而伯氏文惠公奉使淮東時築亭結樓于官舍公為賦兩詩酒盞搖江波吞翠壁之句至今諷味在口輒藉以自恕然甚慙公自稱曰華陽老人集用是以名紹熙二年三月十六日序新刻華陽集序天地山川靈秀融結必生竒崛瑰瑋之士邁迹振古以開文獻于將來而文獻之傳亦必有尚論景行為之後進者以見聞而羽翼之斯二者恆相須也故杞宋無徴孔子傷之而聖賢經傳亦皆俟諸子以世其傳此不特皇王之謨烈廊廟之規章即德冠一鄉行徴一邑者嘉言懿行典刑攸繫百世不可磨也或曰人亡則如之何楊子雲云在則人亡則書故頌詩讀書以論其人兹尚友之道也豫自垂髫時習禮于鄉校見有宋先哲張文簡公者豆而爼之于祠矣聞其人鄉邑之耆俊而國家之梁棟也心竊慕之及考之宋史參之邑志僅述其姓字與行迹之一二考其遺文洪業蔑如也則心甚惜之曰之人也之德也乃罔聞于後世乎及豫致政而田適與其裔孫光裕者遊偶出殘編􅍘簡于蠹餘以示余讀之歎曰偉哉吾鄉之先哲有是哉孝義著于鄉邦勳烈赫于廊廟代言西掖則典雅麗則允黼黻乎皇猷正色立朝則斥姧逺佞直爭光于日月雖佐業偏隅而身係社稷之安危關君德之休戚者數十餘年君臣協志夀祿永綏此其文章政事節概勳猷蓋庶幾韓范富歐之儔公嘗自書曰以直道行已以正色立朝以靜退髙天下人皆以為不負所言是誠擁方茅之秀滙五湖之精挺生一時而殊絶百代者也不幸重罹兵燹著作之屬煨燼者已十之八而嗣是子孫衰謝賢哲無傳僅有諸編之未斬者數百年來冥冥罔攸表章此豈一邑之漏典實國史之遺文哉夫賢人處鄉邑之中擅一言一行之長者人猶膾炙而模楷之而况公碩儒名相遭遇四朝言聽計從澤及天下可使其終泯然乎豫生也晚遇之遲尤幸斯編未盡斬而後生者得與于斯也故緝而􅎚之以播之鄉邦傳之四海使百世而下知吾鄉有立德立功立言不朽之士而興起者無艾也且孟軻傳聖道喜居之相近而荀卿有言法後王𣣔知上丗則知周道謂其近已而易行也今豪傑産自鄉曲徽言懿行炳然尤在耳濡目染依歸更切仰止髙山又奚必逺有所慕哉故兹編之行也實期前哲有光後生多賴非徒虗言是衍而已是豫竊有志也夫是豫竊為妄也夫公諱綱字正彥所著表奏詩文等略具文集中行迹具洪公針狀中甚悉故不𣸪著享年八十四居邑西之希墟有宅號稱西府見方輿勝覽明萬曆丁酉同邑後學于文熙撰華陽集目録第一卷外制胡世將知鎮江府邵溥復徽猷閣待制檀倬復徽猷閣待制牛臯轉兩官李道遷榮州團練使李回落職宮觀陳宥昭宣使上復一官李橫轉行翊衛大夫彭玘轉一官遙郡刺史凌唐佐贈徽猷閣待制錢忱父景臻追封衛國公錢忱妻康氏封安定郡夫人許中降直祕閣董震轉武節大夫遙郡刺史杜林魚澤劉寶王升各轉遙防遙團嶽超轉防禦使朱公旦高政許大同轉團練使謝克家知平江府歐陽懋除徽猷閣待制知建康府連南夫知泉州馮軫降一官祁立轉團練使慕氏魏氏轉婕妤郭安奴轉尚儀蘇迎喜轉司寶宋七娘轉司衣朱倩奴轉掌綵士晤轉防禦使陳永錫遷職第二卷外制王􅊛除天武捧日四廂都指揮使充淮南東西路安撫使司都統制盂忠厚妻王氏封秦國夫人高士瞳轉遙郡承宣使差權管客省四方館閣門公事董貴轉官遷團練使張玘轉官曹成轉右武大夫翟興贈節度使董先除觀察使陜西安撫韓肖胄除簽書樞密院事胡松年除工部尚書黃龜年除中書舍人孚濟侯加封嘉顯孚濟侯顔孝恭轉遙郡團練使呂祉轉一官董旻轉行兩官曹成轉左武大夫遙郡防禦使潘致堯轉五官裴衍轉遙郡刺史辛彥宗敘左武大夫康州刺史安時轉官仇悆降兩官馮正巳落職衝替葉煥落職宮觀韓肖胃母文氏特封國號李膺落職降一官陳永錫特轉行遙郡一官第三卷外制解濳再任荆南鎮撫使樊彥端轉行遙郡刺史士慷轉一官士撙轉正任防禦使士䞈轉遙郡刺史楊沂中沈昭逺改官舒清國除起居郎洪炎轉一官致仕王岡王廷秀除直祕閣宮觀杜湛轉武翼大夫遙郡刺史劉大中除監察御史梁彥贈官李擢除徽猷閣直學士與郡曾楙除禮部尚書宋伯友除刑部侍郎楊從儀轉親衛大夫陳桷升郎中李擢知婺州錢圻改官虞澐陸長民除吏部郎官洪災贈四官邢煥特贈少師追封國公邢孝揚除直祕閣后姊邢氏加封郡夫人郭孝友禮部郎官趙霈祠部郎官吳革除直祕閣粟順等遷