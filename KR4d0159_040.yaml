body:
  text: 金壇後學于孔兼校行狀通直郎大理寺丞洪蒧撰故資政殿學士左通議大夫丹陽郡開國公食邑二千二百戶食實封一百戶致仕贈左光祿大夫張公行狀曾祖俊贈太子少保妣朱氏贈普安郡夫人祖琪贈太子少傅妣王氏贈齊安郡夫人父翺任右朝議大夫致仕贈少保妣李氏贈榮國夫人公諱綱字彥正姓張氏出自姬姓黃帝之後少昊靑陽氏第五子揮為弓正始制弓矢子孫因賜姓焉周宣王有卿士張仲其後裔事晉為大夫至唐支派漸廣世居河朔有官于潤者遂家金壇曰銑上柱國曰連主楊州六合簿寶應正元制書具存南唐李氏考定其書以其家為是邦衣冠之裔公自叙譜諜載本末甚詳由高祖王父而下皆晦迹以德行稱鄉里逮公登二府三代贈官保傅榮及九族矣公幼而頴悟沉厚寡言始入小學與羣兒伍特不好弄鄉先生授以經史一覽輒不忘由是日記數千百言衆咸駭服父少保喜曰張氏種德積善後世必有大吾閭者其在此兒乎十歲能屬文出語不凡同舍生斂袵畏避時少保之子唯公一人公晝則幹蠱夜則讀書積日纍月身修學成猶未忍離親側少保屢勉之年二十始入縣庠居無何試藝優長升𥙷泮宮方舍法盛行游學之士肩𬒮摩屬公偉然傑出冠於諸生郡將尚書俞公􅙫一見異之期以公輔大觀四年褎然為舉首貢入辟雍繼升太學方是時承平日久京都以侈靡相尚士之不恱紛華盛麗者十無一二公獨深居簡出潜心大業至不知飢渴寒暑流輩初易之久而見其志趣益篤問學益精每羣試輒處上游乃更推服質問疑義或摳衣就弟子列四方人士聚於成均無慮數千人語學行之懿必以公為稱首政和三年試內舍第一明年以優等較定試上舍主文尚書張克公見公程文稱歎不巳謂邃於經術遂復擢為第一是年四月七日天子御崇政殿賜上舍及第釋褐授承事郎玉音宣諭張綱係三中首選可特除太學官臚傳既下在廷歎仰蓋一時異恩前此所未有也宰相蔡京與張克公不協故特抑之後數月始除辟雍正當時好事者以本朝衣冠盛事編次為圖載公三魁之美搢紳榮之五年除國子正蔡京方用事必欲使天下士盡出其門朋附之徒有朝處奧泄而暮躋華要者唯公守正不阿初賜第旅進一見而巳絶迹不再往京以公為時第一流人意欲羅入巳黨頻遣所親致委曲且曰儻能屈意相從簪槖可立致公曰富貴在天蔡氏其如豫何京聞其語大銜之徽宗皇帝屢欲擢用公京但於學官中時一改除勉從上意爾公久在學校諸儒敬服既橫經上庠以師道自任循循訓迪卒歲忘倦六年八月除辟雍博士一日忽有㫖召對便殿公自謂起踈逺荷聖主特逹之知思竭忠言冀以感悟淵聽既見上首論朝廷用人當分别邪正以謂方今之患在於君子小人混淆而莫辨陛下儻奮乾剛擴離明詢之以言試之以事稽諸古訓格以僉言則邪正不啻白黑之易見不然將恐小人得志無所忌憚或苟且以害成或邀功而生事其禍有不可勝言者又論奢侈之弊以謂民之化上捷於令陛下履豐亨豫大之期固嘗憂風俗侈靡而下戒飭之詔矣然而背本趨末日甚一日流蕩而不返臣愚以謂陛下不率之以躬行之教未見其能革也陛下誠能以祖宗躬行之教為法其不合於祖宗者一切去之則天下雖大有不難化者公儀貌端偉音吐洪暢所言切中時病上為之改容嘉納奬諭數四除祕書省校書郎蔡黨聞之大怒益欲逐公而未有間也七年磨勘轉宣教郎明年竟為蔡氏所擠韓駒張忞輩凡與公厚善者二十一人俱在遣中得主管成都府玉局觀以歸宣和二年五月依元豐法罷宮觀八月磨勘轉奉議郎三年閏五月再除祕省校書郎兼修國朝㑹要明年兼校正御前文字上方崇儒重道博彚羣書公洞貫九流多識竒字校讎天祿是正魚魯功實多焉朝廷議遣童貫蔡攸宣撫朔方公上疏極論不可出師之狀且引易大君有命開國承家小人勿用必致亂邦之語書奏為持權者沮格不報公憤惋久之繼傳郭藥師歸順蕭后納欵收復燕山捷音踵至在朝莫不相慶唯公憂懼益深至忘寢食暨遭靖康之變人皆謂公有先見之明十二月除著作佐郎五年八月入尚書省為屯田貟外郎十一月磨勘轉承議郎初王黼秉政威權浸專公惡其為人雖同僚以職事見公亦託疾不往周旋數年間竟不識黼之靣黼憾之公在職年餘徽宗皇帝一日取班籍指公名謂黼曰此人馳譽文場行實相稱可與除近上差遣黼設辭障蔽竟不得遷七年六月改司勳貟外郎九月磨勘轉朝奉郎十二月北虜渝平兵及畿甸公夙夜憂憤謂所親曰方今國步阽危吾處下僚不獲與聞朝論然苟有可以效節者不敢不勉乃為書與父母訣獨留老卒垂二繩於梁間曰都城脫有不免與其辱於犬羊之手不若就死于此於是乘城晝夜守禦四十餘日既解嚴有㫖登城及月者例遷一官公曰主憂臣辱義則當然顧可因此以幸賞邪卒不自言靖康元年三月遇欽宗皇帝登寶位覃恩轉朝散郎是時少保榮國以公久在圍城中音問不通積憂成疾公得家問即上章丐祠於是以公為兩浙路提點刑獄公事陛辭之日上宣諭曰朕知卿不阿權貴操守方嚴故授卿此職切宜為朕愛恤百姓公頓首受詔還家方浹旬復𬒳召赴闕大臣傳上㫖欲除公橫榻公方迎醫就養籲天有請辭甚哀切欽宗皇帝雅知公無兼侍特可其奏及聞二聖北狩張邦昌僣竊遂弃簮紱移病告老忽傳太上皇帝踐祚於南京詔至之日公病立愈自陳乞就職時浙憲巳别差王翿矣建炎元年遇太上皇帝登寶位覃恩轉朝請郎駕幸維揚降㫖召公赴行在所公以二親垂老力辭遂再除兩浙提點刑獄公事四年七月復除司勳貟外郎公又固辭乃還浙憲紹興元年磨勘轉朝奉大夫二年改除江東提刑是時戎馬初息民力未蘇公到官撫摩凋瘵惠恤鰥寡屬吏之贓汙不法怠不舉職者悉按劾無少貸諸郡詳覆具獄躬親省閲必以情刑名或不當駮正之吏以舞文抵罪與夫民有冤而獲伸者非一自中原俶擾士庶或盡室嬰禍事既定往往立子為繼而於法不合承絶家財産坐此牒訴紛然公具奏乞將巳絶命繼之人視出嫁女等法量許分給又鋪兵依條不許别役而無立定罪名公乃乞比附巡轄使臣私役法一等科罪今皆著令實自公發之凡州縣事有未便及民所願欲而未獲者皆罷行之不可槩舉統兵官王進駐池州凶暴放肆凌蔑州郡有曹官以小事忤進遂釘其手於門上聞其事詔公體䆒時國勢未安諸將皆有輕朝廷心公到池陽進擁鐵騎數百突至軺車之前衆頗失色公不為禮入傳舍廉問得實立進數責之進叩頭伏罪自是不復越紀律公巡歷所部訪民疾苦未嘗休息迄冬奔馳道路居鄱陽公廨止數十日而巳凡為民去害建利唯恐不至席未及暖而江東九州無違便吏斂手不敢為非公在任及所過州郡饋送絲毫不受下車之初廨舍所列器皿謂之併淨例皆一新公即令公帑緘封以俟後政所用唯隨行瓦木之器比去悉以所緘封者揭于榜歎曰民之困弊未有甚於此時而有司供帳視承平不少減吾忍用之哉至今士大夫相與語廉節者多舉公此事為師法太上皇帝方鋭意於治二千石刺史之賢否靡不周知一日顧宰臣盛稱江東最績遂以左司召公入對極論天下事上擊節稱賞有大用之意公又言監司守臣數易之弊及州縣獄囚瘦死吏無考課法上嘉納之三年正月兼中書門下省檢正諸房公事二月除起居舍人是時北虜漸退川陜屢捷公恐中外苟安上疏乞益嚴邉備又乞舉行仁宗皇帝故事諸路帥守替日各令條列利害五事以上畫一具奏後皆施行五月除中書舍人公文思敏贍凡得詞頭即時具草未嘗稽留方多事時書命填委公灑翰泉涌事辭俱稱玉音稱奬謂比年詞臣鮮能及之自擾攘以來史筆未修雖詔論撰而祕省權輕關㑹稽失公建言乞依祖宗故實委大臣兼領史事即日詔宰臣呂頥浩兼修國史至今遂為定制北虜初議和朝廷數遣使而虜情叵測廷臣以預選為憂公獨奮然請行大臣以公姓名進上曰張某親老且詞命正有所賴朕將委以北門之任矣公聞之感泣未幾榮國病甚乞外祠章十餘上不許遂賜告迎侍還鄉繼𬒳㫖趣歸甚峻是冬還朝供職四年正月兼詳定一司勑令尋除給事中公由江東憲蒙召擢不二年閒致身法從自以遭時遇主古人所難知無不言未嘗有分毫顧望意是時獻言者交章公車每付給舍看詳公曰祖宗成憲具在患不能舉行捨是而一切紛更何益自非卓然可用皆報罷或挾勢以彊公卒莫能得大將有以軍中田産乞不起稅為言者朝廷欲從其請公毅然以為不可先是推恩元祐黨籍子孫許其自陳一時有司失於限制來者不止公建議以崇寧初年所定碑刻九十八人為正又軍興以來小人乘時召亂經涉五年而仇怨告訐連蔓不巳公上言乞截日蔽囚後有告者勿受庶以廣好生之德事即施行而潭帥申請委曾焚劫為首之人請論如法公復奏駮上卒從公議是時所在狴犴填溢一旦釋遣皆洗然自新為良民矣公又論舉將帥修戰艦淮南官冗軍糧闕乏科敷弓料私置稅場及宿衛單寡等皆一時急務舊法應庶官至中大夫止若太中大夫非侍從不遷謂之止法宗室有特㫖轉行太中者公因此上言崇寧大觀以來士風不競叨官竊寵不循資序遂至國紀大壞陛下慨然念治將欲大變其俗故前日冒濫之人大者追奪小者審量有識之士方竊欣幸以為自是遵守祖宗之法今乃復違舊章超遷官秩臣所未諭上聞公言亟寢其命宣政大臣有上遺表復官推恩者公力疏其諂諛誤國之罪以駮之舊相或以生計自言乞借撥官田公引子産辭邑事以告于上貴戚近侍凡所干求茍涉僥幸一切奏罷之人皆服公不畏彊禦公在省闥二年凡命令有不當輒封還詆斥權貴盡言切直無所回避風采振一時上亦知公忠赤屢見褎美人以公居閒恂恂似不能言者而臨事慷慨如此益知所藴蓄與常人殊因為之語曰張公論事有回天之力今信然矣張俊以宣撫使屯江上遣營卒持書至江州瑞昌縣卒怙俊勢見令踞視出慢語且與獄囚有疑似之迹令郭彥參械繫之俊訴于朝彥參坐免官公言近時州縣吏多曲意迎合獻諛當路至不隨流俗能為陛下奉法遵職者蓋寡如彥參者謂宜有以崇奬之今乃黜免何以為剛直之勸時俊典領重兵專制閫外朝廷每務優假駮疏既上在列駭愕權要有為俊地者公由是不能自安俄解職提舉江州太平觀朝野無不惜其去五年二月除徽猷閣待制七年三月再任江州太平觀𥘉少保以公恩封位至五品公既奉祠歸養備盡子職每歲時燕集或賔客過從公腰金侍立捧觴上壽鄉人以為榮是年六月少保卒公執喪哀戚甚勺飲不入口杖乃能行人謂曾閔不過也九年九月外除十月差提舉亳州明道宮十一年四月轉左朝散大夫公自轉正郎以朝廷多故十載不叙年勞至是有司始檢舉焉十二年至十四年凡兩請奉祠皆提舉亳州明道宮十一月磨勘轉左朝請大夫十六年丁榮國夫人憂方彊仕時每念親闈無手足之助暮年乃克躬色難之養溫清甘㫖未嘗廢離及榮國寢疾公屏去家事專務醫藥衣不解帶者纍月居喪哀癯不自勝執禮逾於少壯十九年三月服闋五月差提舉江州太平興國宮二十年轉左朝議大夫二十一年八月再任提舉江州太平興國宮二十三年公生七十年矣遂引年辭祿十二月得請轉左中奉大夫依前徽猷閣待制致仕公任司勳郎官日秦檜以酬賞事屬公公據法以為不可檜怨之及檜當國公絶不與通問一日檜謂公舅氏李朝正侍郎曰張夕拜正而不他吾所心服闕不聞問鄙我也李移書道其語公不答閲歲檜數溫前語色頗厲朝正復相告檜方專權睚眦必報大臣誅殺流竄者踵相躡士大夫重足一迹日虞禍及公得朝正書曰吾巳無求於世矣京黼尚不為之屈况檜乎檜由此益怒至是乃祈謝事以卒素志二十五年十月檜死太上皇帝躬覽萬機圖任舊人共政不閲月召公落致仕赴行在所制曰七十而歸政古之道也古之人亦惟曰無以事勤耆老云耳然至於壽考康寧抱道懷德而諳練治體者則賜之几杖乞言詢事不懈夙夜安有聽其引年而去不知寶貴如我今者具官某時之耆傑朕所體貌給事東臺逮兹二紀而凜然風聲猶著縉紳之間不為朕留以老自請亦既許之矣載惟老臣之居國譬如合抱之喬木封植成材豈一日積知材不顧人謂朕何是用起之丘園引對便殿使朕不失貪賢之美而卿有不忘君之忠豈不休哉安車肯來副我虛佇公以老疾為辭詔不允促行甚亟公不得巳就道都人以公年耆望重久閒復出夾道聚觀爭先覩之為快衛士之舊人識公者更相告語咨嗟歎息之聲洋溢朝路公對便殿太上皇帝喜見顔間曰卿閒居巳二十二年前日屢趣卿者正欲速聞讜言耳首問當今治道之所先公敷奏甚悉因論比年公道不行之弊亟蒙睿奬對數刻乃罷即日除吏部侍郎方是時盡逐秦黨號召天下名德之士咸處班列不數月間自執政至侍從臺諌多公門人如魏良臣周葵湯鵬舉凌哲皆公昔所論薦一時服公知人之明且歎其為當今舊德也秦檜當軸二十年士大夫不登其門者幾人唯公七任宮祠退藏深密未嘗以一毫干之而檜亦不少假借比公再登禁塗秦門舊客各欲詭脫蹤跡往往極口談檜之惡而公反不出一語或問之公曰今之因革惟公道是從豈以譊譊求勝哉由是更服公德量之不可及也十二月兼給事中二十六年兼侍講初講詩關睢一篇因后妃淑女之事歷陳文王用人以致規諌之意上褒諭再三且曰久不聞卿博雅之言今日所講析理詳明深啓朕意公乃奏比年舉子鮮知經術宜令詞賦之士兼隸一經如紹興十四年故事庶免偏廢之患上深然之明年省試畢事遂施行尋權工部侍郎二月權吏部尚書自祖宗以來立公私贓罪三等之法以戢貪殘之吏暨秦檜為相復增民事一條凡麗於民事永不得注親民差遣公曰守倅令佐親民之官苟有所犯未有非民事者錮人聖世豈不重可惜哉亟奏罷之公晨入坐曹事無大小必躬自鈎考發擲按治吏無所容其姦士大夫希恩雪罪有數十年不决者公悉以法訂正可與者即奏與之因進故事極言銷金之費異時論事榻前上復以此為問公口陳為患甚大宜速禁止遂下詔如公言三月再轉左中奉大夫五月大金賀生辰使敬嗣暉入境詔公館伴既接見嗣暉謂其副曰我自幼聞此公姓名今尚在邪由是執禮甚恭故事觀潮浙江坐定潮至嗣暉舉前輩詩數十篇以問公應答如響中使入奏上喜甚及事畢褒寵異於常時蓋嗣暉在虜中號知書虜以秦檜死選擇而使之欲以覘吾國知公德望素著辨論不可屈故卒禮而去無或違者㑹彗出東方詔士庶實封陳言其間貪競之徒以權貴人死意朝廷必欲盡變其所施設故其言不擇是非雜然並進公亟上疏謂求言不可不廣聽言不可不察舉而行之尤不可不審蓋恐踈逺之人鋭於納忠有彊出新意而致衝改祖宗舊法者有取便一時而行之既久不能無害者有貪蠲復之名而不以用度較之致州縣不免暗取於民者上曰數日來朝臣獻言多矣唯卿所陳獨合朕意大臣用心正當如此明日宰執奏事上復宣諭此語知公才堪丞弼遂除公中大夫參知政事公入謝因奏臣待罪政府不欲令子弟仕于朝乞罷男堅國子簿見任上曰卿深鑒權臣私親之弊首變前轍朕甚嘉之特依所乞厥後大臣為子弟引嫌丐罷者相繼有請遂以為例初秦檜久擅政柄以嚴刑峻法鉗天下口太上皇帝慨然總攬盡去苛刻之政自爾詔令之下無非寬恤民力公建議以頒降重復官吏奉行不䖍恐民庶不能通知乃令有司看詳取其切於利民者得八十餘事止標大意及降㫖月日其間繁文一切削去奏乞鏤版宣布中外仍令州縣揭諸粉壁於是天下曉然皆知吾君之德意矣公在政府孜孜庶務憂國如家錢榖甲兵之問或至廟堂必為之竭慮經畫至通夕不寐幸而得之則翊日以告丞相俾奏行焉未嘗自以為功而上亦深知之士大夫無辜𬒳罪竄斥逺方有未還恩數者公奏事上前便便言不巳每蒙開納薦舉人才必參考公論皆曰賢矣然後剡章兩省侍從由公延譽而𬒳擢用者甚衆公未嘗語人而其人亦卒不知為公所薦也公自參機政天下事多所建明更化以來所以維持紀綱法度可以數百年猶蒙其功者公實有力焉至二十七年九月公謂家人曰吾二政巳朞年衰疾豈可久妨賢路宜束裝吾丐歸矣乃夜奏遲明懷至漏舍示同列遂留身乞辭機政上驚曰卿在政府宣力甚多方切倚毗豈當捨朕而去確然不許公既退即挈家屬出私第示必不可留相繼章四五上纍降詔遣中使宣押恩禮備至公力懇不巳上知公去意巳决乃曰卿先朝老臣出處皆可觀今之求去蓋欲全進退之節豈可以朕故令卿有不滿意然觀卿筋力尚壯當為朕臥理一郡公又懇辭上曰比年執政無善罷者卿之行可謂勇退矣且大臣去國自有體貌此不可辭拊勞久之除公資政殿學士知婺州陛辭之日上復與公極論異日為治之要巳而曰舊德去朝相見無日因顰蹙不懌公再拜謝恩既下殿復宣坐賜茶慰勉加厚公至浙江亭將登舟忽中使馳至賜御札一封通犀帶一條天語丁寧備極恩寵搢紳歆艷以為近世創見也是日宰執侍從下至百執事悉會江亭叙别冠蓋相望填溢阡陌都人縱觀或繪為圖以比漢之二踈云公至婺女布宣天子德澤為政務簡易存大體至於事干休戚則必反覆詳審而不敢忽一方之民初未識公徒以公名德之重更相戒飾勿犯公法自郡丞以至諸邑官吏翕然奔走率職曰豈可復以猥瑣上纍我公神明公以獄者人命所繫尤所加意每録重囚必使升階立坐隅親加臨問察其辭色多得其情涖事之初有大辟囚以疑奏讞得㫖杖脊流配當决日引囚出則癯瘠若病者公命減杖數之半僚吏皆曰此勑斷也不可公曰主上寬仁好生哀矜庶獄某嘗親聞聖訓今此囚既以疑故宥其生矣脫或斃於杖下則如勿讞人主欲生一人而郡守乃殺之尚可謂之承流宣化乎衆莫敢言本州歲以綾羅輸內庫自紹興以來逋負重積前官以屬宮禁不敢丐免有司督責嚴甚公具奏一切蠲除之又乞增大禮買羅之直民皆被其賜公在郡祿令之外一錢不受或以謂例所當得前後相承莫有廢者公曰吾顧法如何未聞以例從事也食指猥衆用度不足至質錢以自給飾內外非飮食日用之物不得輒市於民婺出羅帛家人欲一見且不可仲春勸耕例携妓樂公悉屏去燈夕出游吏以故事告公亦罷之政務便民安靜不擾數月之間郡以大治公曰可以休矣遂再辭祿明年三月命下依前資政殿學士轉左太中大夫致仕即日西歸資裝無浙東一物盡以錫賚之餘分給親族之貧者致仕官暨使臣合得俸祿悉罷去不請曰吾平生食君之祿多矣豈可復更尸素吏輩役於私室難以費蠧公廩寧自給之食築亭池上名曰喜歸公自號華陽老人日與親舊游息其間又作詩以叙喜歸之情一時名士賡和盈軸公遭遇纍朝晚年蒙太上皇帝擢與機政眷遇優渥雖一飯之間未嘗忘感戴之意晨起必炷香上祝千萬歲壽每戒子孫曰吾老矣不能上報國恩汝曹其勉之至被疾猶諄諄道此語人皆謂公發於至誠而然二十九年七月以其子堅該恩叙封轉左通議大夫三十一年太上皇帝巡幸建康道出京口公扶病朝行宮是時虜踐淮甸王師列屯江滸上見公慰勞周悉因語時事且曰卿在政府時屢講募兵之議有司措置失當今遂乏用公奏述江淮形勢乞寬聖慮上問公體力增損授以藥方仍述修養之法恩意欵密人皆屬目焉主上登極首訪公安否明年十一月召公赴闕公具奏力陳兩經致仕衰病難支上察其由衷詔曰張綱一時老成朕所渴見巳令趣召乃以耋老為辭重違雅志可從所請令所在州軍常加存問仍賜羊酒郡守備禮委縣令入公里致詔特異之恩一時鮮儷世以為寵乾道二年正月感微疾踰月疾良巳甲午之夕與家人笑語如平時遽命取水浴體浴畢安臥三問夜如何至二鼓忽舉手加額三叩齒遂薨于正寢三日而斂手足和柔膚革如生享年八十有四官左通議大夫職資政殿學士爵丹陽郡開國公食邑二千二百戶實封一百戶遺奏上聞天子嗟悼輟視朝一日詔贈左光祿大夫恤典皆如式公始以經術大儒為上舍第一釋褐即官上庠自正至博士凡三遷時鼓笥踵堂誾誾秋秋盛於唐漢公講論經㫖研窮理窟人人渙然氷釋五經尤精于書每因講解著為義說皆探微索隱倫類通貫嘗疾夫絺繪揣合以應故事故其言無一不與聖人契既卒業遂成一書凡三十卷世號張氏書解自是後學潜心此經者爭傳誦之諸家之說雖充棟汗牛束之髙閣矣公在三館于未見之書無不讀聞見日益博洽雖位通顯未嘗一日廢卷晚年披閲稍倦則命子孫讀于前而卧聽之議論常出諸儒意表人有得其謦咳之餘皆抄録藏去其為文雄深雅健粹然一出于正代言西掖綽有典誥之風奏議詳明直而不訐實近世文章之宗伯也平生著述有華陽集四十卷六經辨疑五卷確論十卷告猷集三卷聞見録五卷瀛州唱和八卷靖康建炎間遭兵火焚掠煨燼之餘所存無幾公純誠直亮禀于天性自布衣至貴顯操守奉養不少異氣貌嚴正雖燕處無惰容未嘗姑息而人親之未嘗暴怒而人畏之交遊盡天下名士推薦人才先德行後文藝卒皆通顯大扺不喜沽名常曰中庸之為德其至矣乎捨是而要一時之譽吾弗能也召節屢頒皆出簡記貴幸近習無一相識者其愛君憂國出于天資每從容上前必以進君子退小人信號令明賞罰為言尤小心恭謹避權逺勢退朝未嘗與人言奏對之語疏伏稍干機密者往往削藁不留以故忠謀讜議人亦莫能盡知也宣政間在京師二姦相繼㺯權氣𦦨熏灼士類不能改其􅍾紹興中退而里居二十餘年當國之人復視之如仇讐不能害暮年遇合遂入政府守法任職親舊未嘗敢干以私急流勇退再辭榮祿全名髙節爛然獨著公嘗書座右曰以直道行已以正色立朝以靜退髙天下是三者人之大節不可違也吾雖不才反身而誠亦庶幾焉其子以是刻諸石觀其言可見公用捨行藏素定久矣公事親至孝承顏順志雖古人有所不及親沒追慕白首不少衷時祭如見其享忌日號哭如𥘉喪一言及親未嘗不垂涕也𥘉祖母齊安夫人在堂奉事尤謹政和匙年公正室新安夫人徐氏以宗祀恩當受封邑公乃以回授祖母宣和七年再乞回授遂封太安人紹興元年公以止郎𥘉遇郊當任子以叔父汝弼為少保所友愛遂奏乞先𥙷叔父𬒳㫖特許既秉政得謝而歸許上其子若孫三人公自念吾白屋起家備位二府皆先世遺澤而羣從猶布衣安得恝然忘之遂剡章乞官其堂弟曰絢堂姪曰基曰圭未幾基亡復以郊恩官基之弟孰公載念曾祖後猶有未仕者又以郊恩官其從姪鉞自叔父以下由公而仕者凡六人公媦適溧陽進士談思文實榮國所鍾愛復奏𥙷甥柳將仕郎公始輟妻之封及祖母輟子之祿及叔父輟孫之官及羣從甥姪至薨沒時曾孫數人皆未官嗚呼非孝義過人安能若能建炎初六飛南渡江浙雲擾公侍二親奔竄山谷鄉鄰之避寇者知公所在爭趨附之曰此公純德孝行可以動天天必祐之冀賴餘庇以免由是相從者數十人晝伏夜行周旋於煙塵矢石間凡數月卒獲無虞間有捨公而出他途必遇寇掠前後數十無免者一日公與羣衆隱大林中虜騎繞林歡譟聲勢甚迫衆大恐遷徙紛亂或啼哭失聲閧然不可遏正爾惶惑忽大風起飛沙折木震動林藪移刻而止虜騎尋引去是日微此風則虜聞人聲無噍類矣人皆以為公德行所感厥後中朝士大夫流散南徙狼狽於道有至公鄉者不以在亡為辭必厚館之或經歲乃去性儉約自入禁闥贊化鈞首尾踰三十年家無金玉之器室無衣帛之妾凡世之聲色玩好一無所著在政府時每解衣人見其所服縑素無不歎息鄉人衣冠新異者不敢服以見公有為不善寧受辱於有司唯恐公之知也公居依山而田瀕湖每歲夏潦山水湍激悉為巨浸有勸公增置良田者公曰先世以此貽子孫儻能保守足以資伏臘豈可廣植膏腴以損子孫之志哉故自微至貴田不加益祿廩之餘推以賑貧無吝色每蓄善藥名方人有疾手自施豫鄰里死者賙其棺槨歲榖熟必捐衣食之費增價糴而藏之至春則減其直以濟乏絶一方賴此免於飢饉流徙者不知其幾千萬人也紹興十六年丁榮國憂有穀千餘斛盡以貸鄉民之無告者既而焚劵柩前曰世俗以厚緇黃為孝於親孰若惠貧乏以酬親志公所居宅南井露降於衆木之上一歲凡三見穰穰如貫珠庭前雙桂枝生連理寢室之後復産紫芝又有羣鶴數百回翔寥廓下視所居公祝曰胎仙見臨願示丹頂俄有二鶴垂首簷楹飛舞自獻人皆異之先是公夢遊一官府殊庭虛寂非人世比夢中以為異日當居干此後十餘夢宛然如一公薨之月族弟統夢至其所與公言同門設緑牌而無字有告之者曰俟張公至則書此額矣考公平生所踐履則知身後所歸宿夫何疑哉公娶同邑徐氏贈新安郡夫人建災四年卒男二人堂右宣義郎前公二十年卒堅朝散大夫直寶文閣知泉州嘗歷御史國子太常簿孫四人􅚚承議郎新通判信州鋈迪功郎早卒鑒迪功郎池州貴池縣主簿鎬從事郎新平江府崑山縣主簿堅􅚚皆中進士第種學積文能世其家鑒嘗薦名禮部孫女六人適士族曾孫男女八人尚幼乾道二年十一月巳酉葬公于家北古觀基之原從治命也公以全德碩望遭遇四朝言聽計從澤及天下克保富貴壽考屹然為世重臣訃音流傳學士大夫暨閭巷之人無問識不識舉皆痛惜流涕蒙公恩者至畫像而祠之公平生不求赫赫之功唯以道德仁義自任誠心守之老而不衰此其所以大過人者真所謂古之遺直歟公之子堅欲上公行實于朝以丐易名之典俾針叙其本末針出入公門三十年矣知公出處最詳輒以所聞見紀其實以授公之子不敢有加焉庶幾議諡勒銘有所考信以傳不朽視質諸夏無且畫工為無愧云謹狀乾道四年三月日通直郎大理寺丞洪針狀先君性嗜學壯歲讀書至忘寢膳自隸業上庠以至官中都著述無虛日任館職最久與一時名公賡和尤富建災巳酉金虜南渡犯浙東明年三月北歸所過焚剽無噍類先君方待浙憲闕居金壇倉遑挈家奔句曲之西館戴氏一夕虜卒至家人僅以身免去未一里而烈焰屬天由是數十年手澤悉為煨燼無餘逮戎馬息驚魂猶未定而秦丞相當國士大夫以文墨賈竒禍斥逐流放踵相躡于道先君念太夫人年益高無兼侍秦又挾微憾疑不附巳常恐一旦貽親憂遂絶意辭翰嘗為大理卿談公哀辭有士應知巳用人豈法家流之句既出好事者口語籍籍幾為所醖釀因此愈自晦屏去筆硯二十餘年或諉以文字之職一切力辭遇勝日䄂手危坐命子孫讀古人佳製以寄幽賞秦相卒先君蒙光堯壽聖皇帝擢登政府旋再辭祿以歸時年巳十十六間居又八年而即世晚景多病頗近藥石雖時時歌詠太平然精勤刻苦不能如疇昔矣堅不孝遭大罰號慕之餘裒集遺文以類編次僅得外制二百二十二表疏九十八奏劄六十八故事十九講義十九啓八十四雜文七十六古律詩二百三十九樂府三十四釐為四十卷以先君自號華陽老人目之曰華陽集集中有宣政靖康間所作詩文數十篇皆掇拾於殘編斷簡之末或親舊口所傳誦十不存一二唯尚書解三十卷乃先君為學官日所作講義訓諸生者閩士集而成書别本刋行嗚呼先君力學起家不幸遭兵火畏權臣故文章之傳後世者止於如此敢托其實載集尾以俟立言君子為之叙乾道三年九月朔孤子堅泣血書先大父平時刻意辭章老且弗倦不幸厄於建炎兵火而殘編斷簡得之煨燼之餘又不幸沮於秦丞相以深文甜天下舌而片言隻字莫敢出諸口比及秦亡而大父巳告老然遇佳時勝賞猶時時技癢發於吟詠故身後裒集之文僅如是而止先叔寶文久欲鋟之木而志弗遂􅚚假守秋浦之明年郡事稍間因取所編復加訂正以成先叔之志云紹興改元冬十二月孫朝奉大夫權知池州軍州兼管內勸農營田事釡謹書華陽集卷第四十畢雍正甲辰夏四日因事逰金陵買得于承恩寺書肆中其價甚昂也石倉記
