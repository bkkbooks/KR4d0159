front:
  text: 華陽集卷第二十三
  hash: sha256:4ce6de141c036fc08f3b41ed44b8dd302c709fe9eba83c95d3732e74ce330177
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0159_SBCK_023-1a}
body:
  text: 金壇後學于文熈校進故事一唐鑑太宗謂羣臣曰朕開直言之路以利國也而比年上封事者許多人細事自今復有爲是者以讒人罪之臣聞自古願治之君未嘗不欲以求言爲急故大開公正之路使天下之人皆納忠於上於是端拱穆淸而留聽不倦雖四方萬里之逺政化之美惡風俗之薄厚靡不畢此知盛德事也然求言非難而聽察爲難以人主之尊而虛心於敢言之士則上自百執事之列下至一介蒭蕘之賤孰不殫志竭慮願有所獻而其間貌言之華至言之實苦言之藥甘言之疾烏得而不察哉又况外示切直内懷姦詐僞辭矯辯而訐人之細事者真小人之所爲也直欲盜名以罔上聽託公以報私仇此而不革則禍及善良傷化敗俗爲害不細唐太宗勵精庶政而於聽言之際能察其姦是乃人主之難事此史氏所以書之以昭示後世也昔者大舜有大焉善與人同舎巳從人樂取於人以爲善故能勤總章之訪廣四岳之詢其於聽言之道可謂至矣然於邇言則察之於䜛說則堲之得非以邇言善惑䜛說善誣唯能察而去之斯其所以舜也歟恭惟陛下聖欽日躋聰明天縱觀書一夜復留意於轉對之臣覽奏四方尤樂聞於當世之務是欲恢張治道復之太平聽納之勤視古無愧而間者姦人蔽欺分曹爲黨一時乗權習勢之徒輙敢以流言飛語隂中善類天下方懷憤切齒而大明旁燭洞見朋邪凡是告訐而言上不實者論正厥罪悉投遠方以爲後日之戒於是有識之士乃始歡欣鼓舞咸謂大道之行天下爲公復見於斯時然則虞舜之堲䜛說唐太宗之罪䜛人與夫今日流放告訐之類實異世而同符者也天下幸甚二唐書李石傳文宗嘗顧鄭覃曰試論我猶漢何等主覃曰陛下文宣主也帝曰渠敢望是石欲彊帝志使不怠因曰陛下之問而覃之對臣皆以爲非顔回匹夫耳自比於舜陛下有四海春秋富當觀得失於前日進月長以齊堯舜奈何比文宣而又自以爲不及惟陛下開肆厥志不以文宣自安則大業濟矣臣聞登山而不登夫㤗山無以小天下觀水而不觀諸滄海無以狹衆流然則學聖人而不學至堯舜又安能超五霸而冠百王乎夫聖人之道至堯舜而止矣以二典考之其政不過欽天時治人事用賢材明賞罰數事而巳非至深而難明甚高而難行也然則三代以下漢魏晉宋隋唐之世迄無一君能跂而望焉其何故哉未必皆其天資庸暗不足與有爲也其間願治之主徃徃視唐虞之際以謂非復後世之所能及則亦自狹其志而卒無所成且漢之治莫如文帝其次則稱孝宣然張釋之爲文帝言天下事帝曰卑之無甚高論令今可行於是釋之言秦漢間事帝乃稱善宣帝因太子有用儒之請嘗曰漢家自有制度本以霸王道雜之奈何純任德教用周政乎由是觀之二帝在漢則爲賢君惟自挾其志故功業之所就如是而巳唐鄭覃以漢二帝比文宗而文宗猶不敢當則太和開成之政一切委靡無足怪者李石之言固可爲萬世帝王之法惜乎文宗不能用也恭惟皇帝陛下聰明睿智出於天縱躬履艱運允迪先猷競競業業夙夜不怠故自中興以來雖海内妥安不敢自暇逸也臺池苑囿之觀聲色狗馬之奉一無所好萬機之暇獨留意經籍深逹古帝王淵㣲之㫖一時羣臣章句講說之學莫能仰窺萬分可謂有堯舜之資矣非特有其資而巳也其志葢將力行而有至焉然則躋時於㤗和納俗於時雍固不難矣易曰天行徤君子以自強不息陛下體天德而行健其所以措諸事要與唐虞比隆者亦乎自強而已矣顔淵匹夫也而猶自比於舜况萬乘主乎臣願陛下益留聖心無使二典專美於前天下幸甚三三朝寶訓太宗嘗謂近臣曰國家以民爲本百姓以食爲命則知儲蓄最爲急務昨江南災旱朕亟遣賑貸果無流亡盜賊之患若非積粟何以救之當諭諸路轉運常爲計度省察儲無使損敗臣竊謂財賦有國之大計當豐亨豫大之時蓄積爲備不可一日闕於天下天官九職洪範八政必以農爲糓食貨之首者以見先王於此未嘗不留意也恭惟太宗皇帝紹開帝業四方僣僞悉以蕩平方是時年糓屢豐兵革偃息倉廩府庫所在充滿而猶宣諭近臣儲蓄是務督諸路以計度察倉庾之損敗常恐一旦旱災無以賑貸而有流亡盗賊之患然則宸慮深逺豈特取足於目前而巳哉蓋天時地利財賦之所自出必資人力以爲之是謂衣食之源而生民之命歛之有常制則民樂輸散之有常度則用不乏如其不然事有出於意外而物不素備則駭而國之必且橫取於民民力有時而不應策將安出於是商功計利之臣始得以行其說而頭㑹箕歛天下有不能堪者矣漢稱桑洪羊唐稱劉晏二子材術過人載在方冊後之言利者莫不祖述之以爲不可跂及然以臣觀之巧算倍征殄民資澤乃商功計利之臣耳且増大農之部丞籠天下之貨物坐市列肆轉販相輸以至入粟𥙷官以貲贖罪古所未有而洪羊發之行四利去四害以羡𥙷乏利無以入諸路轉輸如見錢流地上他人所不能而晏獨能之觀其材術如此而計其功効誠足以舒一時之急奈何非先王之仁政使其人生於唐虞三代之世其策果安用哉故夫論治道者必以國計爲先而論國計者必以儲蓄爲急方今天下充國計者有田畒之稅關市之征醝茗之息酒榷之課是數者其大略也而取之皆有藝極是謂常經不可得而増損凡朝廷祭祀之供使客之奉六軍之須萬官之俸與夫乗輿服御匪頒好用之式皆仰此取足焉以其歲之所入幾何較其歲之所出幾何則其有餘不足大槩可見矣然古人謂取天下之財供天下之用未有不足者况陛下自中興以來勵精圖治不邇聲色不務宴游前世侈靡之事皆所不爲則於財賦固無輕費妄用宜其蓄積加多而沛然充羡今乃不然郡國之間𥙷苴鏬漏言匱乏者十常八九此無他官吏不能體國並緣爲姦上下相蒙其弊乃至此耳禮曰國無九年之蓄曰不足無六年之蓄曰急無三年之蓄曰國非其國今日之事唯當詔天下謹財用之蓄藏而令主計之臣稽考毎歲出入之數積其贏餘無得妄費以待不時之須則所謂九年之蓄者數歲之後亦可以馴致其效顧不美歟五三朝寶訓大中祥符元年上語近臣曰京師民庶邇來漸事奢侈衣服器玩多傳以金雖累申條約終未禁止工人鎔鍜爲箔日增其數計所費金歲不下五六萬兩壞不可復浸以成風良可戒也臣聞好侈靡者天下之常情尚素朴者人君之美化自古帝王當太平極治之時懼天下之人侈心將萌必命有司申舊章頒憲度昭節儉抑滛侈凡服用之過制者莫不有禁葢欲檢押之常情使之成忠厚之俗也仰惟真宗皇帝纂列聖之休撫盈成之運豐亨豫大萬物盛多故民間漸事奢侈而以黄金巧飾器服聖慮高逺究極其弊明詔近臣申嚴條約深得古帝王之用心矣葢金爲天下之至寶而國用之所資使衆庶之賤皆得靡潰於器服之間豈不重可惜哉臣嘗考之於古蘇秦說趙陳平間楚衛靑繫胡有功其所賜黄金或萬鎰或四萬斤或二十萬斤而梁孝王一小國所積乃至四十萬斤長安之亂省中金以萬斤計者猶六十匱何其多也自魏晉以降始不聞有此充羡夫金之爲物産於天地之間百錬而不耗宜乎後世之多於前古然以近史觀之其數未嘗有及於古者豈非風俗侈靡積習耗蠧而致然邪且海内産金之地有幾鑿山披沙積累於銖兩之微其得之不爲易矣一旦聚於都市末作之徒乃併肩列肆兢麗争功鎔之銷之以爲恱目之具以一京師而計所費金歲不下五六萬兩合天下而較之其費不知幾何以數十歲之積累未必能供一歲之用然則近時之金少於前古無足怪者仰惟陛下恭儉愛物出於天性固嘗念庶俗侈靡屢勑銷金之禁然而比年民物阜康驕奢所習殊未衰止器服之飾過制尤甚銷金之外又有泥命貼金剔金縷金爲絲爲線之類號名非一償不重其賞罰而申嚴之示以必行則因循歲月未見其能止也誠能止之則非獨寶貨之藏免於妄費而下不僭上賤不擬貴亦足辨天下之大分臣觀三朝寶訓竊見國家禁銷金者莫嚴於真宗之朝故敢昧死以祥符聖訓爲今日獻華陽集卷第二十三畢
