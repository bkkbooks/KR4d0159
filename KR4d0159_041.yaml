body:
  text: 跋張章簡華陽集四十卷紹興間嘗刊版於秋浦郡齋洪景盧爲之序原本世久無傳此本乃萬曆丁酉金壇于文熙覆刻本平闕之式甚古遇宋語輒注御名云云當從宋槧出也以校文津閣四庫全書本優劣自見庫本因囿於淸高宗諭旨旣删卷三十靑詞全卷又慮卷數與原書不合遂割裂卷二十九賀方敷文冬啓以下至回王運使啓五文以補靑詞之闕然幷其前賀都統劉太尉到任啓賀趙直閣年啓賀都統劉太尉年啓三文亦全删殊難索解此其一此本闕葉十六卷三第三第四葉卷六第三第四葉卷十七第八葉卷二十四第五第六葉卷二十六第四葉卷三十第九葉卷三十二第三第四葉卷三十四第五第六葉卷三十八第九葉卷四十第十九第二十葉庫本亦闕十三卷三卷十七俱不闕餘卷闕番相同惟庫本必於闕處巧爲彌縫一若其本未闕者此其二例一卷二十六第四葉原闕庫本删第三葉末行賀呂相啓四字又删第五葉前三行例二卷三十二第三葉第四葉原闕庫本於第二葉末行實我考妣積德下添一獲字以銜接第五葉首行之文例三卷三十四第五葉第六葉原闕庫本删第四葉末行右壽星三字及第七葉首行例四卷三十八第九葉原闕庫本改第八葉堅所生母李氏安人挽詞五首爲四首又删末行五字又庫本卷十三欽宗乾龍節功德疏之第六章與乾龍節滿散道場文銜接爲一篇與此本異又卷二十六庫本删卷首賀中書啓一文而以卷二十七與詔使啓提補亦未詳其故此其三庫本有此三失則此本之善不待言矣此本世極罕見莫友芝邵位西書目中俱未著錄嘗於廠肆見海源閣舊藏殘帙得補此本闕葉凡七近從常熟瞿氏鐵琴銅劍樓借校影宋鈔本又補得闕葉七番尙闕兩葉卷二十六第四葉卷三十八第九葉諸本俱脫今無由校補矣海寧趙萬里
