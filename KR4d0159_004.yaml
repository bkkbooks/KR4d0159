  text: 華陽集卷第四
  hash: sha256:43c673c89fc0b234ada524422941464b39787c6bc3314a4119f8d958a4fc0c34
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0159_SBCK_004-1a}
body:
  text: 金壇後學于孔兼校外制王序封贈二代故祖伯琪故父夢陽故祖母張氏前母陳氏故母向氏朕頃者合宮享帝慶賜遂行縉紳大夫恩及父祖陳氏向氏云父母存亡靡間厥惟舊章具官故祖故父或母以爾抱才不施張氏陳氏向氏云閫訓具宜積德甚厚有孫能仕父母云有子遂至大官推其本源父曰推其忠教母日推其母慈用贈封秩服此休命以光重泉王序故妻鈎氏命婦爵秩各從其夫茲予慶賜之行燕及臣工之列旣䟽榮於祖禰仍追賚其室家具官某妻某氏相其良人登于顯仕生具淑德没有令名宜更大郡之封以慰重泉之望營䰟未泯服命惟新向子廉復官朕惟欽聖功在社稷萬世永賴遭時多故而向氏子孫流落殆盡惟爾幸占仕籍迺復坐累削官念之慨然宜見褒序旣復文階之峻更升延閣之華以寵戚藩斷自朕意徃服休命尚葢前愆王革追授中大夫仍落職朕觀前世酷吏慘刻少恩未嘗不惻然動心而况出于近時殘鷙殆有甚者按其見惡雖死不赦具官某素行隂賊盗竊寵榮當政和宣和之間聲焰熏灼專以刑戮爲暴觀望相指陷人于罔冤痛之聲逹于上下累仁聖好生之德傷天地至和之氣厥罪旣著身不卽誅顯秩崇名没猶冐處葢于爾失刑甚矣宜從追削少謝無辜爾則何知要爲後來之戒張叔獻除直閣提刑朕惟爾父當靖康艱難之際竭節自奮犯賊兇威身䧟虜庭忠在王室肆求厥後大臣以爾名聞引對便朝有嘉占奏進直延閣徃按祥刑豈獨示朕一時異恩亦以爲後世臣子之勸楊選馬千轉行右武大夫師出以律故能有功賞不踰時所以示勸具官某智窮武略勇冠戎行枉㓂犯邉奮身却敵數其軍實積有戰多宜升上閣之華以聯横列之峻徃服休命益勉壯猷田開除刺史徃者虜㓂大入西土人以不静賴我將士雲集霆擊以克有功幕府具聞爾實居最錫以褒命用昭寵渥尚思懋勉無負厥官許份轉一官致仕事君而能致其身旣勵匪躬之節引疾則閔勞以事宜推從欲之仁厥有故常用昭異數具官某沉静有守惠和而通問學得于家傳經術明于世務持槖簪筆徧儀侍從之華剖竹分符屢易翰藩之寄目違朝著久佚祠宮忽抱疾之有加願辭勞而歸老進一官等俾休餘年其茂對于寵光尚克寧于幹止唐煇除右史朕惟唐虞三代之盛皆有史官紀其行事千載之後如出乎其時而見乎其人者書之傳也今吾左右置史執筆記言動亦以昭示後來厥任重矣惟爾秉心直諒迪德惠和學靡空言慮無遺策頃有臺屬擢備諌貟讜議日聞風節彌勁兹用稽之士論俾直殿拗昔遂良由諌大夫知起居事善惡必記以戒太宗不爲非法而魏謩自𥙷闕爲右史文宗猶以朝廷闕失責其論奏此朕所以命爾之意爾宜勉焉無愧古人以永發譽謝克家移郡懷仁義以事君入則罄嘉猷于帷幄居賢德而善俗出則分憂寄于藩維雖二者任職之不同然一于寵遇而無間矧竭均勞之請宜推從欲之恩具官某䟽通而有謀莊重而不倚見聞殫洽故能洞羣言之微議論宏深可與圖當世之務蚤延登于輔弼俾茂賛于經綸自去嵓廊數更符竹趣奉介圭之覲詔陪講席之游大一統于麟經覺斯文之未墜冠諸儒于虎殿廣舊學以多聞俄爽節宣屢形懇避念稽古之功未究而引疾之志莫移卑以近邦寛予南顧徒得君重當無薄于淮陽惟旣厥心尚不忘于王室張絢改官朕分遣御史循行天下察吏治之能否而升黜之爾以材諝效官發聞于下邑遂獲論薦召見便殿敷奏詳明兹用進爾京秩以示褒寵夫千里之行始于足下徃加策勵用冤逺圖章誼洪擬各轉一官爲官擇人取正銓衡之法以稽爲决具存簡冊之公屬兵火之蕩焚詔臣工而緒正成書來上第勞有差具官某博通世務而言必據經明習憲章而事無遺䇿誼云頃貳司㓂考法治官擬云頃由宗伯兼長治官俾專筆削之工釐𥙷詔條之逸昭明義類迄就編謄分核品流悉從科指吏絶詐欺舞文之弊士無流滯失職之憂實繄爾能有協朕志章程旣定仍舊貫于七司襃典有加進文階于一列徃服休命知予眷懷周聿許摶范伯奮改官朕寤寐求材唯恐不及雖布衣之士延見訪問猶將用其言而顯其身矧如爾等咸以行能克施有政肆加召對議論簡于予衷可無異數昭示寵奬其各改序京秩以需進用梁汝嘉轉一官唐李巽領鹽鐵初歲之利如劉晏之季年其後則三倍晏時今國家經費浩繁鹽利居半分道置使務廣貲儲爾以通敏之材嘗𬒳簡擢頗能爲朕操致竒贏課其歲入視昔増羡使諸路得人悉如爾者亦何必逺希晏巽哉宜進一官以爲爾寵徃服休命益勵逺圖虞澐除左司天下之士固有優于政術而辭采或不足觀飽於文學而吏事迺其所短朕勵精圖治求全材而用之則官人之方莫如歷試以爾典校秘文資以多識論譔車觀敏而有辭方將考實于事功而郞省踐楊未究厥藴若時宰屬夙號要司紏察六曹分總萬務肆以命爾益試其能夫盤根錯節游刅有餘者大匠之斵也勉旣厥心以副朕意待汝舉職則有襃遷陳昻除吏部郞官朕惟艱難以來銓部之法日失其序比加刋定著之方冊將選通敏之士各修迺職奉以周旋惟爾奮自諸生久更器使屬予司宼藹有休聲兹用序進劇曹究其施設夫成法具在待人而舉能使吏姦䆮息而究曹益淸是爲守法尚克勉之朕將于汝觀焉魏良臣除刑部郞官朕惟官人之方狥名不考其實則浮僞者勝狥法而必以次遷則陸沉者衆爾以儒術自奮效官輦轂之下率身自檢屏迹權門嘉有譽言肆令召見觀其占奏名實具孚宜膺不次之除用示求林之勸亟升郎位徃屬秋官無怠厥修思所以報陳規除直龍圖閣知廬州安撫淮西朕惟淮西之地沃壤千里胡醜亂華莽爲盗區雖干戈擾攘之難略平而創痛呻吟之聲未息非夫練逹老成之士徃殿厥服何以寛朕顧憂具官某静重有謀果毅以逹蚤勵忠勤之節屢膺藩翰之寄折衝禦侮彊場綏静牧人御衆閭閻輯和朕嘗考觀安陸池陽之政多廼成績兹用峻以内閣河圖之直昭示褒寵汝其爲朕徙治合淝振肅中權拊安諸郡昔魏尚守雲中而匈奴不敢近塞龔遂治渤海而賊盜至於弃兵徃師古人無使聲名減于前日則予汝嘉吳敏封贈二代故祖父故祖母王氏叚氏朕大享合宮祗見上帝肆頒渥澤均迨于臣工燕及私庭豈間于存没具官某故祖具官某生于積德樂于隱淪故祖母云有積德發慈祥報在迺孫䆮以光大時惟故相屬奉貢祠方慶賜之遂行推本原于所自維師一品追賁九泉故祖母云更封大國追賁重泉尚克有知服兹休命故父腦詞同前具官某故父具官某抱材不試積德在躬發其幽光克有嗣子時惟故相屬奉眞祠方慶賜之遂行推教忠之所自寵増峻秩追賁重泉尚其有知服此休命故母夏侯氏腦詞同前具官某故母具封某夙奉蘋藻具宜室家積德在躬有子而貴時惟故相屬奉眞祠方予慶賜之行慰乃劬勞之報寵增封秩追賁泉扃尚克有知服此休命祖母韓氏朕躬報圭幣大享于合宮霈澤下流羣工卿士爵命及其私庭時乃舊章予不敢廢具官某母具封某氏淑德懿行有聞里族慶種厥孫實惟故相眷兹盛禮宜錫恩榮爰增大國之封用侈雕軒之飾徃服休命益介壽祺妻曹氏腦詞同前具官某妻具封某氏淑德懿行有聞里族作配君子嘗爲輔臣宜更大國之封云云同上王秀除直秘閣仍賜章服朕遭多故深懷罄石之宗睦族以恩欲大本根之芘以爾龔神明之貴胄崇信厚之遺風志在詩書不驕於富貴施之政事克勵干廉勤有嘉屬籍之賢獨藹薦紳之譽俾升華于内閣仍賜寵于身章庸示展親以褒有德徃服休命無怠爾猷徐杞除司勲郞官賞國之典也以待天下有功之士若時司勲實掌其法以辨其等而詔爵禄焉惟爾練逹老成恪勤事業列職民部克有能稱徃贊治于天官以參校于勲籍昔王成以僞受賞而後之俗吏多爲虗名爾勉圖之用懲其弊沈昭逺除戸部郞官以版籍考戸口之耗登以地征制財用之出入民部之職郞實參之惟爾蚤勵材猷亟蒙器使效官樞府有禆宻議宜升省戸益究厥能徃修而官以副朕足國𥙿民之意章誼除龍圖閣學士憲河洛圖書之瑞宏内閣之邃嚴奉祖宗謨訓之藏極儒臣之榮寵式序在位必協公言具官某博稽藝文明逹政體粹然論議智毎合于投機試之劇繁才有餘于游刃以嫉惡根霜臺之譽以持平守法寺之公擢貳秋官有嚴邦禁爲屬樞府克賛兵謀蔚高侍從之華嘉乃踐揚之久冠西淸之峻職正學士之隆名庸示殊恩式彰有德徃祗厥服思振所蒙孫近除給事中國家以三省綱紀天下而東臺封駁之司實萬機出納之地欲使發號施令罔有不臧立正官人動無過舉宜得剛明練逹之士以修厥職肆求在列僉曰汝諧具官某負挺㧞之資富精㣲之學蚤先羣彦再掇異科秀于文詞得宇宙中和之氣措諸事業究朝廷設施之宜耻違道以于時久淹才于外服頃方擢備記注遂掌絲綸旣多潤色之工尤竭論思之助宜進司於平奏用益展于壯猷簡自朕心克協公論惟爾代言之日巳屢聞于直聲則夫批勑之風諒無愧于前史徃共迺事尚勉之哉聞人武子改官朕比遣將臣經理彊宇爾居幕府久以材聞賜對便朝占奏有足嘉者宜略銓部之法改序厥官其徃悉心以佐武服以稱朕待汝之意王雰改官朕惟爾兄以身狥國不得終于牖下念之惻然同氣之親如有爾者嘗掌執羈靮從朕于艱難宜有以優恤之改序厥官無忘報稱華陽集卷第四畢
