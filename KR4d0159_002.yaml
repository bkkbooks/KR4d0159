  text: 華陽集卷第二
  hash: sha256:8351294edf02b6a285e6da0ecb4628cb53551fb02cd4c1800801daf167fae9db
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0159_SBCK_002-1a}
body:
  text: 金壇後學于孔兼校外制王􅊛除天武捧日四廂都指揮使充淮南東西路安撫使司都統制朕思恢復中原經理淮甸比謀元帥既付虎臣必資統制之權爰整師徒之衆維時宿將宜錫贊書具官某束髮從軍奮身許國懷禦侮折衝之略有牧人御衆之材竒謀暗合于孫吳偉績遠希于衛霍𬒳堅執鋭賈義勇以無前逐北追奔積戰多而居最久留行闕董我親軍益見忠勤宜分憂寄用升華於部督俾總率以戎昭朕命甚優爾行惟寵深溝高壘豈徒為固圉之謀訓卒勵兵于以俟侵疆之復孟忠厚妻王氏封秦國夫人朕追念昭慈德音如在奄經祥祭孝思敢忘宜頒封爵之榮下及宗親之懿具封某氏蚤嬪甲族獨著令儀禮先蘋藻之勤譽藹閨房之秀襲后家之餘慶既克有聞配君子以疏榮豈云虛授用易三秦之壤俾新大國之名是為寵光往其祗服高士瞳轉遙郡承宣使差權管客省四方館閣門公事唐竇氏雖緣外戚姻家然皆自以才猷結知天子厠迹名臣朕嘗以是求之今日苟有出於懿親而能以器業自奮則亦加以寵榮而策勵之庶無愧於前代具官某胄出高門是為宣仁近屬早由忠謹數更事任閥閲雖逺風流具存粵自初載嘗執羈從朕于艱危動勞百為夙夜匪懈以扞牧圉積功居多傳曰祿勳合親朕豈忘之哉爰卑郡符往司留務其將進爾諸竇之列爾尚勉之毋忘大訓董貴轉官遷團練使朕方疇咨將臣疆理天下惟恐一士之或失也儻有𬒳堅執鋭忠憤不忘于朝廷顧于高爵厚祿豈所惜哉惟爾武勇自奮智能有餘粵自艱難即親行陳摧堅却敵屢奏膚功兹用正爾武階而卑以戎團之重爾其祗服寵渥思朕所以待汝之意益加懋勉以報所蒙張玘轉官朕惟郡太守繫千里休戚未嘗不重其選而况陜服會府當兵火瘡殘之後外侮可虞民不安業則使之共理非其人可乎以爾懷許國之忠奮兼人之勇早親行陳屢拙敵鋒威名所加逺近信服兹用進爾武階并兹西土爾其為朕安集黎元綏靖疆場使夫妖氛不作而境內廓廓無事則豫汝嘉嗣有褒寵曹成轉右武大夫朕設勇爵以敘進天下有功之士至於橫列其秩尤高方時艱難惜此名器非用褒勸不輕假人具官某沈男有謀奮於行陳率衆數萬聽命朝廷蓋知夫轉禍為福之幾而有尊君親上之義朕甚加之上閣華資肆以命汝其思吾所以寵綏之意益圖忠藎無忘報國翟興贈節度使固藩維而外拒權莫重于敵愾之臣擐甲胄以先登義孰踰于死難之士有能兼是二者獨取名于一時宜舉恤章以昭大節具官某雅好將帥之略亟勵忠勤之規紏合師徒鎮臨方靣肅中權之威令禦外侮于封圻駭兹狂孽之憑陵誓與孤軍而鏖擊竒禍既作奮勢莫回狼瞫馳師身獲死而無恨張巡遇害氣吞賊而有餘念爾仗節之忠興豫當寧之歎用頒齋鉞嘉賁泉扃庶幾精爽之存不寐寵靈之錫董先除觀察使陜西安撫朕惟陜右之地風俗徑勇名都大邑雄於天下爰擇主帥實難其人以爾奮不顧身忠於衛上粵自艱難之際即親行陳之榮休績著聞民用信服宜升勇爵仍卑廉車其往為朕撫兹三州兼治號略之政使夫姦究消伏漸寬疆場之虞閭閻乂安復務農桑之業在爾懋勉毋忘訓詞韓肖胄除簽書樞密院事贊襄帷幄允資同德之良綏靖邉隅尤重本兵之寄矧風塵之未息方社稷之是憂歷選廷臣參決廟勝必兼隆于才望乃克副於倚毗具官某志大而高明謀深而博敏輔中興於初載勤勞惟國事之圖聮法從之淸班議論得大臣之休眷維韓氏之顯蓋自慶曆以來父子繼為宗臣勳烈藏在盟府宜有聞孫之秀蔚為當世之英務儒學以自將振流風而不墜朕慨念祖宗之緒恢復古之宏規每惟勳閥之家嘉象賢之有後是用考觀素履昭示眷懷加祕殿之隆名付樞庭之重柄昔宣王有常德以立武豈徒震驚于徐方而管仲作內政以寓車殆將方行于天下尚圖逺業以嗣先猷胡松年除工部尚書六卿分職政事悉窗於中臺百工惟時制作獨專於起部任責既重選能為難得於邇聯舉以率屬具官某異材間出時論同歸堂堂冠人物之英蹇蹇勵王臣之節智識能窮于物表尊其所聞而高明利害不怵于胸中養之以氣而剛大早由詞掖出領侯藩兼文學政事之長得朝野縉紳之譽逮登鎖闥有古批勑之風繼待經筵起豫正坐之講簡自朕志其若豫工念無臺池苑囿之觀固靡勞于增飾惟是甲胄戈兵之器正有賴于咸精服我訓言佇觀丕績黃龜年除中書舍人持槖簪筆均為從臣視草代言獨高詞禁當朝廷之多故出告令於四方欲昭德意志慮之孚正賴討論潤色之美求稱厥職可無其人具官某問學淹該才猷敏博務明國家之體深逹事物之情往在艱難得於扈從䆮膺顯仕蔚有休稱正奉常禮樂之司肅御史風憲之地彌綸宰屬踐更史官嘉其發于辭章雅有合乎法度宜登鳯閣分掌綸言夫惟操筆成文自得中和之氣庶幾扶杖往聽思見德化之成尚其勉旃以副豫望孚濟侯加封嘉顯孚濟侯爾惟明神受職下土克有常享大芘吾民愆陽為災祈禱屢應有司以實來上朕用歎嘉增錫徽章式昭寵渥尚期靈爽無替格思顔孝恭轉遙郡團練使往者南城盜起害吾良民偏師討之既克底定有司言狀可無寵褒具官某智謀有餘忠勇自奮能率衆士深入賊巢一舉成禽績效居最兹用進秩以昭爾能毋替厥勤尚圖報稱呂祉轉一官間者盜起湖湘民用震擾惟爾按臨一路能知尺籍伍符部發將士授之方略迄以蕩平肆疇厥功進官一等往服朕命益懋所職董旻轉行兩官賞國之典也所以待天下有功之士方時多故苟能為朕輸忠效智以遏亂略則應於功令賞可後哉具官某奮不顧身久親行陳從吾大將屢收戎捷盜起湖湘復能説以禍福率使數萬之衆投戈以歸有司上其勞績良用嘉歎進官二等爰示褒優無替厥勤尚圖所報曹成轉左武大夫遙郡防禦使國家用武左遏寇攘有能為朕摧堅却敵顧於爵賞豈所愛哉具官某久在戎行深於將略嘗率衆士大破賊羣有司上聞績效顯著其升上閣仍卑使名益務忠勤用圖報稱潘致堯轉五官朕頃以邉陲未靜求可使殊鄰者惟爾有材優於專對遂授以指遣之出疆果能為朕仗節馳驅通二國之好以歸夫奉命不辱既無愧于光華則有功見知其可後於褒寵峻升秩序用答勤勞毋怠逺圖以修厥職裴衍轉遙郡刺史爾久以勇聞從吾大將掃平狂寇見謂勤勞應進一官制不可越升刺名郡宜知茂恩益勉戎行毋忘報稱辛彥宗敘左武大夫康州刺史赦過宥罪帝王盛德既渙大號咸與維新具官某生於將家久更器使坐纍貶削克自省循𬒳此龎鴻宜見式序往其茂勉尚蓋前愆安時轉官量材授官計功賦祿此國家馭羣臣之法也至於皇族近親則不然吏事勞能一切略之而特以歲月之積進其秩序蓋御名睦之道如是而後可具官某生長富貴無膏粱之習講聞詩禮有忠信之行久列衛官士論甚美有司會課以為當選夫兵防之職視武階亦俊矣今以授汝往其欽承益務謹良以光屬籍仇悆降兩官朕以爾節制舟師控于海道乃者徐文率衆背義驚吾良民實爾所臨曾無忌憚統馭之術蓋亦踈矣豈朕所望哉禠官二等姑示薄懲尚省厥躬益警爾衆馮王巳落職衝替爾以近臣之子列于縉紳不務謹良淫醜自露有非士之所當為者延閣之班尚安得處其加鐫奪姑示薄懲葉渙落職宮觀池陽邉臨大江以兵為重爾任帥事宜知尺籍伍符謹修輔卒之法而乃妄行募召倚為扞防凡所竄名皆羣不逞坐致凶謀濳會肘腋變生逸其渠魁務姑息郡寄若此朕何賴焉其鐫論撰之華往食祠宮之祿猶為寬典毋廢省循韓肖胄母文氏特封國號朕惟天步方艱戎衣未定爰擇近輔往使殊鄰受命而行既盡大臣之節勸子以義又聞賢母之言蓋其志有私親之所難則以知夫國事之為重肆加褒寵靡限彝章具封某氏太師之孫魏公之婦積勳勞于異世萃忠孝于一門允蹈令儀豈獨專女子之職習聞先德固知徇國家之勤眷豫樞臣夙遵母訓比通兩國之好乃有萬里之行果能教以義方謂勿憂於家事慈闈定省雖暫遠于晨昏使節光華庶克昭於忠信有嘉爾志良副朕懷爰疏大國之封用侈雕軒之飾綸言錫寵宜益保於耆年綵戲輝庭將共觀于復命李膺落職降一官天下之賦鹽利居半方時艱難仰此以佐邦用則商賈楙遷宜有以優假之爾為郡守不知體國乃託贍軍之名違法率斂其人上訴輒更文書變詐自解詔案有實罪不可逭黜官一等罷直延閣尚為寬典勉務自新陳永錫特轉行遙郡一官賞以序官國之令典藏在盟府示不敢私惟爾知事上之忠得謹身之道服勤殿幄積歲居多迎護宮闈
