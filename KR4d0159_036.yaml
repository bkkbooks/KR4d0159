front:
  text: 華陽集卷第三十六
  hash: sha256:937629739349f39407a48d2a181dd39b2ea130cf28732c5f7d49098e497b1465
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0159_SBCK_036-1a}
body:
  text: 金壇後學于孔兼校詩次韻錢巽叔見贈阻闊書郵頓兩忘三年淸夢獨徜徉風旌引興與天遠繭緒牽愁知日長逸翮佇歸鴛鷺列鳴騶忽下水雲鄉秋霖窮巷無人到褁飯應煩問子桑感恩伊昔趨靑瑣嘗叨奉紫宸燕間承仄席淸問及垂綸寵荷皇恩重歸慚白髮新粉身那足報結草是吾鄰幽情𥚹性多違俗忘年只舊山心隨黃葉謝身與白雲間杜酒頻應酌萊衣賸喜班幽情在叢桂為著槿籬環彥逹作詩自歎次韻勉之未試屠龍學頻應引劒看夢驚秋枕雨愁入曙窗寒戰伐今年定乾坤萬里寬扶搖終一舉回首謝悲酸日暮地偏車馬靜門閉水雲深野艇收晴網村春續暮砧危腸逢酒怯病骨畏寒侵又見鴉歸盡誰賡梁甫吟次韻彥逹雨霽坐看飛雨激風雷忽變晴空萬里開殘暑暗隨簷溜去新凉頻逐樹聲來朱絃奏罷空三歎白酒篘殘尚一杯病懶怕催詩債急彊吟狂斐不知裁晚雨急雨鳴𥘉歇崇雲凝不流客帆迷夕浦漁火聚煙洲委巷藏身拙殘編亂眼愁功名心巳謝肯負故山幽彥逹借研意在白取次韻戲答斫石染輕翰對靣可十手價重千黃金欲見那得苟難欺相如璧寧碎范增斗作詩伐君謀聊以當墨守家叔示秋夜詩次韻秋來天色半晴陰衰鬢難禁節物侵蘭葉向人方泣露菊花催酒巳浮金莫將詩課頻頻聒不那愁城日日深咫尺南山堪寄傲欲隨鳩杖遍幽尋用前韻蕭然雲屋敞溪陰荒徑蒿萊故故侵穿竹晚風輕戞玉入簾凉月碎搖金畏寒皮骨驚秋早得酒情懷語夜深臨老工夫在禪說試拈波若為重尋次韻戲彥逹思歸月窗明素練風榻淨飛沙飲極樽無緑更長燭自花感時憂未散得句喜能誇莫寄思歸語粧寒捐鬢鴉月夜漁火前村近秋砧靜夜多山煙歸宿鳥水月動明波燭短催詩急樽空奈客何抱愁眠不穩林影半床過秋夜小酌宇宙秋光老崦嵫夜色連澄波寒浸月低樹逺浮煙巷僻喧都騎杯行促廣筵摩尼元自照沉醉不妨禪探梅俗態多違性幽梅不近城詩書看長物林壑寄餘情傍驛尋梅使衝寒過麴生一枝供細酌歸路見參橫山中即事地僻官仍冷心間日自長松篁供逺吹芝术度幽香直木應先伐驚禽忍再傷家山吾所愛投老慰相望次韻彥逹折梅信步尋梅約欣逢亞雪枝春藏紅蕚小寒嗇暗香遲畫角傳新曲粧臺斂翠眉廣平心不動唯許筆端知僻居陋巷人誰樂窮居意自安擁門雲樹暗繚徑土花乾白髮驚時速靑燈耿夜寒中原滿胡騎一念一悲酸次韻彥逹對雪有感朔風卷地寒雲繁忽驚空花墮簷間遠山歷亂眼中失飛鳥滅沒天際還𬗟想端門萬官賀雲陛儼列鳴珮環豐年獻喘天一笑聲動四海俱歡顔李侯人物妙天下何獨臥窮看屋山胸次氷壺自深瑩管中霧豹難窺班異時富貴恐不免詎忍空歌梁甫艱君看鴻鵠有高志一舉九萬誰能攀雪晴雪晴日腳下茅屋深巷泥融頻屐聲幽鳥喚春啼不那野梅迎客意先傾愁腸斷送酒邉散詩眼安排煙際橫晚歲浮榮安用許秪應丘壑未忘情次韻彥逹催詩老去交親渾謾與興來終日飲亡何扣門頗厭催書債隱几憑誰遣睡魔肯怪物情相楚越端由吾道自丘軻衰慵更著詩頻惱筆陳方開巳倒戈歲暮二首忽忽歲云暮霏霏山雨頻鳥啼茅舍靜梅映竹籬新陋巷無深轍清酤有善鄰中原消息斷聊與醉鄉親二寒逐雲陰散年催節物新桃符趨臘市社鼓賽田神任性琴書懶呼兒杖屨頻君恩難報處家食奉雙親用前韻雪殘春信近山逈客愁新興極尊無酒詩成筆有神玩心雲物變驚夢雨聲頻坐對華嚴海忘言意自親野望日落寒雲薄樓高望眼迷興亡千古恨衰疾萬行啼拔士空巖穴防秋尚鼓鼙建章何處是坐待玉繩低探梅倚空山翠羅曲屏入山曉日寒凄淸蒼龍導前散踈影幽鳥勸坐回新聲探梅忽見數枝發曵杖折來雙眼明綽約東窗可無伴煩君火急呼麯生彥逹乘小舟醉歸墮水作此戲之舍爵頽然飲中仙夜歸一葦航深淵長歌扣舷天上坐起舞失腳水底眠未省渴羌笑肉動㑹令鼴鼠驚腹便布帆無恙急藏去明年更試春江船次韻李公顯士有鴻鵠志萬里一舉翮胸中自廊廟肯顧三畒宅李侯氣邁爽詞鋒凛霜㦸老夫晚結交文㑹欣有繹劇談到時事唾手欲任責短褐天路高畎畒抱忠赤風雷惜變化泥蟠等􅔼蜴結茅西山下樵㸑走僮獲富貴㑹有時簟瓢豈不適世態翻覆手寧較黑與白興來時一杯南窗俯遙碧歸自金壇值雨宿顧龍山翌日施米作供蒲牢不擊缺晨炊風伯如何聖得知留我艤舟明日去滿堂香飯雪翻匙次韻公顯見贈李侯詞氣吐朝陽光熖真成萬丈長緑髮莫將塵土暗㑹看它日照金章年齊耆舊愧衰陽懶性唯耽野趣長了却官租更何事君王約法巳三章用前韻戲公顯初試梅粧愜壽陽藁砧山上夜何長式微未盡閨中怨束晳那辭𥙷一章送公顯應舉堂堂筆陳一當千得意秋風急著鞭百萬破荒明日事未應長缺畒頭錢次韻公顯木犀鋪茸紫蔡亂晴颸點金寒菊棲短籬木犀韻高陋凡枝顧與葵菊同階墀香聞十里自絶竒造物豈偏雨露滋閒見層出珠琲垂鵝黃靚粧宮樣宜煙銷紅日下薄帷宴坐幽窗風度時頗覺飄飄蘭蕙姿著人不去催作詩李侯為續離騷辭香草端從筆下移花前把卷不停披何以酬君金屈巵次韻公顯賦蠟梅二首壽陽催粧花睡起半額淺黃嬌欲語香魂浮動滿幽思著莫春風暗相與李侯鐡心似廣平筆力萬鈞談笑舉詩成夜誦更淸絶向來誰識袁臨汝句中有味應獨知吟罷餘井發微咀愁裏危腸日九回今朝愁眼為花開一枝斜倚向人笑應報上林春信來從丁世叔覔花栽老去看花能幾回旋移花樹著行栽君家封㨁滿煙露分我一枝春色來庚午三月十日遊茅山雨餘沙徑淨無泥杖策何妨過竹溪迎客野花隨處發勸沽幽鳥向人啼峰巒路轉攀蘿倦樓觀煙深望眼迷疑是武陵仙地隔坐來遐想舊桃蹊王伯壽見和復用前韻奉答瓶空何必醉如泥送客誰能過虎溪一枕閉門追蝶夢兩行森木聽鶯啼新詩未讀心先伏細字徐看眼欲迷筆底春風有生意他年桃李㑹成蹊次韻伯壽述懷仲蔚蓬蒿滿徑荒主人曾是漢中郎干時不利初無術醫國那知别有方老去與誰同臭味秋來多病獨悲凉倚天長劒君休問腐肉當前亦斂鋩邀韋汝昭同宿上館打窗風雨夜蕭蕭客裏誰堪伴寂寥五字蘇州有苗裔高吟何必更聞韶題華陽南窗擾擾何年斷俗緣從今便合老山間㑹將碧澗洗心淨坐看白雲終日閒衰病辭祿蒙恩賜可時小子堅方塵末第陳德昭袁仲誠惠詩褒借褒借甚寵次韻奉答二首蕭蕭兩鬢雲毛新忝竊淸朝舊薦紳陳力心知難就别引年恩許致為臣臥家正恐貽官謗增秩俄驚捧帝綸溫鮑一門生意足捐軀無路報㳙塵月窟當年裛桂香衰蘭那敢望重芳姓名忽見偕千佛骨相端知誤九方老樹逢春欣有蘖新雛出谷敢爭翔琢磨賴有交朋在高義無專數范張用前韻再簡二首三復長篇句法新蘭言紉佩更書紳才高奚啻千人敵譽過空慚一介臣莫訝筆端能品藻定由胸次有經綸波瀾萬頃分餘滴洗盡昏花滿眼塵二妙爭開古錦囊爛然佳句壓羣芳奉高遺德歸臨汝文範流風在季方顧我挂冠寧復振生兒附翼豈能翔願公勉力躋雲路視草斯文要主張赴喜雪御筵歸作喜雪排筵曉漏催玉人傳詔下天來香隨日轉蓬萊近山棚花帶春回錦繡開一線新陰留鼓吹三登和氣入樽罍叨霑惠渥思歸美授簡梁園愧乏才進呈皇太后回鑾事實奕世占來寶運昌母儀垂慶肇生啇鑾回長樂神人喜書就蓬山日月光北闕導迎三衛仗東朝歡奉萬年觴太平盛事人相語孝德回天賴我皇太廟靈芝産于仁宗皇帝英宗皇帝兩室前楹芝上有文成王字臣叨陪政府得預榮觀謹課成律詩二首吾皇聖德絶先猷淸廟華芝屢降休道盛百王神畫驗祥開兩室化功侔犧尊影照彤雲聚藻梲光連喘氣浮願詔樂章歌偉蹟便從來歲薦郊丘升平和氣格天淵瑞物嘉生太室前根托丹楹朝麗日葉敷華蓋護非煙燕胎為祝多男慶天母仍符萬歲篇聖意每勤宗廟事屢蒙休應答精䖍神芝名燕胎燕玄鳥也有天命生啇之兆古辭靈芝篇云陛下三萬歲慈母亦復然華陽集卷第三十六畢
