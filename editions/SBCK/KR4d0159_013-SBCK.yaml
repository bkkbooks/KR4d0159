front:
  text: 華陽集卷第十三
  hash: sha256:3a6095a17af18f8a306cd8fd85e74a74cc4b4f827962094aac25e08c6117de75
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0159_SBCK_013-1a}
body:
  text: 金壇後學于文熈校䟽徽宗天寧節功德䟽乘天德而出寧誕記流虹之瑞佇時廵之歸格遙傾就日之心䖍叩覺慈仰祈睿算庶竭涓塵之助少酬覆燾之私道君太上皇帝伏願六氣御和三靈垂佑迎太公而還漢載嚴五日之朝慶靈武之興唐永奉千秋之節欽宗乾龍節功德䟽一大德必得其壽固自享於延洪忠臣逺不忘君更欲申於報効屬紀誕彌之節䖍依無碍之慈同厥有生咸傾善頌恭惟淵聖皇帝陛下宅心齊聖體道淵冲恭勤出天性之自然孝友造人倫之極致南薫應律徒知揖舜之風朔野時廵猶隔就堯之日伏願宻回天鑒坐擁神休兩國交歡佇六飛之旋轡萬年祝聖偕百辟以稱觴二上聖篤生肇千秋而紀節羣心胥慶敢一日而忘君注想玉毫投誠金地庶憑願力上贊皇齡孝慈淵聖皇帝陛下伏願擥道德之精剛玩神明於昭曠自天降福與時偕行返瑤池八駿之遊對周􅀖之咸喜享嵩嶽三呼之祝隆漢􅍈於無窮三純乾紀月載震開祥北望堯天未報生成之德仰瞻佛日用伸祈嚮之私孝慈淵聖皇帝陛下伏願體道淵冲玩神昭曠問途牧馬回法駕於襄城占瑞老人對靈光於南極四葵藿㣲生猶知向日􅆪紳舊物敢忘愛君載臨震夙之辰寅奉熏修之禮兾憑法力黙佑清躬孝慈淵聖皇帝陛下伏願德隨日新誠動天監六飛在御早回朔野之廵萬壽無疆克配南山之詠五配天盛德欲報難名彌月紀辰敢忘善頌庶竭㳙埃之助少伸犬馬之私孝慈淵聖皇帝陛下伏願上帝眷臨百神儼衛駕雲龍之駟按平路以南旋占箕翼之星固皇齡而北拱六羲日南交初届長羸之候堯雲北望載臨震夙之辰罄寰宇以均歡竭忱辭而請祝孝慈淵聖皇帝陛下伏願神祗祖考􅂌景福以彌昌山阜岡陵茂皇齡而益固乾龍節滿散道場文虹渚開祥属此正陽之月雲天在望曷勝就日之心用䖍祝於皇齡輒仰憑於慧力淵聖皇帝陛下伏願三靈垂佑六氣御和至孝自格於神明盛德永膺於福禄順斗杓之南指亟旋八駿之遊過嵩嶽而開呼永享萬年之壽高宗天申節功德䟽一天其申命用休誕紀生啇之節臣能歸美報上同傾戴舜之心仰叩覺慈䖍申善祝皇帝陛下伏願仁恩天覆威令風行復廟社於中原茂本支於皇祚坐明堂而朝萬國閱八千歲之春秋疆戎索以禦四夷作億兆民之父母二盛德在火流光繞樞開長􅀤之祥普天同慶効華封之祝擊壤成謠皇帝陛下伏願宗社妥安蠻夷率服國史播豐年之詠司空廣輿地之圖治定功成案六經而較德天長地久參萬歲以成純三赤伏標符爰啓中興之運瑤光貫月肇開長􅀤之祥屬令節之載臨罄綿區而申祝顧叨法從敢怠愚誠皇帝陛下伏願聖德上昭皇威逺暢成大功以安四海歛厚福以浸􅀺民載新輿地之圖恢中原於有截誕受㤗元之筴纂丕祚於無疆四惟皇作極􅀍四表以尊臨申命自天垂萬年而永固爰届誕彌之節載傾請祝之誠庶竭㳙埃上俾海岳皇帝陛下伏願參天地而化育並日月以照臨威彊成於道德而九服來王孝弟通於神明而兩宫返國築靈臺而􅅯伯用彰無敵之仁開壽域以躋民同享太平之福五彌月届期協火德自然之應後天祝算叩金僊無碍之慈顧㣲塵何􅀘於丘山維向日自傾於葵藿恭惟皇帝陛下聰明體道孝弟通神繼好息民浹歡聲於遐邇刺經作制新墜典於明昌載臨出震之辰宜􅀗目天之佑伏願四時不忒萬國咸寧稽三百五篇之詩旣醉巳歌於至治採七十二君之制升中遂告於成功六皇天眷命上帝䔍生肇八荒再造之基祥開華旦垂萬世無疆之福懽浹羣倫用傾向佛之心仰罄祝堯之請皇帝陛下伏願握符御極旋乾轉坤四時平而風雨時五榖熟而民人育新又新而不怠德銘益懋于湯盤朔更朔以無窮神筴彌増於漢曆七火德當陽方啓明昌之運樞星照野載臨震夙之期爰卽寶坊聿嚴法會皇帝陛下伏願體道淵静儲神穆淸自本自根長上古而不老卜年卜世嗣大曆以無疆八㽔賔在候昭盛德於炎精長􅀤其祥下靈光於華渚於赫生商之旦有開復禹之基屬令節之載臨均綿區而申祝皇帝陛下伏願三靈助順六合同風政陶陶而日新福簡簡而滋至三萬里農桑之本版圖益廣於邉討八千歲春秋之期寶曆彌増於睿筭九表正萬􅀖惟君爲大靈承上帝何福不除矧當彌月之期更切後天之祝皇帝陛下伏願誕膺百順不式九圍老人呈南極之祥神筴授㤗元之秘我無爲而自化熏陶益廣於堯仁聞盛德而偕徠玉帛常趨於禹㑹十道莫大於帝王方隆景運功巳參於天地何假頌言惟載夙之昌期實綿區之共慶欲效㳙塵之報不勝癸藿之傾爰卽淨坊聿嚴法㑹皇帝陛下伏願體道淵静儲思穆清時和歳豐而叶氣横流禮制樂作而頌聲洋溢文謨武烈冐率土以歸仁舜日堯天垂後天而難老十一瑤圖在御萬方瞻北極之尊虹渚呈祥百辟獻南山之壽兹仰憑於佛力兾申祝於堯仁皇帝陛下伏願六氣御和百神受職考七十二君之錯事聿陳梁甫之儀閱千二百歲以脩身盡得廣成之道十二千齡撫運爲天下君萬國傾心祝聖人壽况忝服乗之舊載逢震夙之期爰卽寶坊用嚴法會皇帝陛下伏願乾行剛徤離照光明體道御時道甚大而王亦大立政勸化政日新而德又新坐成不宰之功永嗣無疆之曆十三天佑寶圖時生眞主百靈儲祉咸趨震夙之期四海均歡敢後延洪之祝皇帝陛下伏願懋昭大德遹駿有聲並日月以正明運陶鈞而獨化天開地闢揮八極以凝神治定功成握萬年之景命十四星火當天五百歲䔍生於上聖香花供佛三千臣同竭於一心庶憑覺海之慈仰贊壽山之固皇帝陛下伏願體乾之徤如日之升建皇極以錫庶民坐明堂而朝萬國魚鳶遂性樂舜德於薫弦箕翼占祥永漢圖於神筴十五雷厲風飛方大中天之業虹流電繞載臨彌月之期望玉階以歡呼叩金僊而請祝皇帝陛下伏願决柔用夬行徤乗乾赫厥聲而耀厥靈與乎神而進乎智持有道之勝皇都坐復於輿圖受無疆之休睿筭永齊于箕翼十六成功不居坐享無爲之樂大德必壽欣逢載夙之辰眷踈逺之㣲蹤􅀒恩私而莫報唯憑善頌少效愚􅂨光堯壽聖太上皇帝陛下伏願體道希夷儲神淵静擴孫謀而詒燕開寶連之亨嘉萬乗稱觴永尊天子之父千齡御辨同符象帝之先十七星樞紀瑞方申過曆之期鸞輅陳儀肅奉稱觴之禮事獨高於曠古歡允浹於羣􅀺曾是叨恩敢忘善頌光堯壽聖太上皇帝陛下伏願游神昭曠問道崆峒體太極以函三法乾元而用九坐觀聖子述成萬世之功永鎮皇圖安享千秋之養十八赤符應瑞旣成復古之勲黄屋非心爰享後天之筭式逢誕節更瀝懇祈光堯壽聖太上皇陛下伏願氣襲堪輿心游淡漠迪亨嘉於豐豫齊久大於乾坤舉漢帝之玉巵益隆至養受唐臣之金鑑永鎮丕圖天申節開啓道場文炎帝執衡司夏誕彌膺火運之昌文王受命作周光祚協帝齡之永顧盛德何施於善頌惟羣心欲效于愚誠恭啓法筵仰祈慧照皇帝陛下伏願惟皇建極申命自天靖疆場以無虞洗甲兵而不用開八荒於壽域均調天地四時之和朝五玉于明堂永作神民萬物之主天申節滿散道場文流電繞樞兆一人之有慶斷鰲立極均萬㝢以蒙休載臨彌月之辰祗率周行之士咸趨法席用竭愚誠皇帝陛下伏願彞倫叙乎九疇治道貫乎三極風雨時而五榖熟干戈戢而四海平如日之升益懋昭于盛德後天而老期永御于洪圖㑹慶節功德䟽一膺正綂以當天光啓繼明之運紀誕彌於良月丕昭受命之祥仰叩能仁䖍申善頌皇帝陛下伏願新美庶政緝熈大猷三靈吐格於繁禧四海皆臣于盛德盡事親之道萬年均壽聖之歡簡上帝之心百世邁岐周之歷二甲觀開祥仰千齡之盛旦祗園獻祝竭四表之歡心矧夙荷於殊恩顧敢忘於善頌皇帝陛下伏願百靈薦祉六合承風單于趨渭上之朝博士刺經中之制天長地久參萬歲以成純子孝父慈會一人之有慶三爲天下君上帝啓誕彌之慶祝聖人壽􅀺元均愛戴之心葢有生蒙雨露之恩念無路效㳙埃之報肆殫願力仰叩佛蒙皇帝陛下伏願體道御時配天立極漢廷多暇躬太公五日之朝周歷無疆介君子萬年之福四受命當陽咸仰誕彌之慶傾心向佛䖍伸頌禱之勤兾仗慈光聿崇睿筭皇帝陛下伏願德參上古業廣中天櫜弓矢而戢干戈考制度而正禮樂燕周王之孫子益茂本支奠漢室之山河永觀帶礪皇太后生辰功德䟽道盛母儀夙肇生商之慶祥開宮壼戴臨夢月之期爰啓琅函仰祈鴻筭皇太后殿下伏願百神薦祉六氣御和歌聖德于思齊本支益茂奉慈顔於長樂壽考無疆皇后生辰功德䟽紫房正位夙著於柔儀黄氣占祥載臨於誕日䖍申頌禱仰賛延洪皇后殿下伏願道集坤元福流震索承顔長樂同臻萬壽之期協德關雎永輔一人之慶徽宗皇帝追薦道場䟽弓劎上賓痛龍胡之莫附香花修供捨檀海以疇依法會有嚴威神如在超登彼岸願同􅆊釋之遊陟配在天永錫􅀖家之福寧德皇后追薦道場䟽坤儀永閱􅂚勝長樂之悲佛法無邉用啓華嚴之供人天來會鍾唄宣揚仰祈如在之神遂證無生之果華陽集卷第十三畢
