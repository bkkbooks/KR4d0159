front:
  text: 華陽集卷第三十七
  hash: sha256:6e0a56339553009b940f10a5942a06ffcb47eb312f101547932b7b97bba81dc5
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0159_SBCK_037-1a}
body:
  text: 金壇後學于文熈校詩歲前三日立春值雪㑹同僚飲三日殘冬趂臈回飛霙滿眼送春來香浮綵勝隨冝帶花着瑶林是處開巳卜屢豐歌井邑何妨乗興倒樽罍東陽莫訝休文瘦老病仍添一歲催上元上元春色壓輕寒故事賔僚集晚筵合坐香浮花裊娜捲簾風定月嬋姢閭閻盡道冝新歲燈火何妨減去年堪笑樽前窮太守只愁老病欲歸田休官乞得淸朝一病身杖藜歸去老山村室廬旋築新椽就松菊猶㝷舊徑存漸喜有緣窮野興只慚無路報君恩百年來日知餘幾且把生涯付一樽弟姪三人同日受官實爲吾家盛事老懷不勝抃喜作四小詩見區區之意恩光初自九天來玉樹三枝一日開造物無私人共慶那知陰德舊栽培三世追榮荷聖恩諸孫仍見捧􅁝綸當年孝友家聲在流慶増光屬後人恩􅂁新綠照新秋文雅鄉評早見收王謝故應人物勝芝蘭生處自風流淸時得謝老山村弟姪相過慶一門結綬滿庭青􅀂􅀂莫辭勤苦報君恩郊祀慶成用堅韻圓丘迎日至大駕肅天臨樂奏來靈享嵩呼動德音均恩寰宇慶望闕老臣心基命歌周雅何勞五字吟作亭池上日游其間頗覺自適歳晚穿池結小亭地偏聊欲􅀉幽情虛簷風度披襟爽曲㟁波平照眼明過我賔朋無厭數傍人鷗鷺不湏驚聖朝乞得身閑散便覺淵明是隔生題喜歸亭君恩賜我老莵裘旋築池亭野􅃐幽地勢曲連青嶂遶波光環匝翠煙浮興來樽酒隨時辦客散琴書盡日留爲問標題意何在一生心足是歸休次韻袁仲誠見贈解組清朝返舊鄉依然門巷接回塘閒身乍覺鳥聲樂緩歩重㝷花徑香多謝故人停桂棹何妨清夜醉霞觴新詩贈我光蓬屋十襲應同夏后璜再用喜歸亭韻晏子區區惜弊裘吾衰亦戀故山幽得歸更喜詩盈軸任逹寧須酒拍浮巳縱虛名身外去肯將俗物眼邊留只慚老􅀒君恩重結草他年報未休送張輔􅀸省試明詔搜賢動四陲西來一鶚冠羣飛擅場筆勢驚華省􅀤策才名上紫㣲無􅀒題橋平日志要看懷綬故鄕歸相逢肯惜傾家釀巳約鶯花御名勿違簡表仲誠覔芍藥花老來百計不相􅀜詩句雕鐫興亦䦨只有好花堪照眼從君聊借一枝看仲誠和詩四首又疊送花再用韻荅筆陣橫飛屢叩􅀜嚴兵夜戰迫更䦨好花多謝頻分我怯敵䰟驚未暇看避㓂舟中風雪大作扁舟避㓂艤山隈問捷江城信未廻犯夜號風驚夢破催寒飛雪送愁來三軍挾纊煩温詔百戰搴旗頼雋材巳辦磨崖頌功烈竚還生意􅀤春雷王伯壽示佳作備述窮苦次韻奉呈吟殘翻水筆生春秀句驚人字字新賦料楊雄誰可敵才高太白善無鄰清心鳴鏑増豪氣刮膜神箆浄俗塵唯有訴窮疑太過文章從古忌悲辛雪作朔風吹雪應嘉時蔌蔌空庭静夜知歲稔不須占瑞諜家貪尤喜映書帷花雖無艶難争巧舞不成行也自竒病起老翁迷眼界寒牕呵筆彊裁詩招親舊賞花名花朶朶向人開家釀沉沉旋撥醅咫尺晴川風更便追歡何惜片帆來安人生日聞道防秋􅁻語來生朝宴席爲君開黄花也似知人意争挽歡聲入壽杯聞大帥勇决直趨北界喜而作此牙旗動處擁􅆛貅直渡黄河塞草秋百萬胡兒陣前死肯教衛霍獨封侯次韻王周伯和應文詩先生詩興浩難收苦思俄驚兩􅁂秋變格競傳吳富體懷沙擬續畔牢愁㑹令後學輕焚藁消得時名號􅀝樓我老恨無青玉案錦囊分示􅀂爲酬應文監視刈穫有詩輙和一篇恐以一飽廢學因而勉之杖藜何日下西疇想見欣逢歳有秋可但聚糧供腹飽還應釀秫散眉愁决科佇看標金榜得路終期侍玉樓莫把光陰等閑弃一朝淸問要人酬九日用前韻間裏光陰逐水流重陽忽復故園秋休言白髮從教老試挿黄花也解愁感舊有時曾落㡌憑高無力更登樓昏昏病􅂴唯堪睡詩債休催未暇酬走筆戲呈世叔伯逹二親友老來無計了殘年只有歡情􅀉酒邉歌舞借看真逹士忍將朱戸鎻嬋姢次韻周伯見贈㓜子童孫乏寸長遷官同日􅀍榮光芝蘭瑞色來空翠南露恩言滿詔黄莫訝飛騰循九品㑹看毫末聳千章卽今天子􅀵羣策廊廟訏謨要主張用前韻百歲休誇日月長十分逾八歎流光精忠許國心猶赤老病催人髪巳黄扶杖毎聞宣鳯詔望雲無路仰龍章恢圖幸有臯􅇪在坐看朝綱萬目張次韻方守送進士下詔徴多士彈冠動四溟三場遵舊典八韻見明經勸駕勤州牧吟牋詫地靈春風歸路近衫色照山靑次韻周伯謝綿襖長篇最宜爲誥唐仲舒上林子虚漢相如喜君萬事􅂴着眼獨向文章情未踈家貧肯戀儋石儲船漏則巳那復袽素志蹉跎雪侵􅁂靑衫匍匐塵滿􅅂可憐虞翻屯骨相相逢呼我丈人行夜聞抵掌論開邉怒髮衝冠一何壯驦裘典盡終諱寒忍寒悲歌行路難綈􅂁恐貽范叔怒長篇忽拜烏􅁝䦨辭章典要古所尚餘子碌碌何足仰願君回筆頌皇猷偃武修文荅靈貺天子亟欲聞盡言前席還應虚黈纊老夫辭榮里居行年八十酒間謾成拙句二首述意而巳不以示外也莫笑樽前白髮翁曾􅀐竹馬戯元豐年彌八帙癡頑在身荷三朝寵眷隆綠野敢將前哲比香山幸有老人同興來尚欲㝷幽去收拾殘春杖屨中老病辭榮日月邉歸來擬作地行仙飛霜滿鬂三千丈止水觀心八十年松菊雖存堪􅀉傲干戈未定敢安眠君王宵旰圖恢復洗眼神兵策萬全親舊以老夫年及中壽旣辱臨况又多以詩詞相慶祝顧衰謝何以得之輙成鄙句叙述感悰老來光景去駸駸親舊應多惜老心傾葢義高􅀟白璧開函詩敵萬黄金催年生怕玲瓏唱醉夜寧辭鑿落深多謝慇懃祝彊健􅀉言衰病莫相侵老病蕭然華髮映蒼顔九帙開來第一年錬盡交游難諱老養成衰病却安禪新春巳􅀒登山屐舊賞空慚載酒船張緒風流那復少坐看飛雪弄晴煙送􅚚孫省試英髦雲集幾千人羣試争看藝絕倫一鼓搴旗先作氣三場下筆要如神决科無失靑氊舊拜賜重添緑綬新秀􅀤孫枝吾欲見夢魂巳到上林春次韻洪總領題花信亭得江樓二首誰爲傳花信新亭破睡風春回芳意早客到賞心同酒盞摇江渌詩牋照坐紅無由接歡宴危坐正書空二地勝宜樓觀臨江勢屹然橫波吞翠壁倒影挿雕椽老子難收興雲安未足憐由來詞翰手五鳯獨居前見華陽舊題刻石有感舊句入貞珉新題亦巳陳光陰如許速誰是百年人某上章辭免召命蒙恩矜許仍賜羊酒存問自念衰殘辱此異數不勝感天荷聖之情謹課成拙詩一首昧死飛章上九天懇辭嚴召卒餘年綸言寵念桑榆迫臺餽恩垂􅀨露偏異數一時真創見窮鄉萬口徧誇傳吾衰忝冐知難報結草它年敢避先用前韻召節煌煌下帝􅀜君王圖舊起高年露章懇避回天􅄩拜命歡呼壓地偏錫饌宰官侵夜到問安州牧置郵傳辭榮有耀人皆說誰解清時獨占先考妣贈官一時榮耀老懷易感輙敬書長句􅁝綸五色錦爲囊寵贈􅀟親廟室光位列三􅀌升極品名加大國啓新疆劬勞仰荷湛恩報精爽應知積慶長燕及子孫宜勉力忠勤他日繼遺芳送彦禮弟赴歙尉四首莫辭官小路間􅀜趂取春風穩着鞭無限淸時推轂手冲天何必待三年池塘春草促君詩阿緒風流絮欲飛滿眼吾家好風景正須相賞忽相違高才自是古梅仙綵棒何須向壁懸􅀳盗奔秦無一事爐董深炷好安禪空詩羞澁送君行老病難堪叙别情天假吾年未填壑它時猶及問歸程舊所乗馬老且瘠見之感懷人衰馬亦老不踏長安道筋力漸疲羸鞍韉謾華好見我勿嘶鳴爲爾動懷抱無復矍鑠時去去飽豐草夜思出處因作戲言仕路定風波人生能幾何時來聊試手爲瑞不宜多老來交朋淪謝雖婢僕亦無在者感舊忽覺凄然故交淪没水東流歳晚無人話昔遊飛絮落花何足道忽經風􅀨亦添愁華陽集卷第三十七畢
