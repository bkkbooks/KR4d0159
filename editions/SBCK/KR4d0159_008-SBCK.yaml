front:
  text: 華陽集卷第八
  hash: sha256:f6f077e0fb656a2e6718154a817a1c9255932a3d20be72eac080ff00a5ee576c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0159_SBCK_008-1a}
body:
  text: 金壇後學于孔兼校外制馮賽柴斌轉官換給國家賞典藏在盟府有功則舉輕重隨之具官某素以勇聞奮義不顧頃者秦蜀之役帥臣以便宜行事謂爾勞能可錄超進武階具名于朝用新厥命恩則厚矣可無報哉郭興贈三官朕以爾忠勇之資摧堅却敵視死不顧卒以身膏艸野良用嗟惻進官三等追録爾勤亦以慰爾地下之望趙思誠除中書舎人朕惟人主有立政造事之勤而無論思之助則動或失中有􅀤號出令之信而無制作之文則行之不逺孰能舉職宜圖舊人具官某秉德在躬克濟美于先世辭榮求志嘗晦迹于明時頃自丘園推登禁路論事能識大體抗強禦而不回代言真有古風見中和之自得去位旣久勞予所思其遂解于州麾俾亟還于詞掖朕方圖回大業力濟中興葢欲使朝廷凡幾微之事罔有愆違亦庶幾天下因播告之修識所好惡任責在爾將觀巳試之能服命惟新無􅀒見知之意范冲除宗正少􅀸人主㧞用賢能之士服在要途豈惟督責治功亦以率勵風俗惟爾名臣之子才術有餘澹然無求士夫高仰朕方御名叙皇族思欲追迹麟趾信厚之化而屬有攸籍官宜擇人徃列亞􅀸曰爾爲可勉赴朕命以舉伯臣之職庶幾典刑視效于親睦之教有助焉江公亮章傑倉部工部兩易其任天下之務總于六􅀸選建諸郞分􅊢迺事爾公亮爲司􅁃掌粟入之藏以待􅀖用爾傑爲司平掌五材九範之法以率百工葢版曹起部其屬雖不同至于委用則未始或異兩易厥任出于至公徃祗厥官毋替朕命孫注轉官換給付身朕嗣承大統澤流海内文武在服咸􅀍寵光具官某奮義戎行有年于此阻以道逺恩獨未及帥司旣以便宜升進武階具名來上俾更命渥載新爾榮徃其欽承思所以報宋孝先降兩官吏貪爲殘害吾赤子爾爲部使者坐視不問事􅀤驗治罪將奚逃黜官二等以爲外臺不職之戒尚從寛典省咎勿忘种濳轉官換給付身賞國之典藏在盟府出之無常輕重眡功具官某材勇有聞熟于行陣秦蜀之役丕績顯然帥司旣以便宜進爾横列之峻具名來上用錫贊書徃祗厥官益圖報稱曾楙轉官舜典陟明雖九官猶不廢于考績周官詔爵更三歲則大計於羣工眷予從槖之聮宜舉􅀖彞之舊具官某性資醖藉問學淵源在昔光明盛大之時則備獻納論思之職眷遇甚渥踐揚居多自均逸于祠庭巳屢更于歲籥比觀會課於法當遷俾膺爵秩之崇用錫贊書之寵徃服朕命益茂爾猷范同除祠部郎官吳次賔除刑部郎官六􅀸之職各有攸司豈惟分舉治功亦以待異日華要之選凡厥在服必取時髦以爾同學古有稽敏而練逹爾次賔效官惟謹多所踐更宜進陟于郎曹以佐吾宗伯司冦之事徃其率職嗣有寵襃張順孟㳙各轉右武大夫國家置武功官等秩不一而横列處其最高方時多艱名器爲重非有顯績不輕假人具官某勇聞一時出入行陣嘗從大將却敵有功迨今累年而幕府具名來上茲用錫爾賛書一新寵命以光戎壘以爲衆士之勸徃其祗服圖報勿忘巨振楊琳降官朕于武勇之士錫以高爵厚禄荅其勤勞至于干犯憲禁亦未嘗赦具官某統率戎旅屬吾大將不自謹畏過惡􅁀列幕府論奏顧安所逃罪哉尚從輕比姑禠一官服我寛恩勿忘省咎常同除起居郎朕惟天下士有以文學論議表見一時而風節不強不足與有爲也故凡㧞用群俊必先試所以難觀其遇事卓然有立然後寘之要地用能舉職厭服公言惟爾諒直多聞深逹世務頃自逺服擢居憲臺屢殫排撃之公坐致姦邪之戢是爲試可克協朕心兹用俾爾進直殿􅉾記予言動且朕卽位於今八年繫日之書缺焉未備方選儒學之士緒正逸典􅀂時記注實與纂修爾其勉舉厥官以謹書法庶使筆削之善有以副朕責成之意范宗尹除資政殿大學士知溫州朕時廵東南方􅀝維藩之固選建牧守葢先宿望之圖惟予輔臣越在外服宜遂分于重􅀉用允穆于師言具官某高明而有謀敏博而能斷亟際風雲之會蚤膺夢卜之求􅀂渉大川嘗歷艱難而求濟克勤小物每嘉弼亮以輸忠自違機柄之煩久卽祠庭之逸叔敖去相不悔旣譽處之彌休申伯以作爾庸尚藩宣之是頼眷迺永嘉之地實當海道之衝下酌民言正資撫御徒得君重少寛顧憂其升秘殿之華徃對分符之寵夫股肱舊德固宜一體以宣勞而膏澤下流豈待朞年而報政勉服休命克副眷懷虞澐除檢正朕惟東西二省政事出焉中書揆而議之門下審而覆之旣以二三大臣任其重矣則又爲之設屬每事稽考以助其不迨吾于是知檢正之職不可用非其人以爾敏秀而文多所殘更宣勞之著尤在都公茲用更錫賛書擢居要地夫一日二日萬幾是非當否所繫重矣徃祗厥服益究乃心晏敦復除左司朕惟煩劇之務剸裁必得其人如庖丁解牛技經肯綮無難焉則談笑之間無餘事矣惟爾奮由儒學雅以才術著稱佐吾銓曹事至輙辦兹用進爾宰屬究其設施夫詔條叢淆吏胥出沒不可不察也服我訓言徃勤厥職使夫游刃恢恢然有餘地則彌綸省闥之譽何愧于古張崇轉右武大夫國家置武功官等級不一而横列處其最高方時多艱名器爲重非有顯績不輕假人具官某素以勇聞習于行陣奮義不顧却敵有功宜升武秩之崇以勸用命之士徃其欽服思報勿忘藍珪轉内侍省押班朕惟宮庭之制則有司存奉出入起居之嚴申戒令紏禁之事恪恭乃職必惟其人以爾材智自將有勞潜邸御名宻以謹克慕忠規宜進長于班聮用昭示於寵渥尚思所報益勉厥勤􅀽正功除直秘閣與郡昔我仁祖嘗患群臣欲進者多而求退者少以問宰相王曾曾謂士人貪廉係時用捨惟朝廷抑奔兢而崇静退則庶幾有難進之風朕讀寶訓至此未嘗不三復興歎深念多故以來士風不厲正當逺稽前言以革流弊之末今爾任吾宰屬方以治辦稱于一時乃忽􅁣然力求􅀘外嘉其􅃐尚義當勉從芸閣華資用爲爾寵徃臨郡􅀉益茂厥修顯應侯加封普惠侯惟侯受職宅彼思靈大芘一方克有常享禱祈輒應逹于聽聞増錫徽章以昭其實朕命不易尚其欽哉蒙光仲等加上柱國逺處遐陬世懷忠順屬兹多故效節彌勤宜進勲階用昭褒寵徃祗厥命永固邉陲汪思㳟除吏部郎官主管侍郎左選文部四選皆爲劇曹而侍郎所掌七階之士尤號員冗必擇通材以爲之屬而佐其銓序惟爾昔嘗任此藹有能名稽諸僉言宜還舊服徃續巳試之效用昭申命之公夫二年居官十年待選自前世患之而今日益甚思革其弊在爾勉焉翟琮知壽春府惟古壽春形勝甲于淮右數更冦亂瘡痍未復尚虞外侮震驚吾民圖御衆之才徃任扞城之􅀉具官某明志勇略聞于一時厭難折衝厥有成績茲用分以符竹俾臨要地内則布宣德意安集于流亡外則震肅威名綏靖于彊場是爲稱職尚其勉之魏矼除殿中侍御史朕推大公之心闢衆正之路以收集士􅀋圖回治功其有弗協于極敗常亂政則責在御史府以法殫治之此風憲之任所以取重一時苟非其人不在茲選惟爾文學行藝見推士林頃自郞曹擢與六察氣節勁正凛然可觀茲用進陟殿中專以排擊官邪爲務夫明足以辨是非之實而勇足以行之則何事之不舉何舉之不當哉徃祗厥官毋虚朕意黄叔敖轉一官操利柄以斡山海之藏付之成法收贏貲以佐􅀖國之用責在有司旣殫效職之勤宜舉􅅷功之典具官某才周世務學嗣家風蚤升八座之聯獨擅一時之譽以版曹之餘暇兼筦榷以宣勞調盈虚之時濬利源而無壅考竒羡之入溢歲課以居多有嘉心計之良實濟軍興之乏肆疇美績俾進文階時乃茂恩徃其祗服高士瑰除直秘閣圖書之府芸閣在焉寓直其間皆一時雋秀是爲朝廷淸選爾以才術從軍有功􅂌此華資用爲褒勸夫帥司便宜之舉所以昭示至公具名上聞宜新寵命徃其祗服思報所蒙宋萬年轉一官時方用武正賴深謀有勞不圖何以爲勸惟爾奮由儒術洞曉韜鈐從吾將臣參計軍事用抗強敵屢􅀗戰多宜加進秩之恩以示懋功之寵祗服朕命圖惟厥終司寶梁嬌娘賜名從順轉郡夫人知尚書内省事法天象之明用建中臺之制贊路朝之治尤嚴内省之司爰舉徽章式圖􅀖媛具官某􅅚躬端靜迪德惠和譽久著于宮闈靡聞私謁身服勤于婦職常佩忠規有嘉淑御名之稱宜總綱維之政序之寵位錫以美名大䟽湯沐之封増重文昌之􅀉兹爲異數率由至公其益懋于厥官庶克諧于新命紅霞帔呂六六轉掌記楊二奴轉掌闈後庭衆治内職主之式序勞能具存舊典以爾祗勤宮掖夙夜不違進陟婦官用昭異數徃共乃事思報勿􅁯故宗樸改封惠王昔我皇族當重熈累洽之辰並建輔藩倣畫野分疆之制念閱時之旣久致疇邑之相重度義不安改封爲允具官某躬秉一德寵遇累朝方神祖之御圖推嚴尊屬以濮國之次子奄宅王封肆今遺列之存尚想宗英之盛眷予潜邸嘗胙􅀳康偶同壤地之名顧何嫌于異數然以嗣孫之請欲自避于殊稱爰徹爾疆宜莫如惠荒羅浮之勝地易隧路之新榮一品彌崇尚奚加于儀物九原未泯宜克享于徽章趙思誠轉一官朕以天官大許羣工之治惟時法從特循三歲之規迨稽閥以上聞卽推恩而增秩具官某静重有守諒直敢爲持槖禁嚴居􅀗論思之助分符便郡實資屏翰之良比載考于僉言方促加于嚴召適兹會課用進文階夫以積日較功雖由銓序至于褒賢錫寵豈限彞章勉圖厥勤以副朕意華陽集卷之八
