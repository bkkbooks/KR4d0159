front:
  text: 華陽集卷第九
  hash: sha256:831a321eb7e2edce407f5c9cd5a315cd6f7df75a9eaebff0118e975b97c96d0f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0159_SBCK_009-1a}
body:
  text: 金壇後學于文熈校表江東提刑謝到任表臣某言伏奉勑命差臣權􅀤遣前件差遣臣巳于閏四月十七日到任交割職事訖惟良折獄初未熟于刑書爲官擇人忽謬將於使指臣某誠惶誠懼頓首頓首伏念臣學無領略識不高明忝竊一官侵尋半世家家懷璞獨慚無實而得名一一吹竽庸敢抱虚而求進三遷中秘再直郎曹皆粗守于官箴迄無禆于國慮索長安之米懼尸素足以危身掛神武之冠恐艱虞不當避事偶叨除于鄉部姑待次于親闈宸綍四更歲陽七換貧窶方憂于家食歡呼勿奉于綸言就易鄰封便趨官次四郊多壘曾無􅀍堅執銳之勤一路觀風乃有攬轡登車之適夫何孱􅋘忽此遭逢茲葢伏遇皇帝陛下體乾徤之資撫離明之運求王道而忽于先務用人才而不以遐遺故雖僕遫之㣲亦預澄淸之選臣敢不夙夜率職審御名持心引古義以决疑自竭倪寛之學期有司之不犯用揚虞舜之仁兾􅀗㣲勞少酬洪造臣無任肆赦謝表臣某言今月九日准都進奏院逓到赦書一道臣巳卽時謝恩施行訖星文示戒深軫慮於淵衷聖澤推仁亟致祥于和氣歡呼旣洽精祲遂通臣某誠惶誠懼頓首頓首竊以天之垂象以見吉凶王者求端以考得失推于彼而有合于此知遣告之甚明應以實而不􅅚以文顧靈承之敢後宜正厥事以孚于休恭惟皇帝陛下上智膺圖中興撫運克謹嚴㳟之畏靡忘宵旰之勤念國歩之多艱感乾文而彌懼推占小異爰興罪巳之言肆赦遂行大布及民之惠災巳無忘國其有瘳臣敢不遵奉十行頒宣一路釋刑罰之􅁈濫旣逃失職之誅浹恩霈于寵洪庶廣好生之德臣無任進天申節銀狀右狀以長􅀤開祥誕彌紀節仰祝後天之算載修任土之儀前件物掌以非人藏諸外府備充庭于後列表方物以輸勤粹􅀂乾剛允符九五之德式如王度願續祈招之詩干冐宸嚴俯深戰汗除給事中謝表臣某言伏奉告命除臣給事中仍賜對衣金帶者平奏東臺義豈容于冐處懇辭中詔命莫反于巳行拜寵自天措躬無地臣某誠惶誠懼頓首頓首伏念臣務學不知師古居官無以瘉人庸虚誤簡于淵􅂨叨昧亟躋于華貫擢自古史掌四掖之贊書列于從班陪外廷之末議但尸榮禄何􅀘事功􅀟親闕奉于㫖甘累奏具陳于悃愊丐從孝養未頒賜可之音過軫皇慈乃辱甄升之寵况封駮之重任實詔令之所關爰資論議之公時正廟堂之失端欲稱職尤須擇人夫何甚􅋘之姿與此非常之選錫九環之寶帶身兼備乎服章拜靑􅃈之夕門地益親于禁宻得逾所望慚甚于榮兹葢伏遇皇帝陛下性堯舜之聰明躬禹湯之勤儉大收衆俊協濟丕圖官人盡棫樸之能咸歸有用代匱存管蒯之賤以責成功致此不才亦叨非據臣敢不激昻晚節勉勵前修論事不阿雖乏回天之力有言必告庶逃竊位之譏臣無任罷給事中提舉宫觀謝表臣某官伏奉告命爲臣僚上言罷臣給事中差提舉江州太平觀任便居住者彈章亟上敢意生全命綍寵頒姑從黜免荷恩慈之曲貸弔形影以深慚臣某誠惶誠懼頓首頓首伏念臣樸遬常材浮沉半世深惟薄􅋘敢有志於功名偶幸遭逢遂䆮叨于榮禄與一時侍從之選陪兩省論議之餘寵過所期報將奚稱雖夙宵黽勉曾莫著于㣲勞而過惡􅁀揚忽自罹於深譴退量駑蹇猥玷簡書適當艱棘之時上􅀒明揚之意禠東臺之職􅀌蹤旣逺于宸嚴從真館之遊百口尚霑于廩稍顧官間而身佚知罪大而責輕茲葢伏遇皇帝陛下蹈商周之克寛躬漢高之大度總覽萬㣲之要灼知三俊之心憐臣迫于奉親屢請去而弗􅀗察臣忠以事上欲寡過而未能特霽隆威但令省咎臣敢不洗滌心慮遵奉訓辭在􅅵畒不忘益勵愛君之志保桑榆暮景更修行巳之方臣無任楊楚冦退賀表元惡逋誅敢稱兵而入冦王師壓壘俄不鼓而自奔土疆復寧王威大振臣某誠歡誠忭頓首頓首竊以國家多艱妖孽乗時盗名字以欺天背恩不顧剝􅀺元而奉虜依勢爲強恊成兇悖之謀公肆侵凌之侮大逆不道從古罕聞固天地之靡容宜雷霆之赫怒上煩警蹕親御師干旣遣驍將以挫其鋒仍􅀝大江而固吾圉風聲鶴唳驚震疊之餘威蟻聚蜂屯忽散亾而争遁氛祲掃滅境于肅淸復收蕩析之民大布撫綏之澤神人咸喜宗社同休兹葢伏遇皇帝陛下神武布昭睿莫廣運逺稽世祖欲就昆陽禽敵之功近法真皇亟下景德親征之詔撫戎􅏧于禁旅廪靣筭以前驅志在蕩平務先特重謂上策莫如自治唯深溝高壘之圖故不戰而屈人兵得保勝全師之道臣身閒祠館望極丹墀外侮不庭旣却南侵之􅀐中原可復願歌北伐之詩除徽猷閣待制謝表臣某言臣昨任給事中以言章罷職差提舉江州太平觀任便居住今月一日伏奉告命以明堂禮畢特蒙聖恩授臣徽猷閣待制差遣賜如故尋具奏辭免准尚書省劄子奉聖㫖不允臣巳于二十一日望闕謝恩祗訖霈雷雨而作解旣蒙宥過之仁近日月而依光復冐隆名之寵罪如山積恩自天回命下無所措躬感深至於流涕臣某誠惶誠懼頓首頓首伏念臣學迂而􅋘性滯且愚蚤塵俊造之科名浮于實晚遇聖神之主用過其材高華驟躐于周行淸燕數承于睿奬不量叨昧自致顛躋念兹遲暮之年獨在譴訶之域上孤任使深愧平生置散投閒方迫衰窮之苦滌瑕蕩垢俄霑惠澤之施頒之明綸寵以異數身不去家而與鴛鸞次對之列禄足以飽而從香火奉祠之遊誰謂危蹤克膺殊眷兹葢伏遇皇帝陛下配天同德與物爲春閔一夫之向隅開三靣以祝網謂嘗服御載收簮􅂂之遺還􅂌恩光使畢桑榆之景臣敢不欽承命渥益勵身修􅀘劓息黥幸復全于玷缺摩頂放踵當永誓于靡捐臣無任紹興六年車駕廵幸起居表臣某言臣㳟聞車駕廵幸巳進􅀤至平江府蹔駐淸蹕者親屈萬乗大廵六師天歩載康皇威克振臣某誠歡誠忭頓首頓首㳟惟皇帝陛下纂承丕緒圖復中原虎士雲屯將啓前茅之慮玉車雷動俯勤細柳之行昭聖武於百蠻示恩威于諸將八神警蹕協豫順以乗時六轡如琴仰乾行之應律臣職居祠館班隔外庭効駕展軨莫備驅塵之列望雲就日徒傾嚮闕之心臣無任紹興六年冬至賀表臣某言四序宻移肇啓初陽之候萬方來賀備陳亞歲之儀臣某誠歡誠忭頓首頓首㳟惟皇帝陛下體道御時配天立極黄鍾旣應迎恊氣以横流清蹕所臨萃諸福而畢至臣叨恩真館投迹窮鄕稱觴莫預于周班傾藿徒存于魏闕臣無任紹興七年元正賀表臣某言淸臺考曆綂三朔以開元象魏布和詔萬民而觀治臣某誠歡誠忭頓首頓首恭惟皇帝陛下乾符載錫寶運重熈聿求王道之端克協人時之正四方來賀旣與物以爲春萬壽無疆宜從天而難老臣叨恩法從芘迹真祠遙想鴛鸞莫預周行之集並遊麋鹿惟均率舞之歡臣無任徽宗皇帝升遐慰表臣某言臣伏讀詔書恭聞云云禍降自天悲纒率土臣某誠悲誠感頓首頓首恭惟皇帝陛下久居孝養遽宅大憂哀慕無窮聖惟難處願深思于付託宜少抑于悲摧克合禮經以幸天下臣限以職任在外不􅀗奔詣闕庭臣無任紹興七年再任宮觀謝表臣某言臣昨爲宮觀任滿具奏陳乞再任續奉勑命候今任滿日令再任臣巳卽時望闕謝恩祗受訖身閒竊祿深愧㒺功秩滿自言猥叨申命荷皇慈之曲􅀍感危涕之横流臣某誠惶誠懼頓首頓首伏念臣蚤以謬庸誤膺簡㧞持紫荷之槖嘗􅀗近于淸光拜靑􅃈之門䆮不容于公議過􅀩全度姑聽罷歸復聮次對之班更􅂌真祠之逸歲月易得俄見迫於終更貧病交攻妄欲仍于舊貫用傾危悃仰叩清􅂨方虞冐昧之干誅忽辱矜容而賜可職雖不改命寔維新得禄足以代耕益助庭闈之養有官而無課最荐修香火之緣揆厥所蒙其何以稱茲葢伏遇皇帝陛下至神黙運盛德兼容常以佚道而使人豈于匹夫而求備謂木卷曲而不中繩墨本自弃材知馬虺隤而難以馳驅忍令更駕俯聽就閒之請大推從欲之仁故使餘生亦均殊遇念此難虞之際獨居僥倖之多問舎求田詎敢卽安於私計捐軀殞首終期効死於他時庶竭㣲忠少酬洪造臣無任紹興七年車駕駐驆建康起居表臣某言臣恭聞車駕廵幸駐驆建康府者載移清蹕爰宅近都萬􅀐天臨見上聖憂勤之至庶􅀖風動知中原恢復之期臣某誠惶誠懼頓首頓首㳟惟皇帝陛下神武布昭睿謨濬􅀤内修五禮稽虞舜之時廵外整六師法周王之於邁用涓穀旦聿臨大江不辭馬上之勞坐得域中之勝紹復先王之大業與時偕行再㑹諸侯于東都指日可待臣奉祠有守扞牧牧靡皇浮天時而不懷徒誦盤庚之作居江海而何有唯存魏闕之思臣無任丁父憂服闋從吉再任宮觀謝表臣某言臣今月十七日伏奉勑命以臣前任左朝奉大夫充徽猷閣待制提舉江州太平觀緣丁父憂服闋從吉特蒙聖恩授臣依前官職改差提舉亳州明道宮任便居住臣巳於當日望闕謝恩祗受訖釋三年之䘮未忘哀慕拜九重之命遽復官聯不自意其餘生尚仍叨于舊寵危悰易感哀淚交流臣某誠惶誠懼頓首頓首伏念臣禀生多艱于世寡合偶值中興之運誤膺上聖之知頃自常僚擢升華貫遭時見用欲自効于孤忠當官而行殆難堪于衆怒仰蒙聖度深諒愚誠俾聮次對之榮退處真祠之逸方杜門而求志俄陟岵以纒哀畢此䘮期絕無生理山塋路熟身從麋鹿之遊禁籞天高望絕鴛鸞之列豈伊朽質上軫洪慈俯矜荼毒之餘加惠龍光之厚官不易舊命實維新自視庸虚重慚忝冐茲葢伏遇皇帝陛下化育萬物允􅁵百工用人惟巳而不以遐遺以道觀能而各有攸處臣朴忠自信昔嘗入侍於淸光知臣病瘁可憐故特寵還于異數家食無事功之責責母慈足甘㫖之歡天地隆恩固難圖于報謝桑榆暮景徒求誓于糜捐臣無任紹興十年明堂禮成賀表臣某言臣㳟聞九月十日明堂禮成大赦天下者大享合官禮儀旣備受􅁵宣室慶賜遂行臣某誠歡誠忭頓首頓首竊以國有常經祀爲大事稽九筵而定位莫尊王者之堂間三歲以陳儀用拯聖人之孝㳟惟皇帝陛下廣堯舜之仁義恭禹湯之儉勤道格皇天靡怠靈承之志功歸烈孝聿修嚴配之儀彌文咸秩于舊章精意克昭于大報神祗來饗福禄並膺逖惟萬􅀖之歡永頼一人之慶臣叨官禁路竊食祠庭禮有執膰莫預駿奔之列欣同擊壤徒深抃舞之情臣無任華陽集卷第九畢
