front:
  text: 華陽集卷第七
  hash: sha256:dbebe8790917b478a5e385655d04f9747351bfc8896b69c28743cccb793b9ed1
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0159_SBCK_007-1a}
body:
  text: 金壇後學于文熈校外制汪藻轉一官朕于名器不以假人惟時賞勞則靡所愛故雖嚴近之列有應公令猶加襃錄葢所以勸也具官某以文章得名而能逹當世之務以氣節自勵而不忘憂國之心厭直承名徃臨藩翰政平訟理百姓和樂有西京循吏之風比以軍儲闕供下郡國平價以糴而能悉意奉公承詔􅃐辦朕甚嘉焉其進一官以爲任職者之寵祗服休命益勉厥勤陳桷除起居舎人朕􅁣念艱難以來士風不兢媮薄之俗勝而馳騁進取之習日滋故于用人尤御名厥與方將迪簡在位取其沉厚之德靖㳟之操以革斯弊而振起之惟爾文學之富蚤掇殊科克勵才猷以蒙器使自歷中秘陟郎曹葢二紀于兹一時軰流咸見㧞用廼獨退然不以屑意朕方嘉其有守而譽言日聞是用付爾史筆俾聯法從之班以職記注之事夫華要之選非獨爲爾寵也欲使縉紳明識朕意知所􅃐向焉益勉厥修無􅀒眷奬邵溥瀘南沿邉安撫使兼知瀘州朕宵衣旰食思濟多艱不敢一日輒忘彊場之事故選置師帥必惟賢能建威消萌用寛憂顧具官某奮由儒學允蹈古人輔以才猷表見當世念去禁途之乆旣嚴召節之頒載考僉言宜膺煩使惟瀘川地接夷族控制西南朝廷藩翰得人爲重今朕􅂌爾以中權之寵徃殿厥服爾其深體德意御名守教條無以地僻俗陋而鄙夷之使夫並邉列城兵民咸乂是爲稱職尚勉之哉趙起魏珍各轉一官朕以驍將扞邉爲日滋乆來赴行闕有嘉勤勞矧其偏禆協忠國事遠勒部曲可無寵褒其叙進于武階庶有光於戎律徃服休命尚勉圖功張成憲除金部郎官宇文師瑗除駕部郞官中臺六􅀸總治衆務郎爲之屬其選甚高爾成憲才術之優見于已試爾師瑗縉紳之譽藹然有聞司珍駕曹宜以分命徃其懋勉嗣有寵遷景興宗轉三官換給付身頃者秦蜀用師權在主將得以便宜行事謂爾有勞可賞且復㑹課當遷就進文階亦以久矣兹用錫爾贊書新厥寵命徃其欽服尚勉圖功劉子羽散官白州安置朕􅁀兵露師經理秦蜀置將不善功潰于成由引用之非人遂同惡以相濟誤國甚矣罪奚可逃具官某本非庸才乗於艱運謬竊逾涯之寵䆮成妄作之凶方朝廷􅀝重元戎聽幕府自擇叅佐首以憸佞賛其機謀昧攻守之良圖恣剛愎以自用協持上下莫敢誰何富平之師一敗塗地旣自耻于失策欲移咎于他人隂肆䜛誣濫行斬殺坐令將士卒至叛違迨嚴召以促還乃卧家而自便觀其寡謀輕敵雖惡有所分至于慢上侵權則咎將誰執其以散秩徃居遐荒尚堅循省之心毋􅀒生全之賜程唐落職宮觀腦詞同前具官某材無寸長志欲大用專事權要䆮加顯榮謬爲屬於戎昭曾靡遵于廟勝富平之舉朕甚悼焉以䛕佞濟輕脫之謀以殘忍成覆亡之禍生靈塗炭職汝之由尚復何顔更臨藩翰覽彈章之來上知公議之弗容其鐫延閣之華徃食眞祠之祿是爲寛典母怠省愆趙鼎加恩朕日者昭事上帝大享合宮秩將禮之文旣荷三靈之眷推慶成之澤爰䟽百辟之恩矧乃洪儒爲予近弼方有資于同德其敢廢于舊章具官某才周而識明器逺而用博忠嘉自奮屢陳經世之謀謇諤有聞獨著立朝之節一自登于樞輔再分領于帥權坐申廟勝之威益峻嚴瞻之望肆加嚴召入賛于機衡正賴明謨用寛于宵旰念縟儀之旣舉宜慶賜之惟均亟命有司式敷異數俾増封于爵號併申衍于爰田夫尊賢顯功所以錫便藩之寵而憂邉思職尚宜圖康濟之方祗服訓言以稱朕意張頴劉彦適降官持節一路以繩責郡吏部使者職也爾由選掄將漕廣右而縣令貪墨乃置不問朝廷耳目之􅀉尚何賴焉貶秩二等姑示薄懲徃服寛恩勿忘念咎趙進之轉官換給付身川陜用師一時官吏付之元帥使以便宜黜陟葢嘗謂爾有功可錄進主兵團兹用更錫贊書新厥寵命徃其歛承圖報勿忘潘長􅀸潘粹􅀸轉一官遷團練使朕欽念泰陵在宥之德昭慈保䕶之功實萬世永賴而吳國諸子是爲外孫備歷險艱來赴行闕此寵榮所宜及也進官一等仍􅂌使名尚勉厥勤以副朕崇􅅄之意周綱姜師仲除監察御史士有卓然以氣節自立于世然後能有所爲矧吾中執法之屬任國風憲以督察百吏爲職則爲官擇人非有立者不在兹選爾綱嘗任言責閱試巳孚爾師仲行巳直方見稱多士兹用並擢御史以舉六察之政考之公論匪爲爾私徃服訓言益堅所守王綰除石司中臺萬事之本天下之休戚繫焉方時多故詔勑文書倍于疇昔雖以二三執政提其綱維至于左右周旋剖决留事則責在其屬以爾燭理明而不惑遇事審而有斷郞曹更踐閱歲滋多蔚有休聲逹于朕聽兹用擢居宰士以彌綸省闥徃共厥職益務恪勤庶幾稱朕所以屬任之意呂聰問除吏部郞官張銖除考功郎官李元瀹除度支郎官朕㧞舉羣材以備官使惟時郞位其選甚高凡列職於其間必考實于公論惟爾聰間名德之後文雅自將銖才術兼優能治􅀖計元瀹爲屬憲府藹然有稱皆宜進陟顯途是用各加褒擢徃踐厥服益􅌗爾猷蘇􅂝除檢正朕惟東西二省政事出焉中書揆而議之門下審而覆之旣以二三大臣任其責矣則又爲之設屬以助其不迨吾於是知檢正之職不可用非其人以爾氣稟粹温臨事敏逹郎曹􅀸寺多所踐更比嘗命列司宗之貳而議者謂爾相臣之子嗣德有耀朝廷政體生長見聞是宜更錫賛書擢此要地夫一日萬機出納當否所繫重矣徃祗厥服益究乃心呂聰問除宗正少􅀸堯御名九族周尚同姓千載之後協和輯睦之風可以想見朕甚慕之肆求時髦叅典屬籍庶幾紏合之義無媿于古以爾名德之後儒學自將越在外服蔚有休譽比嘗召對便坐觀其論奏有合朕心擢亞伯臣公議惟允惟昔宗寺圖諜于今僅存襃集闕遺以昭穆親踈之序則爲爾職尚其勉之陳桷除太常少􅀸左右史記言動之實地聮禁近奉常長貳專禮樂之任班秩甚高朕爲官擇人各使效職攸司雖異易地則同爾比由望實之孚入直螭陛乃以親聮宰輔引嫌自言方兹公朝重違其意擢亞􅀸列主吾曲臺夫以直筆叙事之才而付之討論制作之事葢優爲也徃服朕命益究爾能王居正除起居舎人唐制兩省屬皆可議朝廷事其責重矣而况左右載筆記人主言動實爲異時法從之選式序在位尤難其人惟爾問學淵源論學勁正昔嘗入直螭陛固以任職著聞比自侯􅀖擢貳􅀸列㑹吾記注引嫌自言求稱厥官兹用命爾易地以處夫奉常班秩雖峻而職淸且近史實兼之徃祗服于新恩益勉修于舊物湯東野落職宮祠朕選建牧守外作翰藩有兵有民任責爲重償悉心于撫御庶少寛于顧憂具官某蚤以材能登于法從維揚謀帥初謂得人當兵火瘡殘之餘付還定安集之政所宜夙夜務稱厥職而乃坐靡嵗月績效弗昭致使一方坐弊尤甚宜黜隆名之寵徃從祠館之游尚服寛恩毋忘循省吉俊􅀘官換給付身爾頃以武勇自奮從軍秦蜀主帥謂其有功福秩甚峻録名來上更名爲真徃服寵榮益思報効宋孝先起復知楊州維揚古都㑹控淮帶江綿地數千里厥今屏翰之􅀉視他鎮爲重兵火旣息餘民出于塗炭凡厥師帥豈獨任吾折衝禦侮之責而撫綏瘡痍朕心尤所深念以爾久蒙器使中外殘更决滯務于都司贊深謀于督府皆有聞焉朕思得䟽通敏博之士經理淮甸爾雖以憂去職義當奪情錫兹賛書徃殿方靣率勤儉以勸生業推恩信以安衆心在爾勉之予不多訓謝伋除祠部郞官温州主管神御朕時廵東南欽惟宗廟未􅀗妥靈肆命有司奉祠于近郡以爾冬官之屬敏肅而誠宜陟氷㕔徃以從事詩不云乎温㳟朝夕執事有恪尚其勉之副予休享之意曾紆降一官朕分遣重兵宿屯要地惟時給餉責在漕臣爾才智聞于一時何獨至此而不加勉使吾􅀍堅之衆行有乏食之憂主帥以言良咈予􅃪貶秩一官姑示薄懲徃服寛恩尚圖來効程千秋起復知岳州巴陵控引江湖居國上游兵火搶攘之後政失其經民未復業今欲外彊屏藩内安流離貴在守臣其可不御名以爾富于才術嘗試爲郡考其績效綽有能名兹用起從􅀝廬之中委以專城之􅀉奪情以義宜遵有國之常規當官而行尚茂折衝之遠略郭師中轉刺史依前武功大夫換給付身朕嗣承大綂文武之士咸進厥官今旣八年而帥司謂爾恩獨未及升刺舉之號以聞于朝是用更錫贊書載新寵命徃其祗服思報所蒙楊揆降官朕惟淮楚與敵爲鄰爾爲守臣凡疆外之事義當專逹乃不以聞違詔漏言皆汝之咎貶秩二等聊戒慢官益勉所圖以􅀘前失徐俯除端明殿學士宮祠憂勤圖治時方急于任賢左右近臣義豈容于去國念有均勞之請欲高易退之風宜狥懇祈更全體貌具官某氣節不撓辨論可觀蔚有譽于當時期力行于素志起從踈逺亟聯從橐之華度越軰流遂陟樞庭之峻閱時未久􅀍遇非常庶觀整軍經武之謀折遐衝于萬里抑賴同寅協㳟之助圖大政于一堂顧屬任之方深曾設施之未究奏章俄上引疾甚堅肆推從欲之仁曲示優賢之禮殊庭厚祿秘殿隆名匪曰朕私用榮爾去或出或處諒不替于憂時嘉謀嘉猷尚毋忘于告后章傑除工部郎官朕惟百工之事皆聖人作也述聖人制作之意考治百工而使咸精其能是謂有司之職以爾才智明逹風力敏強將漕外臺蔚有休譽宜遂進登郎省屬于冬官以修五材九範之法克㳟朕命嗣有寵褒彭玘贈吉州團練使戰則死綏將帥之事也比年兵政不修望敵奔潰者十常八九朕方整軍經武欲以激勵士氣有能披堅執銳奮不顧死則褒崇之典其可後哉具官某資稟忠義志摧姦兇獨當喋血之鋒遽致隕身之禍有司具奏朕甚痛之其正序于戎團庶追榮于幽壤䰟爽如在尚克欽承華陽集卷第七畢
