front:
  text: 華陽集卷第十五
  hash: sha256:75a9b33ee635532661933e2c3f2c2967126209496dcc6b9df4aa8ce80f8c2eb1
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0159_SBCK_015-1a}
body:
  text: 金壇後學于文熈校劄子乞舉將帥劄子給事中時所論臣聞三辰不軌擢士爲相蠻夷不㳟拔卒爲將仰惟陛下勵精求治士之懷材抱藝者莫不以次進用獨將帥之臣推擇未廣方今夷虜尚熾邉陲未能徹警朝廷所恃以􅁍敵禦侮者不過大將數人而巳各據要害按甲休兵則未見缺事萬一烽火四起必將分道出師前擊後援􅀂非備豫何以應卒故臣謂爪牙之選在今日尤當拔竒取頴以防緩急夫前世經武之事毎不乏人者不必皆取良家子苟其材智勇略足以葢衆雖在㣲賤擢寘三軍之上不以爲嫌所以販繒屠狗盜賊奴􅀠罪亡之餘率爲一時名將國家自艱難以來兵氣未振然不可遂以乏材厚誣天下竊意韜略之士固有沉埋困躓姓名不得上聞者正須上之人篤意求之耳臣愚欲望聖慈特詔中外文武臣寮廣行捜訪有能練逹戎律熟知虜情忠勇可備將帥不問有官無官或隱於山林或見在行伍卽具姓名聞奏然後召問審考不次擢用庶幾如古拔卒爲將之意取進止乞修戰船劄子給事時所論臣竊觀自古興師却敵阻江河以爲險則水戰之具不可不備岑彭以樓船露橈斬任滿於荆門周瑜以蒙衝鬬艦走曹操於赤壁此巳徃之明驗也邇來朝廷講究防秋之策不爲不熟唯水軍一事未有措置臣固未論其他且以臨安言之車駕駐驆於此邉江接海舟楫之利最爲􅂃急舊有戰船不少樓櫓器械亦略具備今旣歲久徃徃破壞置之枯河悉不可用逐舩篙工戰卒又復取其健者分􅀠諸將目今但存空名萬一倉卒有警乃始簡料久廢之卒而修葺旣弊之舟其爲計晚矣傳曰不備不虞不可以師近日邊陲探報尚未寧息所以備禦之方政當毎事儆戒况虜情難測左實右僞聲東擊西其出沒雖逺在江湖千里之外安知猪突豕勇之計不出於吾指顧之間是則海道迅􅄩尤須過於隄防臣愚欲望聖慈特詔有司將行在戰船棹卒􅄩行修治令綂制官糾集訓練以備不測所有其餘沿江舊有水軍去處亦乞劄下所属施行取進止論三衙兵少劄子臣竊觀漢周勃以北軍安劉氏唐李晟領神策收復京師此皆天子禁兵入衛王宮出扈乘輿所以張皇武威遏絕姦穴一旦緩急取之左右足以勘難國家自祖宗建立基本尤以三衙爲重方今盛時所總􅆛虎之士無慮數十萬艱難以來闕額不􅀘軍政蕩然名存而實廢陛下時廵方岳駐驆之地當使兵衛森列盛於平日而尺籍伍符廼益加少未聞有所措置方今外有不庭之虜内有竊􅀤之宼而所謂五軍者雖冠於神武之名營屯輦轂要之皆出戰之士至於扈蹕以彊天下則正屬三衙是謂天子爪牙之任昔叚秀實有言猛虎所以百獸畏者以有爪牙也爪牙廢則狐豚特犬悉能爲敵可不深念哉臣愚欲望聖慈特詔大臣取殿司及馬歩軍兵籍斟酌多寡講求􅀘卒之法務得驍銳勇果之衆專一訓練以嚴􅀫衛之列庶幾國勢内重陰有以折姦雄之心天下幸甚取進止論黨籍之家推恩泛濫劄子臣聞錄􅁈恤􅀌振淹拔滯帝王之盛德徃時元祐臣寮子孫流落困躓陛下憐其名族不遭曲加恩惠德至渥也然臣考之黨籍見於䂖刻者三百餘人前後推恩巳多而來者不止逓相援例無有限極或白身不試輙命以官或先次注授不問資格一門之中旣及其子􅀂孫又復旁連弟姪由是上則多泛濫之寵下則啓僥倖之門原其始也本欲加惠忠良之後及其行之稍過則不能無弊臣以謂黨籍之家固宜有以優恤之但不可不爲限制方今吏貟猥多銓曹無闕可擬􅀂更以此占奪名次則􅀌寒平進之人愈見留滯臣愚欲乞詔有司將元祐黨人擇其顯有名德者方許子孫陳乞恩例一次今日以前巳經推恩者不得再有陳乞其間人才卓然可用自當别聽推擇區區管見冐瀆聖聽如有可采伏望特賜􅐶㫖施行取進止論公道劄子臣聞人材治世之具賞罰勵世之柄是二者其權制於人主而所以行之則責在大臣用人材而行賞罰其要不在乎它曰公而巳矣惟公則能生明一措私意於其間必將昧於所見顛倒錯繆未見其能治也葢用人材而不公則宜退者進可用者斥是出於私好惡也何以示甄别行賞罰而不公則爲善者不見錄稔惡者或幸免是出於私喜怒也何以示勸懲書曰以公滅私民其允懷􅀂乃以私滅公則積日寖久毒流於下民將胥怨何懷之有臣竊觀陛下總攬權綱􅁣然獨斷則前日不公之弊無患於不革然臣尚慮左右玩習之久未能盡絕私意精白以承休德欲望聖􅄌特詔一二大臣專以至公之道經綸天下人之賢者雖讎必舉其不肖者雖親必黜高爵厚禄旌有功則勿吝嚴刑峻罰當有罪則勿恤如是而日御名一日無或致忽於其間則朝廷之上舉動皆合於公論庶幾無􅀒陛下委任責成之意取進止論守令害民劄子臣聞張官置吏凡以爲民也陛下勵精圖治勤求民瘼詔書爲民而下者十常八九非不丁寧懇切而州縣官吏奉行不䖍尚多背公營私剥下媚上恣爲貪虐略無忌憚致使斯民日受其弊無所赴愬爲縣令者害及一縣而太守不敢誰何爲太守者害及一郡而監司未嘗按􅀤葢自比年以來上下相蔽習成此風恬不知怪臣愚欲望聖慈特降詔㫖遣清彊官循行天下以察訪吏治夫遣使之意止欲慰安􅀺元不必張大聲勢以致騷擾所過郡縣問民疾苦受其詞訴饋遺燕犒一切杜絶庶革請託之弊以專發擿之公其監司及州縣官吏不能宣上德意而爲民害者具姓名申奏悉行罷黜葢方今天下之事上􅀜聖慮者非一然以臣觀之安民情固􅀖本莫先於此儻遂施行天下幸甚取進止乞除民事一條劄子臣聞立法所以防姦法旣具矣又増益之則條目苛碎而猾吏得以舞文姦必愈甚臣竊見祖宗以來愛養生民唯恐貪殘之吏有以傷之故立公私􅂍罪三等之法俾吏部量其所犯而限其注擬行之旣久輕重咸得其當頃因臣寮建議遂増置民事之科應緣民事􅀍罪者並不得注知州軍通判知縣差遣夫守令通判親民之官苟有所犯未有不干渉於民者使其人實由姦貪而犯􅂍私之罪則坐以重法固不足䘏萬一素行廉勤偶陷公過而或傅致於民事遂令終身不入親民之選則人才必有廢弃者豈不重可惜哉又况刀筆之吏因此執疑似之迹故生沮難或致交通賄賂爲害不細臣嘗取吏部民事條令觀之始於紹興六年而相繼申明衝改議論紛紜至今猶未止也葢天下皆知其不便唯一時權臣欲專予奪之柄故不肯遽罷但令申取朝廷指揮殊不以紊亂祖宗法度爲意臣愚欲望陛下特降睿旨將吏部民事一條早賜蠲除所有百官注擬及公私􅂍罪格法並依舊制施行庶幾法令簡明易於遵守取進止乞重監司劄子臣竊謂今之監司乃古部刺史朝廷付之一路所以督察守令其權不爲不重夫守令之治其大略有七一曰宣詔令二曰厚風俗三曰勸農桑四曰平獄訟五曰興學校六曰理財賦七曰實户口使守令得人而七者皆舉天下無餘事矣苟不得人則按􅀤之職實在監司故夫論治道者謂得百守令不如得一監司比年以來所在守令姦貪不法未嘗見監司有一按􅀤者此無他葢由用非其人或以資淺望輕而不敢誰何或以識暗才劣而不能廉察至於觀望權勢則方且奉承之不暇交通賄賂則爲之委曲以相容夫爲一路刺舉之官而失職如是則守令之無狀固不足恠守令旣無狀而欲七者之治皆舉亦巳難矣臣愚伏望聖慈特降􅐶㫖今後監司有􅀜須擇七品以上淸望官或曾經朝廷擢用或曾任郡守治狀顯著者爲之所貴位望兼重而可以付之權才能巳試而足以舉其職守令皆知奉法不􅀒陛下宵旰圖治之意取進止乞審聽察劄子臣伏覩詔書以星文示變上軫聖慮許士庶實封陳言又令諸路監司郡守條具便民寛恤事件聞奏仰見陛下嚴㳟寅畏克謹天戒亟欲消變復臻和平天下幸甚然臣竊謂求言雖易聽察爲難詔㫖流行四海之内皆將竭忠盡誠爭獻所聞事有利害固無患壅塞而不上逹也旣又分命有司看詳其說則是非混淆亦不必慮而臣區區所見尚恐踈遠之人銳於納忠設意過當有彊出新意而至衝改祖宗舊法者有取便一時而行之旣久不能無害者有貪蠲復之名而不以用度較之致州縣不免暗取於民者􅀂此之􅀋自非深思熟慮實難遽見臣愚欲望聖慈明詔有司凡看詳羣臣所上章奏必須審御名究極事情不得一切苟簡更乞萬幾之暇躬垂省覽唯不悖戾祖宗舊法可以經久而實惠及物乃聽施行庶幾事體稍重動合人心而和氣可召災異非所憂也取進止辭免除參知政事劄子臣今月二十五日伏蒙聖恩除臣參知政事特降中使宣押赴都堂治事者臣聞命震驚㒺知所措伏念臣資本庸陋齒迫衰殘頃巳辭榮絕無進望陛下俯憐舊物召寘銓曹雖竭疲駑謾淹歲月方懼曠瘝之責敢希超躐之除况此邇臣與聞大政允謂機衡之要地必資英博之竒材非臣空踈所宜叨據伏望聖慈推仁從欲爲官擇人收還誤恩以允公議臣無任懇祈激切俟命之至取進止辭免再賜對衣金帶鞍馬劄子臣蒙恩除參知政事今月六日正謝又蒙聖慈賜臣對衣金帶魚袋鞍馬竊緣臣􅀍命之初巳經宣賜今兹豈敢再冒龍光伏望陛下察臣庸虚之資方辱高位念臣盈滿之戒難當異恩特降㫖揮追還所賜臣無任惶懼俟命之至取進止華陽集卷第十五畢
