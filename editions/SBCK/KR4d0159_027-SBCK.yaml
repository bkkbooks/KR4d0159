  text: 華陽集卷第二十七
  hash: sha256:8efa07f509cdd8e44f21f30c200b2f2b710e28bb2b15a71bba1cc62fdf9ee6b6
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0159_SBCK_027-1a}
body:
  text: 金壇後學于文熈校啓與馬運使啓折獄致刑欲革放紛之弊奉指銜命猥叨欽恤之司自惟非材幸竊餘芘恭惟某官德名重於國器文譽藹乎時髦簡在宸􅂨屈臨漕計積紅腐於九歲巳高流馬之功奉紫泥之十行佇復富民之拜不圖朽質獲近英標冀辱奬提粗逃癏曠决䑕牙之滯訟念方愧於平反附驥尾以追途尚或希於致遠與陳運使啓衰病餘生顧何堪於禄仕澄清重􅀉竊自懼於顛隮恭惟某官問學得之淵源才猷敏於經濟欲試幾㣲之務暫淹飛輓之勞底御名􅀖財巳見錢流於地上趣歸禁路佇觀詔下於日邉曾是陳人獲聮治部䑕牙决訟深慚行露之歌鵬翼摶扶願假垂天之蔭回趙提􅀧啓臥疾鄉閭莫遂挂冠之請按行獄市徒増攬轡之羞尚幸庸虛仰依明哲恭惟某官受天間氣爲國老成蘭省潜郎藹聲華於士論蓬山仙伯獨領䄂於英游惟其多開物成務之材故欲展富國彊兵之術鍾官咸􅁬寶藏滋興佇聞馹詔之頒歸踐鴛行之寵豈伊朽質獲近餘光登元禮之門念進趨之匪遠倒陳遵之牘辱襃借以彌勤適方在行不卽裁報回宣州張守啓衰病餘生杜門巳久澄清重寄攬轡奚堪欲稍緩於曠癏幸宻依於明哲伏惟某官學窺聖域名右漢廷直指遺風吏識乗軺之舊剖符新政人推臥閤之賢遠圗暫屈於州麾異寵卽歸於禁路顧玆頑鈍夙仰聲猷邈爾治封未講郵書之好藹然謙德先貽衮字之襃欽佩過情重慚不敏回建昌朱守啓登孟博之車量材曷稱倒陳遵之牘荷意惟勤適將命以在行愧占詞之弗謹某官風雲逸足霄堮垂光龍馬􅀒圖聮内閣􅃉嚴之直鹿車方道廣侯􅀖惠養之仁念久去於蓬山冝卽歸於禁路豈伊晚節獲覘餘光疇昔論交尚紀緒言之益撝謙下逮猥先翰墨之頒足未及於踵門心巳傾於望履與池州葉守啓伏審光奉明綸寵臨巨屏妙簡西清之列暫分北顧之憂下車云初闔境相慶恭惟某官道貫三代學通九流屢更藩翰之勤綽有神明之政矧池陽之名郡當江左之上游兵火仍灾痛創殘之未􅀘閭閻復業仰慈惠之方深行聞臥閤之功遂促追鋒之召某禀生甚拙慕德惟深將命在途漸喜封圻之近造門有日卽諧雲霧之披回太平許守啓伏審光膺宸綍懋建州麾仰師帥之得賢措兵民於無事歡呼所至遠邇惟均伏惟某官忠嘉夙簡於上心才術更優於時論藩垣借重拯黔􅀺於塗炭之餘樽俎折衝驅盜賊於笑談之末雖下車之日未久而閉閤之風巳高將促召於鋒車遂進儀於禁路顧兹庸􅋘竊服聲猷銜命于行尚阻膺門之謁鳴謙下逮猥先蕭牘之頒拜賜則優感銘􅂚旣與饒州李守啓􅀒薪嬰疾將待盡於餘年􅄃轡之官遽叨榮於一路自視衰遲之迹尚依明哲之光恭惟某官抱王佐之偉材明國家之大體進儀禁路專史臣言動之書出偃侯藩著循吏撫綏之政閱時未久雅望益隆豈容臥閤之堅行趣追鋒之召敢圖晚節獲並英游奉指不才莫决鼠牙之訟危蹤有託徒欣驥尾之榮回董提刑啓鄉閭待次聊欲奉􅀟親之歡獄市平反何以當一路之􅀉未卜交符之日巳深攬轡之羞正頼故人曲垂大芘伏惟某官天麟表瑞廟璉􅁛珍蔚高國士之風早勵古人之志螭蚴直筆已推狐史之家聲芸閣紬書更仰蓬山之舊業稍淹大用良鬱師言佇促鋒車復還禁路自顧衰遲之迹夙叨朋舊之私邈未造於高閎猥辱先於華問瑰詞借譽敢忘置䄂之三年良晤有期尚幸解顔而一笑賀權樞宻啓伏審光奉明綸進登右府允協股肱之望獨當宥宻之司無間邇遐同増抃喜竊以國體所繫兵柄爲先峻極西庭上應斗樞之象賛襄宻命入籌帷幄之嚴事有關於中書尊實等於丞相欲廟堂之増重顧選授之尤難方將委任而貴成並注安危之意有能􅁬庸而熈載宜兼文武之資恭惟某官受天傑材爲國重器學海造域中之大孔孟同歸談鋒多堂上之竒孫吳暗合早飛騰於華近屢罄竭於忠嘉矧當四方􅀒固之時尤賴千里折衝之策果膺殊渥遂賛本兵玉帳經綸旣奠安於宗社槐庭宻勿卽正位於公台仰觀君子之所爲期與天下而同慶某禀生踈拙夙荷眷知聞新命之初傳覺歡悰之倍集心同燕雀徒忻廣厦之成身繫匏􅀲莫遂趨庭之謁其如頌詠曷究敷陳賀參政啓伏審光奉明綸入參大政事關廟社喜格天人竊以治道所先擇賢爲大置諸廊廟必求名德之全若時謀謨用協股肱之望矧國家之多難方宵旰以深憂將期解甲而息肩尤在折衝而制勝故隨會見用􅀳國之盜逃犇而汲黯在朝淮南之謀寢息公議旣與羣陰自消爰有哲人克膺明命恭惟某官金聲玉振武緯文經議論醇乎古人備四時之正氣典章出其大手炳三代以同風起自祠庭復還視草坐席未温於東閤機衡遂賛於中台衆賢聚於本朝巳覺巖瞻之峻上帝賚之良弼行外鼎鉉之尊某晚學何知承顔最舊念去桃隂之久幸依枌里之仁新命初傳懽悰倍集按行獄市方親駻突之鞿瞻望鈞墀坐阻鳧趨之謁其如欣訟曷究叙言賀内翰啓伏審光奉明綸還直北門之峻親承宻㫖獨居東閣之尊驚詔令之一新仰恩榮之加舊歡呼相慶中外所同竊以翰墨文章擅詞林之寵詢謨獻納專内相之權是爲儒選之極高殆非他才之可雜玉堂晝静鈴索夜呼備黼座之天臨紛書詔之雲委任官能否係國重輕實惟選授之難况在艱虞之日憂邉思職將推頗牧於禁中求舊得人豈歎嚴徐之見晩恭惟某官曠世之高才獨歩立朝之大節可觀以忠信結於深知彼功名視爲餘事仰斯文之未墜頼故老之重來蓮燭夜歸墨麻曉出山東悍卒行聞感泣之思坐上同寮佇興禮絕之拜某稟生踈拙夙荷眷知聳新命之初傳􅁴歡悰之倍集賀建康李端明啓伏審外華秘殿出鎮雄藩十國爲連兼總兵民之􅀉萬夫觀政坐銷愁歎之聲無間邇遐同極抃喜恭惟某官大事能斷遠圖是經秉直節而不回肅威名之久著立朝抗論姦謀旣息於淮南分閫授師茂略更煩於江左隱􅀂長城之勢居然奠枕之安豈徒臥護於一方葢將信威於萬里顧茲庸陋叨荷眷知獄市按行未卜交符之日台墀趨進預欣望履之榮儻􅀫惠之未忘尚孤蹤之有託朱相逺迎啓伏審光奉明綸寵還真館促赴鋒車之召有嚴衮路之趨久屬望於蒼生佇儀圖於舊德入當國論冝大臣無憚於暑行妙簡淵􅂨諒宣室巳傾於前席觸炎威之方熾渉砥道以惟勤聳聞旌馭之來首獲望塵之拜其爲欣幸罔罄敷陳上呂都督啓伏審杖鉞臨戎益峻三台之望前茅啓道有嚴十乗之行肅萬旅以營屯擁百神而訶護江山改觀廟社妥寧恭惟某官忠憤格於天淵勲名震乎夷虜任兹國事獨以身先鶉火方中觸炎曦而岡避招搖在上考視履之多祥某志在執鞭職當􅀒弩屬採薪而獲疹趨半道以馳還尚賖約束之嚴竊動震惶之色仰惟鈞造俯賜鑒憐與韓舎人啓阻奉英標念久更於歲籥逷聞吏隱方就逸於祠庭仰高静退之風重積瞻馳之素恭惟某官才雄當代名配古人進登侍從之華獨藹詞章之譽承明厭直閔勞旣遂於高情宣室召還圖任將歸於大用顧兹頑鈍夙荷眷知論五經於石渠尚記緒言之益按九章於獄市敢忘厚德之依適整駕以在行喜望塵之不遠儻未絶曳􅅂之禮期遂造於門墻猶或崇伐木之仁願復承於謦欬歡悰所激占叙奚殫與姚都運啓竦服聲猷志極高山之仰叨承芘映寵增末路之光馳驅尚阻於登龍窹寐敢忘於附驥恭惟某官名高月旦識洞陽秋問學深游夏之科才術妙管蕭之亞有嚴戎閫聮上相之賔寮獨任計臺萃六師而飛輓威行八路風動一時民不告勞士有􅀫飽策殊勲於異日孰先經畫之勤拜新渥以還朝佇副弼諧之望時當流火凉生穉金聞旌斾之少休諒神人之咸喜起居甚適福履具宜不勝拳拳門墻之私聊貢區區竿牘之問與傅參謀啓走塵路之七旬敢有懷安之志望牙旗於千里浸稽伏謁之儀非自置於闊踈諒必蒙於簡照恭惟某官才雄當代名配古人富五經之紛綸爲四海之模楷􅁬志英特濟時艱危尊相臣以兼將臣首冠賔僚之選使仁者以佐賢者獨高籌策之良沉深方賛於中權叅决遂專於帥閫威行八路風動一時坐分北顧之憂遠却南侵之侮戮鯨鯢以築京觀期國難之將平作舟楫而濟巨川竚祖風之復振顧茲么麽雅辱眷知一去門墻七更歲籥心傾三益敢論杵臼之交職在九章正頼帡幪之芘卽奉承於約束巳切戒於馳驅與劉參議啓逖遠聲猷毎極高山之仰頻更㓂亂靡遑尺牘之修退念闊踈伏増震懼恭惟某官瑞麟一角祥鳯九苞學窮游夏之淵源文列傅班之伯仲姓字早標於千佛名敢直言忠嘉屢罄於七人事無遺策志欲康於天歩時方迫於戎昭泛淥水而依紅蓮沉静巳煩於遠略渉赤墀而登紫禁便蕃行服於邇聮惟是謬庸夙承眄睞幸因賤事當稟令於轅門巳渉修途卽通名於賔謁與韓太尉啓伏審南服宣威破梟羣而電掃北轅奏凱肅虎士以雲屯諒先十乗之行自致百神之護恭惟某官智深韜略神授機符當國歩之多艱􅁬戎昭而特起漢壇獨拜家聲旣嗣於淮陰衛幕遐征師律益嚴於㶚上肆平巨猾果奏膚功亟振旅以還軍佇䇿勲而進律某平反獄市景仰轅門竦行斾之匪遙顧趨風之敢後卽期瞻望預極忻愉賀孟參政啓伏審光奉制書肇臨督府機衡舊德載聮上衮之華􅆛虎新軍更肅中權之令歡欣畏愛遠邇均齊恭惟某官温温秉君子之文挺挺有大臣之節深憂國計自結主知廊廟登賢蚤入陪於大政甌閩謀帥亟掃蕩於兇渠顧兹八路之權尤屬九重之慮欲成丕烈宜付偉人􅂌冊命以加榮更節旄而増重居然莫枕隱􅀂長城恢漢祚於中原佇復孔明之策扶唐室而再造徐觀尚父之功某身在洪鈞職當部屬望光塵之入境夙堅􅀒弩之誠受約束以趨風將遂執鞭之志與詔使啓伏審光膺宸詔榮奉使華問俗觀風按六條而黜陟登車攬轡聳百郡之觀瞻恭惟某官天賦遠猷世獲重語公才公望早膺􅀒扆之知允武允文遂賛樞庭之議肆求直指果副僉諧導德意於閭閻兵火之餘達幽枉於宵旰焦勞之際威行漢節仍兼御史之權名配周官大振撢人之職矧蹇帷特專於所任而授指固異於常時􅁀勝之高逐捕之名徒繡衣之有耀范孟博抗澄清之志曾給札之無聞孰􅀂當仁斯爲盛舉某衰遲末路景仰英標叨承犴獄之司平反何有忽報輶軒之動投劾靡遑儻使靑天􅀗雲霧之披尚覬厦屋有帡幪之賜
