front:
  text: 華陽集卷第十六
  hash: sha256:23684137aa1c7373a1b675cd3a1d39f6d61f2cf6fdd0d52db717ac063e122b5e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0159_SBCK_016-1a}
body:
  text: 金壇後學于孔兼校劄子奏狀乞罷政第一劄子臣輒瀝危誠上干天聽伏念臣賦材不敏學古無聞遭值休明擢從逺外方上聖一新於􅀖治以非才參賛於廟謨荷生成之恩爲至深蒙寵遇之禮爲甚厚顧雖􅂢軀於萬死且難圖報於毫分詎敢懷安上􅀌隆眷然臣分窮命薄福過災生氣積脾寒新秋頓作目昏脚弱舊疾轉加豈惟竊位以妨賢亦恐養痾而廢職儻不知止必自速辜伏望皇帝陛下矝念么㣲保全終始特垂恩造許臣解罷見任職事除一在外宮觀差遣庶便醫藥稍安餘年臣無任祈天懇聖激切俟命之至乞罷政第二劄子臣昨日獲對天顔靣陳情懇乞解見任職事仰蒙聖慈矜憐衰病存問再三臣退歸私第伏省恩言舉室感戴至於涕泣今日又蒙特降中使宣押臣造朝及赴都堂治事眷遇優渥臣何以克當伏念臣寒陋書生本無片善叨榮逾分殃咎自貽秋深以來衆疾交作自量疲􅒒難以久當重任伏望皇帝陛下曲垂憫恤檢㑹臣昨日所進劄子早降處分除臣一在外宮觀差遣臣無任激切祈天俟命之至取進止乞罷政第三劄子臣近緣疾病陳乞解罷見任職事除臣一在外宮觀差遣兩蒙聖慈特降中使宣押未賜俞允臣感激惶懼不知所措臣聞朝廷之上一日二日萬幾責在二三執政之臣必能殫志極慮夙夜匪懈然後不􅀒􅀉委之重臣素乏時才頃巳辭祿遭遇陛下非常之知驟加録用使預執政之列戴荷聖恩至深至厚非不欲黽勉自竭􅃐就㳙埃少圖報􅁛實以衰殘多病心力俱疲苟或不知自量豈唯臣一身􅀒顚躓之憂而朝廷萬幾亦未免有曠職之患伏望皇帝陛下曲推全度早賜矜從庶使餘生無愧公議臣無任祈天懇聖激切俟命之至取進止乞罷政第四劄子臣比嘗三具劄子乞解職任今月九日伏准詔書不允臣仰見聖慈憐念未忍弃􅂢顧臣何人膺此禮遇區區危􅂨但極慚感伏念臣本無材術叨貳政機思報國恩唯知自竭然三百六旬之久勞能蔑著於㳙埃而七十五歲之身疾病巳凋於齒髮是用投誠君父冀遂退休敢期惠渥之臨尚閟俞音之錫臣以零丁弱質衰謝餘年自知一去於軒墀難復再膽於天日豈不貪戀明聖顧懷顯榮第憂癏曠以招尤不容勉彊而尸祿伏望皇帝陛下乾坤亭育日月照臨早降㫖揮曲從所請儻獲因此苟延旦暮盡出陛下生成之造臣無任祈天懇聖激切俟命之至取進止辭免資政殿學士知婺州劄子臣近者屢貢封章懇辭政事退量瀆犯方俟譴何今月十一日伏准尚書省劄子奉聖㫖除臣資政殿學士知婺州臣聞命震驚罔知所措臣竊謂士之從仕固欲善其始終君之待臣毎務全於體貌至􅀂便私而有請乃令因請以叨恩則上多虚授之嫌而下有難安之勢臣自膺重任亦旣彌年初無橫草之功積有􅀒薪之疾慮曠癏而􅄩戾上玷清朝及彈擊之未加仰陳危悃儻使奉祠而得請尚憂公議之不容矧兹秘殿隆名金華古郡是所謂勲舊均勞之禮其可付衰殘養疾之人雖聖慈或出於愛忘而私義終難於冒處伏望皇帝陛下矜臣愚拙唯合退閑特降㫖揮收還成命止乞令臣守本官除一在外宮觀差遣庶安薄分用穆師言無任祈天懇聖激切俟命之至取進止投進恩賜御書墨本劄子臣昨准告除資政殿學士知婺州陛辭之日伏蒙聖慈特降中使齎御書一封賜臣通犀帶一條臣以異恩出於望外捧受之次兢惶不知所措仰見陛下俯憐衰病驟去闕庭特示殊私俾安􅀌迹臣雖萬死豈足以上報委曲生全之造感戴至深言窮涕泣臣叨蒙光寵欲以傳示不朽輙將所賜御書摹勒上石謹以墨本裝成卷軸昧死投進庶幾少効臣子感恩歸美之萬一干冒天威臣無任隕越待罪之至取進止乞修心治國劄子臣庸陋不才頃蒙太上皇帝自小官拔擢至參大政曽無毫髪功效上報厚恩迫以衰病謝事去國昨者陛下受命握符光臨大寳臣屏伏田野逖聞堯舜盛德之事無緣􅌃舞玉階自同百獸今遇大駕時廵過臣鄉郡臣可謂千載一時之幸輒有區區愚􅂨敢因賜對冒昧奏聞臣伏見神宗皇帝卽位之初司馬光任御史中丞論天下事未及其他而先之以人君修心治國之要其言曰修心之要有三一曰仁二曰明三曰武修政治興教化育萬物養百姓此人君之仁也知道義識安危别賢愚辨是非此人君之明也惟道所在斷之不疑姦不能惑佞不能移此人君之武也治國之要亦有三一曰官人二曰信賞三曰必罰人主誠能收采天下之英俊隨其所長而用之有功者勸之以重賞有罪者威之以嚴刑譬如乗輕車駕駿馬總其六轡奮其鞭策何徃而不可至哉臣誦光遺文毎至此未嘗不斂衽太息以謂古先哲王之所以治天下與夫謀臣議士之所以盡忠於其君考諸五經百氏歷代載籍之傳求其至精至要誠無出於此六者方今内憂弊政外患彊敵錢􅂖甲兵獄訟盜賊之事雜然上􅀜聖慮實宵衣旰食之時臣願陛下俯念光言日加三省事有合於此六者必力行之害於此六者必亟去之一嚬一􅀏之間取則於是而無或暫忘􅀂是則心之所主旣簡而定萬幾雖繁應之不勞矣臣退閒旣久時事不敢與聞獨獻乎生服膺之言庶少􅀘聰明之萬一惟陛下勿謂迂闊而弃之天下幸甚取進止辭免起居舎人狀紹興三年正月先兼中書門下省檢正諸房公事二月除起居舎人右臣今月日准尚書省劄子奉聖㫖除臣起居舎人日下供職者竊以史臣之職君舉必書宜付偉才以昭盛德而臣學不通古智昧趨時誤辱眷知召從踈逺使備貟於宰屬顧何􅀘於公家方懼尸榮更叨茂渥况當宁圖功之日衆賢聚於本朝而直筆記事之官一時謂之淸選自視薄陋豈應冒居仰覬􅐶慈俯矝愚悃收還成命免致煩言所有恩命臣未敢祗受謹錄奏聞伏候勑㫖辭免中書舎人狀紹興三年五月自起居舎人遷中書舎人右臣今月十五日准尚書省劄子奉聖㫖除臣中書舎人日下供職者竊以中書爲政事之源内史掌詞命之職惟時妙選宜屬偉才伏念臣行能不過於常人名實未孚於衆聽豈謂衰遲之迹誤蒙聖哲之知頃自外臺召寘宰屬未及暖席進列史官綴法從之淸班望睟容於丹陛恩光厚矣自量巳過於所期功効蔑如詎敢更叨於非據况乃代言之地尤以稱職爲難比偶闕貟猥嘗承乏書詔填委旣無潤色之能巧匠傍觀徒有汗顔之愧惟巳試之如此亦自知之甚明儻遂卽真而不辭將恐煩言之隨至仰祈􅐶鑒俯察忱誠特反渙恩庶安愚分所有恩命臣未敢祗受謹錄奏聞伏候勑㫖除中書舎人舉魏良臣自代狀蒙恩授前件職准令節文侍從官授訖三日内舉官一貟自代者右臣伏覩左從政郎充詳定一司勑令所刪定官魏良臣奮自學校聞于搢紳持巳端方勵古人之節屬文典麗有作者之風舉以代臣實允公議謹錄奏聞伏候勑㫖乞宮觀第一狀在中書舎人因母病連章乞祠養親章四上乃得㫖送母還鄕紹興三年八月十二日到家復上章乞終養不允右臣頃從踈賤躐處從班未有毫分少伸報効今以事出迫切不避譴責輙輸悃誠仰瀆宸聽伏念臣父母年老昨者迎侍偕來庶奉甘㫖而臣父以不伏水上先還里中獨留母氏于此渉夏至今卧病相仍緣臣兄弟終鮮别無兼侍毎趨朝入局藥餌俱廢今則病勢寢劇未有痊損之期兼臣父在鄉孑然一身久闕供養人子之心實不遑處欲望聖􅄌矜憐特令臣以本官任在外宮觀一次庶當孝治之朝不廢篤親之義臣無任祈天懇聖激切之至謹錄奏聞伏候勑㫖乞宮觀第二狀右臣近爲母氏久病輒具奏陳乞以本官任在外宮觀一次伏蒙聖恩未賜俞允臣危誠迫切不能自巳再干天聽罪不容誅伏念臣母年垂八十昨緣迎侍至此忽得脾疾醫療踰月至今未差臣叨塵侍從供職未久初不敢便有陳請縁數日來疾勢増加而臣職事之外餘力無幾旣兄弟終鮮又無得力子姪可以供承藥餌責在臣身實􅉛孝養而臣父前歸鄕里不願逺來􅅴㫖之奉亦復久闕此臣所以日夜憂惶莫知所處仰恃陛下天地養育之恩一物失所尚軫聖慮故􅂺再申前懇冀獲矝憐儻蒙從欲之仁卽臣異日糜骨􅂢軀圖報未晚欲望􅐶慈特賜檢㑹臣前奏令臣以本官任在外宮觀一次臣無任祈天懇聖激切俟命之至謹錄奏聞伏候勑㫖乞宮觀第三狀右臣近以母病再瀝誠懇上干天聽乞以本官任在外宮觀疊蒙聖恩未賜俞允顧臣愚分豈當更有敘陳實以情迫于中不能自巳臣聞臣子之事君親恩義相須未有闕於事親而能事其君者臣愚不肖仰荷陛下拔擢豈不知竭犬馬之力圖報萬分實緣母病日久父先還鄉所以供子職者唯臣一身恩愛所牽不皇寧處今來母氏所苦醫療百端未見減損衰晩之年氣血浸耗竊欲迎侍蚤歸鄕閭􅀂蒙天慈俯遂前請則臣一門賴陛下優容生養之恩過於天地異時碎首􅂢軀誓圖報塞臣以供承藥餌見今在告深恐因循妨廢職事伏望聖慈察臣懇迫之情特賜檢㑹前奏令臣以本官任在外宮觀一次干冒天威臣無任戰懼俯伏侍命之至謹錄奏聞伏候勑㫖乞宮觀第四狀右臣昨爲母氏不安奏乞在外宫觀差遣以便醫藥准尚書省劄子奉聖㫖不允續蒙給臣寛假仍許將母還鄉臣一介賤㣲上荷聖􅄌察其懇切曲加矜念仰惟天地父母涵容拊育之恩非臣殞首􅂢軀所能報稱臣本貫鎮江府金壇縣巳於八月十二日迎侍到家自初得告今巳逾月望闕懷戀夙夜靡寧便當還朝亟就班次緣臣母病寖久未獲痊平氣血虚羸近尤増劇臣别無兄弟侍疾嘗藥唯臣一身遽捨而去於義難處􅀂更在假淹留又恐益廢職事私情雖迫公議肯容臣幸以謭薄之資躐升華近之列惟思荅効豈敢懷安特由恩愛所牽奔趨莫遂俯仰自念憂灼彌深是用輒冒天威具陳前懇伏望陛下俯垂􅐶聽特賜檢㑹臣七月二十五日以後累奏令臣以本官任在外宮觀一次庶幾菽水致養免於遺親犬馬報恩期以異日臣無任祈天懇聖激切惶懼之至謹錄奏聞伏候勑音華陽集卷第十六畢
