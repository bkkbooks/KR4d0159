front:
  text: 華陽集卷第二十四
  hash: sha256:8930ffd9659be86896195aa24baec66b073e191d26c5603b05200eee8a7ecd34
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0159_SBCK_024-1a}
body:
  text: 金壇後學于孔兼校經筵詩講義故詩有六義焉一曰風二曰賦三曰比四曰興五曰雅六曰頌臣聞聲詩之作本乎民情之自然其所歷非一時所述非一事所出非一人故衆體並列咸有攸當方其作之也志各有爲故賦比興之㫖分焉及其序之也事各有本故風雅頌之名别焉詩人之言顧豈一端而已或美或刺或䂓或諷苟可以直言而無害則鋪陳其事而賦之􅀂其避䛕佞之嫌畏指斥之過必將引􅀋以寓意則取象於物而比之至於耳聞目見有以動蕩其心志而不能自巳則又感􅀤於所寓之時而謂之興此賦比興之辨也􅀂夫採於國史播在樂章其述諸侯之事而止於一國則列而爲諷言天子之政而及於天下則列而爲雅形容盛德之美成功以告於神明則列而爲頌此風雅頌之辨也然而論詩之㫖莫先於風風之所言賦也比也興也互見而兼備焉故一曰風而繼之以二曰賦三曰比四曰興積風而爲雅積雅而爲頌故五曰雅六曰頌周官大師敎六詩考其先後亦同乎六義之序上以風化下下以風刺上主文而譎諌言之者無罪聞之者足以戒故曰風至於王道衰禮義廢政敎失國異政家殊俗而變風變雅作矣臣聞詩之爲風政教之本也上以是而化其下無非躬行之德下以是而諷其上無非愛君之誠是二者皆有巽入之道而不見於形迹故曰上以風化下下以風刺上夫禮有五諌而莫善於諷聖人樂於文過必使瞽爲詩工誦箴然則詩之爲諌諷諌之謂也主於文則敘其情而不至於訐名以譎則陳其事而不斥以正夫如是則無拂心逆指之辭言之者安所加其罪得將順救正之道聞之者豈不知所戒故曰主文而譎諌言之者無罪聞之者足以戒夫天之有風披拂於萬物之上而其功宻庸詩之濕柔篤厚而所以感動於人者似之故序詩者言詩之功用必繼之以故曰風至主于王道衰禮義廢政教失國異政家殊俗則文武成康之澤㣲矣天下之人不復見先王之治乃􅀤其憂思感傷之心而變風變雅於是乎作辭雖巳變而所以述作之意依違諷諌於治道猶有􅀘焉此叙詩者所以取之而不弃也國史明乎得失之迹傷人倫之廢哀刑政之苛吟詠情性以風其上逹於事變而懷其舊俗者也臣竊謂此言變詩之所由作也孔子曰文勝質則史先儒以謂苟能制作文章亦可謂之史然則國史國人之文勝者是也惟其文勝故多識前言徃行而明乎得失之迹故感於乎得失之迹故感於衰世而諷刺之意不能自巳今夫人倫廢則五品不遜自一家而推之家者失其序矣刑政苛則百姓不親自一國而逹之天下者失其理矣人倫失其序刑政失其理此詩人所以動其哀傷之情也然百姓之不親未􅀂五品之不遜故傷之爲義有甚於哀詩人遭時如此而槩以古今得失之迹則吟詠性情以風其上不亦宜乎所以風其上者則以逹於事變而懷其舊俗故也且唐之風舊矣其後變而爲􅀳􅆁鄘之國舊矣其後變而爲衛詩人當晉衛之世􅀤于吟詠雖述一時之事而憂思感傷猶不忘其本故􅀳詩十二篇而特謂之唐衛詩三十九篇而兼存􅆁􅅠之國以此見詩人懷舊之心􅀤於辭氣必有以感動於人所以能使序詩者迹其本意而不敢沒其實也然逹事變懷舊俗舉是二國之詩考於其他可以􅀋見矣故變風􅀤乎情止乎禮義􅀤乎情民之情也止乎禮義先王之澤也臣竊謂此言變詩之㫖也夫詩之爲變則以事有不得平者咈乎吾心故作爲箴規怨刺之言以􅀤其憤憾不洩之氣夫如是則宜有怒而溢惡矯而過正者然以詩辭考之雖觸物寓意所指不同而要其終極一歸於禮義而巳葢人生而静乃天之性感物而動斯謂情情雖出於性其動於中也物實有以感之旣感於物矣非先王之澤薰陶漸漬不忘於心則吟詠以風其能止於禮義乎今自􅆁􅅠而下百有餘篇刺奢刺儉刺貧刺虐如此之􅀋皆變風也然雖其間或出於婦人女子小夫賤􅀠之所爲是乃一時有激而云然其比興述作優游而不迫返覆顛倒而不亂孜孜焉􅀂將救其時弊而反之於正者得非禮義之教使之然歟由是觀之變風之詩雖不純乎文武之序亦足見先王之澤垂數百年猶未泯也是以一國之事繫一人之本謂之風言天下之事形四方之風謂之雅雅者正也言王政之所由廢興也政有小大故有小雅焉有大雅焉頌者美盛德之形容以其成功告於神明者也是謂四始詩之至也臣以謂此申言風雅頌之休也風猶天之風也動於上而其下化之如􅀜雎之化行而公子信厚鵲巢之功致而在位正直齊君好田而成馳逐之風魏君儉嗇而變機巧之俗􅀂此之􅀋無非本於國君之躬行故曰一國之事繫一人之本謂之風雅者正也猶言王之政也王畿雖止於千里而其政之所及則侯甸男衛自東南西北皆其所經略非如諸侯止於一國而巳是以雅之所言皆天下之大而四方之風於是乎觀焉故曰言天下之事形四方之風謂之雅其言王政之所由廢興則以雅有正變故也文武興而民好善王政之所由興正雅是也幽厲興而民好􅁀王政之所由廢變雅是也􅀂夫小大之辨則隨其所主之意而巳如小雅言飲食賔客賞勞群臣之􅀋皆事之小者而大雅言受命尊祖致太平成福祿之􅀋皆事之大者然則政有小大分爲二雅宜矣風也雅也國治之始也及其告成功則有頌焉周頌啇頌殆四十篇皆所以言􅀕祀猶今之樂章爾事實而義明言簡而意足以是而告於神明可謂無愧辭矣􅀂乃魯頌非爲􅀕祝設特以頌僖公之美而巳德薄辭侈視商周之作不能無少貶雖然前乎商周獨虞舜之載􅆳五子之述戒他詩未有聞也孔子自衛反魯然後刪詩斷自周始國風雅頌方序而傳焉謂之四始有以見後世之作詩者皆權輿於此而莫之或先也非獨莫之或先而其述作之美亦無以復加矣故曰是謂四始詩之至也然則􅀜雎麟趾之化王者之風故繫之周公南言化自北而南也鵲巢騶虞之德諸侯之風也先王之所以敎故繫之召公臣竊謂二南之詩文王一人躬行之化而特繫之二臣何也文王三分天下有其二以服事商則所居者諸侯之位也受命作周而維新舊􅀖則所行者王者之道也當是時天下之人誦詠而歌舞之述其事則有小大感其化則有淺深序詩者合􅀜雎鵲巢之風皆以爲王者之事而名之歟無以見文王事商之心皆以爲諸侯之事而名之歟則無以顯文王作周之德故取其事之大而所感之深者繫之周公謂之王者之風事之小而所感之淺者繫之召公謂之諸侯之風夫如是然後可以備盡文王之道葢周公召公分陜而治舉周召則文王所治之地皆在是矣周公聖人也召公賢人也以王者之風繫之聖人以諸侯之風繫之賢人理固然也且周南之后妃即召南之夫人也而其見於詩者不能無異葢無嫉妬之心者周南也召南則無嫉妬之行而巳男女正行婚姻以時者周南也召南則男女得以及時而巳勉以正者周南也召南則勸以義而巳頼而推焉自􅀜雎至於麟趾人之感化爲甚深自鵲巢至於騶虞人之感化爲尚淺序詩者不得不兼陳而備載之也夫文王北居岐周而其化南􅀍江漢故曰自北而南其曰先王之所以教者指太王王季而言也文王始基實因於此是乃諸侯之事故特於召南言之周南召南正始之道王化之基臣竊謂王者之治莫大於人倫而夫婦者人倫之所造端也文王受命作周其治始於閨門而逹之天下於是人倫正而風化行此二南之詩所以爲國風之首在易之家人曰風自火出家人風者化也火者取象於離神所麗也化出於人故能妙萬物而不見其迹當文王之時天下得於觀感人倫以正􅀂出於性之所自爲者豈有他哉神而化之自内而外一本於自然而巳故家人之彖曰夫夫婦婦而家道正正家而天下定矣然則序詩者以周南召南爲正始之道王化之基其知治之本歟是以􅀜雎樂得淑女以配君子憂在進賢不淫其色哀窈窕思賢才而無傷善之心也是􅀜雎之義焉臣聞詩三百五篇而􅀜雎爲之首其所言乃后妃求淑女以配君子之事而說者止稱其無妬忌之行臣以謂此未足以盡􅀜雎之義蓋天子聽天下之外治故有三公九􅀸二十七大夫八十一元士后妃聽天下之内治故有三大夫九嬪二十七世婦八十一御妻治外者莫急於人材治内者求淑女以爲􅂇固其理也文王之所以興周詩􅁛棫樸之官人書美五臣之迪教濟濟多士並列於䟽附先後奔奏禦侮之職固未始不以人材爲先務是以其化刑于寡妻而后妃於是乎有􅀜雎之德觀其求淑女也寤寐反側而不能自巳蓋以謂不如是不足以配文王而成内外之治夫惟文王得多士而立政於外后妃得淑女而輔佐於内則自閨門而逹之朝廷宜無一事之不理所以協濟大業而卜世卜年之永者其本實基於此序詩者旣論詩之大槩而卒舉后妃之德以明􅀜雎之義言后妃之於淑女非特求之盡其勞而以得之爲可樂故曰樂得淑女以配君子凡女子矜其容色者必有忌心能以進賢爲憂則以不滛其色故也故曰憂在進賢不滛其色且女子也而或􅁛其淑或􅁛其賢或稱其才葢以其性之善則曰淑以其行之美則曰賢以其女功之事則曰才性之美行之美能於女功之事是三者宜爲人之所忌也而后妃乃能去其忌心方且憂其求之未得而不得進御於其君猶以爲未也而又哀其或在窈窕之中思念而不忘自非至誠接下而無傷善之心何以及此當是時凡爲淑女者后妃皆得以用之雖幽逺之地無遺才矣周有亂臣十人而后妃與其一觀夫閫内之政如此則其助周家之治信有力焉宜乎􅀜雎之詩列爲二南之首也華陽集卷第二十四畢
