front:
  text: 華陽集卷第三十五
  hash: sha256:f098d71bc6b35bcc92153c21d36129f8ae8b32f7aee5895271da265287e988a6
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0159_SBCK_035-1a}
body:
  text: 金壇後學于文熈校詩次韻蘇養直破虜謠旌旗千里照江紅學語小兒爭挽􅃓春風江岸草無際馬蹄踏徧靑茸茸將軍靣作石稜紫百萬胡羣陣前死游䰟假息度長江京觀應慚望西滸蘇侯筆力壯三軍破虜長謠入眼驚何當更獻中興頌坐看萬國朝神京次韻仲弼高卧元龍百尺樓飽看風月自忘憂雖無濁酒招陶令尚有枯棊伴奕秋俗事可堪遮眼底愁情終莫上眉頭􅁭懷落落誰能測方寸端容萬斛舟千里長懷北固樓客居顔巷不堪憂淸熒坐看􅀌燈夜搖落初驚一葉秋巳厭淸談揮麈尾誰能細字寫蠅頭蓴鱸固是吾家味好約西風買釣舟次韻李傳道感事臥病何人爲掃門墮霜黄葉任􅌭紛旋沽濁酒難禁醉厭數孤砧逺更聞冉冉生涯飄似夢悠悠心緒亂如雲幾時得遂江湖去野性終隨鷗鷺羣聞官軍掩殺城中羣冦次傳道韻未復錢塘郡先收鐵瓮城妖星隨月落殺氣逐參横巳築鯨鯢觀重新鼓角聲大江應好在流恨幾時平飲散懶性時難合愁腸酒易醺雨聲牕外過客語夢中聞借問安􅀖策誰堪破賊羣可憐吾老矣生意薄如雲聞鎮江賊平賊隨寛詔免恩浹大江浮人少餘新市城荒剰故丘瘡痍誰共理宵旰獨深憂莫上西樓望黄雲滿眼愁次韻彦智夜歸三首餘年知有幾時過如激箭况乃丗味惡酸辛幾嘗徧朝來忽覽鏡坐歎華髮變故人尚青眼危論排月旦慰我出新詩驪珠有餘燦國歩何多艱戎虜尚傳箭萬里眇寰海澒洞風塵徧其間蟣虱臣亦作豺狼變中興賴明主掃除在一旦憑君深夜望巳失妖星燦扁舟連夜􅀤歸興急如箭䘮亂男女悲一息萬慮徧人生豈匏繫事業有豹變聖主纂洪業廟堂用伊旦拔茅到公等王道何其燦次韻蘇􅀳翁見􅀉不見梁王舊吹臺年來愁眼向誰開求賢廊廟無虚日報國㳙塵自乏才直指謾能迎櫑具永懷寧敢咏金罍相看􅁂髪霜千丈自視文章水一盃晚歲可憐神氣索故人猶􅀉好詩來追還正始真堪喜突過黄初豈易陪婉孌也知能度曲葡萄應巳釀新醅何時東閤容驚坐一日那辭一百廻傷春老來心事不禁春風物相撩入眼新苦索吟哦成底急且休拘束任吾真有錢買酒須饒醉無事看山莫厭頻憂國只今䕫契在應容衰疾伴樵人用前韻送春滿眼鶯花自在春送春情緒怯愁新鼓琴不用戴安道行酒却須温太真晚歲深交能有幾相逢爛醉莫辭頻新條更有明年在重與東風作主人次韻傳道夜觀牡丹年來春事不相關一笑除非醉裏􅂸未信花枝憎白髪且隨月色傍朱欄他時拜賜猶能記百官遊金明池館職賜牡丹此夜傷心更忍看姚魏風流渾謾與坐來􅀟泪落金盤七月晦七月忽逢晦悲秋竟􅀂何破羗無妙略中聖有狂歌世味羞嘗鼎心源欲静波由來麋鹿性幽興滿煙莎歸鄕窮巷歸來巳白頭結茅何必榜休休好山當戸碧雲晩明月滿谿寒葦秋詩社縱添新句法醉鄕難覔舊交遊平生幸自無機械一棹夷由去狎鷗用前韻愁來莫遣上眉頭着酒驅除醉卽休未省一官堪送老已驚􅀟髩不禁秋收心香火供清夢洗眼雲溪結勝遊喚取短蓬乗晚興坐看煙浪没輕鷗對月蓬􅁂秋風老柴門轍跡踈誰同今夜月望絕故人書止酒愁元亮何心賦子虛得詩還喜誦習氣未全除避冦艤舟遇雪西山羣盗欲侵凌小艇移家傍險行遮眼亂雲方合沓向人飛雪忽縱横心憂出穴虎狼近身似遶枝烏鵲驚天闊此時難借問地偏何處可偷生用前韻雪花吹靣凍凌凌客路艱危敢緩行春酒可賖三日近野梅􅀄見一枝横傷時在處愁先滿討賊無期夢自驚誰解山東問消息謝公應起爲蒼生泊舟廟灣次姪合泊船高㟁曲散策小村傍盗賊耳邉滿朝廷天際望繫愁官柳嫩醒醉野梅香後進推吾子詞鋒不可當春耕亂後荒田􅂎棘生歸來還喜見春耕隨犂細雨濛濛濕轉壠新泉䀨聒鳴好勸賣刀添徤犢盡令長畒種香秔腐儒一飽真餘事莫遣閭閻有歎聲次韻黄堯翁闘雞三首宴罷金雞列籠瞻黼座遙兩雄爭定霸一戰息虚憍忍受摧冠辱貪承賜錦饒如何紀渻氏今乃混漁樵二繫馬翠樓下闘雞花樹旁飛毛驚辟易喋血壯摧傷奮擊方乗􅀔歡呼忽擅場忿心能幾許嗟爾太怱忙三約闘提籠出無譁􅀝壁看禍心藏芥羽碎首濕朱冠擒敵壯夫事策勲公子歡棲羣噲等伍今日始知韓次韻顧應文萬事浮雲過眼空羞將白髪競春紅折腰久巳慚元亮作賦何勞慕敬通經世豈無天下士知心應有古人同破除孤憤難忘酒聖處時時且一中讀書郤老慚無術驅愁頼有書披尋窮洁渺領略造玄虛窻日三竿静爐熏一炷餘倦來還自哂蠧簡􅀋蟫魚次韻孫仲益食豚魚􅀃食書生費口牙一盃初捧白瓷花晨鳬夜鯉可亡命早韭晚菘同世家毒甚鏌鎁渾謾語詩成珠玉且雄誇腐儒一飽忘麤糲更索盧仝七椀茶次韻應文遊東園筋力摧頽老自知追歡猶學少年時園林勝處看如夢杖屨行來歩懶移對酒不堪蕉葉滿挿花那復帽簷欹羡君詩句方豪甚應笑踈狂亦彊隨次韻李道士觀南山三首濛濛煙雨忽晴開坐覺羣山爽氣來誰向此間尋賀老相逢莫放酒舩回山似圍屏六曲開小谿如帶傍山來結廬谿北對山住俗駕何妨且勒回柴門無事晝慵開杖屨誰曾得得來隔㟁野花隨處􅀤護巢幽鳥傍林回與韓子蒼别久忽邂逅於臨川遭時亂離道舊感歎子蒼有詩見贈次韻奉呈二首三顧當年尚草廬南陽誰識臥龍居舎人自是出世佛學子猶呼行秘書視草似聞虛翰苑追鋒看即近郊墟論思好爲蒼生計莫學辛毗謾引􅅂隨緣到處是吾廬風雨飄颻敢定居異縣逢君如隔世七年恠我苦無書平生出處皆陳迹太半交遊巳故墟愁絕不知尊酒盡醉歸兒女笑牽􅅂言懷用子蒼韻早從㣲宦去田廬慚愧英游許並居拙計自憐􅄞叔懶暮年空悔子公書歸尋松竹開幽徑坐看牛羊下夕墟巳把經綸付王導不妨綀布製􅁭􅅂謝錢巽叔用子蒼韻底事承明厭直廬孤城天逺􅀉幽居根塵巳悟三乗祖香火聊看八會書是處風煙供翰墨何妨杖屨入村墟皇文近日收遺老妙手終煩􅀘帝􅅂􅀉曽公衮用子蒼韻五馬歸來識舊廬相門曾對水雲居家聲自可威戎虜吏最何勞課簿書好扈六飛還魏闕却麾單􅀐復姚墟莫欺霜􅁂將軍老矍鑠猶能一攬􅅂晚興二首次人韻病骨離支怯晚風可堪游目送飛鴻書淫老去還知倦酒聖秋來却喜中北伐會須空虎落西邊先欲靖蚕叢卑飛莫起扶搖念徒使莊生笑二蟲衰草連雲萬木風天高滅没見孤鴻夕陽人散酒旗下逺浦舩歸漁笛中兀兀松牕翻蠧簡垂垂蓬􅁂颯霜叢自憐世味諳來慣巳覺忘辛似蓼蟲次韻謝人惠詩翩翩才氣逸輕翰倒瀉波瀾筆力寛沉醉不辭金盞側清吟長占竹窻寒捧心欲俲羞顰媚斵􅈹須煩盡堊漫辱贈驪珠念無報但驚懷䄂有竒觀夜雨夜雨妨清夢踈簷落細聲幽懷無客語偶坐有琴横水闊柴荆逈風高鴈鶩驚感時思報主材薄媿平生閉閤閉閤静無寐觀書空復愁虞􅀸􅀟白璧晏子一狐裘萬事等歸盡百年誰得留還將句中眼爲問賈長頭行部至南陵題隱静寺籃輿行盡萬松岡得得來看古道場飛錫落花成佛去後人誰見紫金光􅀉􅀫隱静東軒軒外竹引飛泉落池中隔窻聞之如秋雨瀉簷聲踏殘西日􅀉僧房一炷爐熏秋夜長誰作響泉喧客枕夢回欹聽雨淋浪次韻李彦逹客舎秋懷落日孤村静凄風一笛秋寸心􅁅欲死􅀟􅁂雪添愁未報中原復應煩肉食謀獨慚蘇季子計拙幣貂表次韻彦逹之子初傾葢論詩卽定交心淸懸水鑑才逸奮蒲梢貰酒移賔榻擕盤雜野肴半醒還半醉相對老蘅茅木落木落秋聲逈山寒暮色連時危羞冕紱身老􅀉林泉濁酒平孤憤淸吟續短篇一枝吾巳足鴻鵠謝哀憐思歸梧陰低落月蛩響怨悽風舊隱江煙裏歸期客夢中攬衣驚帶緩看燭待花紅莫謾呼歡伯驅愁正罔功次韻酬彦逹浮榮過眼風脫葉鴛行無復清夢接柴門晝閉雀可羅寒日暉暉弄踈樾巳種芳蘭滋九畹更遣胎仙舞三疊李侯壯志亦可人舉目萬里欲横絕醉眼時看石稜紫吟􅁂半作霜棘折方今聖主躬儉勤奏賦不須誇羽獵中興盛事要磨崖老於文字誰踰結願君勉力上扶搖渺渺雲海出飛楫莫隨鎩翮臥窮巷謾學啼螿弔寒月燒香三絕句卷去竹書閑棐几臥看桐影轉簷牙試憑波律送淸夢未信華胥天一涯霏霏沉水屑玄玉靄靄博山生翠雲羅筏城旁知幾里坐令香界徹㣲熏閉眼無勞身外思安心有法静中知香添細炷焚千和茶碾新芽試一旗千和香出三洞珠囊華陽集卷第三十五畢
