front:
  text: 華陽集卷第六
  hash: sha256:31664ef905993de50b076ff17670d4d5ca027cd815e1e75288d75e6e02ed9e09
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0159_SBCK_006-1a}
body:
  text: 金壇後學于孔兼校外制李亦改官爾由踈逺上封自言公車以聞遂􅀗召對亦可謂遇矣觀其論奏志有足嘉命改厥官庸示殊寵夫爲士者非馳騁進取之難立而無令名之患徃服朕訓無怠爾修張榮轉遙郡觀察使凡賞無常眡功輕重藏在盟府用以勸能具官某奮不顧身忠于衛上淮壖之役扞禦有聞俾守海陵㓂莫敢犯于是民得按堵而鹽莢之利久廢復興肆疇厥功爵應加等宜錫廉車之寵庶昭戒壘之榮徃其欽承勉思報効宋煇落職朕駐蹕臨安視同天府浩穰之治付厥守臣爾以非材嘗見屬任獄市所􅀉觀望爲姦始則便文自營卒使刑放於寵事雖旣徃公議弗容論譔之華豈應冐處其從鐫奪聊戒後來服我寛恩母忘省咎唐煇除諌議大夫朕惟一事之失圖功弗終一行之虧視德有愧肆用廣開公正之路敷求謇諤之臣葢欲亟聞讜言磨切左右所以成大功全盛德實有賴焉而况官爲正諌表率在列位高責重可非其人具官某德藴純明器凝端粹率義不爽蹈古人之規遇事敢爲見仁者之勇數任言責咸有能稱入直螭􅉾旋升綸閣雖詞章毎多於潤色而鯁亮不廢於論思有嘉造膝之忠曾是伏蒲之舊粤從回禁還冠七人昔柳公權論事不阿風采可尚遂由内史屈居是官朕稽前言亦以命爾徃服乃事思勉厥勤陳古誼以啓迪朕心酌民言而規正國論期􅀘大化勿崇虛名辛炳除御史中丞唐文宗有言御史臺朝廷綱紀一臺正則朝廷治朝廷正則天下治國家自祖宗以來闕大夫不置而中執法實表率其屬以殫治不屈爲職迺者柬㧞忠良布在言路而臺無長官朕甚恧焉推擇其人宜以次舉具官某廉清有守秉高世之資諒直不回勵古人之操辭榮求志逹于聽聞召還周行任以言責載觀論奏之實益信風節之彊排姦擊邪百吏震竦國之司直惟爾有焉徃由雜端進居獨坐雖斷自朕志而考于公論葢無愧矣夫以道制法所以處天下之事爲官擇人所以行天下之法事有弗當于理人有弗協于極皆汝責也其服朕命益懋乃心具陳治國之謀毋􅀒敢言之地是謂稱職則予汝嘉俱彦忠轉遙郡刺史徃歲虜􅀐控弦瞰吾江滸爾以偏將鼓行先登逐北渡淮第功居最有司謂爾賞應貤恩顧方勸能豈限常制遙兼刺舉之號優示寵榮其勉厥勤用圖報稱胡世將除徽猷閣直學士知洪州兼安撫制置使方靣之權朝廷外屏惟豫章古郡實居上游􅁭帶湖湘控引閩粤爰自艱難以來盜賊間起瘡痍吾民故選建牧守常重于他鎮非夫恩威並濟知大體可畏信者難以屬其任具官某䟽通練逹文雅自將早􅀍柬求登于禁近朕固知其有折衝禦侮之略有牧人御衆之才京口大藩試以帥事曾未期月果有能名比方召復周行俾貳司㓂而江表重􅀉念非􅀸無可付者是用升華延閣以寵其行夫一路十州兵民大政得專制焉葢休戚之所繫也􅀸其考古忠信之長慈惠之師以撫安兹土亦使夫令修于庭戸數月之間而人自得于湖山千里之外母愧前哲則予汝嘉侯延慶除起居舎人昔􅀝相能讀三墳五典八索九丘楚王以爲良史朕敷求時髦俾記言動亦惟博極羣書義􅀋通貫然後責其任職以爾儒學之英奮由庠序粹然論議縉紳多之頃嘗擢自郎曹固巳直入螭陛一從外􅀘數更除書考之僉言宜還舊物夫載筆之任重矣隱善諱惡則失之誣因淺仍俗則失之陋爾宜勉焉母流于二者之失予惟汝嘉韓京轉左武大夫朕方整軍經武立國之威凡厥有功必加褒賞具官某夙推將略雅得士心盜擾吾民斬􅀗底定戰多來上深用歎嘉俾進一官庸示勸奬徃朕休命益圖尓勤姚舜明復舊職朕記功忘過不遺䟽逺之臣而况出入禁近爲吾法從者乎具官某蚤以才猷屢更器使六卿之亞蔚有譽言頃由外官嘗坐㣲累閱時旣久宜見抆拭悉還舊秩用昭新恩徃其欽承益思懋勉陳昌禹除待制知静江府朕惟屏翰之重不可屬非其人矧吾桂管要衝控帶西南之地兵民所􅀉謀帥尤難非夫術略威權見于巳試不在兹選具官某忠勤自勵風力有聞簡于公朝屢更煩使比嘗付之郡政究其施設之方治有能名逺近信服是用嘉其顯效􅂌兹巨藩升華次對之聯増重中權之任朕方以安民爲武耀德爲威徃體至懷母求竒功以煩憂顧杜湛除遙郡團練使江西兵馬鈐轄朕設勇爵以待天下勞能之士葢欲激昻惰氣協成武功以尓沉鷙有謀忠力自奮習于行陣屢上戰多不有寵榮人罔攸勸其升舊秩徃主戎團祗服茂恩尚圖報稱王似除資政殿學士川陜宣撫使中原大勢實依秦蜀之雄元帥撫封用作藩籬之固眷求閱禮觀詩之士就付折衝綏逺之謀宜錫贊書以昭宿望具官某直方而不撓篤實而有容雅高拯溺之材遡大川而必濟見謂剸煩之手投利刅以皆虛屬此艱難之時備更中外之任純誠彌篤丕績具昭簡在深􅂨可膺重􅀉顧西南之外屏壯形勝于本朝師徒久勞疆場多事雖戎律巳勤于妙筭而軍容未正于中權載疇僉言肆時改命陟隆名于秘殿總大柄于師于是爲圖任之公勉赴功名之㑹予欲尊主威而強國尓則撫御于全師予欲禦外侮以息民爾則布宣于威令祗服明訓益勵逺猷盧法原除端明殿學士川陜宣撫副使當陜阻艱難之時慮莫先于謀帥得詩書禮樂之士庶相協以圖功矧累朝之舊臣副一方之重􅀉宜加異數以撫成師具官某志在古人名顯當世偏儀侍從堂堂人物之英備罄猷爲蹇蹇王臣之節肆予圖任屬此老成㑹興秦蜀之兵俾貳軍師之政竒謀碩畫自能暗合于孫吳禦侮伐謀尚何遠想于頗牧顧今方隅之未靖况復屯戍之久勤盍加寵於使權庶増重于戎律爰錫贊書之命亟升秘殿之華斷自朕心克符公論四郊多壘念方軫于至懷千里折衝其勉攄於逺略胡寅除起居郎左右置史進聮二省之華言動必書用紀一時之實求稱厥職可非其人以爾學博而文才敏以逹有志當世􅀤聞自初嘗妙簡于公朝繼入躋于淸貫論議不屈氣節可嘉兹用擢于州符付之史筆時惟舊物用觀巳試之能徃服新恩尚勉方來之效王居正除太常少􅀸舜命百夷典禮后䕫典樂各能其官以名後世今國家以奉常一司兼此二事而欲責其任職兹惟艱哉惟爾少以美才輔之篤學頃由簡㧞入侍於螭􅉾欲究設施旋分於符竹踐更旣久中外具宜顧兹列􅀸亦爾舊物其徃爲朕討論前代之制作緒正今日之缺遺使夫聲名文物之華燦然復舉庶幾朝覲㑹同之節將有可觀朕志所期申命惟允劉錫復捧日天武四廂都指揮使明州觀察使權主管殿前司公事儼州廬而列衛勢克壯于宸居提尺藉以申威權莫專于環尹厥惟要地宜付偉材具官某慷􅁣而喜竒謀沉勇而多大節撫臧宮之鳴劒夙有志于功名得黄石之遺編信獨傳于韜略起自將種進超武階時屬艱危任當繁劇佩邉城之印孤軍屢抗于凶殘分帥閫之權諸將敢違于紀律旣錫廉車之寵旋膺部督之雄輟統衛于親兵俾奮揚于西土偶坐微累頗鐫要官雖歷時未久于廢閑豈一􅌌遂忘于委任盡還故秩庸示新恩攝扈殿巖董司禁旅以重爪牙之􅀉以昭心膂之親匪惟爾私實允公議入王宮而假寐無忘大亮之忠兾虎賁之得人尚謹周公之戒􅀜師古除熈河蘭廓路安撫制置使馬歩軍總管依前綂制熈秦兩路軍馬專一招撫熈秦朕惟王者圖回大業綏靖邉隅亦惟四方梟俊之臣能任一時軍旅之事故得折衝禦侮坐有成功矧今西土未寧地居四戰選將任職可非其人具官某沉􅋧而通明銳以果總戎知變得眞將軍之風却敵無前見烈丈夫之勇一自㧞于遠服綂臨將士􅀍堅執銳率爲衆先威名旣昭人用信服今朕擢爾安熈河之民以揔節制之任仍兼舊職圖功允終夫兵勢無常雖貴乎必勝之將而安民爲武尤急于招携之謀徃服訓言毋忘報効楊應誠除樞宻副都承㫖宥宻之司整軍經武之制在焉方時多虞任責尤重孰能爲朕周旋其間奉承詔㫖雖在副介罔不擇人具官某明智有餘深逹世務氣節慷􅁣老而不衰自昔寵分州符遠持使節頗能推其素所蓄積見于設施譽者翕然逹予聞聽比旣起從祠館表率上閤猶以九儀朝覲之事用違所長更錫賛書擢兹要地夫樞機所繫萬里折衝不宻害成古人深戒徃御名厥職母忘訓言趙霈除吏部郎官朕以時方艱虞吏員増溢未能遽損思得通敏詳練之士主吾選法庶幾衡綜有序而僞冐者不得進則官曹流弊不革自淸以爾學世其家克自奮勵施于有政譽言甚休是用擢于典祠俾列天官之屬進必以叙益試爾能徃祗厥官嗣有襃寵呂本中除祠部郎官朕方舉群策以收中興之功顧天下士有一善可取猶將簡㧞任用而况巳試之才爲朕所知者乎以爾富于藝文能嗣家世考其事業譽在郎曹今典祠缺員肆以命爾夫氷㕔素號無事固有餘力足以講論古仐徃其勉之以待上用劉一止除祠部郞官腦詞同前以爾行義文詞縉紳推仰蚤膺器使入直螭􅉾嘉其乆卽退閑益自堅于氣節肆以郎選還寘本朝朕之用人不以官職崇卑而爲輕重徃祗厥服以茂逺圖嗣有褒遷毋虚朕意舒清國除直龍圖閣與郡西清五閣祖宗謨訓在焉寓直其間寔爲儒者之寵爾頃由郎省擢備史官旣致人言宜從外􅀘念其載筆之乆􅂌以河圖之名徃舉藩條尚思報稱華陽集卷第六畢
