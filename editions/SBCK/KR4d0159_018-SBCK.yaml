front:
  text: 華陽集卷第十八
  hash: sha256:a9843b8be5fd91e2befbef387bba2e4c5fbbbb942bbca6e0c40f9007f4ea978f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0159_SBCK_018-1a}
body:
  text: 金壇後學于孔兼校奏狀待罪狀右臣今月七日准中書後省牒准尚書省劄子節文臣僚上言陛下留神治道刻意恢復聽覽至勤奉養至約行宮不踰牧守之居射殿真用茅茨之制聲色無所親幸訏直毎加優容旣有此美實而播告之言或未有以􅀤之謂宜制告號令因事見詞以謙抑爲先必自引咎收拾人心且具言陛下食不重味居不求安思雪大耻圖復故疆之意而侈大矜夸之詞無所雜於其間雖夷狄之彊猶憚而屏迹中原之地不患不復奉聖㫖依奏劄與内外制詞臣者伏念臣以踈遠之蹤誤蒙陛下擢在西掖專掌詞命是宜討論潤色有以仰􅁛委任之重而臣學識淺陋言語鄙拙播告之修乃不能􅀤揚陛下儉約􅅚躬之德焦勞圖治之意以感動於萬方遂致臣僚陳獻之際建言及此退思不職俯伏惶懼莫知所爲臣見居家待罪伏望聖慈特賜黜責以爲詞臣不能者之戒謹錄奏聞伏候勑㫖駮程俱差遣指揮狀右臣今月十八日准中書門下省送到錄黄一道奉聖㫖程俱差知漳州葉三省知秀州宋處仁知南劒州王棐知永州令臣書行臣契勘數内程俱昨任中書舎人臣僚上言論其諂附蔡攸獻金盃與大將及知秀州弃城逃遁等罪巳落職宮觀臣不復具陳然竊見俱自去年得風緩疾精神昏眊支體不隨歩趨拜跪率皆有妨漳雖小郡千里民社正賴存撫非病痼者所能治兼其人方臥家就醫藥客至尚不能應接决難力疾赴任虚占朝廷窠闕况俱見在謫籍未經牽復一旦起典州郡士論不以爲是臣愚欲望聖􅄌將程俱知漳州指揮特賜寢罷所有錄黄臣未敢書行謹錄奏聞伏候勑㫖緣趙令懬轉行太中大夫詞頭狀右臣契勘元豐更定官制以左右諌議爲太中大夫秘書監爲中大夫雖兩官相去一間然官制旣定則諌議者侍從也秘書監庶官而巳故吏部法自承務郎以上應遷官者至中大夫止􅀂太中大夫非侍從官不得轉行謂之礙止法今令懬係中大夫庶官􅀉祿至此極矣而輙得轉行太中大夫則是以庶官超轉侍從於法有礙且自崇寧大觀以來士風不競叨官竊寵徃徃不循資序遂至紀綱大壞陛下􅁣然念治將欲大變其俗故前日冒濫之人大者追奪小者審量中外有識之士方竊欣幸以爲自是復守祖宗之法今廼緣令懬之故更違舊章超遷官秩臣所未諭夫國家之法所以公天下也使令懬得以超越轉行太中大夫非唯名器可惜亦恐方今天下官至中大夫者不少􅀂其間苟得無耻之士他日引此爲例欲與之則冒濫之弊復蹈前轍欲不與則是以朝廷官爵獨私於令慮非所以示四方也議者謂陛下御名睦宗族之道固當以此昭示至恩然臣以爲祖宗之法所以垂憲後世正須謹守豈可以私親而輙廢哉兼令懬在宗室中廉聲不聞昨居福州於太守程邁處􅀜說公事嘗爲大吉院僧求院住持獲賂不滿意遂興訴訟近差知泉州泉人知其貪而畏其來今又改除别郡夫貪惏如此而必使之治郡不知其人果能爲陛下安養百姓乎又况令懬旣得轉行太中大夫則階官便爲侍從改除他郡合衝庶官知州遂成見闕此爲令懬謀則巧矣其如公議何臣恐僥倖之門一啓後來者不可社絕欲望陛下將令慮轉行太中大夫并知州差遣指揮特賜寢罷所有詞頭臣未敢撰述謹錄奏聞伏候勑㫖乞宫觀第一狀右臣犲智謭薄遭遇聖明擢寘從班誤恩過厚固宜夙夜在職圖報萬分而臣志願未申情有所迫輙傾誠悃上冒聦聞伏念臣父母年垂八十父久苦肺疾氣血衰殘難於逺出自臣竊祿行朝止是間迎母氏到官去年秋臣母在此因傷暑抱疾累月蒙恩給臣假送還鄕里自後臣母亦不願隨臣久留於外臣終鮮兄弟􅅴㫖之奉唯臣一身臣旣効官卽於親側别無兼侍所以供養有闕私心常不安處臣自去年以來累具奏陳乞奉祠歸養未蒙俞允今者二親逺在一方桑榆寖迫仍復多病藥石所賴全缺供承臣不勝區區之私輙犯隆威再申前請伏望陛下特垂慈憫除臣一在外宮觀差遣庶幾獲盡子職無􅀒於孝養臣無任祈天懇聖激切俟命之至謹錄奏聞伏􅃸勑㫖乞宫觀第二狀右臣近嘗具奏以父母年老陳乞外任宫觀續准尚書省劄子奉聖㫖不允仰惟皇慈待下旣寛冒犯之誅而又恩容在職未欲使之輕去顧臣愚蠢上體聖意豈當更有叙陳實以誠迫于中不能自巳伏念臣本由一介蒙陛下拔擢謬列禁近敢不夙夜思報所以屢上奏牘瀝懇祈間者蓋緣二親迫於垂盡之年而􅅴㫖致養不獲奉於朝夕人子之心義不遑處􅀂使臣别有兄弟兼侍則雖逺去親側亦决不敢以區區之私冒塵淵聽伏望陛下俯察􅈼天之懇曲推從欲之仁特賜檢㑹臣前奏除臣一在外宮觀差遣臣愚干犯不勝惶懼戰慄之至謹錄奏聞伏候勑㫖辭免給事中狀紹興三年八月上章乞終養親不許繼􅀍㫖趣歸還朝供職中書舎人四年正月兼詳定一司勑令㝷擢給事中右臣今月十七日准尚書省劄子奉聖㫖除臣給事中日下供職者聞命震恐罔知所爲伏念臣資望素輕材能至陋當此艱虞之日誤蒙聖哲之知召從遠方擢備邇列使之獻納旣不能􅀘􅂇大化以表見千慮一得之愚職在詞章又不能􅀤􅀭盛德以聳動四方萬里之聽方虞罪譴敢覬遷除矧東臺論駮之司實萬機出納之地自揣無狀尤難冒居兼臣近以父母高年嘗乞宮祠歸養顧未蒙於俞允乃更竊於恩滎度義不安措躬無所伏望聖慈收還成命改􅂌真才庶逃非據之慚仍免煩言之責所有前件恩命臣不敢祗受謹錄奏聞伏候勑㫖再辭給事中乞宮觀狀右臣近准尚書省劄子奉聖㫖除臣給事中臣㝷具奏辭免伏蒙聖造未賜矝從竊念臣猥以空踈薄陋之姿久玷言語侍從之列事功無􅀘罪戾彌深陛下赦而不誅更加奬擢此葢隆天重地之德非臣殞首􅂢軀所能報􅁛固宜卽拜成命黽勉就職然臣區區私意實以父母年老近嘗力請宮祠庶便􅅴㫖聖恩不許夙夜靡遑方欲再瀝懇誠上干淵聽乃忽有此除授惕然慚懼尤難冒處夫爲親有請出於人子之本心􅀂因請得遷豈免羣言之竊議伏望陛下察其迫切追寢誤恩特賜檢㑹臣前奏除臣一外任宮觀差遣俾安愚分亦以便私臣不勝幸甚所有前件恩命臣未敢祗受謹錄奏聞伏候勑㫖除給事中舉凌哲自代狀蒙恩授前件職准令節文侍從官授訖三日内舉官一貟自代者右臣伏見左修職郎前秀州海鹽縣令凌哲禀性純明飭躬廉御名問學博而知要詞章蔚有可觀考其吏能尤識治體舉以自代實允公言謹錄奏聞伏候勑㫖看詳元祐黨人狀准尚書省劄子臣寮上言具前劄子七月十二日三省同奉聖㫖令給舎看詳元祐黨籍内曾任宰執侍從臺諌等官顯有名德合依累降指揮推恩之人并餘人各項開具限五日具狀聞奏今具下項須至奏聞者曾任宰臣文彦博呂公著司馬光呂大防劉摯范純仁韓忠彦曾任執政梁燾王巖􅅱王存鄭雍傅堯俞趙瞻韓維孫固范百禄胡宗愈李清臣蘇轍劉奉世范純禮陸佃安燾曾任待制以上蘇軾范祖禹王欽臣姚勔顧臨趙君錫馬黙孔武仲王汾孔文仲朱光庭吳安持錢勰李之純孫覺鮮于侁趙彦􅀂趙卨孫升李周劉安世韓川賈易呂希純曾肇王覿范純粹楊畏呂陶王古陳次􅂛豐稷謝文瓘鄒浩張舜民餘官秦觀湯或有杜純司馬康宋保國吳安詩張耒歐陽棐呂希哲劉唐老晁􅀘之黄庭堅黄隱畢仲遊常安民孔平仲添入黨籍冗雜泛濫増至三百九人看詳九十八人内除王珪一名不合在籍自餘九十七人多是名德之臣除臺諌官卒難省記外其間曾任宰執侍從及餘人並開項在前所有三百九人豁除九十七人係前石刻所載其餘數内更有侍從官上官均岑象求及餘官江公望范柔中鄧考甫孫諤等六人其名德亦顯然可見外有二百餘人雖石刻具存然其姓名有不顯者及當時議論是非爲年歲深逺别無文字攷究難以雷同開具契勘前項九十七人并六人共計一百三人依得累降推恩指揮所有今來臣寮上言許子孫陳乞恩例次數伏乞付三省措置施行謹録奏聞伏候勑㫖駮郭彦參放罷指揮􅃺八月二十八日准中書門下省送到錄黄一道爲郭彦參依前降指揮放罷等事令臣書讀行下者右臣契勘郭彦參權江州瑞昌縣事擅枷張俊下書人張玘其事巳經洪州體究得實臣取索事狀看詳蓋緣本縣舊吏鄔昱爲俊管莊昱方有公事在縣而玘適持俊書來徑傳入宅故彦參怒其不伏止約又疑玘所持書是昱詐爲遂令枷問巳而不曾勘斷却行踈放夫縣令官雖卑然以百里之權付之事有不平豈免訶問臣竊見近時州縣官吏率多曲意迎合求媚於當路至於不隨流俗能爲陛下奉法遵職者絕少􅀂彦參所爲正當有以崇奬之使其一時之間小有過當理尚可恕况於法初無違犯何所加罪哉始者洪州體究申上朝廷得㫖郭彦參依巳降指揮放罷於是士論籍籍以謂罰及無辜㝷爲臣寮論列陛下灼見其事收還指揮不行今又因俊奏陳却令彦參依前放罷兩月之間反復如此非所以示信於天下且俊大臣也豈肯以私意害朝廷之公法哉蓋是俊未知昨來體究得實及巳施行了當所以再有論奏臣愚欲望聖慈特降􅐶㫖將洪州體究到郭彦參事因并前後臣寮章䟽劄令俊知其郭彦參止乞依今年七月十二日巳降指揮施行所有今來録黄臣未敢書讀行下謹錄奏聞伏候勑㫖華陽集卷第十八畢
