front:
  text: 華陽集卷第三十四
  hash: sha256:1c740a164e149af29a1a9ba380b60c9b514f293441747085c3a31e8724a14414
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0159_SBCK_034-1a}
body:
  text: 金壇後學于孔兼校詩聞車駕幸秘府二首一聲淸蹕九天來睿主崇文寳運開光動石渠春滉􅃞香浮芸閣晝徘徊天顔有喜垂清問御筆新題仰聖才鉛槧小臣空悵望五雲深處認蓬萊春旗簇仗石渠邉東壁分明帝座前八品㣲官恩有地七年通籍願瞻天心馳魏闕何時到身滯周南秪自憐遙想道山雲集處幾多光寵被羣賢次韻王子飛跋石曼卿洛中題壁酒狂翫世芙蓉仙胷中落落太古全浮雲富貴不着眼肯復騰上誇鳶肩應恠元龍􅀒豪氣獻書天子言十事􅀐騾一去不可追風月凄凉壁間字九日陳少陽同戴國衡王虞章游天淸寺菊坡不蒙見約次韻少陽太丘道廣固難周自有良朋結勝游莫使彈琴防性氣只堪尋竹占淸幽三篇􅄙索詩償債一醉那無酒喚愁貧甚淵明在環堵忍教空􅀒菊花枝次韻國衡古寺憑崇岡蒼煙蔭喬木欹斜屋鱗比繚繞墻帶束何人闢層軒延客􅀉遐瞩醉賞菊坡下客意豈在菊念昔居此地名世盡儒服師曠賢多知蒼史聖重目臺成竟誰游事去不容跼梁王高帝孫名字亦不辱當時盛歌舞肯使後人逐陳迹今故存新池爲誰綠感歎世上事翻覆如轉燭請君聽鍾魚尚想吹紫玉次韻虞章軌道無停轍風林難盡柯人生百年間疾􅀂下走坡何爲形役苦况乃憂患多淵明頗解事舎濁揚淸波九原骨巳朽萬古名不磨念我獨窘束處世隨唯阿塵埃眼中滿歲月馬上過不作雞肋弃尚扣牛角歌正頼良友朋詩句陶天和㳙㳙吐㣲溜浩浩供洪河三篇怯大手未陳先倒戈借問菊坡游頗亦狂醉麽獨不飲公榮冷靣看紅酡欲賦無好語書懷愧陰何書懷紛紛兒軰謾同時獨􅀒權竒不受羈刻燭巳驚詩句速飛觴肯放酒行遲平生白壁休三歎萬事黄􅆝僅一炊誰向先賢得風制空令人笑虎頭癡夜飲二首大木千章難近用朱絃三歎有遺音㣲言欲扣會心處濁酒不妨隨意斟年少詩狂不自禁那堪客裏聽孤砧窻寒夜半月初上酒盡欲眠愁更深戲張處文二首禪房深夜雨蕭蕭只有靑燈伴寂寥咫尺嬋姢鎻朱戸不知何日枉佳招延賔北海坐常滿不飲公榮亦太慳病渇固應難與酒嘯歌元自不相關春末桃李盛開竹間有梅一枝薿然秀􅀤用唐子西韻簡汪彦章在處朱朱兼白白化工􅇊倆眞多色誰知先生鐵石心到眼物華如過客高標可但凌三冬一枝傑出妖艶中椒蘭絳灌信鼎貴萬世屈賈留淸風館職上元宴集葆真宮以病不赴次龔濬之韻春融凖擬千場醉底事年來興易厭滿眼笙歌招不出獨哦詩句遶窮簷鄭樞宻生日五首黄閤曾居百辟尊經綸相業滿乾坤化行風雨年年節恩到桑蔴處處村付與斗樞深拱極安排鼎鉉再調元贊襄好爲蒼生計天子文思納盡言朝來佳氣滿樞庭知是君王用老成素􅀝房喬關大事政須裴度張威名三千奏上深憂國百萬功成看偃兵聽取啼禽催布􅂖便將霖雨􅀤春耕衮衣廊廟孰推先元老勲名自卓然忠槩明堂尊一柱神鋒長劒􅀝中天定知闢國功歸召巳見䟽封地得燕相業蟬聮應未艾少翁家學似韋賢此日君恩特地深傳呼星使自天臨鸞臺鳯閣滿春色燕語鶯啼俱好音駿極共歌申降嶽對揚真頼傅爲霖靑氊豈待金甌卜自有公言格帝心推轂當時起陸沉巴俞秪恐累知音十年謬許門人列一報長懷國士心沙路待看新築穩桃陰應念舊蹊深酸寒尚有男兒志忍使霜華兩􅁂侵代人上鄭相生日三首瑞霧祥煙滿絳霄詔開黄閣宴生朝鈞天合奏御香滿百辟紫宸初散朝流花寳爵傳宣勸歡聲自逐和風轉四方爭獻壽星圖祝公千歲身長健畫手丹靑妙入神煌煌列􅀫能寫真貂冠玉帶畫中見便是凌煙閣上人偉哉風骨神仙裔主張壽禄來塵世不須更占南極星看取老人朝玉帝右壽星上方有國名衆香經行苑囿皆芬芳世人豈識天香界但知蘇合及都梁􅀶山氤氲吐㣲竇一炷香嬰淨塵垢散成五色空中雲持獻現前無量壽我公􅀫悟香嚴因應緣來現宰官身妙香宻圎證無漏總持不動真天人熏陶四海看無際便是經行衆香地獻香􅋘語應巳聞羅筏寧論幾千里右壽香凝香紅蠟大如椽華堂兩兩排金蓮漏澁銅壺寒夜永光搖翠幄爭春妍蘭膏芳苡何足道簾捲香風碧煙裊霜蛾勿用拂麟􅂡合就仙丹會難老我公身依日月光不假仙丹亦壽康煌煌神燭照天下光熖何止萬丈長世間爝火知無助想像丹輝爭欲賦可憐賤士老不才短檠見跋無佳句右壽燭送趙承之出守鄧州蓬萊宮中老仙伯一首詩堪萬人敵胡不佩劒趨明光要試南陽二千石南陽異時名帝鄉蘘山菊水秋風香民歌召杜向千載至今遺俗皆農桑使君此去殊不惡坐嘯風流有餘樂堂前畫燭照紅粧席上枯棊響飛雹行看璽書下赤墀旌旗夾道生光輝應念斯文要羽翼歸來九萬翔天池謁蔣仲逺坐中出所和徐學士詩歸而次韻二首是日飲仲逺宅見二侍兒剥啄龍門未厭頻􅂂聲容易出雲津求羊徑掃無它客王謝堂前宴令辰心醉不知簾外􅀨眼花唯覺坐中春留連更欲窮歡賞惆悵金壺啓夕淪不須乗月坐胡床簾底高張宻炬香隨意尊罍供北海等閑談論到羲皇三朝舊德真忘分一介㣲官倍有光禮絕百寮明日事可能重許上公堂謝周仲弼􅀉新米索米長安甑欲塵斗升分惠意何親無煩子罕出公粟自有叔牙知我貧指囷高風懷國士翻匙佳句憶詩人他年􅀂遂歸田去盡種香秔老此身索仲弼和詩且邀奕佳言吐屑破春温落落胷懷自不羣百萬買鄰輕去我十千沽酒屢思君􅂴償詩債緣何事熟讀棊經要異聞挑戰㑹從今日始待嚴旗皷送奔軍次韻彦章秋夜有感萬􅄜沉沉夜色幽􅀝樓長嘯雜吳謳干時不利羞魚沬廪食無功􅀋鼠偷巳欲忘言聊卒歲尚餘豪氣獨悲秋麴生風味真吾友誰解招呼與解愁秋日野望秋雲來不斷野色浩無窮興逸煩􅁭外詩成醉眼中懷鄕看􅀫鳥轉物悟飛蓬何日江南去新鱸鱠筯紅謝洪察院送酒􅄝酒劉伶絕世無春衫典盡倒天壺造門誰爲傾家釀見客常留滿眼沽頗訝霜威太嚴冷忽分春色到焦枯一尊且作通宵醉明日重看朝夕烏次韻陳去非中秋無月蕭瑟中宵雨打牕那知風葉亂飄黄巳無佳月供淸賞賴有新詩耿夜光蓬戸我方甘寂寞朱門君勿看煇煌只今天柱峰何在好約玄真一醉狂送杜子從赴成都倅結束征鞍去欲奔行行折柳送都門壯懷未用看􅀟􅁂祖席何妨醉一尊玉局仙游成獨徃草堂詩句與誰論懸知别乗風流處醉􅀝紅粧笑語温友人哭内作詩次韻奉倩傷情愛所鍾佳人難再豈天窮登臺曾是吹簫侶對影今爲舞鏡雄虛按故應愁午飯小牕誰與伴春風夜深它帳遙聞語莫怨朝來無是公戲題所見破睡輕風透碧紗寳􅁫聊挿任欹斜欲尋女伴嬉遊去試問鞦韆有幾家候張彦智承出縈虵路轉愜登臨一室翛然静客心杖屨主人山下去風鳴巖壑自幽深用前韻索彦智和詩老將詩壇數按臨詞鋒疑有受降心夜嚴旗鼓吾將勉只恐秦師壁巳深彦智贈汧泉一斗使僕淬礪斤斧出長松矯矯之姿甚大惠也因成小詩􅀉謝昔李太白作詩三千首自謂不直一杯水今詩四句耳較之不直㳙滴乃欲酬一斗之贈無乃太鮮乎纍纍弱蔓繞長松未放蒼龍舞太空賴有霜刀堪一割謝公汧水爲磨礱喜門客至簷桷縱横僅滿筵維摩病室故蕭然焚香淨掃床前地宴坐超觀物外天容膝不妨元亮醉下帷誰識仲舒賢白頭千里來相就知是吾兒幾世緣讀周仲弼雪中友人過訪詩次其韻􅀐馬走天闕着破幾狐裘功名藐未涯日月去不留從來舌本彊游談媿枚鄒閉門有樂地未用兒女憂故人􅀉新詩卷軸紅牙頭飄然雪中作乗興將誰謀相與情未踈連夜飛輕舟此身一縷㣲豈待萬户侯有酒且共樂貧交乃勝游次韻仲弼重九黄花白酒兩相逢把酒􅆪花對晚風千里故園雲水外三年歸路夢䰟中自憐晼晚傷秋色誰解踈狂􅀤醉紅􅀉語髯周頗知否此時情緒與君同送姪合赴省試三首破的雄鄕國擔簦上帝京路夷驤逸驥天闊轉飛鯨學就千人敵名歸四海爭莫言年少在歲月易峥嶸二黄卷新儒業靑錢舊世家征衣輕逺别祖席倍歡譁雲薄堯天近山昏楚日斜高堂朝夕念擢桂是生涯三聖主收羣策終軍正妙年精神揮玉雪翰墨灑雲煙舊學嗟予老衰宗繼汝賢决科須第一御名勿棄青氊華陽集卷第三十四畢
