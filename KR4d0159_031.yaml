front:
  text: 華陽集卷第三十一
  hash: sha256:a16fc5b15eb7bebdc46cf8a0c4aa0f35d492e76d36855c885021b9536205fce5
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0159_SBCK_031-1a}
body:
  text: 金壇後學于文熙校雜文祭張彥智文嗚呼天生偉人堂堂傑異既博於才抑豪於氣悼往古之不返追流風於末裔躬信義而急人處厄窮以遊戲妻孥困而號啼賔客喧其沓至苦俗態之卑陬納圓鑿於方枘獨昻昻以在羣思雲飛而孤唳觀負抱之如此宜少見於行事誦平生之所為亦表表於當世方建炎之巳酉海內俶其鼎沸渡五馬於烏江守孤城之如魂駭盜兵以環拏顧蕞爾其何恃仗忠信而出郊逆酋渠以單騎解血刃於垂及曾一鏃之不試倐移帥於廣陵膺戎虜之孔熾略旁州以煨燼眇千里而睥睨公開門而待之衆果却而逺避賴尊爼之折衝赫威名而逾厲天子異其材能詔徙近而作蔽惟建康之都會委荒城而晝閉招餘孽於散亡謂非公其誰治即銜命以入境咸息黥而輔劓出閭閻於瓦礫洗江山於昏翳弔野鬼之沉冤布春耕於新惠觀施設於三州曾未盡其一二俄感物以懷歸動蓴鱸之逸思叩帝閽而露章拜琳宮之仙吏反故鄉以訪舊侶漁樵而求志方却掃以就間肯輕身於權媚昔先祖之定交俾通家以相繼結盟好於金石沐芳馨於蘭蕙有如某之薄陋辱知過其子弟甫弱歲而承顔勤白首以無替每暇日之招邀吐肺肝而自誓走童僕之歡呼極芳鮮於庖胾傾家釀之新芻投車轄以留醉粲一笑以相樂率百金而屢費鄙後出之纎巧獨純誠以見謂逮之官於番陽慘離情而分𬒮阻萬山而道逺馳緘縢以來誶謂兵戈之未息將會靣之難值徴斯言之不祥卒永隔於下地嗚呼哀哉斂不摩棺葬不臨隧邈音容而遐想撫泛瀾以出涕驚祥祭之甫臨才一拜於墓次旅肴酒以致奠跽陳詞而略意後時而來心則有愧祭外祖母倪氏文恭聞令德發聞自初歸我外祖蘭芬藹如外氏族大母儀是朂靜專柔間不戒而肅曷彰厥善是生叔舅起家白屋士林之秀帝欲用之召從百里安輿迎侍象服煒煒孝養方隆命也不弔訃音自南痛靡有極追念蒙愛誨言具存歲時間見視猶巳孫中山遄歸一拜堂上曾未閲歲遽哭遺像嗚呼哀哉人亦有言五福罕備亦既備矣則又兼貴况復有子諸孫滿前相其令終尚何憾焉唯是慈訓永隔千古奠以致哀淚墮如雨祭丁明仲文嗚呼明仲藹茲令德何辜于天而奪之亟夫好名者爭尺寸之進而趨利者競錐刀之直孰如明仲有官不仕欣然自適日散千金了無難色此其高情逸韻視夫世俗之規規何啻十百而千億也方且左琴右書枕流漱石舒幽思而嘯詠對淸樽以朝夕友先賢於三徑五柳之間與之合堂而同席若其考古論今旁搜逺托或深入佛海或直造聖域以至醫經神巧之功地理陰陽之賾吳陸畫手鍾王筆迹莫不極精而研思毫分而縷析嗚呼明仲既賢而又多能胡為不壽一病至此極也雖然人生如夢百年瞬息逹人大觀何得何失惟典刑之徂盡後來無所矜式念此風俗使我心惻矧豫葭莩之親契好篤於疇昔航一水以相過每論心而莫逆嗟桑榆之暮景期林壑以逺迹誦招隱而振衣指迷途以先迪將駕言而從之忽千古之永隔嗚呼哀哉日月如駛及此窀穸懷話言其如在邈高風以寥閴跽陳詞而奠訣揮老淚之橫臆祭張彥度文同姓所先友義相朂惟公於我愛均骨肉初公南來歲在乙酉客中見我傾蓋如舊卜居吾邑契好日親趣舍利害有懷必陳為飢所驅宦遊契闊繾綣不忘書無虛月佐幕兩州鳴琴三縣至輒有聲銛鋒稍見衆驚且喜抱能將施公曰休矣善刀藏之奉祠歸來我方屏處白首對談過相勞苦曰惟此身來日無多一笑相樂吾其敢踈别去未幾話言猶在命也不淑忽焉棄背嗚呼哀哉公兄寶文我之先友國士期我親愛篤厚斯人既沒典刑在公不愸遺一吾誰與從豈無交遊莫如公久四十五年夢覺何有聊陳薄奠送公西山追懷曩昔淚下逆泉祭胡氏碩人文人之家法實由中饋允矣令德流芳必異仰惟碩人生有殊質歸我舅氏見謂良匹承上撫下以身周旋逹于宗黨靡有間言婦順母儀既克兼備凡厥家事不嚴而治舅方從宦進蒙上知曰惟在公皇恤我私匪其弗恤閫職有付處不失宜吾復何預暨登法從內助益勤湯沐疏封絲綸載新一時光寵有燁其盛豈無所本惟德之令謂宜百年永膺福祉胡為一病遽至不起嗚呼哀哉昔我外祖有子三人伯仲蚤世叔也獨存天既相之俾克顯大曷又抑之而奪其配我為其甥劬勞念母時過外家庶慰孤苦骨肉同體舅惟我親碩人遇我親愛惟均親之愛之義則有勗如巳子弟恩久彌篤去冬之别言猶在耳方卜再見遂隔生死訃音初聞哀極號慟何哀之極母黨為重瞻彼下湯歸窆有期永懷懿範胡寧忍違恭陳薄奠侑以楚些情見乎辭聲淚俱墮祭陳美成文粵惟陳氏世有令德如公父祖我幸及識先德往矣典刑在公方嚴厚重有祖遺風尚其家學博文約禮篤志不倦惟公是似再世濟美亦既兼之以戒以守厥譽四馳譽之云何曰誠長者修身齊家飾以儒雅顧我衰遲里閭相屬佩服典常蘭芬蕙馥乃以女孫為其子婦冀聮姻好相親以久孰云一病遂至此極堂堂若人何去之亟逾五望六壽則不允族半靑紫時獨不逢皇天卑付不充有命有德有義不逢何病餘慶流衍在其後昆身雖永巳不亡者存詞以寫哀一别千古尚想平生淚墮如雨祭甥丁伯升文嗚呼吾甥氣貌堂堂何賦分之多蹇而受命之不長未孩而孤既孤而病或者以為不祥惟吾令妹獨有是子不幸而婺居曰吾尚何為乃切自慕於共薑我先大夫與先夫人日夜念之欲奪其志以嫁而妹以甥之故指天自誓凛然有甚於秋霜觀夫守義若是則其所託於襁褓者厚矣譬猶草木之芳固將封之植之擢危根而孤秀期拱把於千章以吾甥出於積德之後且夙承其母訓又有伯父叔父教以義方吾故謂甥異時必能自立而襲其餘慶浩乎其未可量也豈知事有大繆年未及冠而天奪其母零丁一身蓋僅存而若亡有婦甚賢亦相繼而下世舋猶未巳又哭其長子之喪夫憂患百罹至此極矣嘗試推否泰之消長尚庶幾其享後福而壽康奚慘罰之太甚嬰此微恙而禍變卒駭於非常嗚呼哀哉甥舅恩義如何可忘獨捨我以先去其孰知余心之惶惶而况平生志願命有所制百不一償我是用追悼反復為出涕而淋浪雖然有形同歸於幻滅一死何足以悲傷顧或修而或短等炊夢於黃粱聊攄詞以寓意薦餘哀於一觴千古永訣歸安于藏祭舅李侍郎文惟公與我親則為舅道義之交實同朋友故或出或處一話一言未嘗不竭誠盡心以相佐佑如何天奪之亟一病遂至於不救嗚呼哀哉公生我後十有三年我之知公蓋自其幼有若梗楠豫章擢於喬林雖拱把之微巳見其蔚然而孤秀及其長也讀書考古夜以繼晝議論英發智略輻輳則又若騏驥驊騮一日千里駸駸乎得夷途而馳驟故常自謂材高者必能高舉器大者斯可大受於是發策決科蜚英騰茂當聖主收人材致太平之時能自拔於輩流躡羣英而並簉內而法從之嚴外而大郡之守獨以望實得之易若取諸懷袖且天之生公既卑以能名又寵以祿厚是將全其所亨而終以期頥之壽不謂令德壯猷方植而仆痛功名之雅志曾萬分之未就嗚呼哀哉公之材氣剛明諒直蓋天性之自然無所矯揉以是而遊於世故能任誠無欺徇義不苟雖遇事煩劇而蟠根錯節交乎前必使之毫分縷析情窮理究如庖丁之解牛迎刃砉然顧何勞於擊剖此固公之所長而人亦以是稱公同一辭於萬口初公罷官而歸以病來告亟往見之猶能為我強起握手道舊頗怪其二年之别白髮蒼顔氣消容皺方咨嗟而歎惜公忽笑曰子言何陋人生固有一死孰先孰後譬猶客寓時至則行何畏之有以是見公胸中所存死不足以動之而况世間得失利害其又奚疚追懷曩昔每聞擊節慷慨之談必有以發吾覆今我老矣事乃大繆母存之念既絶同心之盟莫副命也不淑安所歸咎情敞恍而愁思淚淋浪而噎嘔聊陳薄奠詞以為侑諒靈魂之未逺冀萬一於三嗅祭叔排岸文昔我先君唯叔同氣兄友弟恭華鄂韡韡于時燕私某每侍旁一話一言敬佩典常先君既沒嗟我何怙儀刑所瞻獨有叔父恩義載勗慰此孝思如何不弔叔又棄遺嗚呼哀哉堂堂吾叔得官歲晚材不及施有言莫踐浮沉里社夏屋渠渠既富且樂宦逹誰如謂宜百年享有全福七十非夭唯曰不足人曰不足叔也何憾有子若孫卜安于坎如某蹇薄老去疇依杖屨未逺舉目煙霏陳詞奠訣以寫哀慕詞莫究哀淚墮如雨祭弟彥飾文昔我先祖頎然五孫皆以世業種學績文季孟之間君勇且仁屢戰詞場誓將策勳事既大謬棄如飛塵浮沉里閭坐閲紛紜𬒳褐懷玉匪琢而珍昻昻令姿野鶴雞羣氣有拂膺怒髮衝巾心豈芥蒂即之也溫是謂坦率一笑一嚬曾莫矯揉任吾天真自其少小我固知君允矣直諒古之德人宜壽百歲率俾風淳云何不淑奄忽沉淪嗟我老矣來歸鄉枌交遊零落其誰與親賴有諸弟異戶同門花月風煙欣然一尊情久彌篤謂當終身君遽捨我悲哉良辰壽雖未極甲子越旬生雖不逹子孫詵詵數則有盡不亡者存亦可無憾安于丘墳唯是老懷痛茲天倫想念疇昔悽愴蒿焄酒殽如生冀來淸魂嗚呼彥飾聞乎不聞祭弟彥深文嗟豫生之多艱舉一世而少徒矧投老於窮巷交遊散而益踈獨三弟之鄰牆分戚休而與俱每論心而莫逆撫芳辰以自娛粵巳卯之徂夏鴈序折而稍孤念過從之鮮歡猶二季之相扶曷沉痛之未定君又棄余於半途愴餘年之無依籲蒼天其何辜嗚呼哀哉才踈而通莫之或攄心和而平退然守愚不知者謂君藏蓄之深而獨善知之者未嘗不歎其優遊卒歲得保身之令圖頃一病之沉綿氣朘消而莫蘇冀藥石之可恃竟奄忽而云徂紛華蕚之凋悴復誰憐於朽株老懷悽其感傷泣涕淚而盈𥚑設豆觴之菲奠視生平而不殊幸淸魂之一歆歸即安於山隅祭談彥才文嗟我有生逾八十年親戚故舊壯歲滿前水逝舟移去者紛然獨吾彥才相視華顛暇時過從一尊留連話舊論心情久益堅曷又厭余棄之而先念茲惸惸有懷孰宣嗚呼彥才和易周旋喜愠如一舉鄉推賢平生康強五福幾全晚見其子服榮官聮天報善人可無憾焉唯後死者無徒自憐去年之冬微疾巳纏扶杖過我諄諄話言猶冀後會約期禁煙豈謂永訣遽營新阡我老艱出空望堂筵一奠寓哀淚下迸泉謁文宣王廟文某去聖巳逺學道不工叨恩竊祿領兹獄事大懼不能任職然嘗聞諸夫子聽訟猶人必使無訟某雖不敏請事斯語尚其降鑒有以相之謁諸廟文某叨𬒳誤恩當一路按舉之職自視薄陋疇克以濟惟神宅靈此邦功德顯茂尚其陰相庶免大戾即事之三日敢用虔告華陽集卷第三十一畢
