front:
  text: 華陽集卷第三十五
  hash: sha256:f098d71bc6b35bcc92153c21d36129f8ae8b32f7aee5895271da265287e988a6
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0159_SBCK_035-1a}
body:
  text: 金壇後學于文熙校詩次韻蘇養直破虜謠旌旗千里照江紅學語小兒爭挽弓春風江岸草無際馬蹄踏遍靑茸茸將軍靣作石稜紫百萬胡羣陳前死遊魂假息度長江京觀應慚望西滸蘇侯筆力壯三軍破虜長謠入眼驚何當更獻中興頌坐看萬國朝神京次韻仲弼高卧元龍百尺樓飽看風月自忘憂雖無濁酒招陶令尚有枯棊伴奕秋俗事可堪遮眼底愁情終莫上眉頭襟懷落落誰能測方寸端容萬斛舟千里長懷北固樓客居顔巷不堪憂淸熒坐看孤燈夜搖落初驚一葉秋巳厭淸談揮麈尾誰能細字寫蠅頭蓴鱸固是吾家味好約西風買釣舟次韻李傳道感事臥病何人為掃門墮霜黃葉任􅌭紛旋沽濁酒難禁醉厭數孤砧逺更聞冉冉生涯飄似夢悠悠心緒亂如雲幾時得遂江湖去野性終隨鷗鷺羣聞官軍掩殺城中羣冦次傳道韻未復錢塘郡先收鐵甕城妖星隨月落殺氣逐參橫巳築鯨鯢觀重新鼓角聲大江應好在流恨幾時平飲散懶性時難合愁腸酒易醺雨聲窗外過客語夢中聞借問安邦策誰堪破賊羣可憐吾老矣生意薄如雲聞鎮江賊平賊隨寬詔免恩浹大江浮人少餘新市城荒剩故丘瘡痍誰共理宵旰獨深憂莫上西樓望黃雲滿眼愁次韻彥智夜歸三首餘年知有幾時過如激箭况乃丗味惡酸辛幾嘗遍朝來忽覽鏡坐歎華髮變故人尚青眼危論排月旦慰我出新詩驪珠有餘燦國步何多艱戎虜尚傳箭萬里眇寰海澒洞風塵遍其間蟣虱臣亦作豺狼變中興賴明主掃除在一旦憑君深夜望巳失妖星燦扁舟連夜發歸興急如箭喪亂男女悲一息萬慮遍人生豈匏繫事業有豹變聖主纂洪業廟堂用伊旦拔茅到公等王道何其燦次韻蘇晉翁見寄不見梁王舊吹臺年來愁眼向誰開求賢廊廟無虛日報國涓塵自乏才直指謾能迎櫑具永懷寧敢咏金罍相看鬢髮霜千丈自視文章水一杯晚歲可憐神氣索故人猶寄好詩來追還正始真堪喜突過黃初豈易陪婉孌也知能度曲葡萄應巳釀新醅何時東閣容驚坐一日那辭一百回傷春老來心事不禁春風物相撩入眼新苦索吟哦成底急且休拘束任吾真有錢買酒須饒醉無事看山莫厭頻憂國只今夔契在應容衰疾伴樵人用前韻送春滿眼鶯花自在春送春情緒怯愁新鼓琴不用戴安道行酒却須溫太真晚歲深交能有幾相逢爛醉莫辭頻新條更有明年在重與東風作主人次韻傳道夜觀牡丹年來春事不相關一笑除非醉裏拚未信花枝憎白髮且隨月色傍朱欄他時拜賜猶能記百官遊金明池館職賜牡丹此夜傷心更忍看姚魏風流渾謾與坐來雙泪落金盤七月晦七月忽逢晦悲秋竟若何破羌無妙略中聖有狂歌世味羞嘗鼎心源欲靜波由來麋鹿性幽興滿煙莎歸鄉窮巷歸來巳白頭結茅何必榜休休好山當戶碧雲晚明月滿溪寒葦秋詩社縱添新句法醉鄉難覔舊交遊平生幸自無機械一棹夷由去狎鷗用前韻愁來莫遣上眉頭著酒驅除醉即休未省一官堪送老已驚雙鬢不禁秋收心香火供清夢洗眼雲溪結勝遊喚取短蓬乘晚興坐看煙浪沒輕鷗對月蓬鬢秋風老柴門轍迹踈誰同今夜月望絶故人書止酒愁元亮何心賦子虛得詩還喜誦習氣未全除避冦艤舟遇雪西山羣盜欲侵凌小艇移家傍險行遮眼亂雲方合沓向人飛雪忽縱橫心憂出穴虎狼近身似繞枝烏鵲驚天闊此時難借問地偏何處可偷生用前韻雪花吹靣凍凌凌客路艱危敢緩行春酒可賖三日近野梅𥘉見一枝橫傷時在處愁先滿討賊無期夢自驚誰解山東問消息謝公應起為蒼生泊舟廟灣次姪合泊船高岸曲散策小村傍盜賊耳邉滿朝廷天際望繫愁官柳嫩醒醉野梅香後進推吾子詞鋒不可當春耕亂後荒田𣏌棘生歸來還喜見春耕隨犂細雨濛濛濕轉壠新泉䀨聒鳴好勸賣刀添健犢盡令長畒種香粳腐儒一飽真餘事莫遣閭閻有歎聲次韻黃堯翁鬪雞三首宴罷金雞列籠瞻黼座遙兩雄爭定霸一戰息虛憍忍受摧冠辱貪承賜錦饒如何紀渻氏今乃混漁樵二繫馬翠樓下鬪雞花樹旁飛毛驚辟易喋血壯摧傷奮擊方乘勢歡呼忽擅場忿心能幾許嗟爾太匆忙三約鬪提籠出無譁倚壁看禍心藏芥羽碎首濕朱冠擒敵壯夫事策勳公子歡棲羣噲等伍今日始知韓次韻顧應文萬事浮雲過眼空羞將白髮競春紅折腰久巳慚元亮作賦何勞慕敬通經世豈無天下士知心應有古人同破除孤憤難忘酒聖處時時且一中讀書郤老慚無術驅愁賴有書披尋窮潔渺領略造玄虛窗日三竿靜爐熏一炷餘倦來還自哂蠧簡類蟫魚次韻孫仲益食豚魚説食書生費口牙一杯初捧白瓷花晨鳬夜鯉可亡命早韭晚菘同世家毒甚鏌鎁渾謾語詩成珠玉且雄誇腐儒一飽忘粗糲更索盧同七碗茶次韻應文遊東園筋力摧頽老自知追歡猶學少年時園林勝處看如夢杖屨行來步懶移對酒不堪蕉葉滿插花那復帽簷欹羡君詩句方豪甚應笑踈狂亦強隨次韻李道士觀南山三首濛濛煙雨忽晴開坐覺羣山爽氣來誰向此間尋賀老相逢莫放酒船回山似圍屏六曲開小溪如帶傍山來結廬溪北對山住俗駕何妨且勒回柴門無事晝慵開杖屨誰曾得得來隔岸野花隨處發護巢幽鳥傍林回與韓子蒼别久忽邂逅於臨川遭時亂離道舊感歎子蒼有詩見贈次韻奉呈二首三顧當年尚草廬南陽誰識臥龍居舍人自是出世佛學子猶呼行祕書視草似聞虛翰苑追鋒看即近郊墟論思好為蒼生計莫學辛毗謾引𥚑隨緣到處是吾廬風雨飄颻敢定居異縣逢君如隔世七年怪我苦無書平生出處皆陳迹太半交遊巳故墟愁絶不知尊酒盡醉歸兒女笑牽𥚑言懷用子蒼韻早從微宦去田廬慚愧英遊許並居拙計自憐嵇叔懶暮年空悔子公書歸尋松竹開幽徑坐看牛羊下夕墟巳把經綸付王導不妨綀布製襟𥚑謝錢巽叔用子蒼韻底事承明厭直廬孤城天逺寄幽居根塵巳悟三乘祖香火聊看八會書是處風煙供翰墨何妨杖屨入村墟皇文近日收遺老妙手終煩輔帝𥚑寄曽公衮用子蒼韻五馬歸來識舊廬相門曾對水雲居家聲自可威戎虜吏最何勞課簿書好扈六飛還魏闕却麾單騎復姚墟莫欺霜鬢將軍老矍鑠猶能一攬𥚑晚興二首次人韻病骨離支怯晚風可堪遊目送飛鴻書淫老去還知倦酒聖秋來却喜中北伐會須空虎落西邊先欲靖蠶叢卑飛莫起扶搖念徒使莊生笑二蟲衰草連雲萬木風天高滅沒見孤鴻夕陽人散酒旗下逺浦船歸漁笛中兀兀松窗翻蠧簡垂垂蓬鬢颯霜叢自憐世味諳來慣巳覺忘辛似蓼蟲次韻謝人惠詩翩翩才氣逸輕翰倒瀉波瀾筆力寬沉醉不辭金盞側清吟長占竹窗寒捧心欲俲羞顰媚斫鼻須煩盡堊漫辱贈驪珠念無報但驚懷袖有竒觀夜雨夜雨妨清夢踈簷落細聲幽懷無客語偶坐有琴橫水闊柴荆逈風高鴈鶩驚感時思報主材薄愧平生閉閣閉閣靜無寐觀書空復愁虞卿雙白璧晏子一狐裘萬事等歸盡百年誰得留還將句中眼為問賈長頭行部至南陵題隱靜寺籃輿行盡萬松岡得得來看古道場飛錫落花成佛去後人誰見紫金光寄宿隱靜東軒軒外竹引飛泉落池中隔窗聞之如秋雨瀉簷聲踏殘西日寄僧房一炷爐熏秋夜長誰作響泉喧客枕夢回欹聽雨淋浪次韻李彥逹客舍秋懷落日孤村靜凄風一笛秋寸心灰欲死雙鬢雪添愁未報中原復應煩肉食謀獨慚蘇季子計拙幣貂表次韻彥逹之子初傾蓋論詩即定交心淸懸水鑑才逸奮蒲梢貰酒移賔榻擕盤雜野肴半醒還半醉相對老蘅茅木落木落秋聲逈山寒暮色連時危羞冕紱身老寄林泉濁酒平孤憤淸吟續短篇一枝吾巳足鴻鵠謝哀憐思歸梧陰低落月蛩響怨悽風舊隱江煙裏歸期客夢中攬衣驚帶緩看燭待花紅莫謾呼歡伯驅愁正罔功次韻酬彥逹浮榮過眼風脫葉鴛行無復清夢接柴門晝閉雀可羅寒日暉暉弄踈樾巳種芳蘭滋九畹更遣胎仙舞三疊李侯壯志亦可人舉目萬里欲橫絶醉眼時看石稜紫吟鬢半作霜棘折方今聖主躬儉勤奏賦不須誇羽獵中興盛事要磨崖老於文字誰踰結願君勉力上扶搖渺渺雲海出飛楫莫隨鎩翮臥窮巷謾學啼螿弔寒月燒香三絶句卷去竹書間棐几臥看桐影轉簷牙試憑波律送淸夢未信華胥天一涯霏霏沉水屑玄玉靄靄博山生翠雲羅筏城旁知幾里坐令香界徹微熏閉眼無勞身外思安心有法靜中知香添細炷焚千和茶碾新芽試一旗千和香出三洞珠囊華陽集卷第三十五畢
