front:
  text: 華陽集卷第二十一
  hash: sha256:333af9690d5b4f0e7994b2f60eb1ea3f12f58e668a7652857141590b174ab0ff
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0159_SBCK_021-1a}
body:
  text: 金壇後學于文熈校進故事一唐書禇遂良傳太宗曰朕行有三一監前代成敗以爲元龜二進善人共成政道三斥逺羣小不可讒言臣聞天下之道二治與亂而巳矣行堯舜禹湯文武之事則治行桀紂之幽厲事則亂進賢退不肖則治好近小人而不聞正論則亂堯舜禹湯文武與夫桀紂幽厲雖去今數千百載而其經世成敗之迹存方諸冊可考而知其成者昭然爲可仰也其敗者惕然爲可畏也由其所致以驗吾之所爲合於善者從而勉之近而惡者從而改之則師古之道於是乎在乃若捨夷途而弗遵蹈覆轍而不知戒未有不入於亂亡之域宜乎太宗監之以爲元龜歟至於進善人共成政道斥逺羣小不受讒言臣謂人主唯能監前代成敗以爲元龜則於此二者勉而行之宜無難焉葢人者國之寶也羣小者國之賊也猶氷炭之不可相入梟鸞之不可並翼而棲也故一善人進則羣賢類至不肖無所容必能使其君受直言而行正道如是而欲天下之不治不可得也一小人進則羣小類至君子無所容必能使其君聽讒說而由邪徑如是而欲天下之不亂亦不可得也太宗旣能監前代矣則知夫治生乎君子所以進善人共成正道知夫亂生於小人所以逺羣小而不受䜛言嗚呼太宗以英武之姿取孤隋攘群盜撥亂反正慨然行此三者用能致貞觀之治亦可謂盛王矣然史氏有言人之立事無不銳於治而工於初至其半則稍怠卒而漫澶不振觀太宗之三事始非不勤而終之實難何以言之乾陽畢工隋人解體可以監矣乃詔發卒治洛陽宮而乾陽之役復興張元素以謂襲亡國之弊同歸於亂所謂元龜者果安在哉魏徴嘗謂太宗在正觀初親君子斥小人比來輕䙝小人禮重君子重君子也恭而逺之輕小人也狎而近之又曰正觀之初求士如渇比來由心好惡以衆賢舉而用以一人毀而弃雖積年任而信或一朝疑而斥使䜛佞得行守道踈間然則進善人逺羣小其不克終亦可知矣且前代不可不監也善人不可不進也羣小不可不遠也爲治之道無出此三者信能行之久而不變帝王之德曷以尚之奈何太宗有區區之志而持之不堅所以後世君子之欲成人之美者莫不歎息於斯焉二後漢馬援傳建武四年隗囂使援奉書洛陽世祖使來歙持莭送援西歸隴右隗囂與援同臥起問以東方流言及京師得失援說囂曰前到朝廷上引見數十每接燕語自夕至旦才明勇略非人及也且開心見誠無所隱伏闊逹多大莭略與高帝同經學博覽政事文辨前世無比囂曰卿謂何如高帝援曰不如也高帝無可無不可今上好吏事動如節度又不許飲酒囂意不懌曰如卿言反復勝邪然雅信援故遂遣長子恂入質臣嘗謂中興之主自夏少康周宣王以來功業之盛莫如光武世之議者見其起於兵間破㝷邑百萬之師而王郞銅馬赤眉青犢之屬相継掃蕩遂以爲專用威武平定天下及觀馬援之言然後知光武所以成功固有出於威武之外者方隗囂據阨守險名震西州自以天水富盛士馬最彊將欲北收西河上郡東取三輔之地按秦舊迹表裏山河其志豈肯爲光武屈哉雖光武亦自謂不能屈也故遣使徃來卑辭厚禮言必稱字用敵國之儀以慰藉之當是時舉天下姦雄割㨿之徒比權量力桀驁難制莫囂若也馬援告以光武大略而囂意輒不懌遽以爲勝高帝於是遣子入質惕然畏服之不暇夫囂初未嘗親見光武之爲人也且光武才明勇略固非人敵則英睿之姿巳足以葢衆矣開心見誠無所隱伏則大信不疑已足以結人心矣旣闊逹多大節而又博學文辨旣好吏事而又動如節度不喜飲酒則其於經世變通之略修身勵行之事葢恢恢然有餘𥙿矣然則漢室陵夷之後有能兼是衆美傑然獨出於天下之上以圖中興之業則神器大寶不歸是將安歸乎此囂之所以聞其風聲不期服而自服也孟子曰以力服人者非心服也力不贍也以德服人者中心恱而誠服也故臣嘗論帝王之就功業當以德爲主而威武爲之輔明王御名德四夷猶將咸賔况區區一隗囂何足道哉雖然光武才明勇略濶逹多大節與夫經學博覽固人之所難能也至於好吏事動如節度不飲酒此細行耳常人亦能之乃以是稱光武何哉葢以帝王之資處富貴崇高之勢侈心勝之則易以縱怠心乗之則易以忽縱而不知戒忽而不知勉其視細行雖躬行若無難者殆有所甚難焉唯光武爲能克巳奮勵不敢自暇自逸此所以特異於衆非中才庸主所可同日語也故由光武以觀中興事業則修德來逺其効昭然可不勉哉三劉向新序顔淵侍魯定公于臺東野畢御馬于臺下定公曰善哉東野畢之御顔淵曰善則善矣雖然其馬將失定公不恱以告左右曰吾聞之君子不䜛人乎顔淵不恱歷階而去須臾馬敗聞矣定公命躐席而起曰趨駕請顏淵顔淵至定公曰向寡人曰善哉東野畢之御也吾子曰善則善矣雖然其馬將失不識君子何以知之也顔淵曰臣以政知之昔者舜工於使人造父工於使馬舜不窮其民造父不盡其馬是以舜無失民造父無失馬今東野畢之御也上車執轡御體正矣周旋歩驟朝禮畢矣歷險致逺而馬力殫矣然求不巳是以知其失也定公曰善可少進與顔淵曰獸窮則觸鳥窮則啄人窮則詐自古及今有窮其下能無危者未之有也臣讀書至於五子之歌曰予臨兆民懔乎若朽索之馭六馬然後知人君雖以崇高之資享天下之奉憂思危懼殆未嘗一日敢自安也葢民恃君以生而君則恃民以固邦本民不得其生必將召亂起禍本實先撥何以保邦其猶朽索馭馬而馳騁不巳决至於奔逸顛仆豈可不畏哉是以民有餘於生則資民以致治者恭巳南靣其樂亦有餘也馬有餘於力則乗馬以致遠者安意肆志其適亦有餘也顏淵知是道矣所以因畢野之御而以舜不窮其民造父不盡其馬告於定公使定公察御馬之道以明夫治民之術則魯國其庶幾乎臣觀古之治民者薄其賦歛取之以什一則以富其財也寛其征役使之以時而豐年不過三日則以優其力也民之所以爲生者財與力而巳矣舜不窮其民蓋知其所本在者觀其臨下以簡御衆以寛則凡民窮之政必無有也自舜以至禹湯文武率由是道奈何後世一切反之殫天下之財不足以充無厭之欲竭天下之力不足以供不急之務使夫安俗樂業之衆悉爲窮民卒抵於亂亡而後巳故曰人欲靜徭役毒之世方敝褒刻窮之此非獨桀紂秦隋爲然漢唐亦然也漢民之窮自武帝始唐民之窮自明皇始武帝以征伐明皇以奢淫是皆縱一已之樂而貽禍於天下者也孟子曰有布縷之征米粟之征力役之征君子用其一緩其二用其二而民有殍用其三而父子離夫爲王民而至於父子離則其窮極矣不亡何待故御馬者上車執轡體旣正矣周旋歩驟禮旣畢矣歷險至逺而馬力已殫矣然猶求焉馬未有不失者也是以善治天下者不窮其民惟舜能之善爲御者不盡其馬惟造父能之雖然造父不常有也而舜豈世出哉顔淵曰舜何人也予何人也有爲者亦若是故臣嘗謂帝王惟能恭儉節用而不窮其民是亦舜而已矣四唐鑑唐太宗曰人主唯有一心而攻之者甚衆或以勇力或以辯口或以諂䛕或以姦詐或以嗜欲輻輳攻之各求自售以取寵祿人主少懈而受其一則危亡隨之臣竊謂人主以眇然之身宅萬方之上一事有失不足以成大功一行或虧不足以備盛德自堯舜禹湯以至文武皆以功德盛大傳於後世者豈有他哉定其心術而已矣書曰人心惟危道心惟㣲心之在人危且㣲如此而事物萬變日交乎前則所以定之者可不知其道乎方其虚一而静獨觀昭曠無有系累則好惡公是非白尚誰得而惑之惟夫私情内萌偏見妄作方寸汨亂而不知其守此姦邪之所趣而䜛賊之所入也或以勇力或以辯口或以謟䛕或以姦邪或以嗜欲輻輳攻之其不至於顚倒敗壞者幾希矣何獨一事之失一行之虧乎且以漢唐觀之庸昏之主固不必言如孝武明皇亦坐此而致敗孝武當文景之後雄才大略可與有爲者也奈何秉心不正左右前後之人觀其向者投合所好如張湯杜周以慘刻而受知東方朔郭舎人以猾稽而得幸李延年之䛕媚江充之陰狡與夫臺池苑囿之觀弋獵犬馬之戲相與攻之卒至於海内騷動而漢室因以中衰明皇勵精政事開元之際幾至太平亦云盛矣然侈心一動窮天下不足以爲樂則有宇文融以言利進韋堅楊御名矜以褒刻顯李林甫之姦邪楊國忠之滛蠱相與攻之而明皇溺其所甚愛忘其所可戒卒至於天寶之禍不可救樂觀二君之事靡不有初鮮克有終後世所以惜之范祖禹以爲人主之心不可以有偏好葢好有所偏必將迷而不返以萬乗之國而迷其所好則一時憸佞便嬖皆將承意順㫖以僥倖恩寵唯恐其不至於是優賞濫賜上下相蒙雖有彊諌力爭之士能遽回其勢乎故臣嘗論人主之於天下唯當清静寡欲求所以安宗廟定社稷活百姓之道而力行之舎是皆不足留意唐太宗知夫人主一心而攻之者甚衆自謂少懈而受其一則危亡隨之嗚呼若太宗可謂知治道矣祖禺作唐鑑而撮取其語豈無意哉華陽集卷第二十一畢
