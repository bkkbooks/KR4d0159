front:
  text: 華陽集卷第五
  hash: sha256:0f80babf3ebb395c550c3a23554d4c3314915ede4044bee8971db3305a66cb5c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0159_SBCK_005-1a}
body:
  text: 金壇後學于文熈校外制劉大中除右司諌朕兢業圖治如渉淵氷深惟萬機猶懼有闕敷求端實剛明之士備耳目之官左右規切以開廣視聽惟爾博通儒學敢于有爲奉指觀風百吏震聳入居憲府志節彌厲兹用進爾于七人之列夫大則廷議小則上封諌臣之職也爾其夙夜罄竭輔朕不逮傳不云乎千人諾諾不如一士諤諤朕三復之蓋于爾有望焉王存追復資政殿學士左正議大夫贈左銀靑光祿大夫朕念㤗陵憂勤天下時有廟堂元老左右弼諧恊成丕功垂𥙿後世歲月逝矣遺忠隱然尚其典刑可勵媮薄寵榮弗及公論謂何具官某躬蹈古人夙有重望引義慷慨見于立朝元祐之初首膺簡用進位丞轄厥德茂焉中遭煩言䧟于鈎黨齎志没地久未昭雪朕方旌别淑慝以定國是肆疇勲緒考以舊章升秘殿之隆名陟文階之峻秩垂光幽壤流澤來裔精爽如在尚克欽承韓膺胄除直秘閣與外任右府本兵中臺布政分隷厥事其來尚矣今爾任吾宰属以材自奮顧于樞輔職靡所關乃遽引嫌丐從外𥙷勉狥抗章之懇俾升延閣之華徃服恩榮别膺器使李大有除右司朕以二三大臣總中臺之政設官置屬分贊左右一事之舉差若毫釐之逺天下休戚繫焉惟爾頃由郞省出膺郡寄能以材術自勵治譽藹然則夫朝廷施設所宜于民者亦旣深究而熟講之兹用命爾爲吾宰士爾其悉心徃共廼服以其所見于昔考所行于今必使六曹萬務各當其理若網在綱有條而不紊庶幾流澤于下而民有愜志則予汝嘉錢圻除刑部郞官六卿之屬皆朝廷高選而刑辟重事掌于秋官必資通明練逹之士庶革頗類放分之弊以爾文學行藝稱于縉紳中外踐揚顯有嘉績其徃列于郞位用參讞于刑章罔非在中尚迪有慶張致遠除監察史朕㧞舉賢能執憲轂下豈惟使之督察吏治亦將勵其風節取人所難以待異日之用惟爾問學淵博材猷敏彊見于設施信其有立是宜擢居臺屬贊肅綱維惟公無私可以守法惟明不蔽可以照姦人之言曰柔亦不茹剛亦不吐無縱詭隨以謹罔極吾將以是望汝尚克勉之嗣有褒寵許份贈四官陳力就列者人臣之義隱卒崇終者朝廷之仁嘉迺遺忠肆推䘏典具官某嗣傳家學躬有令名蚤𬒳遇于熈朝亟升華于禁路事功克著揚歷兹多久去周行方遂掛冠之懇載披奏牘遽聞易簀之言念其平生爲之惻怛陟文階之四等賁餘澤于重泉尚其有知服我休命韓之美李恪各轉一官日者虜大入襄郢一方爲之搔動而安睦宻邇形勝相望爾等或任守臣或貳郡政嚴武經而外拒固吾圉以自安賊不敢窺民用無擾有司言狀朕甚嘉之何愛一官不爲爾寵徃服休命益懋逺圖胡世將除禮部侍郎朕當艱難之時尤謹于禮故凡典司之任必擇其人眷廼秩宗實爲高選若時置貳用采公言具官某夙猷静淵器質通敏蚤發揮于事業䆮揚歷於禁嚴炳若詞章深得代言之體粹于論議屢殫造膝之忠卑方靣以宣勞總中權而兼制化行里俗荒疇漸復于春耕令肅兵屯外戸不聞于夜閉方渴論思之助宜還表著之聯徃副六卿遂典三禮夫出維周翰旣巳臻賣刀買犢之風則入備漢儀豈復憂㧞劒擊柱之事勉勵夙夜用副簡求劉岑除刑部侍郞朕惟王政必本于仁恩宜重萬民之命俗吏或牽于私意靡遵三尺之公肆求時髦俾職司㓂具官某性資敏明而輔以博古之學辨論詳雅而發爲華國之文夙藹譽于儒林亟躋榮于要路彌綸省闥肅振綱維揚歷道山蔚高領䄂察其更事之久必能議法以情簡自朕心宜掌邦禁徃攝貳卿之事進聯法從之班爾其端一意以持平審四方之奏讞民之多辟忍横𬒳于非辜法無二門尚參决以古義用迪咸中之慶庶追止辟之風唐恕贈徽猷閣侍制上有旌賢録舊之德下有生榮死哀之美朕覽觀前史有味其言是用優寵臣工不間存没具官某名德之後蹈履五常浮沉半生不爲勢屈眷言静退之節足以率厲本朝召自山林寘于卿列朕方嗟其相見之晚人皆期以不次之除如何老成奄忽長逝矣少也懷才不見于用晚而見用不盡其才追想遺德于予心有戚焉次對西淸叅軍法從以彰眷禮以慰爾地下之靈尚其有知服我休命鄭作肅除直秘閣宰屬要官彌綸省闥爾居其位以稱職聞尚宜服勒究乃施設遽兹引疾祈去周行考厥舊章寵升延閣姑遂爾志徃其欽承韓肖胄知温州量材受任進賢雖協于公朝居寵思危引分迺全於臣節眷予近輔祈解要樞爰推從欲之仁曲示均勞之意具官某性資夷粹識度淵宏蚤宣力于事功䆮升華于嚴近疇若名臣之緒夙推濟美之賢越自貳卿登于右府出疆萬里嘉復命之良勤坐制四夷方運籌之有賴奏章俄上去志莫回俾辭宥宻之司徃卽維之藩寄奉行詔令其務息于民勞益勵忠規尚無忘于王室梁汝嘉除徽猷閣待制朕惟今日廵幸之邦形勝有同于畿甸若時浩穰之浩剸裁寔賴于守臣疇厥功庸宜加寵異具官某有䟽通之智有彊敏之材早自奮揚亟蒙任使摘山煑海課歲入之居多輓粟飛粟致軍儲之有𥙿旋委翰藩之重俾司輦轂之繁吏有黠姦望風引去事雖盤錯投刅皆虛數引見于便殿信廼言之底績升華次對進列西清庶同增秩之褒庸示懋功之勸徃服明命益勵逺猷沈與求知鎮江府朕觀東南形勝之地京口實當上游方兹時廵尤所倚重思得折衝厭難之士以修古方伯連帥之職用作外屏寛予顧憂具官某學不守于空言才克施于有政蚤膺柬㧞亟寘淸華執法憲臺則排姦擊邪紀綱復振率屬銓部則揚淸激濁流品自分玉堂推詞翰之工經幄罄論思之助以其蓄之有素故能用無不宜久去周行殊鬱士論是用起從貢館殿此大邦眷惟一路節制之權加以萬旅營屯之寄非威重足以鎮浮則人不服非惠和足以宣化則下不安徃圖厥功奚侯多訓侯延慶除太常少卿朕惟六經之道同歸而禮之用爲急遭時多故奉常之官名存而實廢孰能爲朕褒舉闕遺正其名物庶幾一代之制尚有典刑惟爾博學而文強志以敏考其施設譽在縉紳比自侯邦召寘右史時乃舊物巳試曰能宜更錫于賛書俾遂亞于卿列朕方布告中外有事郊丘爰復舉于上儀其敢忘于舊典討論制作在爾勉之蘇擕除宗正少卿朕觀周南麟趾之化而美召穆公紏合宗族之詩眷言懿親曲加御名叙惟是圖諜散逸未克訂正屬之卿寺必推其人以爾明純惠和名臣之子更歷事任爲時老成久滋退間厥聞彌著用復寘于少列俾職司宗夫伯臣之設非獨序正屬籍辨昭穆之親踈也典刑視效于是乎取之勉爾所職昭厥象賢之美使吾同姓皆知蹈履先德亦所以勸顧不韙歟陸長民除右司朕惟朝廷之官皆爲擢用至于宰相之屬尤號要司賛綱紀出納之權懋省闥彌綸之望孰能任此莫如汝宜惟汝蚤奮才猷亟蒙器使勤勞備著中外迭居若時都公實乃舊職稽其巳試之效考以僉言之同是爲得人徃共厥服惟明敏能㑹法意惟公勤能督吏姦使六曹無滯于所行則萬務不勞而自理祗若予訓嗣有寵褒晏復除吏部郎官朝廷品覈人物掌以天官分總銓衡惟郞是賴爾以識度之逺材術之優頃蒙柬求與吾選事今用復爾于外俾列舊職爾其悉意一從事于新書使夫黠胥不能玩法而寒㣲無留滯之歎則予汝嘉胡松年除吏部尚書中臺分建六職允爲喉舌之司文部品序羣材尤重銓衡之寄遭時艱棘舊典逸遺方考實以成書思得人而總治求于試可宜以次遷具官某諒直而粹温䟽通而敏博才用衆務本于獨見之明學洞羣言輔以力行之志蚤持從橐克勵忠規代言西掖而進專瑣闈封駮之嚴率屬冬官而兼備經幄講論之益㑹殊鄰之脩聘將使指以出疆言不見于幾㣲動輒得其要領嘉乃任職簡予深衷俾升常伯之聯用冠丼泉之列旣師言之允穆庶邦治之協寧昔魏用毛玠崔琰典吏之曹化淸儉之節于多士唐以宋璟李乂掌選部擅平允之譽于一時徃旣厥心古人不逺陳與義除禮部侍郞朕選六卿之亞皆民譽也故治官掌銓衡之政而宗伯總禮文之事然劇易之職不同至于佐其長以率屬則協心盡悴厥任惟均具官某蚤以異材亟登邇列分職文部期年于兹姦弊旣除譽言無間念方使之進陪經幄兼直玉堂若猶責以煩劇之勞將恐妨於論思之益宜從所便易卑簡曹且禮所以治神人和上下豈在區區文物之間爲哉爾其勉修厥職使夫日力有𥙿而專意于問學文章以奉我淸間之燕朕心所望尚克體之胡世將除刑部侍郎朕惟天下一物失所尚足害政故于刑辟之事尤致哀務秋官亞卿率屬爲重朕所選卑非賢不居具官某學窮經術而知其變通智逹事幾而見于施設比自侯服召還秩宗雖未卽于周行巳大孚于羣聽㑹兹司宼方務得人載疇僉言咸曰汝可昔者伯夷降典要在折民惟刑臯陶制百姓于刑之中而曰以教祗德葢二官任職雖或不同然一體相須未始有間徃師古意其審克之劉岑除吏部侍郞朕方肇修銓衡之法付之文部使天下之士咸以資格聽其考序其職顧不重哉非得夫剸煩治劇之才何以勝激濁揚淸之任具官某學博而有守言大而力行擢貳秋官掌予邦憲以情論法吏不敢欺信其才高可膺煩使治官之亞汝宜攝承夫裴馬之能述于史氏後世稱焉徃其懋勉無愧古人是爲任職唐煇除中書舎人文章爾雅訓詞深厚獨稱西漢而後世罕能及者朕心慕焉是以敷求天下修㓗博習之士置諸左右侍從之列使備述作庶幾古人具官某秉德粹完操行純固韞櫝六經之奥服膺一善之㣲蚤勵才猷亟蒙器使擢居諌省知無不言進列史官書必以法朕旣嘉其風節之勁又嘗考迺詞章之華宜陟綸闈遂典書命夫代言之任是謂儒者之至榮然稱職爲難當識國家之大體益勉所學以宏厥聲華陽集卷第五畢
